  window._noticeImgData = editing&&editing.imageData ? editing.imageData : null;
}

function previewNoticeImg(input){
  if(!input.files||!input.files[0]) return;
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = function(e){
    window._noticeImgData = e.target.result;
    const prev = document.getElementById('m_nimg_preview');
    if(prev){
      prev.style.display = 'block';
      prev.innerHTML = '<div style="position:relative;display:inline-block">'
        +'<img src="'+e.target.result+'" style="max-width:100%;max-height:180px;border-radius:10px;display:block">'
        +'<button onclick="clearNoticeImg()" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:14px">×</button>'
        +'</div>';
    }
  };
  reader.readAsDataURL(file);
}
function clearNoticeImg(){
  window._noticeImgData = null;
  const prev = document.getElementById('m_nimg_preview');
  if(prev){ prev.style.display='none'; prev.innerHTML=''; }
  const inp = document.getElementById('m_nimg');
  if(inp) inp.value='';
}

function saveNotice(editId){
  const title = document.getElementById('m_ntitle').value.trim();
  const body  = document.getElementById('m_nbody').value.trim();
  const deadline = document.getElementById('m_ndeadline').value;
  const store = document.getElementById('m_nstore').value;
  const important = document.getElementById('m_nimp').checked;
  const imageData = window._noticeImgData || null;
  if(!title||!body) return alert('タイトルと内容を入力してください');

  const list = DB.getNotices();
  if(editId){
    // 編集
    const idx = list.findIndex(n=>n.id===editId);
    if(idx>=0){
      list[idx] = Object.assign({}, list[idx], {title, body, store, important, deadline, imageData, editedAt: today()});
      DB.set('notices', list);
    }
  } else {
    // 新規
    const staffInStore = STAFF_LIST.filter(s=>s.treat&&(store==='both'||s.store===store||s.store==='both'));
    const progress = {};
    staffInStore.forEach(s=>progress[s.id]='未対応');
    list.unshift({id:genId(), title, body, store, important, deadline, imageData, date:today(), author:S.user.name, readBy:[S.user.id], progress});
    DB.set('notices', list);
    // LINE通知
    const storeLabel = store==='both'?'全店':store==='A'?'浦和店':'広尾店';
    sendLineNotification(
      `${important?'🔴【重要】':'📢'}${title}\n投稿者: ${S.user.name}（${storeLabel}）\n${body.slice(0,100)}${body.length>100?'...':''}`,
      'ln_notice'
    );
  }
  window._noticeImgData = null;
  closeModal();
  render();
}

function updateProgress(noticeId, status){
  const notices=DB.getNotices();
  const idx=notices.findIndex(n=>n.id===noticeId);
  if(idx>=0){
    if(!notices[idx].progress)notices[idx].progress={};
    notices[idx].progress[S.user.id]=status;
    DB.set('notices',notices);
  }
  closeModal();
  setTimeout(()=>openNotice(noticeId),100);
}


function deleteNotice(id){
  if(!confirm('このお知らせを削除しますか？')) return;
  DB.set('notices',DB.getNotices().filter(n=>n.id!==id));
  closeModal();
  render();
}

function renderManuals(){
  const list = DB.getManuals();
  const cats = ['全て',...new Set(list.map(m=>m.cat))];
  const keyword = S.manualKeyword||'';
  const readKey = 'manual_read_'+(S.user?.id||'');
  const readMap = JSON.parse(localStorage.getItem(readKey)||'{}');
  const filtered = list.filter(m=>{
    const matchCat = S.manualCat==='全て'||m.cat===S.manualCat;
    const matchKey = !keyword||(m.title+m.body).includes(keyword);
    return matchCat&&matchKey;
  });
  const unread = filtered.filter(m=>!readMap[m.id]).length;

  return`<div class="page">
    <!-- 進捗バナー -->
    ${!isOwner()?`<div style="background:linear-gradient(135deg,#FCE4EC,#F8BBD9);border-radius:14px;padding:14px 16px;margin-bottom:14px">

        <div style="font-size:36px">📚</div>
        <div style="flex:1">
          <div style="font-weight:800;font-size:15px">接客マニュアル</div>
          <div style="font-size:12px;color:var(--mid);margin-top:2px">
            ${list.length}冊 · 未確認 <strong style="color:var(--danger)">${unread}件</strong>

          <div style="background:rgba(255,255,255,.5);border-radius:20px;height:6px;margin-top:6px;overflow:hidden">

      </div>
    </div>`:''}
    <!-- 検索 -->

      <input class="form-input" placeholder="🔍 キーワードで検索（例：クレーム・オフ）"

    </div>
    <!-- カテゴリ -->
    <div class="tab-row">
      ${cats.map(c=>{
        const mc=getManualCat(c);

          ${c==='全て'?'📚 全て':mc.icon+' '+c}

    ${filtered.map(m=>{

function showAddManualModal(editId){
  const list = DB.getManuals();
  const cats=[...new Set(list.map(m=>m.cat))];
  const editing = editId ? list.find(m=>m.id===editId) : null;
  // テキストエリアの中身は安全にエスケープ
  const safeBody = editing ? editing.body.replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
  const safeTitle = editing ? editing.title.replace(/"/g,'&quot;').replace(/</g,'&lt;') : '';
  showModal(`<div class="modal-title">${editing?'✏️ マニュアルを編集':'💅 マニュアルを追加'}</div>
    <div class="form-group"><label class="form-label">カテゴリ</label>

        <option value="new">新しいカテゴリ</option>
      </select></div>
    <div class="form-group hidden" id="m_newcatG"><label class="form-label">新しいカテゴリ名</label><input class="form-input" id="m_mncatname"></div>
    <div class="form-group"><label class="form-label">タイトル</label><input class="form-input" id="m_mtitle" placeholder="タイトル" value="${safeTitle}"></div>
    <div class="form-group"><label class="form-label">内容</label><textarea class="form-input" id="m_mbody" rows="12" placeholder="マニュアル内容を入力（改行OK）">${safeBody}</textarea></div>
    <button class="btn btn-primary btn-block" onclick="saveManual('${editId||''}')">💾 ${editing?'更新する':'保存する'}</button>`);
  document.getElementById('m_mcat').addEventListener('change',e=>{
    document.getElementById('m_newcatG').classList.toggle('hidden',e.target.value!=='new');
  });
}

function saveManual(editId){
  const catEl=document.getElementById('m_mcat');
  const cat=catEl.value==='new'?document.getElementById('m_mncatname').value:catEl.value;
  const title=document.getElementById('m_mtitle').value.trim();
  const body=document.getElementById('m_mbody').value.trim();
  if(!cat||!title||!body) return alert('すべての項目を入力してください');
  const list=DB.getManuals();
  if(editId){
    // 編集モード：既存エントリを更新
    const idx=list.findIndex(m=>m.id===editId);
    if(idx>=0){
      list[idx]={...list[idx], cat, title, body, updatedDate:today(), updatedBy:S.user.name};
    }
  } else {
    // 新規追加
    list.push({id:genId(),cat,title,body,date:today(),author:S.user.name});
  }
  DB.set('manuals',list);
  closeModal();
  render();
}

function deleteManual(id){
  if(!confirm('このマニュアルを削除しますか？')) return;
  DB.set('manuals',DB.getManuals().filter(m=>m.id!==id));
  closeModal();
  render();
}

function renderAttendance(){
  const att = DB.getAttendance();
  const todayAtt = att.filter(a=>a.date===today());
  const myRecord = todayAtt.filter(a=>a.staff===S.user.id);
  const clockedIn = myRecord.find(a=>!a.out);
  const d = new Date();
  const timeStr=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

  const allToday = canSeeAll() ? att.filter(a=>a.date===today()) : att.filter(a=>a.date===today()&&STAFF_LIST.find(s=>s.id===a.staff)?.store===S.user.store);
  return `<div class="page">
    <div class="clock-display">${timeStr}</div>
    <div style="margin-bottom:20px">
      ${clockedIn
        ? `<button class="btn btn-danger btn-block" onclick="clockOut()">🔴 退勤打刻</button>`
        : `<button class="btn btn-primary btn-block" onclick="clockIn()">🟢 出勤打刻</button>`}
    </div>
    ${myRecord.length>0?`<div class="card mb-12">
      <div class="fw-bold mb-8">📋 本日の記録</div>
      ${myRecord.map(r=>`<div class="att-item">
        <span>${r.in} ${r.out?'→ '+r.out:' （勤務中）'}</span>
        <span class="fw-bold">${r.out?calcHours(r.in,r.out):'--'}</span>
      </div>`).join('')}
    </div>`:''}
    ${isOwner()?`<div class="card">
      <div class="fw-bold mb-8">👥 本日のスタッフ状況</div>
      ${STAFF_LIST.filter(s=>s.treat&&(canSeeAll()||s.store===S.user.store)).map(s=>{
        const r=allToday.find(a=>a.staff===s.id&&!a.out);
        const done=allToday.filter(a=>a.staff===s.id&&a.out);
        return `<div class="att-item">
          <span class="fw-bold">${s.name}</span>
          <span class="${r?'badge badge-green':done.length?'badge badge-gray':'badge badge-gray'}">
            ${r?'出勤中':done.length?'退勤済':'未出勤'}
          </span>
        </div>`;
      }).join('')}
    </div>`:''}
  </div>`;
}

function calcHours(inT, outT){
  const [ih,im]=inT.split(':').map(Number);
  const [oh,om]=outT.split(':').map(Number);
  const mins=(oh*60+om)-(ih*60+im);
  return `${Math.floor(mins/60)}h${mins%60}m`;
}

function clockIn(){
  const att=DB.getAttendance();
  att.push({id:genId(),staff:S.user.id,date:today(),in:nowTime(),out:null});
  DB.set('attendance',att);
  render();
}

function clockOut(){
  const att=DB.getAttendance();
  const idx=att.findIndex(a=>a.staff===S.user.id&&a.date===today()&&!a.out);
  if(idx>=0){att[idx].out=nowTime();DB.set('attendance',att);}
  render();
}

function savePin(staffId){
  const input = document.getElementById('pin_'+staffId);
  if(!input) return;
  const val = input.value.trim();
  if(val && !/^[0-9]{4}$/.test(val)) return alert('4桁の数字で入力してください');
  const pins = DB.getPins();
  if(val) pins[staffId] = val;
  else delete pins[staffId];
  DB.setPins(pins);
  alert(val ? '✅ PINを設定しました' : '✅ PINを削除しました');
}


function exportData(){
  const keys = ['sales','customers','notices','messages','designs','designSchedules',
    'manuals','checklist','attendance','shiftRequests','absences','awards',
    'inventory','stocktaking','settings','pins','checkdone_A','checkdone_B',
    'staffConfig','menuConfig','appConfig','userIcons','points','chatSpaces',
    'storeUsageReqs','monthlyTasks','monthlyDone','repairs','reports','troubles'];

  const data = {
    version: '2.0',
    exportedAt: nowDateTime(),
    exportedBy: S.user?.name||'',
    salonNs: window._salonNs||'',
    localStorage: {},
    firebase: {}
  };

  // localStorageから
  keys.forEach(k=>{
    const val = localStorage.getItem('salon_'+k);
    if(val) data.localStorage[k] = val;
  });

  // Firebaseから（キャッシュ済みデータ）
  if(window._fbCache){
    data.firebase = JSON.parse(JSON.stringify(window._fbCache));
  }

  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  a.href = url;
  a.download = `cura_backup_${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  alert('✅ バックアップ完了！\n「cura_backup_'+dateStr+'.json」を安全な場所に保存してください。\n\nFirebase・localStorageの全データを含んでいます。');
}

function importData(input){
  const file = input.files[0];
  if(!file) return;
  if(!confirm('バックアップから復元しますか？\n現在のデータは上書きされます。')) {
    input.value='';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const backup = JSON.parse(e.target.result);
      if(!backup.data) throw new Error('無効なバックアップファイルです');
      let count = 0;
      Object.entries(backup.data).forEach(([k,v])=>{
        localStorage.setItem('salon_'+k, v);
        count++;
      });
      alert(`✅ 復元完了！${count}件のデータを復元しました。\nバックアップ日時: ${backup.exportedAt||'不明'}`);
      input.value='';
      render();
    } catch(err){
      alert('❌ 復元に失敗しました。\n正しいバックアップファイルを選択してください。');
      input.value='';
    }
  };
  reader.readAsText(file);
}


function uploadUserIcon(input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 3*1024*1024){ alert('3MB以下の画像を選択してください'); return; }
  const reader = new FileReader();
  reader.onload = function(e){
    DB.setUserIcon(S.user.id, e.target.result);
    alert('✅ アイコンを設定しました！');
    render();
  };
  reader.readAsDataURL(file);
}

function renderMenuCustModal(){
  const order = window._menuCustOrder||[];
  const allPages = ALL_MENU_ITEMS.map(function(m){return m.page;});
  // orderにないページ（追加可能）
  const available = ALL_MENU_ITEMS.filter(function(m){ return !order.includes(m.page); });

  let html = '<div class="modal-title">🔧 メニューを編集</div>';
  html += '<div style="font-size:12px;color:var(--mid);margin-bottom:12px">表示する項目を選んで並び替えできます</div>';

  html += '<div style="font-size:12px;font-weight:700;color:var(--pink);margin-bottom:6px">✅ 表示中（タップで削除・↑↓で並び替え）</div>';
  html += '<div id="menuCustList" style="margin-bottom:12px">';
  order.forEach(function(page, idx){
    const item = ALL_MENU_ITEMS.find(function(m){return m.page===page;});
    if(!item) return;
    html += '<div style="display:flex;align-items:center;gap:8px;padding:8px;background:#f8f8f8;border-radius:8px;margin-bottom:4px">';
    html += '<span style="font-size:18px">'+item.icon+'</span>';
    html += '<span style="flex:1;font-size:13px;font-weight:600">'+item.label+'</span>';
    html += '<button onclick="menuCustUp('+idx+')" style="background:none;border:1px solid #ddd;border-radius:6px;padding:2px 8px;cursor:pointer;font-size:12px" '+(idx===0?'disabled':'')+'>↑</button>';
    html += '<button onclick="menuCustDown('+idx+')" style="background:none;border:1px solid #ddd;border-radius:6px;padding:2px 8px;cursor:pointer;font-size:12px" '+(idx===order.length-1?'disabled':'')+'>↓</button>';
    html += '<button onclick="menuCustRemove(\''+page+'\')" style="background:none;border:1px solid var(--danger);border-radius:6px;padding:2px 8px;cursor:pointer;font-size:12px;color:var(--danger)">×</button>';
    html += '</div>';
  });
  html += '</div>';

  if(available.length>0){
    html += '<div style="font-size:12px;font-weight:700;color:var(--mid);margin-bottom:6px">＋ 追加できる項目</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">';
    available.forEach(function(item){
      html += '<button onclick="menuCustAdd(\''+item.page+'\')" style="padding:6px 10px;border-radius:8px;border:1.5px dashed var(--border);background:#fff;cursor:pointer;font-size:12px">'+item.icon+' '+item.label+'</button>';
    });
    html += '</div>';
  }

  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  html += '<button class="btn btn-ghost btn-sm" onclick="menuCustReset()">🔄 デフォルトに戻す</button>';
  html += '<button class="btn btn-primary btn-sm" onclick="menuCustSave()">💾 保存する</button>';
  html += '</div>';

  showModal(html);
}

function menuCustUp(idx){
  if(idx<=0) return;
  var a=window._menuCustOrder[idx-1]; window._menuCustOrder[idx-1]=window._menuCustOrder[idx]; window._menuCustOrder[idx]=a;
  renderMenuCustModal();
}
function menuCustDown(idx){
  if(idx>=window._menuCustOrder.length-1) return;
  var a=window._menuCustOrder[idx+1]; window._menuCustOrder[idx+1]=window._menuCustOrder[idx]; window._menuCustOrder[idx]=a;
  renderMenuCustModal();
}
function menuCustRemove(page){
  window._menuCustOrder = window._menuCustOrder.filter(function(p){return p!==page;});
  renderMenuCustModal();
}
function menuCustAdd(page){
  if(!window._menuCustOrder.includes(page)) window._menuCustOrder.push(page);
  renderMenuCustModal();
}
function menuCustReset(){
  window._menuCustOrder = ALL_MENU_ITEMS.map(function(m){return m.page;});
  renderMenuCustModal();
}
function menuCustSave(){
  const cfg = getNavConfig()||{};
  cfg.owner = window._menuCustOrder.slice();
  saveNavConfig(cfg);
  closeModal();
  render();
  alert('✅ メニューを保存しました！');
}

function addMenuCat(){
  const name = document.getElementById('new_menu_cat')?.value.trim();
  if(!name) return;
  const menus = loadMenus();
  menus.push({cat:name, items:[]});
  saveMenuConfig(menus);
  showMenuManager();
}

function removeMenuCat(idx){
  if(!confirm('このカテゴリを削除しますか？')) return;
  const menus = loadMenus();
  menus.splice(idx,1);
  saveMenuConfig(menus);
  S.menuEditCat = undefined;
  showMenuManager();

function renameMenuCat(idx){

function addMenuItem(catIdx){

function removeMenuItem(catIdx, itemIdx){

  });

async function sendLineNotification(message, eventId, isTest){
  const cfg = DB.getSettings();
  const workerUrl = cfg.lineWorkerUrl;
  const token     = cfg.lineToken;
  const events    = cfg.lineEvents||{};
  if(!workerUrl||!token) return false;
  if(eventId && events[eventId]===false) return false;

  // Firebase から登録済みのLINE IDを取得
  const lineIds = await getRegisteredLineIds();
  if(!lineIds.length && !isTest) return false;

  try{
    const endpoint = isTest ? workerUrl+'/notify' : workerUrl+'/broadcast';
    const body = isTest
      ? {token, lineUserId: lineIds[0]||'test', message}
      : {token, lineIds, message};

    const res = await fetch(endpoint, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    return res.ok;
  }catch(e){
    console.warn('LINE通知エラー:', e.message);
    return false;
  }
}

async function getRegisteredLineIds(){
  // Firebaseからスタッフが登録したLINE IDを取得
  if(!window._fbCache) return [];
  const lineIds = window._fbCache['lineIds']||{};
  return Object.values(lineIds).filter(Boolean);
}

function executeTestDataClear(){
  if(!window._fbDB){ alert('Firebase接続が必要です'); return; }

  const checked = (id) => document.getElementById('del_'+id)?.checked;
  const updates = {};

  // チェックされた項目のみ削除
  ['sales','customers','messages','absences','notices',
   'thanks','reports','repairs2','storeUsageReqs','attendance'].forEach(k=>{
    if(checked(k)){
      updates[window._dataPath+'/'+k] = null;
      delete window._fbCache[k];
      localStorage.removeItem('salon_'+k);
    }
  });
  if(checked('checkdone')){
    updates[window._dataPath+'/checkdone_A'] = null;
    updates[window._dataPath+'/checkdone_B'] = null;
    delete window._fbCache['checkdone_A'];
    delete window._fbCache['checkdone_B'];
  }
  if(checked('chats')){
    ['all','A','B','mgmt'].forEach(room=>{
      updates[window._chatsBasePath+'/'+room] = null;
      updates[window._reactionsBasePath+'/'+room] = null;
      window._fbChats[room] = {};
      window._fbReactions[room] = {};
      localStorage.removeItem('chat_'+room);
    });
  }

  if(Object.keys(updates).length === 0){
    alert('削除する項目を選択してください');
    return;
  }

  closeModal();
  render(); // 即時UI更新

  window._fbDB.ref('/').update(updates, function(error){
    if(error){
      alert('❌ 削除失敗: ' + error.message);
    } else {
      alert('✅ 選択したデータを削除しました！');
      render();
    }
  });
}

function renderMessages(){
  const tab = S.msgTab || 'inbox';
  const allMsgs = DB.getMessages();

  // 受信メッセージ
  const inbox = allMsgs.filter(m=>{
    if(!S.user) return false;
    if(m.from === S.user.id) return false;
    if(m.to==='all') return true;
    if(m.to==='store') return m.toStore===S.user.store||S.user.store==='both';
    if(m.to==='individual') return m.toId===S.user.id;
    return false;
  }).sort((a,b)=>b.date.localeCompare(a.date));

  // 送信メッセージ
  const sent = allMsgs.filter(m=>m.from===S.user?.id)
    .sort((a,b)=>b.date.localeCompare(a.date));

  // タスク管理（オーナー）
  const taskBoard = isOwner() ? allMsgs
    .filter(m=>m.progress&&Object.keys(m.progress).length>0)
    .sort((a,b)=>b.date.localeCompare(a.date)) : [];

  const unreadCount = inbox.filter(m=>!(m.readBy||[]).includes(S.user?.id)).length;

  return`<div class="page">
    <div class="tab-row">
      <button class="tab ${tab==='inbox'?'active':''}" onclick="S.msgTab='inbox';render()">
        📥 受信${unreadCount>0?` <span style="background:var(--danger);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px">${unreadCount}</span>`:''}
      </button>
      <button class="tab ${tab==='sent'?'active':''}" onclick="S.msgTab='sent';render()">📤 送信</button>
      ${isOwner()?`<button class="tab ${tab==='tasks'?'active':''}" onclick="S.msgTab='tasks';render()">📊 タスク管理</button>`:''}
    </div>

    ${tab==='inbox'?renderInbox(inbox):''}
    ${tab==='sent'?renderSent(sent):''}
    ${tab==='tasks'?renderTaskBoard(taskBoard):''}

    <button class="fab" onclick="showAddMessageModal()">✏️</button>
  </div>`;
}

  if(msgs.length===0) return`<div class="empty-state"><div class="empty-icon">📥</div><div class="empty-text">受信メッセージはありません</div></div>`;
  return msgs.map(m=>{
    const isRead=(m.readBy||[]).includes(S.user?.id);
    const myProg=m.progress?m.progress[S.user?.id]:'';
    const pColor=myProg==='完了'?'badge-green':myProg==='対応中'?'badge-warn':'badge-gray';
    const isExp=m.deadline&&new Date(m.deadline)<new Date()&&myProg!=='完了';

        <span class="badge badge-gray">From: ${m.fromName||"不明"}${STAFF_LIST.find(s=>s.id===m.from)?("（"+getStoreLabel(STAFF_LIST.find(s=>s.id===m.from).store)+"）"):""}</span>

      <div class="fw-bold" style="${m.cancelled?'text-decoration:line-through;color:#999':''}">${m.title}</div>

  }).join('');
}

      const doneCount=progEntries.filter(([,v])=>v==='完了').length;

      const total=progEntries.length;
      const pct=total?Math.round(doneCount/total*100):0;
      const isExp=m.deadline&&new Date(m.deadline)<new Date()&&doneCount<total;
      const toLabel=m.to==='all'?'全員':m.to==='store'?getStoreLabel(m.toStore):(m.toName||'');
      return`<div class="card" onclick="openMessage('${m.id}')" style="cursor:pointer">

          <span class="badge ${doneCount===total?'badge-green':isExp?'badge-danger':'badge-warn'}">${doneCount===total?'✅ 完了':isExp?'⚠️ 超過':'進行中'}</span>
        </div>

function openMessage(id){
  const msgs=DB.getMessages();
  const idx=msgs.findIndex(x=>x.id===id);
  const m=msgs[idx];
  if(!m) return;
  // 既読にする
  if(!isOwner()||(m.from!==S.user?.id)){
    msgs[idx].readBy=[...new Set([...(msgs[idx].readBy||[]),S.user?.id])];
    DB.set('messages',msgs);
  }
  const myProg=m.progress?m.progress[S.user?.id]:'';
  const progOptions=['未対応','対応中','完了'];
  const isExp=m.deadline&&new Date(m.deadline)<new Date()&&myProg!=='完了';
  const toLabel=m.to==='all'?'全員':m.to==='store'?getStoreLabel(m.toStore):(m.toName||'');
  const isSender=m.from===S.user?.id;

  const deadlineHtml=m.deadline?`<div style="padding:8px 12px;background:${isExp?'#FFEBEE':'#f5f5f5'};border-radius:var(--rs);margin:8px 0;font-size:13px">

  const groupOptions = isOwner() ? `

    <button class="btn btn-primary btn-block" onclick="saveMessage()">📨 送信する</button>`);

function saveMessage(){
  const title=document.getElementById('m_mtit').value.trim();
  const body=document.getElementById('m_mbod').value.trim();
  const deadline=document.getElementById('m_mdl').value;
  const toVal=document.getElementById('m_mto').value;
  if(!title||!body) return alert('タイトルと内容を入力してください');
  let to='individual', toStore=null, toId=null, toName=null;
  let recipients=[];
  if(toVal==='all'){to='all';recipients=STAFF_LIST.filter(s=>s.treat&&s.id!==S.user?.id);}
  else if(toVal.startsWith('store_')){toStore=toVal.replace('store_','');to='store';recipients=STAFF_LIST.filter(s=>s.treat&&s.store===toStore&&s.id!==S.user?.id);}
  else{toId=toVal.replace('id_','');const ts=STAFF_LIST.find(s=>s.id===toId);toName=ts?.name||'';recipients=ts?[ts]:[];}
  const progress={};
  if(recipients && recipients.length>0) recipients.forEach(s=>{if(s&&s.id) progress[s.id]='未対応';});
  const list=DB.getMessages();
  list.unshift({id:genId(),title,body,deadline,to,toStore,toId,toName,date:today(),from:S.user?.id||'',fromName:S.user?.name||'',readBy:[S.user?.id||''],progress});
  DB.set('messages',list);
  closeModal();
  alert('📨 送信しました！');
  render();
}

function updateMsgProgress(msgId, status){
  const msgs=DB.getMessages();
  const idx=msgs.findIndex(m=>m.id===msgId);
  if(idx>=0){
    const prev=(msgs[idx].progress||{})[S.user?.id];
    if(!msgs[idx].progress)msgs[idx].progress={};
    msgs[idx].progress[S.user?.id]=status;
    DB.set('messages',msgs);
    if(status==='完了'&&prev!=='完了'&&S.user){
      addPoints(S.user.id,'📋 タスク完了',POINT_RULES.task_done);
    }
  }
  closeModal();
  setTimeout(()=>openMessage(msgId),100);
}

function deleteMessage(id){
  if(!confirm('削除しますか？'))return;
  DB.set('messages',DB.getMessages().filter(m=>m.id!==id));
  closeModal();render();
}

        <input type="file" accept="image/*" style="display:none" onchange="previewDesignImg(this)">
      </label>

    <button class="btn btn-primary btn-block" onclick="saveDesign()">投稿する</button>`);
}

function previewDesignImg(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    window._designImgData = e.target.result;
    const prev = document.getElementById('d_img_preview');
    const prevImg = document.getElementById('d_img_previewImg');
    const label = document.getElementById('d_img_label');
    if(prev && prevImg){
      prevImg.src = e.target.result;
      prev.style.display = 'block';
      if(label) label.textContent = '✅ 画像選択済み';
    }
  };
  reader.readAsDataURL(file);
}

function clearDesignImg(){
  window._designImgData = null;
  const prev = document.getElementById('d_img_preview');
  const label = document.getElementById('d_img_label');
  if(prev) prev.style.display = 'none';
  if(label) label.textContent = '📸 写真を選択（インスタスクショなど）';
}

function saveDesign(){
  const title=document.getElementById('d_title').value.trim();
  const cat=document.getElementById('d_cat').value;
  const menuCat=document.getElementById('d_menucat').value;
  const tags=document.getElementById('d_tags').value.trim();
  const store=document.getElementById('d_store')?.value||'both';
  const imageUrl = window._designImgData || document.getElementById('d_img').value.trim();
  const youtubeUrl = document.getElementById('d_youtube')?.value.trim()||'';
  const bodyEl=document.getElementById('d_body');
  const body=(bodyEl?bodyEl.value.trim():'')||'（コメントなし）';
  if(!title) return alert('タイトルを入力してください');

  // 確認スタッフの指定（チェックされたスタッフのみ、未選択なら全員）
  const treatStaff = STAFF_LIST.filter(s=>s.treat);
  const checkedStaff = treatStaff.filter(s=>document.getElementById('d_staff_'+s.id)?.checked);
  const targetStaff = checkedStaff.length>0 ? checkedStaff : treatStaff;

  const progress={};
  targetStaff.forEach(s=>progress[s.id]='未確認');

  const list=DB.getDesigns();
  list.unshift({
    id:genId(),title,cat,menuCat,tags,imageUrl,youtubeUrl,body,store,
    date:today(),author:S.user.name,authorId:S.user.id,
    progress,
    targetStaffIds: targetStaff.map(s=>s.id)
  });
  DB.set('designs',list);
  window._designImgData = null;
  closeModal();render();
}

function confirmDesign(id){
  const list = DB.getDesigns();
  const idx = list.findIndex(d=>d.id===id);
  if(idx<0) return;
  if(!list[idx].confirmed) list[idx].confirmed = {};
  list[idx].confirmed[S.user.id] = true;
  list[idx].confirmed[S.user.id+'_at'] = today();
  DB.set('designs', list);
  closeModal();
  openDesign(id); // 再表示
}

function updateDesignProgress(designId, status){
  const designs=DB.getDesigns();
  const idx=designs.findIndex(d=>d.id===designId);
  if(idx>=0){
    const prev=(designs[idx].progress||{})[S.user.id];
    if(!designs[idx].progress)designs[idx].progress={};
    designs[idx].progress[S.user.id]=status;
    DB.set('designs',designs);
    if(status==='習得済み'&&prev!=='習得済み'&&S.user){
      addPoints(S.user.id,'💅 デザイン習得済み',POINT_RULES.design_learn);
    }
  }
  closeModal();
  setTimeout(()=>openDesign(designId),100);
}

// DESIGN SCHEDULE (デザインスケジュール管理)
// ============================================================
const DESIGN_STAGES=['デザイン案','撮影','手順作成','公開済み'];
const DESIGN_TYPES=['キャンペーン','定額','季節限定','レギュラー','その他'];

function renderDesignSchedule(){
  const schedules=(DB.get('designSchedules')||[]).sort((a,b)=>a.deadline?a.deadline.localeCompare(b.deadline||'z'):1);
  return`<div class="page">
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button class="tab" onclick="S.designMainTab='gallery';render()">💅 デザイン</button>
      <button class="tab active">📅 スケジュール</button>
    </div>
    ${schedules.length===0?`<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">スケジュールはまだありません</div></div>`:''}
    ${schedules.map(s=>{
      const stageIdx=DESIGN_STAGES.indexOf(s.stage);
      const pct=Math.round((stageIdx+1)/DESIGN_STAGES.length*100);
      const isExp=s.deadline&&new Date(s.deadline)<new Date()&&s.stage!=='公開済み';
      return`<div class="card" onclick="openDesignSchedule('${s.id}')" style="cursor:pointer">
        <div class="card-row mb-8">
          <div>
            <span class="fw-bold">${s.title}</span>
            <span class="badge badge-blue" style="font-size:11px;margin-left:6px">${s.type}</span>
          </div>
          <span class="badge ${s.stage==='公開済み'?'badge-green':isExp?'badge-danger':'badge-warn'}">${s.stage}</span>
        </div>
        <div class="progress-bar" style="margin-bottom:6px"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--mid)">
          ${DESIGN_STAGES.map((st,i)=>`<span style="color:${i<=stageIdx?'var(--pink)':'var(--lite)'}">${i<=stageIdx?'✅':'○'} ${st}</span>`).join('')}
        </div>
        ${s.deadline?`<div style="font-size:12px;color:${isExp?'var(--danger)':'var(--mid)'};margin-top:6px">📅 期限: ${fmtDateFull(s.deadline)}${isExp?' ⚠️ 超過':''}</div>`:''}
        ${s.memo?`<div style="font-size:12px;color:var(--mid);margin-top:4px">📝 ${s.memo}</div>`:''}
      </div>`;
    }).join('')}
    <button class="fab" onclick="showAddScheduleModal()">＋</button>
  </div>`;
}

function openDesignSchedule(id){
  const list=DB.get('designSchedules')||[];
  const s=list.find(x=>x.id===id);
  if(!s) return;
  const stageIdx=DESIGN_STAGES.indexOf(s.stage);
  const isExp=s.deadline&&new Date(s.deadline)<new Date()&&s.stage!=='公開済み';
  showModal(`
    <div class="flex gap-8 mb-8" style="flex-wrap:wrap">
      <span class="badge badge-blue">${s.type}</span>
      <span class="badge ${s.stage==='公開済み'?'badge-green':isExp?'badge-danger':'badge-warn'}">${s.stage}</span>
    </div>
    <div class="modal-title">${s.title}</div>
    ${s.deadline?`<div style="font-size:13px;color:${isExp?'var(--danger)':'var(--mid)'};margin-bottom:12px">📅 期限: ${fmtDateFull(s.deadline)}${isExp?' ⚠️ 期限超過':''}</div>`:''}
    ${s.memo?`<div style="background:var(--bg);padding:12px;border-radius:var(--rs);font-size:14px;line-height:1.8;white-space:pre-wrap;margin-bottom:14px">📝 ${s.memo}</div>`:''}

    <div style="font-size:13px;font-weight:600;color:var(--mid);margin-bottom:10px">📊 ステージを更新</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
      ${DESIGN_STAGES.map((st,i)=>`<button class="btn ${s.stage===st?'btn-primary':'btn-ghost'} btn-sm" onclick="updateScheduleStage('${s.id}','${st}')">${i<=stageIdx?'✅':''} ${st}</button>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="btn btn-danger btn-sm" onclick="deleteSchedule('${s.id}')">🗑 削除</button>
      <button class="btn btn-outline btn-sm" onclick="closeModal()">閉じる</button>
    </div>`);
}

function showAddScheduleModal(){
  showModal(`<div class="modal-title">📅 デザインスケジュール追加</div>
    <div class="form-group"><label class="form-label">タイトル</label><input class="form-input" id="sch_title" placeholder="例：夏キャンペーンネイル2026"></div>
    <div class="form-group"><label class="form-label">種類</label>
      <select class="form-input" id="sch_type">${DESIGN_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">現在のステージ</label>
      <select class="form-input" id="sch_stage">${DESIGN_STAGES.map(s=>`<option>${s}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">📅 公開予定日</label><input type="date" class="form-input" id="sch_dl"></div>
    <div class="form-group"><label class="form-label">メモ・備考</label><textarea class="form-input" id="sch_memo" rows="4" placeholder="デザインの概要・撮影日・担当者など"></textarea></div>
    <button class="btn btn-primary btn-block" onclick="saveSchedule()">追加する</button>`);
}

function saveSchedule(){
  const title=document.getElementById('sch_title').value.trim();
  const type=document.getElementById('sch_type').value;
  const stage=document.getElementById('sch_stage').value;
  const deadline=document.getElementById('sch_dl').value;
  const memo=document.getElementById('sch_memo').value.trim();
  if(!title) return alert('タイトルを入力してください');
  const list=DB.get('designSchedules')||[];
  list.unshift({id:genId(),title,type,stage,deadline,memo,date:today(),author:S.user.name});
  DB.set('designSchedules',list);
  closeModal();render();
}

function updateScheduleStage(id, stage){
  const list=DB.get('designSchedules')||[];
  const idx=list.findIndex(s=>s.id===id);
  if(idx>=0){list[idx].stage=stage;DB.set('designSchedules',list);}
  closeModal();
  setTimeout(()=>openDesignSchedule(id),100);
}

// SHIFT REQUEST (シフト希望提出)
// ============================================================
function renderShiftRequest(){
  const now = new Date();
  const targetYear = S.shiftReqYear || now.getFullYear();
  const targetMonth = S.shiftReqMonth !== undefined ? S.shiftReqMonth : now.getMonth() + 1;
  const requests = DB.getShiftRequests();
  const shiftView = S.shiftView || 'submit'; // submit or manage

  if(isOwner()){
    return renderShiftRequestOwner(requests, targetYear, targetMonth);
  } else if(isShiftAdmin()){
    // misa/wakanaは両方のビューを持つ
    return `<div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
        <button class="btn ${shiftView==='submit'?'btn-primary':'btn-ghost'}" onclick="S.shiftView='submit';render()">📝 自分のシフト希望</button>
        <button class="btn ${shiftView==='manage'?'btn-primary':'btn-ghost'}" onclick="S.shiftView='manage';render()">👥 シフト管理</button>
      </div>
      ${shiftView==='submit'?renderShiftRequestStaff(requests, targetYear, targetMonth):renderShiftRequestOwner(requests, targetYear, targetMonth)}
    </div>`;
  } else {
    return renderShiftRequestStaff(requests, targetYear, targetMonth);
  }
}

function renderShiftRequestStaff(requests, year, month){
  const myReqRaw = requests.find(r=>r.staffId===S.user.id&&r.year===year&&r.month===month);
  const myReq = {
    staffId: S.user.id, year, month, offDays:[], startTime:'10:00', endTime:'19:00', note:'',
    ...(myReqRaw || {}),
    offDays: (myReqRaw?.offDays) || []
  };
  const daysInMonth = new Date(year, month, 0).getDate();
  const firstDay = new Date(year, month-1, 1).getDay();
  const weeks = ['日','月','火','水','木','金','土'];
  const submitted = requests.some(r=>r.staffId===S.user.id&&r.year===year&&r.month===month);

  return`<div class="page">
    <!-- 月選択 -->
    <div class="card">
      <div class="card-row">
        <button class="btn btn-ghost btn-sm" onclick="S.shiftReqMonth=${month===1?12:month-1};if(${month===1})S.shiftReqYear=${year-1};render()">◀</button>
        <div class="fw-bold">${year}年 ${month}月のシフト希望</div>
        <button class="btn btn-ghost btn-sm" onclick="S.shiftReqMonth=${month===12?1:month+1};if(${month===12})S.shiftReqYear=${year+1};render()">▶</button>
      </div>
    </div>

    ${submitted?`<div style="background:#E8F5E9;border-radius:var(--rs);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px">
      <span style="font-size:16px">✅</span>
      <span style="color:#2E7D32;font-weight:600">${year}年${month}月の希望を提出済みです</span>
    </div>`:''}

    <!-- カレンダー：希望休選択 -->
    <div class="card">
      <div class="fw-bold mb-12">🗓️ 希望休を選んでください</div>
      ${(()=>{
        const isContractor = S.user?.contractor;
        if(isContractor) return '<div style="font-size:12px;color:var(--mid);margin-bottom:10px">業務委託は日数制限なし</div>';
        const maxOff = DB.getStaffMaxOffDays()[S.user?.id] || 8;
        const used = (myReq.offDays||[]).length;
        const rem = maxOff - used;
        return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div style="font-size:12px;color:var(--mid)">タップで選択・解除</div>
          <div style="font-size:13px;font-weight:700;color:${rem<=0?'var(--danger)':rem<=2?'var(--warn)':'var(--success)'}">
            残り${rem}日（${used}/${maxOff}日使用）
          </div>
        </div>`;
      })()}
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px">
        ${weeks.map((w,i)=>`<div style="text-align:center;font-size:11px;font-weight:700;color:${i===0?'var(--danger)':i===6?'var(--info)':'var(--mid)'}">${w}</div>`).join('')}
        ${Array(firstDay).fill('<div></div>').join('')}
        ${Array.from({length:daysInMonth},(_,i)=>{
          const day = i+1;
          const date = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          const isOff = (myReq.offDays||[]).includes(date);
          const dow = new Date(year,month-1,day).getDay();
          const isSun = dow===0;
          const isSat = dow===6;
          return`<div onclick="toggleOffDay('${date}','${year}','${month}')" 
            style="text-align:center;padding:6px 2px;border-radius:6px;cursor:pointer;
              background:${isOff?'var(--danger)':'transparent'};
              color:${isOff?'#fff':isSun?'var(--danger)':isSat?'var(--info)':'var(--text)'};
              border:1.5px solid ${isOff?'var(--danger)':'var(--border)'}">
            <div style="font-size:12px;font-weight:${isOff?'700':'400'}">${day}</div>
            ${isOff?'<div style="font-size:8px">休</div>':''}
          </div>`;
        }).join('')}
      </div>
      ${(myReq.offDays||[]).length>0?`<div style="font-size:12px;color:var(--danger);margin-top:8px">
        希望休: ${(myReq.offDays||[]).map(d=>d.split('-')[2]+'日').join('・')}
      </div>`:'<div style="font-size:12px;color:var(--mid)">希望休なし</div>'}
    </div>

    <!-- 希望時間 -->
    <div class="card">
      <div class="fw-bold mb-12">⏰ 希望出勤時間</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">出勤時間</label>
          <input type="time" class="form-input" id="shift_start" value="${myReq.startTime||'10:00'}">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">退勤時間</label>
          <input type="time" class="form-input" id="shift_end" value="${myReq.endTime||'19:00'}">
        </div>
      </div>
    </div>

    <!-- 備考 -->
    <div class="card">
      <div class="fw-bold mb-12">📝 備考・その他の希望</div>
      <textarea class="form-input" id="shift_note" rows="3" placeholder="例：〇日は午後から出勤希望・〇〇の都合あり">${myReq.note||''}</textarea>
    </div>

    <button class="btn btn-primary btn-block" onclick="submitShiftRequest('${year}','${month}')">
      📨 ${submitted?'更新して再提出':'シフト希望を提出'}
    </button>
    <div style="font-size:12px;color:var(--mid);text-align:center;margin-top:8px">
      提出後も再提出で変更できます
    </div>
  </div>`;
}

function renderShiftRequestOwner(requests, year, month){
  const monthReqs = requests.filter(r=>r.year===year&&r.month===month);
  const adminStore2 = !isOwner() && S.user?.shiftAdmin ? S.user.shiftAdmin : null;
  const allStaff = STAFF_LIST.filter(s=>s.treat&&(adminStore2?s.store===adminStore2:true));
  const submitted = allStaff.filter(s=>monthReqs.some(r=>r.staffId===s.id));
  const notSubmitted = allStaff.filter(s=>!monthReqs.some(r=>r.staffId===s.id));
  const storeFilter = S.shiftOwnerStore || 'both';

  // shiftAdminは自分の担当店舗のみ
  const adminStore = !isOwner() && S.user?.shiftAdmin ? S.user.shiftAdmin : null;
  const filteredReqs = monthReqs.filter(r=>{
    const staff = STAFF_LIST.find(s=>s.id===r.staffId);
    if(adminStore) return staff?.store===adminStore;
    return storeFilter==='both'||staff?.store===storeFilter;
  });

  return`<div class="page">
    <!-- 月選択 -->
    <div class="card">
      <div class="card-row">
        <button class="btn btn-ghost btn-sm" onclick="S.shiftReqMonth=${month===1?12:month-1};if(${month===1})S.shiftReqYear=${year-1};render()">◀</button>
        <div class="fw-bold">${year}年 ${month}月 シフト希望一覧${!isOwner()&&S.user?.shiftAdmin?'（'+(S.user.shiftAdmin==='A'?'浦和店':'広尾店')+'）':''}</div>
        <button class="btn btn-ghost btn-sm" onclick="S.shiftReqMonth=${month===12?1:month+1};if(${month===12})S.shiftReqYear=${year+1};render()">▶</button>
      </div>
    </div>

    <!-- 店舗フィルター（オーナーのみ） -->
    ${isOwner()?`<div class="tab-row">
      <button class="tab ${storeFilter==='both'?'active':''}" onclick="S.shiftOwnerStore='both';render()">両店</button>
      <button class="tab ${storeFilter==='A'?'active':''}" onclick="S.shiftOwnerStore='A';render()">浦和店</button>
      <button class="tab ${storeFilter==='B'?'active':''}" onclick="S.shiftOwnerStore='B';render()">広尾店</button>
    </div>`:``}
    ${!isOwner()&&S.user?.shiftAdmin?`<div style="margin-bottom:12px"><span class="store-badge ${S.user.shiftAdmin==='A'?'store-a':'store-b'}">${S.user.shiftAdmin==='A'?'浦和店':'広尾店'} シフト管理</span></div>`:``}

    <!-- 提出状況サマリー -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-row mb-8">
        <div class="fw-bold">📊 提出状況</div>
        <span class="badge ${submitted.length===allStaff.length?'badge-green':'badge-warn'}">${submitted.length}/${allStaff.length}名 提出済</span>
      </div>
      ${notSubmitted.length>0?`
        <div style="background:#FFF3E0;border-radius:var(--rs);padding:8px 12px;margin-bottom:8px">
          <div style="font-size:12px;font-weight:600;color:var(--warn);margin-bottom:6px">⚠️ 未提出</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">

function toggleOffDay(date, year, month){
  const requests = DB.getShiftRequests();
  let req = requests.find(r=>r.staffId===S.user.id&&r.year===parseInt(year)&&r.month===parseInt(month));
  if(!req){
    req = {staffId:S.user.id, year:parseInt(year), month:parseInt(month), offDays:[], startTime:'10:00', endTime:'19:00', note:''};
    requests.push(req);
  }
  const idx2 = req.offDays.indexOf(date);
  if(idx2>=0){
    req.offDays.splice(idx2,1);
  } else {
    // 業務委託は制限なし、それ以外は設定値（デフォルト8日）
    const isContractor = S.user?.contractor;
    if(!isContractor){
      const maxOffDaysMap = DB.getStaffMaxOffDays();
      const MAX_OFF_DAYS = maxOffDaysMap[S.user?.id] || 8;
      if((req.offDays||[]).length >= MAX_OFF_DAYS){
        alert(`休み希望は最大${MAX_OFF_DAYS}日までです`);
        return;
      }
    }
    req.offDays.push(date);
  }
  req.offDays.sort();
  DB.setShiftRequests(requests);
  render();
}

function submitShiftRequest(year, month){
  const startTime = document.getElementById('shift_start')?.value || '10:00';
  const endTime = document.getElementById('shift_end')?.value || '19:00';
  const note = document.getElementById('shift_note')?.value || '';
  const requests = DB.getShiftRequests();
  const idx2 = requests.findIndex(r=>r.staffId===S.user.id&&r.year===parseInt(year)&&r.month===parseInt(month));
  const existing = idx2>=0 ? requests[idx2] : null;
  const newReq = {
    staffId: S.user.id,
    staffName: S.user.name,
    year: parseInt(year),
    month: parseInt(month),
    offDays: existing ? existing.offDays : [],
    startTime, endTime, note,
    submittedAt: nowTime()
  };
  if(idx2>=0) requests[idx2] = newReq;
  else requests.push(newReq);
  DB.setShiftRequests(requests);
  addPoints(S.user.id,'📅 シフト希望を提出',POINT_RULES.shift_submit);
  alert('✅ シフト希望を提出しました！+'+POINT_RULES.shift_submit+'pt獲得！');
  render();
}

function getCurrentPeriod(){
  const now = new Date();
  const year = now.getFullYear();
  const half = now.getMonth() < 6 ? 1 : 2;
  return {year, half, label: `${year}年 ${half===1?'上半期（1〜6月）':'下半期（7〜12月）'}`};
}

function getPeriodKey(year, half){ return `${year}-H${half}`; }

function getPeriodRange(year, half){
  if(half===1) return {start:`${year}-01-01`, end:`${year}-06-30`};
  return {start:`${year}-07-01`, end:`${year}-12-31`};
}

function renderProgress(){
  const viewMode = S.progressView || 'staff'; // 'staff' or 'task'
  const storeFilter = S.progressStore || 'both';

  // 全タスクを収集
  const allTasks = [];

  // メッセージからタスクを収集
  DB.getMessages().forEach(m=>{
    if(!m.progress||Object.keys(m.progress).length===0) return;
    Object.entries(m.progress).forEach(([staffId, status])=>{
      const staff = STAFF_LIST.find(s=>s.id===staffId);
      if(!staff) return;
      if(storeFilter!=='both'&&staff.store!==storeFilter) return;
      allTasks.push({
        type:'message', icon:'💬',
        id: m.id,
        title: m.title,
        staffId, staffName: staff.name, staffStore: staff.store,
        status, date: m.date,
        deadline: m.deadline,
        from: m.fromName
      });
    });
  });

  // 連絡事項からタスクを収集
  DB.getNotices().forEach(n=>{
    if(!n.progress||Object.keys(n.progress).length===0) return;
    Object.entries(n.progress).forEach(([staffId, status])=>{
      const staff = STAFF_LIST.find(s=>s.id===staffId);
      if(!staff) return;
      if(storeFilter!=='both'&&staff.store!==storeFilter) return;
      allTasks.push({
        type:'notice', icon: n.important?'🔴':'📢',
        id: n.id,
        title: n.title,
        staffId, staffName: staff.name, staffStore: staff.store,
        status, date: n.date,
        deadline: n.deadline,
        from: n.author
      });
    });
  });

  // デザインからタスクを収集
  DB.getDesigns().forEach(d=>{
    if(!d.progress) return;
    Object.entries(d.progress).forEach(([staffId, status])=>{
      const staff = STAFF_LIST.find(s=>s.id===staffId);
      if(!staff) return;
      if(storeFilter!=='both'&&staff.store!==storeFilter) return;
      if(status==='未確認') return; // 未確認は除外
      allTasks.push({
        type:'design', icon:'💅',
        id: d.id,
        title: d.title,
        staffId, staffName: staff.name, staffStore: staff.store,
        status: status==='習得済み'?'完了':status==='練習中'?'対応中':'未対応',
        date: d.date,
        from: d.author
      });
    });
  });

  const activeTasks = allTasks.filter(t=>t.status!=='完了');
  const doneTasks = allTasks.filter(t=>t.status==='完了');
  const overdueTask = allTasks.filter(t=>t.deadline&&new Date(t.deadline)<new Date()&&t.status!=='完了');

  return`<div class="page">
    <!-- サマリー -->
    <div class="summary-grid" style="margin-bottom:16px">
      <div class="summary-card" style="border-left:3px solid var(--danger)">
        <div class="summary-num" style="color:var(--danger)">${activeTasks.filter(t=>t.status==='未対応').length}</div>
        <div class="summary-label">⬜ 未対応</div>
      </div>
      <div class="summary-card" style="border-left:3px solid var(--warn)">
        <div class="summary-num" style="color:var(--warn)">${activeTasks.filter(t=>t.status==='対応中').length}</div>
        <div class="summary-label">🔄 対応中</div>
      </div>
      <div class="summary-card" style="border-left:3px solid var(--success)">
        <div class="summary-num" style="color:var(--success)">${doneTasks.length}</div>
        <div class="summary-label">✅ 完了</div>
      </div>
      <div class="summary-card" style="border-left:3px solid var(--danger)">
        <div class="summary-num" style="color:var(--danger)">${overdueTask.length}</div>
        <div class="summary-label">⚠️ 期限超過</div>
      </div>
    </div>

    <!-- フィルター -->
    <div class="tab-row">
      <button class="tab ${storeFilter==='both'?'active':''}" onclick="S.progressStore='both';render()">両店</button>
      <button class="tab ${storeFilter==='A'?'active':''}" onclick="S.progressStore='A';render()">浦和店</button>
      <button class="tab ${storeFilter==='B'?'active':''}" onclick="S.progressStore='B';render()">広尾店</button>
    </div>

    <!-- 表示切替 -->
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button class="tab ${viewMode==='staff'?'active':''}" onclick="S.progressView='staff';render()">👤 スタッフ別</button>
      <button class="tab ${viewMode==='task'?'active':''}" onclick="S.progressView='task';render()">📋 タスク別</button>
    </div>

    ${viewMode==='staff' ? renderProgressByStaff(allTasks, storeFilter) : renderProgressByTaskGrouped(allTasks, storeFilter)}
  </div>`;
}

function getTaskCreatorType(fromName){
  const staff = STAFF_LIST.find(s=>s.name===fromName);
  if(!staff) return 'owner';
  if(staff.role==='admin'||staff.role==='owner') return 'owner';
  if(staff.taskAdmin) return 'leader';
  return 'staff';
}


// 稼働率計算（席数とスタッフ数の小さい方を使用）
function getEffectiveSeats(store, cfg){
  const seats = store==='A'?(cfg.seatsA||6):(cfg.seatsB||3);
  // 各店舗の施術スタッフ数
  const staffCount = STAFF_LIST.filter(s=>s.treat&&!s.noSales&&(s.store===store||s.store==='both')).length;
  // 席数とスタッフ数の少ない方が実効稼働数
  return Math.min(seats, staffCount);
}

function calcHourDiff(open, close){
  if(!open||!close) return 0;
  const [oh,om]=open.split(':').map(Number);
  const [ch,cm]=close.split(':').map(Number);
  return Math.round(((ch*60+cm)-(oh*60+om))/60*10)/10;
}

function getActualOpenHours(store, date, cfg){
  const logged = DB.getStoreHoursForDate(store, date||today());
  if(logged && logged.hours>0) return logged.hours;
  return store==='A'?(cfg.openHoursA||9):(cfg.openHoursB||10);
}

function calcOccupancyWithHours(salesCount, store, cfg, hours){
  const effectiveSeats = getEffectiveSeats(store, cfg);
  const avgTime = cfg.avgTreatTime||90;
  const capacity = effectiveSeats * hours * 60;
  const used = salesCount * avgTime;
  return capacity>0?Math.min(100,Math.round(used/capacity*100)):0;
}

function getStoreOpenHours(store, cfg){
  return store==='A'?(cfg.openHoursA||9):(cfg.openHoursB||10);
}

function calcOccupancy(salesCount, store, cfg, days=1){
  const effectiveSeats = getEffectiveSeats(store, cfg);
  const openHours = getStoreOpenHours(store, cfg);
  const avgTime = cfg.avgTreatTime||90;
  // 稼働率 = (件数 × 平均施術時間) / (実効席数 × 営業時間 × 日数 × 60分) × 100
  const capacity = effectiveSeats * openHours * 60 * days;
  const used = salesCount * avgTime;
  return capacity>0?Math.min(100,Math.round(used/capacity*100)):0;
}

function getOccupancyLabel(store, cfg){
  const seats = store==='A'?(cfg.seatsA||6):(cfg.seatsB||3);
  const staff = STAFF_LIST.filter(s=>s.treat&&!s.noSales&&(s.store===store||s.store==='both')).length;
  const effective = Math.min(seats, staff);
  const hours = getStoreOpenHours(store, cfg);
  const storeName = store==='A'?'浦和店（10-19時）':'広尾店（11-21時）';
  return `${storeName} ${seats}席・${staff}名→実効${effective}枠`;
}

function renderProgressByTaskGrouped(allTasks, storeFilter){
  const ownerTasks = allTasks.filter(t=>getTaskCreatorType(t.from)==='owner');
  const leaderTasks = allTasks.filter(t=>getTaskCreatorType(t.from)==='leader');

  const renderSection = (tasks, label, color, icon) => {
    if(tasks.length===0) return '';
    const taskMap = {};
    tasks.forEach(t=>{
      if(!taskMap[t.id]) taskMap[t.id]={icon:t.icon,title:t.title,type:t.type,from:t.from,date:t.date,deadline:t.deadline,staff:[]};
      taskMap[t.id].staff.push({name:t.staffName,store:t.staffStore,status:t.status});
    });
    const taskList = Object.values(taskMap).sort((a,b)=>{
      const ad=a.staff.every(s=>s.status==='完了');
      const bd=b.staff.every(s=>s.status==='完了');
      return ad===bd?0:ad?1:-1;
    });
    return`<div style="margin-bottom:20px">
      <div style="font-size:14px;font-weight:700;color:${color};margin-bottom:10px;display:flex;align-items:center;gap:6px">
        <span>${icon}</span>${label}
        <span style="background:${color};color:#fff;border-radius:20px;padding:2px 8px;font-size:11px">${taskList.length}件</span>
      </div>
      ${taskList.map(task=>{
        const allDone=task.staff.every(s=>s.status==='完了');
        const pendingStaff=task.staff.filter(s=>s.status==='未対応');
        const doingStaff=task.staff.filter(s=>s.status==='対応中');
        const doneStaff=task.staff.filter(s=>s.status==='完了');
        const isExp=task.deadline&&new Date(task.deadline)<new Date()&&!allDone;
        const pct=task.staff.length?Math.round(doneStaff.length/task.staff.length*100):0;
        return`<div class="card" style="margin-bottom:8px;border-left:4px solid ${allDone?'var(--success)':isExp?'var(--danger)':color}">
          <div class="card-row mb-8">
            <div><span>${task.icon}</span><span class="fw-bold" style="margin-left:4px">${task.title}</span></div>
            <span class="badge ${allDone?'badge-green':isExp?'badge-danger':'badge-warn'}">${allDone?'✅完了':isExp?'⚠️超過':'進行中'}</span>
          </div>
          <div style="font-size:12px;color:var(--mid);margin-bottom:8px">
            From: ${task.from} · ${fmtDateFull(task.date)}${task.deadline?` · 📅 ${fmtDateFull(task.deadline)}`:''}
          </div>
          <div class="progress-bar" style="margin-bottom:8px"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
          <div style="display:flex;gap:4px;flex-wrap:wrap">
            ${pendingStaff.map(s=>`<span class="badge badge-danger" style="font-size:11px">⬜ ${s.name}</span>`).join('')}
            ${doingStaff.map(s=>`<span class="badge badge-warn" style="font-size:11px">🔄 ${s.name}</span>`).join('')}
            ${doneStaff.map(s=>`<span class="badge badge-green" style="font-size:11px">✅ ${s.name}</span>`).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  };

  if(ownerTasks.length===0&&leaderTasks.length===0){
    return`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">タスクがありません</div></div>`;
  }

  return renderSection(ownerTasks,'オーナーからのタスク','#E91E8C','👑')
       + renderSection(leaderTasks,'リーダーからのタスク','#FF9800','⭐');
}

function renderProgressByTask(allTasks, storeFilter){
  // タスクIDでグループ化
  const taskMap = {};
  allTasks.forEach(t=>{
    if(!taskMap[t.id]) taskMap[t.id] = {
      icon:t.icon, title:t.title, type:t.type,
      from:t.from, date:t.date, deadline:t.deadline,
      staff:[]
    };
    taskMap[t.id].staff.push({
      name:t.staffName, store:t.staffStore,
      status:t.status, staffId:t.staffId
    });
  });

  const tasks = Object.values(taskMap);
  if(tasks.length===0) return`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">タスクがありません</div></div>`;

  // 未完了タスクを先に
  tasks.sort((a,b)=>{
    const aDone = a.staff.every(s=>s.status==='完了');
    const bDone = b.staff.every(s=>s.status==='完了');
    return aDone===bDone?0:aDone?1:-1;
  });

  return tasks.map(task=>{
    const allDone = task.staff.every(s=>s.status==='完了');
    const pendingStaff = task.staff.filter(s=>s.status==='未対応');
    const doingStaff = task.staff.filter(s=>s.status==='対応中');
    const doneStaff = task.staff.filter(s=>s.status==='完了');
    const isExp = task.deadline&&new Date(task.deadline)<new Date()&&!allDone;
    const pct = task.staff.length ? Math.round(doneStaff.length/task.staff.length*100) : 0;

    return`<div class="card" style="margin-bottom:12px;border-left:4px solid ${allDone?'var(--success)':isExp?'var(--danger)':'var(--pink)'}">
      <div class="card-row mb-8">
        <div>
          <span>${task.icon}</span>
          <span class="fw-bold" style="margin-left:4px">${task.title}</span>
        </div>
        <span class="badge ${allDone?'badge-green':isExp?'badge-danger':'badge-warn'}">${allDone?'✅完了':isExp?'⚠️超過':'進行中'}</span>
      </div>
      <div style="font-size:12px;color:var(--mid);margin-bottom:8px">
        From: ${task.from} · ${fmtDateFull(task.date)}
        ${task.deadline?` · 📅 ${fmtDateFull(task.deadline)}`:'' }
      </div>
      <div class="progress-bar" style="margin-bottom:8px"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        ${pendingStaff.map(s=>`<span class="badge badge-danger" style="font-size:11px">⬜ ${s.name}</span>`).join('')}
        ${doingStaff.map(s=>`<span class="badge badge-warn" style="font-size:11px">🔄 ${s.name}</span>`).join('')}
        ${doneStaff.map(s=>`<span class="badge badge-green" style="font-size:11px">✅ ${s.name}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function saveInventoryItem(){
  const name = document.getElementById('inv_name').value.trim();
  const cat = document.getElementById('inv_cat').value;
  const store = document.getElementById('inv_store').value;
  const stock = parseInt(document.getElementById('inv_stock').value)||0;
  const unit = document.getElementById('inv_unit').value.trim()||'個';
  const minStock = parseInt(document.getElementById('inv_min').value)||0;
  const wholesalePrice = parseInt(document.getElementById('inv_price').value)||0;
  const location = document.getElementById('inv_loc').value.trim();
  const note = document.getElementById('inv_note').value.trim();
  if(!name) return alert('商品名を入力してください');
  const list = DB.getInventory();
  list.push({
    id:genId(),name,cat,store,currentStock:stock,unit,minStock,
    wholesalePrice,location,note,
    updatedAt:nowDateTime(),updatedBy:S.user?.name||'',
    createdAt:nowDateTime(),createdBy:S.user?.name||'',
    history:[{date:nowDateTime(),by:S.user?.name||'',before:0,after:stock,type:'初期登録'}]
  });
  DB.setInventory(list);
  closeModal();render();
}

function updateInventoryItem(id){
  const list = DB.getInventory();
  const idx = list.findIndex(i=>i.id===id);
  if(idx<0) return;
  list[idx].name = document.getElementById('inv_name').value.trim();
  list[idx].cat = document.getElementById('inv_cat').value;
  list[idx].wholesalePrice = parseInt(document.getElementById('inv_price').value)||0;
  list[idx].unit = document.getElementById('inv_unit').value.trim()||'個';
  list[idx].minStock = parseInt(document.getElementById('inv_min').value)||0;
  list[idx].location = document.getElementById('inv_loc').value.trim();
  list[idx].note = document.getElementById('inv_note').value.trim();
  const prevStock = list[idx].currentStock;
  const newStock = parseInt(document.getElementById('inv_stock').value)||0;
  list[idx].currentStock = newStock;
  list[idx].updatedAt = nowDateTime();
  list[idx].updatedBy = S.user?.name||'';
  if(!list[idx].history) list[idx].history=[];
  if(prevStock !== newStock){
    list[idx].history.unshift({
      date:nowDateTime(), by:S.user?.name||'',
      before:prevStock, after:newStock, type:'編集'
    });
    if(list[idx].history.length>20) list[idx].history=list[idx].history.slice(0,20);
  }
  DB.setInventory(list);
  closeModal();render();
}

function deleteInventoryItem(id){
  if(!confirm('削除しますか？'))return;
  DB.setInventory(DB.getInventory().filter(i=>i.id!==id));
  closeModal();render();
}

function updateStock(id, delta){
  const list = DB.getInventory();
  const idx = list.findIndex(i=>i.id===id);
  if(idx<0) return;
  const before = list[idx].currentStock||0;
  list[idx].currentStock = Math.max(0, before+delta);
  list[idx].updatedAt = nowDateTime();
  list[idx].updatedBy = S.user?.name||'';
  // 変更履歴を追加
  if(!list[idx].history) list[idx].history=[];
  list[idx].history.unshift({
    date:nowDateTime(), by:S.user?.name||'',
    before, after:list[idx].currentStock,
    type: delta>0?'入庫':'使用'
  });
  if(list[idx].history.length>20) list[idx].history=list[idx].history.slice(0,20);
  DB.setInventory(list);
  render();
}

function saveStocktaking(store){
  const list = DB.getInventory();
  const items = list.filter(i=>i.store===store);
  let updatedCount = 0;
  items.forEach(item=>{
    const input = document.getElementById('st_'+item.id);
    if(!input||input.value==='') return;
    const newStock = parseInt(input.value);
    if(isNaN(newStock)||newStock<0) return;
    const idx = list.findIndex(i=>i.id===item.id);
    if(idx>=0){
      const prevSt = list[idx].currentStock;
      list[idx].currentStock = newStock;
      list[idx].updatedAt = nowDateTime();
      list[idx].updatedBy = S.user?.name||'';
      if(!list[idx].history) list[idx].history=[];
      list[idx].history.unshift({date:nowDateTime(),by:S.user?.name||'',before:prevSt,after:newStock,type:'棚卸し'});
      if(list[idx].history.length>20) list[idx].history=list[idx].history.slice(0,20);
      updatedCount++;
    }
  });
  // 棚卸し履歴保存
  const history = DB.getStocktaking();
  history.unshift({id:genId(),store,date:today(),staff:S.user.name,count:updatedCount});
  DB.set('stocktaking', history);
  DB.setInventory(list);
  S.invMode = 'list';
  alert(`✅ 棚卸し完了！${updatedCount}件の在庫を更新しました`);
  render();
}

function getRank(pts){
  let rank = RANKS[0];
  for(const r of RANKS){ if(pts >= r.min) rank = r; }
  return rank;
}

function getNextRank(pts){
  for(const r of RANKS){ if(pts < r.min) return r; }
  return null;
}

function addPoints(staffId, reason, pts){
  if(!staffId) return;
  const points = DB.getPoints();
  if(!points[staffId]) points[staffId] = 0;
  points[staffId] += pts;
  DB.setPoints(points);
  // 履歴追加
  const history = DB.getPointHistory();
  history.unshift({staffId, reason, pts, date:today(), time:nowTime()});
  if(history.length > 200) history.splice(200);
  DB.set('pointHistory', history);
}

function sendThanks(toId, toName){
  const msg = document.getElementById('thanks_msg')?.value.trim()||'';
  const remaining = THANKS_LIMIT - getTodayThanksGiven().length;
  if(remaining<=0) return alert('本日の投票は終了しました');
  if(toId===S.user?.id) return alert('自分には送れません');
  const list = DB.getThanks();
  list.unshift({
    id:genId(), fromId:S.user.id, fromName:S.user.name,
    toId, toName, message:msg, date:today()
  });
  DB.setThanks(list);
  // ポイント付与
  addPoints(S.user.id, `🙏 ${toName}さんへありがとう`, POINT_RULES.thanks_give);
  addPoints(toId, `🙏 ${S.user.name}さんからありがとう`, POINT_RULES.thanks_receive);
  closeModal();
  render();
  alert(`✅ ${toName}さんに感謝を送りました！\n+${POINT_RULES.thanks_give}pt獲得！`);
}

const MONTHLY_CATS = ['店舗管理','スタッフ','顧客管理','売上・財務','教育・技術','その他'];

function renderMonthlyTasks(){
  const tasks = DB.getMonthlyTasks();
  const done = DB.getMonthlyDone();
  const now = new Date();
  const monthLabel = `${now.getFullYear()}年${now.getMonth()+1}月`;
  const store = getEffectiveStore();

  const filtered = tasks.filter(t=>t.store==='both'||t.store===store||store==='both');
  const doneCount = filtered.filter(t=>done[t.id]).length;
  const pct = filtered.length?Math.round(doneCount/filtered.length*100):0;

  const cats = [...new Set(filtered.map(t=>t.cat))];
  const catFilter = S.monthCat||'全て';
  const shown = catFilter==='全て'?filtered:filtered.filter(t=>t.cat===catFilter);

  return`<div class="page">
    <!-- ヘッダー -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-row mb-8">
        <div class="fw-bold">📆 ${monthLabel}のタスク</div>
        <span class="badge ${pct===100?'badge-green':'badge-warn'}">${doneCount}/${filtered.length}完了</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${pct===100?'<div style="text-align:center;color:var(--success);font-weight:700;margin-top:8px">🎉 今月のタスクを全て完了！</div>':''}
    </div>

    <!-- カテゴリフィルター -->
    <div class="tab-row">
      ${['全て',...cats].map(c=>`<button class="tab ${catFilter===c?'active':''}" onclick="S.monthCat='${c}';render()">${c}</button>`).join('')}
    </div>

    <!-- タスクリスト -->
    ${shown.length===0?`<div class="empty-state"><div class="empty-icon">📆</div><div class="empty-text">タスクがありません<br>${isOwner()||isTaskAdmin()?'右下の＋から追加できます':''}</div></div>`:''}
    ${shown.map(task=>{
      const isDone = !!done[task.id];
      const doneInfo = done[task.id];
      const assignee = task.assignee==='all'?'全員':task.assignee==='A'?'浦和店':task.assignee==='B'?'広尾店':(STAFF_LIST.find(s=>s.id===task.assignee)?.name||'全員');
      const isMyTask = task.assignee==='all'||task.assignee===S.user?.store||task.assignee===S.user?.id;
      return`<div class="card" style="border-left:4px solid ${isDone?'var(--success)':'var(--pink)'};opacity:${isDone?0.8:1}">
        <div class="card-row mb-8">
          <div style="flex:1">
            <div class="fw-bold ${isDone?'':''}">
              ${isDone?'<span style="text-decoration:line-through;color:var(--mid)">':''}${task.title}${isDone?'</span>':''}
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
              <span class="badge badge-pink" style="font-size:10px">${task.cat}</span>
              <span class="badge badge-blue" style="font-size:10px">👤 ${assignee}</span>
              ${task.deadline?`<span class="badge badge-warn" style="font-size:10px">📅 ${task.deadline}日まで</span>`:''}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            ${isOwner()||isTaskAdmin()?`<button onclick="deleteMonthlyTask('${task.id}')" style="background:none;border:none;color:var(--lite);cursor:pointer;font-size:14px">✕</button>`:''}
            ${isMyTask?`<button class="btn btn-sm ${isDone?'btn-ghost':'btn-primary'}" onclick="toggleMonthlyDone('${task.id}')" style="${isDone?'border-color:var(--success);color:var(--success)':''}">
              ${isDone?'✅ 完了済':'完了にする'}
            </button>`:''}
          </div>
        </div>
        ${isDone&&doneInfo.by?`<div style="font-size:11px;color:var(--mid)">✅ ${doneInfo.by} · ${doneInfo.at}</div>`:''}
        ${task.note?`<div style="font-size:12px;color:var(--mid);margin-top:4px;background:#f9f9f9;padding:6px 10px;border-radius:var(--rs)">📝 ${task.note}</div>`:''}
      </div>`;
    }).join('')}

    ${isOwner()||isTaskAdmin()?`<button class="fab" onclick="showAddMonthlyModal()">＋</button>`:''}
  </div>`;
}

function toggleMonthlyDone(taskId){
  const done = DB.getMonthlyDone();
  if(done[taskId]){
    delete done[taskId];
  } else {
    done[taskId] = {by:S.user?.name, at:nowDateTime()};
    // ポイント付与
    if(S.user) addPoints(S.user.id, '📆 月次タスク完了', 20);
  }
  DB.setMonthlyDone(done);
  render();
}

function saveMonthlyTask(){
  const title = document.getElementById('mt_title').value.trim();
  const cat = document.getElementById('mt_cat').value;
  const assignee = document.getElementById('mt_assign').value;
  const deadline = document.getElementById('mt_deadline').value;
  const store = document.getElementById('mt_store').value;
  const note = document.getElementById('mt_note').value.trim();
  if(!title) return alert('タスク名を入力してください');
  const list = DB.getMonthlyTasks();
  list.push({id:genId(), title, cat, assignee, deadline, store, note, createdBy:S.user?.name, createdAt:today()});
  DB.setMonthlyTasks(list);
  closeModal();
  render();
}

function deleteMonthlyTask(id){
  if(!confirm('このタスクを削除しますか？')) return;
  DB.setMonthlyTasks(DB.getMonthlyTasks().filter(t=>t.id!==id));
  render();
}

function showAddTroubleModal(){
  showModal(`<div class="modal-title">🔧 トラブルを追加</div>
    <div class="form-group"><label class="form-label">カテゴリ</label>
      <select class="form-input" id="tr_cat">${TROUBLE_CATS.map(c=>`<option>${c}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">タイトル（問題名）</label>
      <input class="form-input" id="tr_title" placeholder="例：ジェルが剥がれやすい"></div>
    <div class="form-group"><label class="form-label">⚠️ 症状</label>
      <textarea class="form-input" id="tr_symptom" rows="2" placeholder="どんな症状が出るか"></textarea></div>
    <div class="form-group"><label class="form-label">🔍 原因</label>
      <textarea class="form-input" id="tr_cause" rows="3" placeholder="考えられる原因（改行OK）"></textarea></div>
    <div class="form-group"><label class="form-label">✅ 対処法</label>

function saveTrouble(){
  const cat = document.getElementById('tr_cat').value;
  const title = document.getElementById('tr_title').value.trim();
  const symptom = document.getElementById('tr_symptom').value.trim();
  const cause = document.getElementById('tr_cause').value.trim();
  const solution = document.getElementById('tr_solution').value.trim();
  if(!title||!solution) return alert('タイトルと対処法は必須です');
  const list = DB.getTroubles();
  list.unshift({id:genId(),cat,title,symptom,cause,solution,date:today(),author:S.user?.name||''});
  DB.setTroubles(list);
  closeModal();render();
}

function deleteTrouble(id){
  if(!confirm('削除しますか？'))return;
  DB.setTroubles(DB.getTroubles().filter(t=>t.id!==id));
  closeModal();render();
}


function getOccColor(r){return r>=98?'#1565C0':r>=90?'#E91E8C':r>=80?'#FF5722':r>=60?'#FF9800':r>=40?'#FFC107':r>=20?'#4CAF50':'#9E9E9E';}

function renderOccAnalysis(){
  const occStore = S.occStore||'A';
  const allData=getAllOccData(occStore);
  const tab=S.occTab||'calendar';
  const DOW=['日','月','火','水','木','金','土'];
  const dowStats=Array(7).fill(null).map(()=>({count:0,totalC:0,totalRate:0,totalH:0,totalA:0}));
  Object.entries(allData).forEach(([date,d])=>{
    const dow=new Date(date).getDay();
    dowStats[dow].count++;dowStats[dow].totalC+=d.c||0;
    dowStats[dow].totalRate+=d.r||0;dowStats[dow].totalH+=d.h||0;dowStats[dow].totalA+=d.a||0;
  });
  const monthStats={};
  Object.entries(allData).forEach(([date,d])=>{
    const mk=date.slice(0,7);
    if(!monthStats[mk])monthStats[mk]={count:0,totalC:0,totalRate:0};
    monthStats[mk].count++;monthStats[mk].totalC+=d.c||0;monthStats[mk].totalRate+=d.r||0;
  });
  const viewYear=S.occYear||new Date().getFullYear();
  const viewMonth=S.occMonth!==undefined?S.occMonth:new Date().getMonth()+1;

  return`<div class="page">
    <!-- 店舗選択 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <button class="btn ${occStore==='A'?'btn-primary':'btn-ghost'}" onclick="S.occStore='A';render()">🏪 浦和店</button>
      <button class="btn ${occStore==='B'?'':''} ${occStore==='B'?'btn-primary':'btn-ghost'}" style="${occStore==='B'?'':'border-color:#9C27B0;color:#9C27B0'}" onclick="S.occStore='B';render()">🏪 広尾店</button>
    </div>
    <div class="tab-row">
      <button class="tab ${tab==='calendar'?'active':''}" onclick="S.occTab='calendar';render()">📅 カレンダー</button>
      <button class="tab ${tab==='dow'?'active':''}" onclick="S.occTab='dow';render()">📊 曜日別</button>
      <button class="tab ${tab==='monthly'?'active':''}" onclick="S.occTab='monthly';render()">📈 月別</button>
      <button class="tab ${tab==='shift'?'active':''}" onclick="S.occTab='shift';render()">👥 シフト参考</button>
    </div>
    ${tab==='calendar'?renderOccCal(allData,viewYear,viewMonth):''}
    ${tab==='dow'?renderOccDow(dowStats,DOW):''}
    ${tab==='monthly'?renderOccMonth(monthStats):''}
    ${tab==='shift'?renderShiftRef(dowStats,DOW):''}
    ${isOwner()||isTaskAdmin()?`<button class="fab" onclick="go('occInput')">✏️</button>`:''}

function renderOccCal(all,year,month){
  const fd=new Date(year,month-1,1).getDay();
  const ld=new Date(year,month,0).getDate();
  const DOW=['日','月','火','水','木','金','土'];
  return`<div class="card-row mb-8">
    <button class="btn btn-ghost btn-sm" onclick="S.occMonth=${month===1?12:month-1};if(${month===1})S.occYear=${year-1};render()">◀</button>
    <div class="fw-bold">${year}年${month}月</div>
    <button class="btn btn-ghost btn-sm" onclick="S.occMonth=${month===12?1:month+1};if(${month===12})S.occYear=${year+1};render()">▶</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px">
    ${DOW.map((d,i)=>`<div style="text-align:center;font-size:11px;font-weight:700;padding:4px;color:${i===0?'var(--danger)':i===6?'var(--info)':'var(--mid)'}">${d}</div>`).join('')}
    ${Array(fd).fill('<div></div>').join('')}
    ${Array.from({length:ld},(_,i)=>{
      const dt=i+1;
      const dk=year+'-'+String(month).padStart(2,'0')+'-'+String(dt).padStart(2,'0');
      const d=all[dk];
      const isT=dk===today();
      const dow=new Date(year,month-1,dt).getDay();
      return`<div style="text-align:center;padding:4px 2px;border-radius:6px;background:${d?getOccColor(d.r)+'22':'transparent'};border:${isT?'2px solid var(--pink)':'1px solid var(--border)'}">
        <div style="font-size:11px;color:${dow===0?'var(--danger)':dow===6?'var(--info)':'var(--text)'};font-weight:${isT?700:400}">${dt}</div>
        ${d?`<div style="font-size:9px;font-weight:700;color:${getOccColor(d.r)}">${d.r}%</div><div style="font-size:9px;color:var(--mid)">${d.c}人</div>`:''}
      </div>`;
    }).join('')}
  </div>
  <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">
    ${[['#1565C0','98%〜'],['#E91E8C','90-97%'],['#FF5722','80-89%'],['#FF9800','60-79%'],['#FFC107','40-59%'],['#4CAF50','〜39%']].map(([c,l])=>`<div style="display:flex;align-items:center;gap:3px;font-size:10px"><div style="width:10px;height:10px;border-radius:2px;background:${c}"></div>${l}</div>`).join('')}
  </div>
  ${Object.entries(all).filter(([d])=>d.startsWith(year+'-'+String(month).padStart(2,'0'))).sort().map(([date,d])=>`
    <div class="card" style="border-left:4px solid ${getOccColor(d.r)};margin-bottom:6px;padding:10px 12px">
      <div class="card-row">
        <div><span class="fw-bold">${parseInt(date.slice(8))}日（${['日','月','火','水','木','金','土'][new Date(date).getDay()]}）</span>${d.n?`<span class="badge badge-gray" style="font-size:10px;margin-left:6px">${d.n}</span>`:''}</div>
        <span style="font-size:18px;font-weight:800;color:${getOccColor(d.r)}">${d.r}%</span>
      </div>
      <div style="font-size:11px;color:var(--mid);margin-top:4px">👥${d.c}人 / ⏱${d.a}h÷${d.h}h / 6席${d.r6}%</div>
    </div>`).join('')}`;
}

function renderOccDow(stats,DOW){
  const maxC=Math.max(...stats.map(s=>s.count>0?s.totalC/s.count:0))||1;
  return`<div class="card"><div class="fw-bold mb-12">📊 曜日別 平均データ</div>
  ${stats.map((s,i)=>{
    if(s.count===0)return`<div class="bar-wrap"><div class="bar-label"><span>${DOW[i]}曜日</span><span style="color:var(--mid)">データなし</span></div></div>`;
    const avgC=Math.round(s.totalC/s.count),avgR=Math.round(s.totalRate/s.count);
    const avgH=Math.round(s.totalH/s.count*10)/10,avgA=Math.round(s.totalA/s.count*10)/10;
    return`<div class="bar-wrap">
      <div class="bar-label"><span style="font-weight:700;color:${i===0?'var(--danger)':i===6?'var(--info)':'var(--text)'}">${DOW[i]}曜日</span><span><strong>${avgC}人</strong> / ${avgR}%</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(avgC/maxC*100)}%;background:${getOccColor(avgR)}"></div></div>
      <div style="font-size:11px;color:var(--mid)">${avgA}h稼働 / ${avgH}h勤務（${s.count}日）</div>
    </div>`;
  }).join('')}</div>`;
}

function renderOccMonth(stats){
  return`<div class="card"><div class="fw-bold mb-12">📈 月別 平均稼働率</div>
  ${Object.keys(stats).sort().map(m=>{
    const s=stats[m],avgR=Math.round(s.totalRate/s.count),avgC=Math.round(s.totalC/s.count);
    return`<div class="bar-wrap">
      <div class="bar-label"><span class="fw-bold">${m}</span><span style="color:${getOccColor(avgR)};font-weight:700">${avgR}%</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${avgR}%;background:${getOccColor(avgR)}"></div></div>
      <div style="font-size:11px;color:var(--mid)">平均来客${avgC}人 / ${s.count}日間</div>
    </div>`;
  }).join('')}</div>`;
}

function renderShiftRef(stats,DOW){
  return`<div class="card"><div class="fw-bold mb-12">👥 シフト作成参考</div>
  <div style="font-size:12px;color:var(--mid);margin-bottom:10px">過去実績から算出した曜日別の目安です</div>
  ${stats.map((s,i)=>{
    if(s.count===0)return'';
    const avgC=Math.round(s.totalC/s.count),avgR=Math.round(s.totalRate/s.count);
    const avgH=Math.round(s.totalH/s.count*10)/10,avgA=Math.round(s.totalA/s.count*10)/10;
    const nFull=Math.ceil(avgA/9),nPT=Math.max(0,Math.round((avgH-nFull*9)/5));
    return`<div style="padding:10px;border-radius:var(--rs);background:${getOccColor(avgR)}15;border-left:4px solid ${getOccColor(avgR)};margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-weight:700;font-size:15px;color:${i===0?'var(--danger)':i===6?'var(--info)':'var(--text)'}">${DOW[i]}曜日</span>
        <span style="background:${getOccColor(avgR)};color:#fff;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700">${avgR}%</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:12px">
        <div style="text-align:center;background:rgba(255,255,255,.7);padding:6px;border-radius:8px">
          <div style="font-size:18px;font-weight:800;color:${getOccColor(avgR)}">${avgC}人</div><div style="color:var(--mid)">平均来客</div>
        </div>
        <div style="text-align:center;background:rgba(255,255,255,.7);padding:6px;border-radius:8px">
          <div style="font-size:16px;font-weight:800">${avgA}h</div><div style="color:var(--mid)">平均稼働</div>
        </div>
        <div style="text-align:center;background:rgba(255,255,255,.7);padding:6px;border-radius:8px">
          <div style="font-size:13px;font-weight:800;color:var(--pink)">フル${nFull}${nPT>0?'+時短'+nPT:''}</div><div style="color:var(--mid)">参考編成</div>
        </div>
      </div>
    </div>`;
  }).join('')}
  <div style="font-size:11px;color:var(--lite);margin-top:6px">※フル9h・時短5hで計算した目安です</div></div>`;
}

function renderOccInput(){
  const date = S.occInputDate||today();
  const store = S.occInputStore||'A';
  const allA = getAllOccData('A');
  const allB = getAllOccData('B');
  const allStore = store==='A'?allA:allB;
  const exA = allA[date]||{};
  const exB = allB[date]||{};

  // 同曜日の過去平均
  const same = Object.entries(allStore).filter(([d])=>new Date(d).getDay()===new Date(date).getDay()&&d!==date);
  const avgC = same.length>0?Math.round(same.reduce((a,[,v])=>a+(v.c||0),0)/same.length):0;
  const avgR = same.length>0?Math.round(same.reduce((a,[,v])=>a+(v.r||0),0)/same.length):0;
  const seats = store==='A'?6:3;

  return`<div class="page">
    <!-- 店舗・日付選択 -->
    <div class="card" style="margin-bottom:12px">
      <div class="form-group">
        <label class="form-label">🏪 店舗</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <button class="btn ${store==='A'?'btn-primary':'btn-ghost'}" onclick="S.occInputStore='A';render()">浦和店</button>
          <button class="btn ${store==='B'?'btn-primary':'btn-ghost'}" onclick="S.occInputStore='B';render()">広尾店</button>
        </div>

    </div>

    <!-- 検索バー -->
    <div style="position:relative;margin-bottom:12px">
      <input class="form-input" 
        placeholder="🔍 キーワードで検索（デザイン名・説明・タグ）"
        value="${keyword}"
        oninput="S.designKeyword=this.value;render()"
        style="padding-left:14px">
      ${keyword?`<button onclick="S.designKeyword='';render()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;cursor:pointer;color:var(--mid)">✕</button>`:''}
    </div>

    <!-- メニュー別フィルター -->
    <div style="margin-bottom:8px">
      <div style="font-size:12px;font-weight:600;color:var(--mid);margin-bottom:6px">💅 メニュー別</div>
      <div class="tab-row" style="margin-bottom:0">
        ${['全て',...DESIGN_MENU_CATS].map(c=>`<button class="tab ${menuFilter===c?'active':''}" style="font-size:12px;padding:6px 12px" onclick="S.designMenuCat='${c}';render()">${c}</button>`).join('')}
      </div>
    </div>

    <!-- カテゴリ別フィルター -->
    <div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:600;color:var(--mid);margin-bottom:6px">🗂️ スタイル別</div>
      <div class="tab-row" style="margin-bottom:0">
        ${['全て',...DESIGN_CATS].map(c=>`<button class="tab ${catFilter===c?'active':''}" style="font-size:12px;padding:6px 12px" onclick="S.designCat='${c}';render()">${c}</button>`).join('')}
      </div>
    </div>

    <!-- 件数表示 -->
    <div style="font-size:12px;color:var(--mid);margin-bottom:10px">
      ${filtered.length}件のデザイン
      ${catFilter!=='全て'||menuFilter!=='全て'||keyword?`<button onclick="S.designCat='全て';S.designMenuCat='全て';S.designKeyword='';render()" style="background:none;border:none;color:var(--pink);font-size:12px;cursor:pointer;margin-left:8px">✕ フィルター解除</button>`:''}
    </div>

    <!-- デザイングリッド -->
    ${filtered.length===0?`<div class="empty-state"><div class="empty-icon">💅</div><div class="empty-text">デザインが見つかりません</div></div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${filtered.map(d=>{
        const myStatus = d.progress&&S.user ? d.progress[S.user.id] : '未確認';
        const sColor = myStatus==='習得済み'?'badge-green':myStatus==='練習中'?'badge-warn':'badge-gray';
        const sIcon = myStatus==='習得済み'?'✅':myStatus==='練習中'?'🔄':'📖';
        return`<div class="card" style="cursor:pointer;margin-bottom:0;padding:12px" onclick="openDesign('${d.id}')">
          ${d.imageUrl
            ?`<img src="${d.imageUrl}" style="width:100%;border-radius:var(--rs);margin-bottom:8px;object-fit:cover;height:120px" onerror="this.style.display='none'">`
            :`<div style="width:100%;height:80px;background:var(--pink-l);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:8px">💅</div>`}
          <div class="fw-bold text-sm" style="margin-bottom:6px;line-height:1.4">${d.title}</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap">
            <span class="badge badge-pink" style="font-size:10px">${d.cat}</span>
            ${d.menuCat?`<span class="badge badge-blue" style="font-size:10px">${d.menuCat}</span>`:''}
            ${!isOwner()?`<span class="badge ${sColor}" style="font-size:10px">${sIcon}</span>`:''}
          </div>
          ${d.tags?`<div style="font-size:10px;color:var(--mid);margin-top:4px">#${d.tags.split(',').join(' #')}</div>`:''}

      }).join('')}

function openDesign(id){
  const d=DB.getDesigns().find(x=>x.id===id);
  if(!d) return;
  const myStatus=d.progress&&S.user?d.progress[S.user.id]:'未確認';
  const progressHtml=!isOwner()?`<div style="margin:14px 0">
    <div style="font-size:13px;font-weight:600;color:var(--mid);margin-bottom:8px">📊 習得状況を更新</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      ${LEARN_STATUS.map(p=>`<button class="btn ${myStatus===p?'btn-primary':'btn-ghost'} btn-sm" onclick="updateDesignProgress('${d.id}','${p}')">${p==='習得済み'?'✅':p==='練習中'?'🔄':'📖'} ${p}</button>`).join('')}
    </div>
  </div>`:'';
  const ownerProgressHtml=isOwner()&&d.progress?`<div style="margin:14px 0">
    <div style="font-size:13px;font-weight:600;color:var(--mid);margin-bottom:8px">👥 スタッフ習得状況</div>
    ${STAFF_LIST.filter(s=>s.treat).map(s=>{
      const st=d.progress[s.id]||'未確認';
      const c=st==='習得済み'?'badge-green':st==='練習中'?'badge-warn':'badge-gray';
      return`<div class="att-item"><span class="fw-bold">${s.name}</span><span class="badge ${c}">${st==='習得済み'?'✅':st==='練習中'?'🔄':'📖'} ${st}</span></div>`;
    }).join('')}
  </div>`:'';
  showModal(`
    <div class="flex gap-8 mb-8" style="flex-wrap:wrap"><span class="badge badge-pink">${d.cat}</span>${d.menuCat?`<span class="badge badge-blue">${d.menuCat}</span>`:''}</div>${d.tags?`<div style="font-size:12px;color:var(--mid);margin-bottom:8px">#${d.tags.split(',').join(' #')}</div>`:''}
    <div class="modal-title">${d.title}</div>
    <div style="font-size:12px;color:var(--mid);margin-bottom:12px">${fmtDateFull(d.date)} · ${d.author}</div>
    ${d.imageUrl?`<img src="${d.imageUrl}" style="width:100%;border-radius:var(--rs);margin-bottom:12px;object-fit:cover;max-height:200px" onerror="this.style.display='none'">`:''}
    <div style="font-size:14px;line-height:1.9;white-space:pre-wrap;background:var(--bg);padding:14px;border-radius:var(--rs)">${d.body}</div>
    ${progressHtml}${ownerProgressHtml}
    <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${(isDesignAdmin()||d.author===S.user?.name)?`<button class="btn btn-danger btn-sm" onclick="deleteDesign('${d.id}')">🗑 削除</button>`:'<div></div>'}
      <button class="btn btn-outline btn-sm" onclick="closeModal()">閉じる</button>
    </div>`);
}

function showAddDesignModal(){
  showModal(`<div class="modal-title">💅 デザインを投稿</div>
    <div class="form-group"><label class="form-label">タイトル</label><input class="form-input" id="d_title" placeholder="例：春のニュアンスネイル"></div>
    <div class="form-group"><label class="form-label">🗂️ スタイル</label>
      <select class="form-input" id="d_cat">${DESIGN_CATS.map(c=>`<option>${c}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label class="form-label">💅 メニュー</label>
      <select class="form-input" id="d_menucat"><option value="">選択しない</option>${DESIGN_MENU_CATS.map(c=>`<option>${c}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label class="form-label">🏷️ タグ（任意・カンマ区切り）</label><input class="form-input" id="d_tags" placeholder="例：ピンク,春,インスタ"></div>
    <div class="form-group">
      <label class="form-label">🖼️ 画像（ファイルまたはURL）</label>
      <label style="display:block;background:var(--pink-l);border:1.5px dashed var(--pink);border-radius:var(--rs);padding:12px;text-align:center;cursor:pointer;margin-bottom:8px">
        <span id="d_img_label" style="color:var(--pink);font-weight:600">📸 写真を選択（インスタスクショなど）</span>
        <input type="file" accept="image/*" style="display:none" onchange="previewDesignImg(this)">
      </label>
      <div id="d_img_preview" style="display:none;text-align:center;margin-bottom:8px">
        <img id="d_img_previewImg" style="max-height:150px;border-radius:var(--rs);border:1px solid var(--border)">
        <button onclick="clearDesignImg()" style="display:block;margin:4px auto;background:none;border:none;color:var(--danger);cursor:pointer;font-size:12px">✕ 削除</button>
      </div>
      <input class="form-input" id="d_img" placeholder="または画像URL（https://...）" style="font-size:12px">
    </div>
    <div class="form-group"><label class="form-label">説明・コメント（任意）</label><textarea class="form-input" id="d_body" rows="3" placeholder="気になったポイントや参考にしたいこと"></textarea></div>
    <button class="btn btn-primary btn-block" onclick="saveDesign()">投稿する</button>`);
}

function previewDesignImg(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    window._designImgData = e.target.result;
    const prev = document.getElementById('d_img_preview');
    const prevImg = document.getElementById('d_img_previewImg');
    const label = document.getElementById('d_img_label');
    if(prev && prevImg){
      prevImg.src = e.target.result;
      prev.style.display = 'block';
      if(label) label.textContent = '✅ 画像選択済み';
    }
  };
  reader.readAsDataURL(file);
}

function clearDesignImg(){
  window._designImgData = null;
  const prev = document.getElementById('d_img_preview');
  const label = document.getElementById('d_img_label');
  if(prev) prev.style.display = 'none';
  if(label) label.textContent = '📸 写真を選択（インスタスクショなど）';
}

function saveDesign(){
  const title=document.getElementById('d_title').value.trim();
  const cat=document.getElementById('d_cat').value;
  const menuCat=document.getElementById('d_menucat').value;
  const tags=document.getElementById('d_tags').value.trim();
  // ファイルアップロード優先、なければURL
  const imageUrl = window._designImgData || document.getElementById('d_img').value.trim();
  const bodyEl=document.getElementById('d_body');
  const body=(bodyEl?bodyEl.value.trim():'')||'（コメントなし）';
  if(!title) return alert('タイトルを入力してください');
  const progress={};
  STAFF_LIST.filter(s=>s.treat).forEach(s=>progress[s.id]='未確認');
  const list=DB.getDesigns();
  list.unshift({id:genId(),title,cat,menuCat,tags,imageUrl,body,date:today(),author:S.user.name,authorId:S.user.id,progress});
  DB.set('designs',list);
  window._designImgData = null;
  closeModal();render();
}

function updateDesignProgress(designId, status){
  const designs=DB.getDesigns();
  const idx=designs.findIndex(d=>d.id===designId);
  if(idx>=0){
    const prev=(designs[idx].progress||{})[S.user.id];
    if(!designs[idx].progress)designs[idx].progress={};
    designs[idx].progress[S.user.id]=status;
    DB.set('designs',designs);
    if(status==='習得済み'&&prev!=='習得済み'&&S.user){
      addPoints(S.user.id,'💅 デザイン習得済み',POINT_RULES.design_learn);
    }
  }
  closeModal();
  setTimeout(()=>openDesign(designId),100);
}

// DESIGN SCHEDULE (デザインスケジュール管理)
// ============================================================
const DESIGN_STAGES=['デザイン案','撮影','手順作成','公開済み'];
const DESIGN_TYPES=['キャンペーン','定額','季節限定','レギュラー','その他'];

function renderDesignSchedule(){
  const schedules=(DB.get('designSchedules')||[]).sort((a,b)=>a.deadline?a.deadline.localeCompare(b.deadline||'z'):1);
  return`<div class="page">
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button class="tab" onclick="S.designMainTab='gallery';render()">💅 デザイン</button>
      <button class="tab active">📅 スケジュール</button>
    </div>
    ${schedules.length===0?`<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">スケジュールはまだありません</div></div>`:''}
    ${schedules.map(s=>{
      const stageIdx=DESIGN_STAGES.indexOf(s.stage);
      const pct=Math.round((stageIdx+1)/DESIGN_STAGES.length*100);
      const isExp=s.deadline&&new Date(s.deadline)<new Date()&&s.stage!=='公開済み';
      return`<div class="card" onclick="openDesignSchedule('${s.id}')" style="cursor:pointer">
        <div class="card-row mb-8">
          <div>
            <span class="fw-bold">${s.title}</span>
            <span class="badge badge-blue" style="font-size:11px;margin-left:6px">${s.type}</span>
          </div>
          <span class="badge ${s.stage==='公開済み'?'badge-green':isExp?'badge-danger':'badge-warn'}">${s.stage}</span>
        </div>
        <div class="progress-bar" style="margin-bottom:6px"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--mid)">
          ${DESIGN_STAGES.map((st,i)=>`<span style="color:${i<=stageIdx?'var(--pink)':'var(--lite)'}">${i<=stageIdx?'✅':'○'} ${st}</span>`).join('')}
        </div>
        ${s.deadline?`<div style="font-size:12px;color:${isExp?'var(--danger)':'var(--mid)'};margin-top:6px">📅 期限: ${fmtDateFull(s.deadline)}${isExp?' ⚠️ 超過':''}</div>`:''}
        ${s.memo?`<div style="font-size:12px;color:var(--mid);margin-top:4px">📝 ${s.memo}</div>`:''}
      </div>`;
    }).join('')}
    <button class="fab" onclick="showAddScheduleModal()">＋</button>
  </div>`;
}

function openDesignSchedule(id){
  const list=DB.get('designSchedules')||[];
  const s=list.find(x=>x.id===id);
  if(!s) return;
  const stageIdx=DESIGN_STAGES.indexOf(s.stage);
  const isExp=s.deadline&&new Date(s.deadline)<new Date()&&s.stage!=='公開済み';
  showModal(`
    <div class="flex gap-8 mb-8" style="flex-wrap:wrap">
      <span class="badge badge-blue">${s.type}</span>
      <span class="badge ${s.stage==='公開済み'?'badge-green':isExp?'badge-danger':'badge-warn'}">${s.stage}</span>
    </div>
    <div class="modal-title">${s.title}</div>
    ${s.deadline?`<div style="font-size:13px;color:${isExp?'var(--danger)':'var(--mid)'};margin-bottom:12px">📅 期限: ${fmtDateFull(s.deadline)}${isExp?' ⚠️ 期限超過':''}</div>`:''}
    ${s.memo?`<div style="background:var(--bg);padding:12px;border-radius:var(--rs);font-size:14px;line-height:1.8;white-space:pre-wrap;margin-bottom:14px">📝 ${s.memo}</div>`:''}

    <div style="font-size:13px;font-weight:600;color:var(--mid);margin-bottom:10px">📊 ステージを更新</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
      ${DESIGN_STAGES.map((st,i)=>`<button class="btn ${s.stage===st?'btn-primary':'btn-ghost'} btn-sm" onclick="updateScheduleStage('${s.id}','${st}')">${i<=stageIdx?'✅':''} ${st}</button>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="btn btn-danger btn-sm" onclick="deleteSchedule('${s.id}')">🗑 削除</button>
      <button class="btn btn-outline btn-sm" onclick="closeModal()">閉じる</button>
    </div>`);
}

function showAddScheduleModal(){
  showModal(`<div class="modal-title">📅 デザインスケジュール追加</div>
    <div class="form-group"><label class="form-label">タイトル</label><input class="form-input" id="sch_title" placeholder="例：夏キャンペーンネイル2026"></div>
    <div class="form-group"><label class="form-label">種類</label>
      <select class="form-input" id="sch_type">${DESIGN_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">現在のステージ</label>
      <select class="form-input" id="sch_stage">${DESIGN_STAGES.map(s=>`<option>${s}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">📅 公開予定日</label><input type="date" class="form-input" id="sch_dl"></div>
    <div class="form-group"><label class="form-label">メモ・備考</label><textarea class="form-input" id="sch_memo" rows="4" placeholder="デザインの概要・撮影日・担当者など"></textarea></div>
    <button class="btn btn-primary btn-block" onclick="saveSchedule()">追加する</button>`);
}

function saveSchedule(){
  const title=document.getElementById('sch_title').value.trim();
  const type=document.getElementById('sch_type').value;
  const stage=document.getElementById('sch_stage').value;
  const deadline=document.getElementById('sch_dl').value;
  const memo=document.getElementById('sch_memo').value.trim();
  if(!title) return alert('タイトルを入力してください');
  const list=DB.get('designSchedules')||[];
  list.unshift({id:genId(),title,type,stage,deadline,memo,date:today(),author:S.user.name});
  DB.set('designSchedules',list);
  closeModal();render();
}

function updateScheduleStage(id, stage){
  const list=DB.get('designSchedules')||[];
  const idx=list.findIndex(s=>s.id===id);
  if(idx>=0){list[idx].stage=stage;DB.set('designSchedules',list);}
  closeModal();
  setTimeout(()=>openDesignSchedule(id),100);
}

// ============================================================
function renderShiftRequest(){
  const now = new Date();
  const targetYear = S.shiftReqYear || now.getFullYear();
  const targetMonth = S.shiftReqMonth !== undefined ? S.shiftReqMonth : now.getMonth() + 1;
  const requests = DB.getShiftRequests();
  const shiftView = S.shiftView || 'submit'; // submit or manage

  if(isOwner()){
    return renderShiftRequestOwner(requests, targetYear, targetMonth);
  } else if(isShiftAdmin()){
    // misa/wakanaは両方のビューを持つ
    return `<div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
        <button class="btn ${shiftView==='submit'?'btn-primary':'btn-ghost'}" onclick="S.shiftView='submit';render()">📝 自分のシフト希望</button>
        <button class="btn ${shiftView==='manage'?'btn-primary':'btn-ghost'}" onclick="S.shiftView='manage';render()">👥 シフト管理</button>
      </div>
      ${shiftView==='submit'?renderShiftRequestStaff(requests, targetYear, targetMonth):renderShiftRequestOwner(requests, targetYear, targetMonth)}
    </div>`;
  } else {
    return renderShiftRequestStaff(requests, targetYear, targetMonth);
  }
}

function renderShiftRequestStaff(requests, year, month){
  const myReqRaw = requests.find(r=>r.staffId===S.user.id&&r.year===year&&r.month===month);
  const myReq = {
    staffId: S.user.id, year, month, offDays:[], startTime:'10:00', endTime:'19:00', note:'',
    ...(myReqRaw || {}),
    offDays: (myReqRaw?.offDays) || []
  };
  const daysInMonth = new Date(year, month, 0).getDate();
  const firstDay = new Date(year, month-1, 1).getDay();
  const weeks = ['日','月','火','水','木','金','土'];
  const submitted = requests.some(r=>r.staffId===S.user.id&&r.year===year&&r.month===month);

  return`<div class="page">
    <!-- 月選択 -->
    <div class="card">
      <div class="card-row">
        <button class="btn btn-ghost btn-sm" onclick="S.shiftReqMonth=${month===1?12:month-1};if(${month===1})S.shiftReqYear=${year-1};render()">◀</button>
        <div class="fw-bold">${year}年 ${month}月のシフト希望</div>
        <button class="btn btn-ghost btn-sm" onclick="S.shiftReqMonth=${month===12?1:month+1};if(${month===12})S.shiftReqYear=${year+1};render()">▶</button>
      </div>
    </div>

    ${submitted?`<div style="background:#E8F5E9;border-radius:var(--rs);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px">
      <span style="font-size:16px">✅</span>
      <span style="color:#2E7D32;font-weight:600">${year}年${month}月の希望を提出済みです</span>
    </div>`:''}

    <!-- カレンダー：希望休選択 -->
    <div class="card">
      <div class="fw-bold mb-12">🗓️ 希望休を選んでください</div>
      ${(()=>{
        const isContractor = S.user?.contractor;
        if(isContractor) return '<div style="font-size:12px;color:var(--mid);margin-bottom:10px">業務委託は日数制限なし</div>';
        const maxOff = DB.getStaffMaxOffDays()[S.user?.id] || 8;
        const used = (myReq.offDays||[]).length;
        const rem = maxOff - used;
        return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div style="font-size:12px;color:var(--mid)">タップで選択・解除</div>
          <div style="font-size:13px;font-weight:700;color:${rem<=0?'var(--danger)':rem<=2?'var(--warn)':'var(--success)'}">
            残り${rem}日（${used}/${maxOff}日使用）
          </div>
        </div>`;
      })()}
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px">
        ${weeks.map((w,i)=>`<div style="text-align:center;font-size:11px;font-weight:700;color:${i===0?'var(--danger)':i===6?'var(--info)':'var(--mid)'}">${w}</div>`).join('')}
        ${Array(firstDay).fill('<div></div>').join('')}
        ${Array.from({length:daysInMonth},(_,i)=>{
          const day = i+1;
          const date = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          const isOff = (myReq.offDays||[]).includes(date);
          const dow = new Date(year,month-1,day).getDay();
          const isSun = dow===0;
          const isSat = dow===6;
          return`<div onclick="toggleOffDay('${date}','${year}','${month}')" 
            style="text-align:center;padding:6px 2px;border-radius:6px;cursor:pointer;
              background:${isOff?'var(--danger)':'transparent'};
              color:${isOff?'#fff':isSun?'var(--danger)':isSat?'var(--info)':'var(--text)'};
              border:1.5px solid ${isOff?'var(--danger)':'var(--border)'}">
            <div style="font-size:12px;font-weight:${isOff?'700':'400'}">${day}</div>
            ${isOff?'<div style="font-size:8px">休</div>':''}
          </div>`;
        }).join('')}
      </div>
      ${(myReq.offDays||[]).length>0?`<div style="font-size:12px;color:var(--danger);margin-top:8px">
        希望休: ${(myReq.offDays||[]).map(d=>d.split('-')[2]+'日').join('・')}
      </div>`:'<div style="font-size:12px;color:var(--mid)">希望休なし</div>'}
    </div>

    <!-- 希望時間 -->
    <div class="card">
      <div class="fw-bold mb-12">⏰ 希望出勤時間</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">出勤時間</label>
          <input type="time" class="form-input" id="shift_start" value="${myReq.startTime||'10:00'}">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">退勤時間</label>
          <input type="time" class="form-input" id="shift_end" value="${myReq.endTime||'19:00'}">
        </div>
      </div>
    </div>

    <!-- 備考 -->
    <div class="card">
      <div class="fw-bold mb-12">📝 備考・その他の希望</div>
      <textarea class="form-input" id="shift_note" rows="3" placeholder="例：〇日は午後から出勤希望・〇〇の都合あり">${myReq.note||''}</textarea>
    </div>

    <button class="btn btn-primary btn-block" onclick="submitShiftRequest('${year}','${month}')">
      📨 ${submitted?'更新して再提出':'シフト希望を提出'}
    </button>
    <div style="font-size:12px;color:var(--mid);text-align:center;margin-top:8px">
      提出後も再提出で変更できます
    </div>
  </div>`;
}

function renderShiftRequestOwner(requests, year, month){

  const adminStore2 = !isOwner() && S.user?.shiftAdmin ? S.user.shiftAdmin : null;
  const allStaff = STAFF_LIST.filter(s=>s.treat&&(adminStore2?s.store===adminStore2:true));
  const submitted = allStaff.filter(s=>monthReqs.some(r=>r.staffId===s.id));
  const notSubmitted = allStaff.filter(s=>!monthReqs.some(r=>r.staffId===s.id));
  const storeFilter = S.shiftOwnerStore || 'both';

  // shiftAdminは自分の担当店舗のみ
  const adminStore = !isOwner() && S.user?.shiftAdmin ? S.user.shiftAdmin : null;
  const filteredReqs = monthReqs.filter(r=>{
    const staff = STAFF_LIST.find(s=>s.id===r.staffId);
    if(adminStore) return staff?.store===adminStore;
    return storeFilter==='both'||staff?.store===storeFilter;
  });

  return`<div class="page">
    <!-- 月選択 -->
    <div class="card">
      <div class="card-row">
        <button class="btn btn-ghost btn-sm" onclick="S.shiftReqMonth=${month===1?12:month-1};if(${month===1})S.shiftReqYear=${year-1};render()">◀</button>
        <div class="fw-bold">${year}年 ${month}月 シフト希望一覧${!isOwner()&&S.user?.shiftAdmin?'（'+(S.user.shiftAdmin==='A'?'浦和店':'広尾店')+'）':''}</div>
        <button class="btn btn-ghost btn-sm" onclick="S.shiftReqMonth=${month===12?1:month+1};if(${month===12})S.shiftReqYear=${year+1};render()">▶</button>
      </div>
    </div>

    <!-- 店舗フィルター（オーナーのみ） -->
    ${isOwner()?`<div class="tab-row">
      <button class="tab ${storeFilter==='both'?'active':''}" onclick="S.shiftOwnerStore='both';render()">両店</button>
      <button class="tab ${storeFilter==='A'?'active':''}" onclick="S.shiftOwnerStore='A';render()">浦和店</button>
      <button class="tab ${storeFilter==='B'?'active':''}" onclick="S.shiftOwnerStore='B';render()">広尾店</button>
    </div>`:``}
    ${!isOwner()&&S.user?.shiftAdmin?`<div style="margin-bottom:12px"><span class="store-badge ${S.user.shiftAdmin==='A'?'store-a':'store-b'}">${S.user.shiftAdmin==='A'?'浦和店':'広尾店'} シフト管理</span></div>`:``}

    <!-- 提出状況サマリー -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-row mb-8">
        <div class="fw-bold">📊 提出状況</div>
        <span class="badge ${submitted.length===allStaff.length?'badge-green':'badge-warn'}">${submitted.length}/${allStaff.length}名 提出済</span>
      </div>
      ${notSubmitted.length>0?`
        <div style="background:#FFF3E0;border-radius:var(--rs);padding:8px 12px;margin-bottom:8px">
          <div style="font-size:12px;font-weight:600;color:var(--warn);margin-bottom:6px">⚠️ 未提出</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
            ${notSubmitted.map(s=>`<span class="badge badge-warn" style="font-size:11px">${s.name}</span>`).join('')}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
            <button class="btn btn-sm" style="background:#FF9800;color:#fff;border:none" onclick="sendShiftReminder(${year},${month},'all')">
              📢 全員に催促
            </button>
            <button class="btn btn-ghost btn-sm" onclick="showReminderModal(${year},${month})">
              👤 個別に催促
            </button>
          </div>
        </div>`:'<div style="color:var(--success);font-size:13px;font-weight:600">✅ 全員提出済み！</div>'}

    ${filteredReqs.length===0?`<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">まだ提出がありません</div></div>`:''}

      return`<div class="card">

          <div>
            <span class="fw-bold">${staff.name}</span>

      </div>`;
    }).join('')}
  </div>`;
}

function toggleOffDay(date, year, month){
  const requests = DB.getShiftRequests();
  let req = requests.find(r=>r.staffId===S.user.id&&r.year===parseInt(year)&&r.month===parseInt(month));
  if(!req){
    req = {staffId:S.user.id, year:parseInt(year), month:parseInt(month), offDays:[], startTime:'10:00', endTime:'19:00', note:''};
    requests.push(req);
  }
  const idx2 = req.offDays.indexOf(date);
  if(idx2>=0){
    req.offDays.splice(idx2,1);
  } else {
    // 業務委託は制限なし、それ以外は設定値（デフォルト8日）
    const isContractor = S.user?.contractor;
    if(!isContractor){
      const maxOffDaysMap = DB.getStaffMaxOffDays();
      const MAX_OFF_DAYS = maxOffDaysMap[S.user?.id] || 8;
      if((req.offDays||[]).length >= MAX_OFF_DAYS){
        alert(`休み希望は最大${MAX_OFF_DAYS}日までです`);
        return;
      }
    }
    req.offDays.push(date);
  }
  req.offDays.sort();
  DB.setShiftRequests(requests);
  render();
}

function submitShiftRequest(year, month){
  const startTime = document.getElementById('shift_start')?.value || '10:00';
  const endTime = document.getElementById('shift_end')?.value || '19:00';
  const note = document.getElementById('shift_note')?.value || '';
  const requests = DB.getShiftRequests();
  const idx2 = requests.findIndex(r=>r.staffId===S.user.id&&r.year===parseInt(year)&&r.month===parseInt(month));
  const existing = idx2>=0 ? requests[idx2] : null;
  const newReq = {
    staffId: S.user.id,
    staffName: S.user.name,
    year: parseInt(year),
    month: parseInt(month),
    offDays: existing ? existing.offDays : [],
    startTime, endTime, note,
    submittedAt: nowTime()
  };
  if(idx2>=0) requests[idx2] = newReq;
  else requests.push(newReq);
  DB.setShiftRequests(requests);
  addPoints(S.user.id,'📅 シフト希望を提出',POINT_RULES.shift_submit);
  alert('✅ シフト希望を提出しました！+'+POINT_RULES.shift_submit+'pt獲得！');
  render();
}

function deleteSchedule(id){
  if(!confirm('削除しますか？'))return;
  DB.set('designSchedules',(DB.get('designSchedules')||[]).filter(s=>s.id!==id));
  closeModal();render();
}

function submitAbsence(){
  const type = document.getElementById('ab_type').value;
  const time = document.getElementById('ab_time')?.value||'';
  const reason = document.getElementById('ab_reason').value.trim();
  const now = new Date();
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const list = DB.getAbsences();
  list.unshift({
    id:genId(),
    staffName:S.user.name,
    staffId:S.user.id,
    store:S.user.store==='both'?'A':S.user.store,
    type, time, reason,
    date:today(),
    createdAt:timeStr
  });
  DB.set('absences',list);
  alert(`✅ ${type}の連絡を送りました`);
  render();
}


// ============================================================
// AWARDS (半期表彰制度)
// ============================================================
function getCurrentPeriod(){
  const now = new Date();
  const year = now.getFullYear();
  const half = now.getMonth() < 6 ? 1 : 2;
  return {year, half, label: `${year}年 ${half===1?'上半期（1〜6月）':'下半期（7〜12月）'}`};
}

function getPeriodKey(year, half){ return `${year}-H${half}`; }

function getPeriodRange(year, half){
  if(half===1) return {start:`${year}-01-01`, end:`${year}-06-30`};
  return {start:`${year}-07-01`, end:`${year}-12-31`};
}

function renderAwards(){
  const period = getCurrentPeriod();
  const tab = S.awardsTab || 'sales';
  const viewYear = S.awardsYear || period.year;
  const viewHalf = S.awardsHalf || period.half;
  const periodKey = getPeriodKey(viewYear, viewHalf);
  const range = getPeriodRange(viewYear, viewHalf);
  const awards = DB.getAwards();

  // 売上データ（自動集計）
  const sales = DB.getSales().filter(s=>s.date>=range.start&&s.date<=range.end);
  const salesByStaff = STAFF_LIST.filter(s=>s.treat&&!s.noRank&&s.store==='A').map(s=>({
    ...s,
    total: sales.filter(x=>x.staff===s.id).reduce((a,x)=>a+x.amount,0),
    count: sales.filter(x=>x.staff===s.id).length
  })).sort((a,b)=>b.total-a.total);

  // 手動データ
  const newClients = awards.newClients[periodKey] || {};

function saveAwardData(type, periodKey){
  const awards = DB.getAwards();

  const data = {};
  staff.forEach(s=>{

  if(type==='new') awards.newClients[periodKey] = data;
  else awards.contributions[periodKey] = data;

  render();

  alert('✅ 保存しました！');
}

// 稼働率計算（席数とスタッフ数の小さい方を使用）
function getEffectiveSeats(store, cfg){
  const seats = store==='A'?(cfg.seatsA||6):(cfg.seatsB||3);
  // 各店舗の施術スタッフ数
  const staffCount = STAFF_LIST.filter(s=>s.treat&&!s.noSales&&(s.store===store||s.store==='both')).length;
  // 席数とスタッフ数の少ない方が実効稼働数
  return Math.min(seats, staffCount);
}

function calcHourDiff(open, close){
  if(!open||!close) return 0;
  const [oh,om]=open.split(':').map(Number);
  const [ch,cm]=close.split(':').map(Number);
  return Math.round(((ch*60+cm)-(oh*60+om))/60*10)/10;
}

function getActualOpenHours(store, date, cfg){
  const logged = DB.getStoreHoursForDate(store, date||today());
  if(logged && logged.hours>0) return logged.hours;
  return store==='A'?(cfg.openHoursA||9):(cfg.openHoursB||10);
}

function calcOccupancyWithHours(salesCount, store, cfg, hours){
  const effectiveSeats = getEffectiveSeats(store, cfg);
  const avgTime = cfg.avgTreatTime||90;
  const capacity = effectiveSeats * hours * 60;
  const used = salesCount * avgTime;
  return capacity>0?Math.min(100,Math.round(used/capacity*100)):0;
}

function getStoreOpenHours(store, cfg){
  return store==='A'?(cfg.openHoursA||9):(cfg.openHoursB||10);
}

function calcOccupancy(salesCount, store, cfg, days=1){
  const effectiveSeats = getEffectiveSeats(store, cfg);
  const openHours = getStoreOpenHours(store, cfg);
  const avgTime = cfg.avgTreatTime||90;
  // 稼働率 = (件数 × 平均施術時間) / (実効席数 × 営業時間 × 日数 × 60分) × 100
  const capacity = effectiveSeats * openHours * 60 * days;
  const used = salesCount * avgTime;
  return capacity>0?Math.min(100,Math.round(used/capacity*100)):0;
}

function getOccupancyLabel(store, cfg){
  const seats = store==='A'?(cfg.seatsA||6):(cfg.seatsB||3);
  const staff = STAFF_LIST.filter(s=>s.treat&&!s.noSales&&(s.store===store||s.store==='both')).length;
  const effective = Math.min(seats, staff);
  const hours = getStoreOpenHours(store, cfg);
  const storeName = store==='A'?'浦和店（10-19時）':'広尾店（11-21時）';
  return `${storeName} ${seats}席・${staff}名→実効${effective}枠`;
}

function renderProgressByTaskGrouped(allTasks, storeFilter){
  const ownerTasks = allTasks.filter(t=>getTaskCreatorType(t.from)==='owner');
  const leaderTasks = allTasks.filter(t=>getTaskCreatorType(t.from)==='leader');

  const renderSection = (tasks, label, color, icon) => {
    if(tasks.length===0) return '';
    const taskMap = {};
    tasks.forEach(t=>{
      if(!taskMap[t.id]) taskMap[t.id]={icon:t.icon,title:t.title,type:t.type,from:t.from,date:t.date,deadline:t.deadline,staff:[]};
      taskMap[t.id].staff.push({name:t.staffName,store:t.staffStore,status:t.status});
    });
    const taskList = Object.values(taskMap).sort((a,b)=>{
      const ad=a.staff.every(s=>s.status==='完了');
      const bd=b.staff.every(s=>s.status==='完了');
      return ad===bd?0:ad?1:-1;
    });
    return`<div style="margin-bottom:20px">
      <div style="font-size:14px;font-weight:700;color:${color};margin-bottom:10px;display:flex;align-items:center;gap:6px">
        <span>${icon}</span>${label}
        <span style="background:${color};color:#fff;border-radius:20px;padding:2px 8px;font-size:11px">${taskList.length}件</span>
      </div>
      ${taskList.map(task=>{
        const allDone=task.staff.every(s=>s.status==='完了');
        const pendingStaff=task.staff.filter(s=>s.status==='未対応');
        const doingStaff=task.staff.filter(s=>s.status==='対応中');
        const doneStaff=task.staff.filter(s=>s.status==='完了');
        const isExp=task.deadline&&new Date(task.deadline)<new Date()&&!allDone;
        const pct=task.staff.length?Math.round(doneStaff.length/task.staff.length*100):0;
        return`<div class="card" style="margin-bottom:8px;border-left:4px solid ${allDone?'var(--success)':isExp?'var(--danger)':color}">
          <div class="card-row mb-8">
            <div><span>${task.icon}</span><span class="fw-bold" style="margin-left:4px">${task.title}</span></div>
            <span class="badge ${allDone?'badge-green':isExp?'badge-danger':'badge-warn'}">${allDone?'✅完了':isExp?'⚠️超過':'進行中'}</span>
          </div>
          <div style="font-size:12px;color:var(--mid);margin-bottom:8px">
            From: ${task.from} · ${fmtDateFull(task.date)}${task.deadline?` · 📅 ${fmtDateFull(task.deadline)}`:''}
          </div>
          <div class="progress-bar" style="margin-bottom:8px"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
          <div style="display:flex;gap:4px;flex-wrap:wrap">
            ${pendingStaff.map(s=>`<span class="badge badge-danger" style="font-size:11px">⬜ ${s.name}</span>`).join('')}
            ${doingStaff.map(s=>`<span class="badge badge-warn" style="font-size:11px">🔄 ${s.name}</span>`).join('')}
            ${doneStaff.map(s=>`<span class="badge badge-green" style="font-size:11px">✅ ${s.name}</span>`).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  };

  if(ownerTasks.length===0&&leaderTasks.length===0){
    return`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">タスクがありません</div></div>`;
  }

  return renderSection(ownerTasks,'オーナーからのタスク','#E91E8C','👑')
       + renderSection(leaderTasks,'リーダーからのタスク','#FF9800','⭐');
}

  const taskMap = {};
  allTasks.forEach(t=>{
    if(!taskMap[t.id]) taskMap[t.id] = {
      icon:t.icon, title:t.title, type:t.type,
      from:t.from, date:t.date, deadline:t.deadline,
      staff:[]
    };
    taskMap[t.id].staff.push({
      name:t.staffName, store:t.staffStore,
      status:t.status, staffId:t.staffId
    });
  });

  const tasks = Object.values(taskMap);
  if(tasks.length===0) return`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">タスクがありません</div></div>`;

  // 未完了タスクを先に
  tasks.sort((a,b)=>{
    const aDone = a.staff.every(s=>s.status==='完了');
    const bDone = b.staff.every(s=>s.status==='完了');
    return aDone===bDone?0:aDone?1:-1;
  });

  return tasks.map(task=>{
    const allDone = task.staff.every(s=>s.status==='完了');
    const pendingStaff = task.staff.filter(s=>s.status==='未対応');
    const doingStaff = task.staff.filter(s=>s.status==='対応中');
    const doneStaff = task.staff.filter(s=>s.status==='完了');
    const isExp = task.deadline&&new Date(task.deadline)<new Date()&&!allDone;
    const pct = task.staff.length ? Math.round(doneStaff.length/task.staff.length*100) : 0;

    return`<div class="card" style="margin-bottom:12px;border-left:4px solid ${allDone?'var(--success)':isExp?'var(--danger)':'var(--pink)'}">
      <div class="card-row mb-8">
        <div>
          <span>${task.icon}</span>
          <span class="fw-bold" style="margin-left:4px">${task.title}</span>
        </div>
        <span class="badge ${allDone?'badge-green':isExp?'badge-danger':'badge-warn'}">${allDone?'✅完了':isExp?'⚠️超過':'進行中'}</span>
      </div>
      <div style="font-size:12px;color:var(--mid);margin-bottom:8px">
        From: ${task.from} · ${fmtDateFull(task.date)}
        ${task.deadline?` · 📅 ${fmtDateFull(task.deadline)}`:'' }
      </div>
      <div class="progress-bar" style="margin-bottom:8px"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        ${pendingStaff.map(s=>`<span class="badge badge-danger" style="font-size:11px">⬜ ${s.name}</span>`).join('')}
        ${doingStaff.map(s=>`<span class="badge badge-warn" style="font-size:11px">🔄 ${s.name}</span>`).join('')}
        ${doneStaff.map(s=>`<span class="badge badge-green" style="font-size:11px">✅ ${s.name}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function saveInventoryItem(){
  const name = document.getElementById('inv_name').value.trim();
  const cat = document.getElementById('inv_cat').value;
  const store = document.getElementById('inv_store').value;
  const stock = parseInt(document.getElementById('inv_stock').value)||0;
  const unit = document.getElementById('inv_unit').value.trim()||'個';
  const minStock = parseInt(document.getElementById('inv_min').value)||0;
  const wholesalePrice = parseInt(document.getElementById('inv_price').value)||0;
  const location = document.getElementById('inv_loc').value.trim();
  const note = document.getElementById('inv_note').value.trim();
  if(!name) return alert('商品名を入力してください');
  const list = DB.getInventory();
  list.push({
    id:genId(),name,cat,store,currentStock:stock,unit,minStock,
    wholesalePrice,location,note,
    updatedAt:nowDateTime(),updatedBy:S.user?.name||'',
    createdAt:nowDateTime(),createdBy:S.user?.name||'',
    history:[{date:nowDateTime(),by:S.user?.name||'',before:0,after:stock,type:'初期登録'}]
  });
  DB.setInventory(list);
  closeModal();render();
}

function updateInventoryItem(id){
  const list = DB.getInventory();
  const idx = list.findIndex(i=>i.id===id);
  if(idx<0) return;
  list[idx].name = document.getElementById('inv_name').value.trim();
  list[idx].cat = document.getElementById('inv_cat').value;
  list[idx].wholesalePrice = parseInt(document.getElementById('inv_price').value)||0;
  list[idx].unit = document.getElementById('inv_unit').value.trim()||'個';
  list[idx].minStock = parseInt(document.getElementById('inv_min').value)||0;
  list[idx].location = document.getElementById('inv_loc').value.trim();
  list[idx].note = document.getElementById('inv_note').value.trim();
  const prevStock = list[idx].currentStock;
  const newStock = parseInt(document.getElementById('inv_stock').value)||0;
  list[idx].currentStock = newStock;
  list[idx].updatedAt = nowDateTime();
  list[idx].updatedBy = S.user?.name||'';
  if(!list[idx].history) list[idx].history=[];
  if(prevStock !== newStock){
    list[idx].history.unshift({
      date:nowDateTime(), by:S.user?.name||'',
      before:prevStock, after:newStock, type:'編集'
    });
    if(list[idx].history.length>20) list[idx].history=list[idx].history.slice(0,20);
  }
  DB.setInventory(list);
  closeModal();render();
}

function deleteInventoryItem(id){
  if(!confirm('削除しますか？'))return;
  DB.setInventory(DB.getInventory().filter(i=>i.id!==id));
  closeModal();render();
}

function updateStock(id, delta){
  const list = DB.getInventory();
  const idx = list.findIndex(i=>i.id===id);
  if(idx<0) return;
  const before = list[idx].currentStock||0;
  list[idx].currentStock = Math.max(0, before+delta);
  list[idx].updatedAt = nowDateTime();
  list[idx].updatedBy = S.user?.name||'';
  // 変更履歴を追加
  if(!list[idx].history) list[idx].history=[];
  list[idx].history.unshift({
    date:nowDateTime(), by:S.user?.name||'',
    before, after:list[idx].currentStock,
    type: delta>0?'入庫':'使用'
  });
  if(list[idx].history.length>20) list[idx].history=list[idx].history.slice(0,20);
  DB.setInventory(list);
  render();
}

function saveStocktaking(store){
  const list = DB.getInventory();
  const items = list.filter(i=>i.store===store);
  let updatedCount = 0;
  items.forEach(item=>{
    const input = document.getElementById('st_'+item.id);
    if(!input||input.value==='') return;
    const newStock = parseInt(input.value);
    if(isNaN(newStock)||newStock<0) return;
    const idx = list.findIndex(i=>i.id===item.id);
    if(idx>=0){
      const prevSt = list[idx].currentStock;
      list[idx].currentStock = newStock;
      list[idx].updatedAt = nowDateTime();
      list[idx].updatedBy = S.user?.name||'';
      if(!list[idx].history) list[idx].history=[];
      list[idx].history.unshift({date:nowDateTime(),by:S.user?.name||'',before:prevSt,after:newStock,type:'棚卸し'});
      if(list[idx].history.length>20) list[idx].history=list[idx].history.slice(0,20);
      updatedCount++;
    }
  });
  // 棚卸し履歴保存
  const history = DB.getStocktaking();
  history.unshift({id:genId(),store,date:today(),staff:S.user.name,count:updatedCount});
  DB.set('stocktaking', history);
  DB.setInventory(list);
  S.invMode = 'list';
  alert(`✅ 棚卸し完了！${updatedCount}件の在庫を更新しました`);
  render();
}

const RANKS = [
  {name:'ルーキー',    icon:'⭐',    min:0,    color:'#9E9E9E', char:'🥚', charName:'たまご',    msg:'これからよろしくね！💪',        bg:'#F5F5F5'},
  {name:'レギュラー',  icon:'⭐⭐',   min:300,  color:'#4CAF50', char:'🐣', charName:'ひよこ',    msg:'少しずつ成長してるよ！✨',       bg:'#E8F5E9'},
  {name:'エキスパート',icon:'⭐⭐⭐',  min:800,  color:'#2196F3', char:'🐰', charName:'うさぎ',    msg:'すごい！どんどん上手になってる！',bg:'#E3F2FD'},
  {name:'プロ',        icon:'🌟',    min:1500, color:'#FF9800', char:'🦊', charName:'きつね',    msg:'さすが！プロの域に近づいてきた！',bg:'#FFF3E0'},

];

function getRank(pts){
  let rank = RANKS[0];
  for(const r of RANKS){ if(pts >= r.min) rank = r; }
  return rank;
}

function getNextRank(pts){
  for(const r of RANKS){ if(pts < r.min) return r; }
  return null;
}

function addPoints(staffId, reason, pts){
  if(!staffId) return;
  const points = DB.getPoints();
  if(!points[staffId]) points[staffId] = 0;
  points[staffId] += pts;
  DB.setPoints(points);
  // 履歴追加
  const history = DB.getPointHistory();
  history.unshift({staffId, reason, pts, date:today(), time:nowTime()});
  if(history.length > 200) history.splice(200);
  DB.set('pointHistory', history);
}

  })).sort((a,b)=>b.pts-a.pts);

  const myPts = points[S.user?.id]||0;
  const myRank = getRank(myPts);
  const nextRank = getNextRank(myPts);

const THANKS_LIMIT = 3; // 1日に送れる最大票数

function getTodayThanksGiven(){
  return DB.getThanks().filter(t=>t.fromId===S.user?.id&&t.date===today());
}

function renderThanks(){
  const allThanks = DB.getThanks();
  const todayGiven = getTodayThanksGiven();
  const remaining = THANKS_LIMIT - todayGiven.length;
  const tab = S.thanksTab || 'send';

  // 月間集計
  const mk = getMonthKey();
  const monthThanks = allThanks.filter(t=>t.date.startsWith(mk));
  const monthRank = STAFF_LIST.filter(s=>s.treat).map(s=>({
    ...s,
    received: monthThanks.filter(t=>t.toId===s.id).length,
    messages: monthThanks.filter(t=>t.toId===s.id).map(t=>t.message).filter(Boolean)
  })).sort((a,b)=>b.received-a.received);

  // 受け取ったありがとう
  const myReceived = allThanks.filter(t=>t.toId===S.user?.id).sort((a,b)=>b.date.localeCompare(a.date));

  return`<div class="page">
    <!-- 今日の残り投票数 -->
    <div class="card" style="background:linear-gradient(135deg,#FCE4EC,#F8BBD9);border:1.5px solid var(--pink);margin-bottom:16px">
      <div style="text-align:center">
        <div style="font-size:32px">🙏</div>
        <div style="font-size:16px;font-weight:700;margin:6px 0">今日のありがとう</div>
        <div style="display:flex;justify-content:center;gap:8px;margin:10px 0">
          ${Array.from({length:THANKS_LIMIT},(_,i)=>`
            <div style="width:36px;height:36px;border-radius:50%;background:${i<todayGiven.length?'var(--pink)':'rgba(255,255,255,.6)'};display:flex;align-items:center;justify-content:center;font-size:18px">
              ${i<todayGiven.length?'🙏':'○'}
            </div>`).join('')}
        </div>
        <div style="font-size:13px;color:var(--pink-d);font-weight:600">
          ${remaining>0?`あと${remaining}人に送れます`:'本日の投票は終了しました'}
        </div>
      </div>
    </div>

    <!-- タブ -->
    <div class="tab-row">
      <button class="tab ${tab==='send'?'active':''}" onclick="S.thanksTab='send';render()">🙏 送る</button>
      <button class="tab ${tab==='received'?'active':''}" onclick="S.thanksTab='received';render()">💌 もらった</button>
      <button class="tab ${tab==='ranking'?'active':''}" onclick="S.thanksTab='ranking';render()">🏆 ランキング</button>
    </div>

    ${tab==='send'?`
      ${remaining===0?`<div style="background:#FCE4EC;border-radius:var(--rs);padding:14px;text-align:center;margin-bottom:12px">
        <div style="font-size:24px">😊</div>
        <div style="font-weight:600;color:var(--pink)">今日はすべて送りました！</div>
        <div style="font-size:12px;color:var(--mid);margin-top:4px">明日また送れます</div>
      </div>`:''}
      <div style="font-size:13px;color:var(--mid);margin-bottom:12px">今日感謝を伝えたいスタッフを選んでください</div>
      ${STAFF_LIST.filter(s=>s.treat&&s.id!==S.user?.id).map(s=>{
        const alreadySent = todayGiven.some(t=>t.toId===s.id);
        return`<div class="card" style="opacity:${alreadySent||remaining===0?0.6:1}">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="font-size:36px">${getRank(DB.getPoints()[s.id]||0).char}</div>
            <div style="flex:1">
              <div class="fw-bold">${s.name}</div>
              <div style="font-size:12px;color:var(--mid)">${s.title} · ${getStoreLabel(s.store)}</div>
            </div>
            ${alreadySent
              ?`<span class="badge badge-green">✅ 送済み</span>`
              :remaining>0
                ?`<button class="btn btn-primary btn-sm" onclick="showThanksModal('${s.id}','${s.name}')">🙏 ありがとう</button>`
                :`<span class="badge badge-gray">本日終了</span>`}
          </div>
        </div>`;
      }).join('')}`:''}

    ${tab==='received'?`
      ${myReceived.length===0?`<div class="empty-state"><div class="empty-icon">💌</div><div class="empty-text">まだありがとうが届いていません</div></div>`:''}
      ${myReceived.slice(0,20).map(t=>`
        <div class="card" style="border-left:3px solid var(--pink)">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
            <div style="font-size:24px">🙏</div>
            <div>
              <div class="fw-bold">${t.fromName}さんから</div>
              <div style="font-size:12px;color:var(--mid)">${fmtDateFull(t.date)}</div>
            </div>
          </div>
          ${t.message?`<div style="background:var(--pink-l);border-radius:var(--rs);padding:10px 12px;font-size:14px;line-height:1.6">"${t.message}"</div>`:''}
        </div>`).join('')}`:''}

    ${tab==='ranking'?`
      <div style="font-size:13px;color:var(--mid);margin-bottom:12px">今月（${getMonthKey()}）の感謝ランキング</div>
      ${monthRank.filter(s=>s.received>0).map((s,i)=>`
        <div class="card" style="border-left:4px solid ${i===0?'#FFD700':i===1?'#C0C0C0':i===2?'#CD7F32':'var(--border)'}">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="font-size:${i<3?28:20}px">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1+'位'}</div>
            <div style="font-size:32px">${getRank(DB.getPoints()[s.id]||0).char}</div>
            <div style="flex:1">
              <div class="fw-bold">${s.name}</div>
              <div style="font-size:12px;color:var(--mid)">${s.title}</div>
              ${s.messages.length>0?`<div style="font-size:11px;color:var(--mid);margin-top:2px">"${s.messages[0]}"</div>`:''}
            </div>
            <div style="text-align:center">
              <div style="font-size:24px;font-weight:800;color:var(--pink)">${s.received}</div>
              <div style="font-size:11px;color:var(--mid)">🙏 票</div>
            </div>
          </div>
        </div>`).join('')}
      ${monthRank.every(s=>s.received===0)?`<div class="empty-state"><div class="empty-icon">🙏</div><div class="empty-text">まだ投票がありません</div></div>`:''}
    `:''}
  </div>`;
}

function showThanksModal(toId, toName){
  showModal(`<div style="text-align:center;margin-bottom:16px">
    <div style="font-size:48px">🙏</div>
    <div class="modal-title" style="margin-bottom:4px">${toName}さんへ</div>
    <div style="font-size:13px;color:var(--mid)">感謝のメッセージを添えて送りましょう</div>
  </div>
  <div class="form-group">
    <label class="form-label">メッセージ（任意）</label>
    <textarea class="form-input" id="thanks_msg" rows="3" placeholder="例：今日助けてくれてありがとう！"></textarea>
  </div>
  <button class="btn btn-primary btn-block" onclick="sendThanks('${toId}','${toName}')">🙏 ありがとうを送る</button>`);
}

function sendThanks(toId, toName){
  const msg = document.getElementById('thanks_msg')?.value.trim()||'';
  const remaining = THANKS_LIMIT - getTodayThanksGiven().length;
  if(remaining<=0) return alert('本日の投票は終了しました');
  if(toId===S.user?.id) return alert('自分には送れません');
  const list = DB.getThanks();
  list.unshift({
    id:genId(), fromId:S.user.id, fromName:S.user.name,
    toId, toName, message:msg, date:today()
  });
  DB.setThanks(list);
  // ポイント付与
  addPoints(S.user.id, `🙏 ${toName}さんへありがとう`, POINT_RULES.thanks_give);
  addPoints(toId, `🙏 ${S.user.name}さんからありがとう`, POINT_RULES.thanks_receive);
  closeModal();
  render();
  alert(`✅ ${toName}さんに感謝を送りました！\n+${POINT_RULES.thanks_give}pt獲得！`);
}


// ============================================================
// MONTHLY TASKS (月次タスク)
// ============================================================
const MONTHLY_CATS = ['店舗管理','スタッフ','顧客管理','売上・財務','教育・技術','その他'];

function renderMonthlyTasks(){
  const tasks = DB.getMonthlyTasks();
  const done = DB.getMonthlyDone();
  const now = new Date();
  const monthLabel = `${now.getFullYear()}年${now.getMonth()+1}月`;
  const store = getEffectiveStore();

  const filtered = tasks.filter(t=>t.store==='both'||t.store===store||store==='both');
  const doneCount = filtered.filter(t=>done[t.id]).length;
  const pct = filtered.length?Math.round(doneCount/filtered.length*100):0;

  const cats = [...new Set(filtered.map(t=>t.cat))];
  const catFilter = S.monthCat||'全て';
  const shown = catFilter==='全て'?filtered:filtered.filter(t=>t.cat===catFilter);

  return`<div class="page">
    <!-- ヘッダー -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-row mb-8">
        <div class="fw-bold">📆 ${monthLabel}のタスク</div>
        <span class="badge ${pct===100?'badge-green':'badge-warn'}">${doneCount}/${filtered.length}完了</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${pct===100?'<div style="text-align:center;color:var(--success);font-weight:700;margin-top:8px">🎉 今月のタスクを全て完了！</div>':''}
    </div>

    <!-- カテゴリフィルター -->
    <div class="tab-row">
      ${['全て',...cats].map(c=>`<button class="tab ${catFilter===c?'active':''}" onclick="S.monthCat='${c}';render()">${c}</button>`).join('')}
    </div>

    <!-- タスクリスト -->
    ${shown.length===0?`<div class="empty-state"><div class="empty-icon">📆</div><div class="empty-text">タスクがありません<br>${isOwner()||isTaskAdmin()?'右下の＋から追加できます':''}</div></div>`:''}
    ${shown.map(task=>{
      const isDone = !!done[task.id];
      const doneInfo = done[task.id];
      const assignee = task.assignee==='all'?'全員':task.assignee==='A'?'浦和店':task.assignee==='B'?'広尾店':(STAFF_LIST.find(s=>s.id===task.assignee)?.name||'全員');
      const isMyTask = task.assignee==='all'||task.assignee===S.user?.store||task.assignee===S.user?.id;
      return`<div class="card" style="border-left:4px solid ${isDone?'var(--success)':'var(--pink)'};opacity:${isDone?0.8:1}">
        <div class="card-row mb-8">
          <div style="flex:1">
            <div class="fw-bold ${isDone?'':''}">
              ${isDone?'<span style="text-decoration:line-through;color:var(--mid)">':''}${task.title}${isDone?'</span>':''}
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
              <span class="badge badge-pink" style="font-size:10px">${task.cat}</span>
              <span class="badge badge-blue" style="font-size:10px">👤 ${assignee}</span>
              ${task.deadline?`<span class="badge badge-warn" style="font-size:10px">📅 ${task.deadline}日まで</span>`:''}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            ${isOwner()||isTaskAdmin()?`<button onclick="deleteMonthlyTask('${task.id}')" style="background:none;border:none;color:var(--lite);cursor:pointer;font-size:14px">✕</button>`:''}
            ${isMyTask?`<button class="btn btn-sm ${isDone?'btn-ghost':'btn-primary'}" onclick="toggleMonthlyDone('${task.id}')" style="${isDone?'border-color:var(--success);color:var(--success)':''}">
              ${isDone?'✅ 完了済':'完了にする'}
            </button>`:''}
          </div>
        </div>
        ${isDone&&doneInfo.by?`<div style="font-size:11px;color:var(--mid)">✅ ${doneInfo.by} · ${doneInfo.at}</div>`:''}
        ${task.note?`<div style="font-size:12px;color:var(--mid);margin-top:4px;background:#f9f9f9;padding:6px 10px;border-radius:var(--rs)">📝 ${task.note}</div>`:''}
      </div>`;
    }).join('')}

    ${isOwner()||isTaskAdmin()?`<button class="fab" onclick="showAddMonthlyModal()">＋</button>`:''}
  </div>`;
}

function toggleMonthlyDone(taskId){
  const done = DB.getMonthlyDone();
  if(done[taskId]){
    delete done[taskId];
  } else {
    done[taskId] = {by:S.user?.name, at:nowDateTime()};
    // ポイント付与
    if(S.user) addPoints(S.user.id, '📆 月次タスク完了', 20);
  }
  DB.setMonthlyDone(done);
  render();
}

function showAddMonthlyModal(){
  const store = getEffectiveStore()==='both'?'A':getEffectiveStore();
  showModal(`<div class="modal-title">📆 月次タスクを追加</div>
    <div class="form-group"><label class="form-label">タスク名</label>
      <input class="form-input" id="mt_title" placeholder="例：月次面談の実施"></div>

}

function saveMonthlyTask(){
  const title = document.getElementById('mt_title').value.trim();
  const cat = document.getElementById('mt_cat').value;
  const assignee = document.getElementById('mt_assign').value;
  const deadline = document.getElementById('mt_deadline').value;
  const store = document.getElementById('mt_store').value;
  const note = document.getElementById('mt_note').value.trim();
  if(!title) return alert('タスク名を入力してください');

function renderOccAnalysis(){
  const occStore = S.occStore||'A';
  const allData=getAllOccData(occStore);
  const tab=S.occTab||'calendar';
  const DOW=['日','月','火','水','木','金','土'];
  const dowStats=Array(7).fill(null).map(()=>({count:0,totalC:0,totalRate:0,totalH:0,totalA:0}));
  Object.entries(allData).forEach(([date,d])=>{
    const dow=new Date(date).getDay();
    dowStats[dow].count++;dowStats[dow].totalC+=d.c||0;

  });

    monthStats[mk].count++;monthStats[mk].totalC+=d.c||0;monthStats[mk].totalRate+=d.r||0;

  const viewYear=S.occYear||new Date().getFullYear();
  const viewMonth=S.occMonth!==undefined?S.occMonth:new Date().getMonth()+1;

  return`<div class="page">
    <!-- 店舗選択 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <button class="btn ${occStore==='A'?'btn-primary':'btn-ghost'}" onclick="S.occStore='A';render()">🏪 浦和店</button>
      <button class="btn ${occStore==='B'?'':''} ${occStore==='B'?'btn-primary':'btn-ghost'}" style="${occStore==='B'?'':'border-color:#9C27B0;color:#9C27B0'}" onclick="S.occStore='B';render()">🏪 広尾店</button>
    </div>
    <div class="tab-row">
      <button class="tab ${tab==='calendar'?'active':''}" onclick="S.occTab='calendar';render()">📅 カレンダー</button>
      <button class="tab ${tab==='dow'?'active':''}" onclick="S.occTab='dow';render()">📊 曜日別</button>
      <button class="tab ${tab==='monthly'?'active':''}" onclick="S.occTab='monthly';render()">📈 月別</button>

    ${tab==='calendar'?renderOccCal(allData,viewYear,viewMonth):''}

    ${tab==='monthly'?renderOccMonth(monthStats):''}

    ${isOwner()||isTaskAdmin()?`<button class="fab" onclick="go('occInput')">✏️</button>`:''}
  </div>`;

  return`<div class="card"><div class="fw-bold mb-12">📊 曜日別 平均データ</div>
  ${stats.map((s,i)=>{
    if(s.count===0)return`<div class="bar-wrap"><div class="bar-label"><span>${DOW[i]}曜日</span><span style="color:var(--mid)">データなし</span></div></div>`;
    const avgC=Math.round(s.totalC/s.count),avgR=Math.round(s.totalRate/s.count);
    const avgH=Math.round(s.totalH/s.count*10)/10,avgA=Math.round(s.totalA/s.count*10)/10;
    return`<div class="bar-wrap">
      <div class="bar-label"><span style="font-weight:700;color:${i===0?'var(--danger)':i===6?'var(--info)':'var(--text)'}">${DOW[i]}曜日</span><span><strong>${avgC}人</strong> / ${avgR}%</span></div>

  }).join('')}</div>`;
}

function renderOccInput(){

      <div class="fw-bold mb-6">📊 ${store==='A'?'浦和店':'広尾店'} ${dow}曜日の過去平均（${same.length}日間）</div>

        <span>📊 稼働率: <strong style="color:${getOccColor(avgR)}">${avgR}%</strong></span>

        <input type="number" class="form-input" id="occ_c" value="${ex.c||''}" placeholder="例：15">

      <div class="form-group">

      ${exB.h?`<div class="att-item"><span class="store-badge store-b">広尾店</span><div style="font-size:13px">👥${exB.c}人 / <strong style="color:${getOccColor(exB.r)}">${exB.r}%</strong> / ${exB.a}h÷${exB.h}h</div></div>`:''}

function saveOccRecord(store){
  store = store || S.occInputStore || 'A';
  const date = document.getElementById('occ_date').value;
  const c = parseInt(document.getElementById('occ_c').value)||0;
  const s = document.getElementById('occ_s')?.value.trim()||'';
  const h = parseFloat(document.getElementById('occ_h').value)||0;
  const a = parseFloat(document.getElementById('occ_a').value)||0;
  const n = document.getElementById('occ_n').value.trim();
  if(!h) return alert('勤務時間を入力してください');
  const seats = store==='A'?6:3;
  const r = Math.round(a/h*100);
  const r6 = Math.round(a/(seats*8)*100);
  DB.setOccRecord(store, date, {c,s,h,a,r,r6,n,store});
  alert('✅ 保存しました！\n'+(store==='A'?'浦和店':'広尾店')+'\n稼働率: '+r+'% / '+seats+'席稼働率: '+r6+'%');
  go('occAnalysis');
}

function saveReport(){
  const level = document.getElementById('rp_level').value;
  const cat = document.getElementById('rp_cat').value;
  const store = document.getElementById('rp_store').value;
  const title = document.getElementById('rp_title').value.trim();
  const body = document.getElementById('rp_body').value.trim();
  const customerInfo = document.getElementById('rp_cust').value.trim();
  if(!title||!body) return alert('件名と詳細を入力してください');

  reports.unshift({
    id:genId(), level, cat, store, title, body, customerInfo,
    status:'未対応',
    reporterName: S.user?.name||'',
    reporterId: S.user?.id||'',
    createdAt: nowDateTime(),
    action:''
  });
  DB.setReports(reports);
  closeModal();
  alert('🚨 報告しました！オーナーに通知されます。');

function updateReportStatus(id, status){
  const reports = DB.getReports();
  const idx = reports.findIndex(r=>r.id===id);
  if(idx>=0){ reports[idx].status=status; DB.setReports(reports); }
  closeModal();
  setTimeout(()=>openReport(id),100);
}

function saveReportAction(id){
  const action = document.getElementById('action_'+id)?.value||'';
  const reports = DB.getReports();
  const idx = reports.findIndex(r=>r.id===id);
  if(idx>=0){ reports[idx].action=action; DB.setReports(reports); }
  alert('✅ 対応内容を保存しました');
  closeModal();
}

function deleteReport(id){
  if(!confirm('この報告を削除しますか？'))return;
  DB.setReports(DB.getReports().filter(r=>r.id!==id));
  closeModal();render();
}


function replyToAbsence(id){
  const input = document.getElementById('reply_'+id);
  if(!input||!input.value.trim()) return;
  const text = input.value.trim();
  const list = DB.getAbsences();
  const idx = list.findIndex(a=>a.id===id);
  if(idx>=0){
    if(!list[idx].replies) list[idx].replies=[];
    list[idx].replies.push({
      name:S.user?.name||'',
      text, isOwner:isOwner(),
      time:nowTime()
    });
    DB.set('absences',list);
    input.value='';
    render();
  }
}

function renderShiftCreate(){
  if(!isOwner()&&!isShiftAdmin()) return `<div class="page"><div class="empty-state"><div class="empty-icon">🔒</div><div class="empty-text">権限がありません</div></div></div>`;

  const now = new Date();
  const year = S.shiftCreateYear || now.getFullYear();
  const month = S.shiftCreateMonth !== undefined ? S.shiftCreateMonth : now.getMonth() + 1;
  const store = S.user?.shiftAdmin || 'A'; // wakana=A, misa=B
  const storeName = store==='A'?'浦和店':'広尾店';

  const firstDay = new Date(year, month-1, 1).getDay();
  const lastDate = new Date(year, month, 0).getDate();
  const DOW = ['日','月','火','水','木','金','土'];

  // シフト希望データ
  const requests = DB.getShiftRequests().filter(r=>r.year===year&&r.month===month);
  const staffInStore = STAFF_LIST.filter(s=>s.treat&&(s.store===store||s.store==='both')&&!s.noSales);

  // 稼働データ
  const allOcc = getAllOccData(store);

  // 各日のデータを集計
  const dayData = {};
  for(let d=1; d<=lastDate; d++){
    const dk = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(year,month-1,d).getDay();
    const occ = allOcc[dk];
    // 同曜日の過去平均
    const sameDow = Object.entries(allOcc).filter(([date])=>new Date(date).getDay()===dow);
    const avgR = sameDow.length>0?Math.round(sameDow.reduce((a,[,v])=>a+(v.r||0),0)/sameDow.length):0;
    // 休み希望のスタッフ
    const offStaff = requests.filter(r=>(r.offDays||[]).includes(dk)).map(r=>r.staffName);
    dayData[dk] = {occ, avgR, offStaff, dow};
  }

  return`<div class="page">
    <!-- ヘッダー -->
    <div class="card" style="background:linear-gradient(135deg,var(--pink-l),var(--pink-p));margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div class="fw-bold">${storeName} シフト作成</div>
          <div style="font-size:12px;color:var(--mid)">${year}年${month}月 · 稼働率参照モード</div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="S.shiftCreateMonth=${month===1?12:month-1};if(${month===1})S.shiftCreateYear=${year-1};render()">◀</button>
          <button class="btn btn-ghost btn-sm" onclick="S.shiftCreateMonth=${month===12?1:month+1};if(${month===12})S.shiftCreateYear=${year+1};render()">▶</button>
        </div>
      </div>
    </div>

    <!-- 凡例 -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;font-size:11px">
      ${[['#1565C0','98%〜'],['#E91E8C','90-97%'],['#FF5722','80-89%'],['#FF9800','60-79%'],['#4CAF50','〜59%']].map(([c,l])=>`<span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:2px;background:${c}"></span>${l}</span>`).join('')}
      <span style="display:flex;align-items:center;gap:3px"><span style="font-size:10px">🚫</span>休み希望あり</span>
    </div>

    <!-- カレンダー -->
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px">
      ${DOW.map((d,i)=>`<div style="text-align:center;font-size:11px;font-weight:700;padding:4px;color:${i===0?'var(--danger)':i===6?'var(--info)':'var(--mid)'}">${d}</div>`).join('')}
      ${Array(firstDay).fill('<div></div>').join('')}
      ${Array.from({length:lastDate},(_,i)=>{
        const d=i+1;
        const dk=`${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dd=dayData[dk]||{avgR:0,offStaff:[],dow:0};
        const color=dd.avgR>=98?'#1565C0':dd.avgR>=90?'#E91E8C':dd.avgR>=80?'#FF5722':dd.avgR>=60?'#FF9800':'#4CAF50';
        const isT=dk===today();

            </div>

            <div style="font-size:12px;font-weight:600;color:var(--mid);margin-bottom:4px">⏰ 希望時間</div>

function renderChat(){
  // アクセス可能なルームを制限（オーナーは全て、スタッフは自店舗+全体のみ）
  const myStore = S.user?.store;
  const allowedRooms = canSeeAll() ? ['all','A','B'] : ['all', myStore].filter(Boolean);

  // 現在のルームが許可されていなければリセット
  let room = S.chatRoom || 'all';
  if(!allowedRooms.includes(room)) room = 'all';

  const msgs = DB.getChats(room).slice(-50);
  const roomLabels = {all:'🌐 全体', A:'🏪 浦和店', B:'🏪 広尾店'};

  let h = '<div style="padding:0">';

  // ルーム選択タブ（許可されたルームのみ）
  h += '<div style="padding:8px 12px;background:#fff;border-bottom:1px solid #eee;display:flex;gap:6px">';
  allowedRooms.forEach(function(k){
    const active = room===k;
    h += '<button onclick="S.chatRoom=\''+k+'\';render()" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid '+(active?'var(--pink)':'#ddd')+';background:'+(active?'var(--pink-l)':'#fff')+';color:'+(active?'var(--pink)':'#666')+'">'+roomLabels[k]+'</button>';
  });
  h += '</div>';

  // メッセージ一覧
  h += '<div id="chatBox" style="height:calc(100vh - 185px);overflow-y:auto;padding:12px;background:#f5f5f5">';
  if(!msgs.length){
    h += '<div style="text-align:center;color:#aaa;font-size:13px;padding-top:40px">まだメッセージがありません</div>';
  }
  msgs.forEach(function(m){
    const isMe = m.senderId===S.user?.id;
    const rank = getRank(DB.getPoints()[m.senderId]||0);
    const canDelete = isMe && (Date.now()-(m.ts||0)) < 5*60*1000;
    const fbKey = m._fbKey || '';
    // リアクション取得
    const msgReactions = (window._fbReactions[room]||{})[fbKey] || {};
    const REACT_EMOJIS = ['✅','👍','❤️','😊','👀'];
    // リアクション集計
    const reactCounts = {};
    Object.values(msgReactions).forEach(function(e){ reactCounts[e]=(reactCounts[e]||0)+1; });
    const myReaction = msgReactions[S.user?.id] || '';

    h += '<div style="display:flex;flex-direction:'+(isMe?'row-reverse':'row')+';align-items:flex-end;gap:6px;margin-bottom:6px">';
    h += '<div style="font-size:22px;flex-shrink:0">'+rank.char+'</div>';
    h += '<div style="max-width:72%">';
    if(!isMe) h += '<div style="font-size:11px;color:#888;margin-bottom:2px">'+m.senderName+'</div>';
    if(m.type === 'image'){
      h += '<div style="padding:4px;border-radius:'+(isMe?'18px 4px 18px 18px':'4px 18px 18px 18px')+';background:'+(isMe?'var(--pink-l)':'#fff')+';box-shadow:0 1px 3px rgba(0,0,0,.1)">';
      h += '<img src="'+m.imageUrl+'" style="max-width:220px;max-height:220px;border-radius:12px;display:block;cursor:pointer" onclick="showModal(\'<img src=\\\"'+m.imageUrl+'\\\" style=\\\"max-width:100%;border-radius:12px\\\">\')"></div>';
    } else {
      h += '<div style="padding:10px 14px;border-radius:'+(isMe?'18px 4px 18px 18px':'4px 18px 18px 18px')+';background:'+(isMe?'var(--pink)':'#fff')+';color:'+(isMe?'#fff':'#333')+';font-size:14px;line-height:1.5;word-break:break-word;box-shadow:0 1px 3px rgba(0,0,0,.1)">'+m.text+'</div>';
    }
    // リアクション表示
    if(Object.keys(reactCounts).length > 0){
      h += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;'+(isMe?'justify-content:flex-end':'')+'">';
      Object.entries(reactCounts).forEach(function(entry){
        const emoji = entry[0]; const count = entry[1];
        const isMine = myReaction === emoji;
        h += '<button onclick="toggleReaction(\''+room+'\',\''+fbKey+'\',\''+emoji+'\')" style="padding:2px 7px;border-radius:12px;border:1.5px solid '+(isMine?'var(--pink)':'#ddd')+';background:'+(isMine?'var(--pink-l)':'#fff')+';cursor:pointer;font-size:13px">'+emoji+' '+count+'</button>';
      });
      h += '</div>';
    }
    // 時刻・削除・リアクションボタン
    h += '<div style="font-size:10px;color:#bbb;margin-top:2px;display:flex;align-items:center;gap:6px;'+(isMe?'justify-content:flex-end':'')+'">';
    h += '<span>'+m.time+'</span>';
    if(fbKey) h += '<button onclick="showReactionPicker(\''+room+'\',\''+fbKey+'\')" style="background:none;border:none;cursor:pointer;font-size:13px;color:#bbb;padding:0">＋😊</button>';
    if(canDelete) h += '<button onclick="deleteChatMsg(\''+room+'\',\''+fbKey+'\')" style="background:none;border:none;cursor:pointer;font-size:12px;color:#ffb3b3;padding:0">🗑️</button>';
    h += '</div>';
    h += '</div></div>';
  });
  h += '</div>';

  // 入力欄
  h += '<div style="padding:10px 12px;background:#fff;border-top:1px solid #eee">';
  h += '<div style="display:flex;gap:8px;align-items:center">';
  h += '<label style="width:44px;height:44px;border-radius:50%;background:#f5f5f5;border:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px">';
  h += '📷<input type="file" accept="image/*" style="display:none" onchange="sendChatPhoto(\''+room+'\',this)">';
  h += '</label>';
  h += '<input id="chatInput" placeholder="メッセージを入力..." style="flex:1;padding:10px 14px;border:1.5px solid #ddd;border-radius:22px;font-size:14px;outline:none;font-family:inherit">';
  h += '<button onclick="sendChat(\''+room+'\')" style="width:44px;height:44px;border-radius:50%;background:var(--pink);border:none;color:#fff;font-size:22px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">↑</button>';
  h += '</div></div>';
  h += '</div>';

  setTimeout(function(){ const b=document.getElementById('chatBox'); if(b) b.scrollTop=b.scrollHeight; },80);
  return h;
}


function toggleDayStaff(store, year, month, date, staffName){
  const sched = DB.getShiftSchedule(store, parseInt(year), parseInt(month));
  if(!sched[date]) sched[date]=[];
  const idx = sched[date].indexOf(staffName);
  if(idx>=0) sched[date].splice(idx,1);
  else sched[date].push(staffName);
  DB.setShiftSchedule(store, parseInt(year), parseInt(month), sched);
  render();
}

function showApprovalModal(store, year, month){
  const reqs = DB.getShiftRequests().filter(function(r){return r.year===parseInt(year)&&r.month===parseInt(month)&&(r.offDays||[]).length>0;});
  const approvedOff = DB.getApprovedOff(store, parseInt(year), parseInt(month));
  const DOW = ['日','月','火','水','木','金','土'];
  let html = '<div class="modal-title">📋 希望休の承認</div>';
  if(!reqs.length){ html += '<div style="color:var(--mid)">希望休の提出はありません</div>'; }
  reqs.forEach(function(req){
    const s=STAFF_LIST.find(function(x){return x.id===req.staffId;});
    if(!s) return;
    const appr = approvedOff[req.staffId]||[];
    html += '<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)">';
    html += '<div class="fw-bold mb-6">'+s.name+'</div><div style="display:flex;flex-wrap:wrap;gap:4px">';
    (req.offDays||[]).forEach(function(dk){
      const d=parseInt(dk.slice(8)); const dow=DOW[new Date(dk).getDay()]; const isA=appr.includes(dk);
      html += '<button onclick="toggleApproveOff(\''+store+'\','+year+','+month+',\''+req.staffId+'\',\''+dk+'\')" ';
      html += 'style="padding:5px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid '+(isA?'var(--success)':'var(--border)')+';background:'+(isA?'#E8F5E9':'#fff')+';color:'+(isA?'var(--success)':'var(--mid)')+';">';
      html += (isA?'✅ ':'')+d+'日（'+dow+'）</button>';
    });
    html += '</div></div>';
  });
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">';
  html += '<button class="btn btn-primary btn-sm" onclick="applyApprovedToCalendar(\''+store+'\','+year+','+month+');closeModal()">✅ カレンダーに反映</button>';
  html += '<button class="btn btn-outline btn-sm" onclick="closeModal()">閉じる</button></div>';
  showModal(html);
}


function uploadLogo(input){
  const file = input.files[0];
  if(!file) return;
  // 5MB制限
  if(file.size > 5 * 1024 * 1024){ alert('画像が大きすぎます（5MB以下にしてください）'); return; }
  const reader = new FileReader();
  reader.onload = function(e){
    const dataUrl = e.target.result;
    // Firebaseに保存（全員に反映）
    DB.set('appLogo', dataUrl);
    // localStorageにもキャッシュ
    try{ localStorage.setItem('blancher_logo', dataUrl); }catch(err){}
    alert('✅ ロゴを設定しました！全スタッフに反映されます。');
    render();
  };
  reader.readAsDataURL(file);
}

function removeLogo(){
  if(!confirm('ロゴを削除しますか？全スタッフから削除されます。')) return;
  DB.set('appLogo', null);
  try{ localStorage.removeItem('blancher_logo'); }catch(err){}
  render();
}

function applyLogo(){
  const logo = DB.get('appLogo') || localStorage.getItem('blancher_logo') || '';
  const img = document.getElementById('brand-logo');
  const loadingImg = document.getElementById('loading-logo');
  const loadingEmoji = document.getElementById('loading-emoji');
  if(logo){
    if(img){ img.src = logo; img.style.display = 'block'; }
    if(loadingImg){ loadingImg.src = logo; loadingImg.style.display = 'block'; }
    if(loadingEmoji) loadingEmoji.style.display = 'none';
    // ファビコン・ホーム画面アイコンにも反映
    const favicon = document.getElementById('favicon');
    const touchIcon = document.getElementById('apple-touch-icon');
    if(favicon) favicon.href = logo;
    if(touchIcon) touchIcon.href = logo;
  } else {
    if(img){ img.src = ''; img.style.display = 'none'; }
    if(loadingImg){ loadingImg.src = ''; loadingImg.style.display = 'none'; }
    if(loadingEmoji) loadingEmoji.style.display = 'block';
  }
}

function sendChat(room){
  const input = document.getElementById('chatInput');
  if(!input) return;
  const text = input.value.trim();
  if(!text) return;
  const d = new Date();
  const time = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  DB.addChat(room, {
    id:genId(),
    text, room,
    senderId: S.user?.id||'',
    senderName: S.user?.name||'',
    time
  });
  input.value='';
  input.style.height='auto';
  render();
  setTimeout(()=>{
    const el=document.getElementById('chatMessages');
    if(el) el.scrollTop=el.scrollHeight;
  },50);
}

function toggleReaction(room, fbKey, emoji){
  if(!fbKey || !window._fbDB) return;
  const userId = S.user?.id;
  if(!userId) return;
  const ref = window._fbDB.ref('/reactions/'+room+'/'+fbKey+'/'+userId);
  const current = ((window._fbReactions[room]||{})[fbKey]||{})[userId];
  if(current === emoji){
    ref.remove(); // 同じリアクションは取り消し
  } else {
    ref.set(emoji);
  }
}

function showReactionPicker(room, fbKey){
  const REACT_EMOJIS = ['✅','👍','❤️','😊','👀'];
  const labels = {'✅':'確認','👍':'いいね','❤️':'ハート','😊':'笑顔','👀':'見たよ'};
  const current = ((window._fbReactions[room]||{})[fbKey]||{})[S.user?.id] || '';
  let html = '<div class="modal-title">リアクション</div>';
  html += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px">';
  REACT_EMOJIS.forEach(function(e){
    const active = current === e;
    html += '<button onclick="toggleReaction(\''+room+'\',\''+fbKey+'\',\''+e+'\');closeModal()" style="padding:10px 4px;border-radius:12px;border:2px solid '+(active?'var(--pink)':'#eee')+';background:'+(active?'var(--pink-l)':'#fff')+';cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px">';
    html += '<span style="font-size:24px">'+e+'</span>';
    html += '<span style="font-size:10px;color:#888">'+labels[e]+'</span>';
    html += '</button>';
  });
  html += '</div>';
  html += '<button class="btn btn-ghost btn-sm btn-block" style="margin-top:12px" onclick="closeModal()">キャンセル</button>';
  showModal(html);
}

function deleteChatMsg(room, fbKey){
  if(!fbKey){ alert('削除できません'); return; }
  if(!confirm('このメッセージを削除しますか？')) return;
  if(window._fbDB){
    window._fbDB.ref('/chats/'+room+'/'+fbKey).remove();
  } else {
    // localStorageフォールバック
    try{
      var list = JSON.parse(localStorage.getItem('chat_'+room))||[];
      list = list.filter(function(m){ return m._fbKey !== fbKey; });
      localStorage.setItem('chat_'+room, JSON.stringify(list));
      render();
    }catch(e){}
  }
}

function sendChatPhoto(room, input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 5*1024*1024){ alert('5MB以下の画像を選択してください'); return; }
  const reader = new FileReader();
  reader.onload = function(e){
    const d = new Date();
    const time = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    DB.addChat(room, {
      id: genId(), room, type: 'image',
      imageUrl: e.target.result,
      text: '[画像]',
      senderId: S.user?.id||'',
      senderName: S.user?.name||'',
      time
    });
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function cancelMessage(id){
  if(!confirm('このメッセージを取り消しますか？\n受信者には「取り消し済み」と表示されます。')) return;
  const msgs = DB.getMessages();
  const idx = msgs.findIndex(m => m.id === id);
  if(idx === -1) return;
  msgs[idx].cancelled = true;
  DB.set('messages', msgs);
  closeModal();
  render();
}

function renderShiftInput(){
  if(!isOwner()&&!isShiftAdmin()) return `<div class="page"><div class="empty-state"><div class="empty-icon">🔒</div><div class="empty-text">権限がありません</div></div></div>`;

  const yr=S.shiftInYear||new Date().getFullYear();
  const mo=S.shiftInMonth!==undefined?S.shiftInMonth:new Date().getMonth()+1;
  // misaはB(広尾)、wakanaはA(浦和)をデフォルトに
  const defaultStore = isOwner() ? 'A' : (S.user?.shiftAdmin || 'A');
  const st=S.shiftInStore||defaultStore;
  const last=new Date(yr,mo,0).getDate();
  const firstDay=new Date(yr,mo-1,1).getDay();
  const sched=DB.getShiftSchedule(st,yr,mo);
  const reqs=DB.getShiftRequests().filter(r=>r.year===yr&&r.month===mo);
  const apprv=DB.getApprovedOff(st,yr,mo);
  const DOW=['日','月','火','水','木','金','土'];
  const pm=mo===1?12:mo-1, py=mo===1?yr-1:yr;
  const nm=mo===12?1:mo+1, ny=mo===12?yr+1:yr;

  return`<div style="padding:8px">
    ${isOwner()?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
      <button class="btn btn-sm ${st==='A'?'btn-primary':'btn-ghost'}" onclick="S.shiftInStore='A';render()">浦和店</button>
      <button class="btn btn-sm ${st==='B'?'btn-primary':'btn-ghost'}" onclick="S.shiftInStore='B';render()">広尾店</button>
    </div>`:`<div style="margin-bottom:8px"><span class="store-badge ${st==='A'?'store-a':'store-b'}">${st==='A'?'🏪 浦和店':'🏪 広尾店'} 担当</span></div>`}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <button class="btn btn-ghost btn-sm"
        onclick="S.shiftInMonth=${pm};S.shiftInYear=${py};render()">◀</button>
      <b>${yr}年${mo}月（${st==='A'?'浦和店':'広尾店'}）</b>
      <button class="btn btn-ghost btn-sm"
        onclick="S.shiftInMonth=${nm};S.shiftInYear=${ny};render()">▶</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px">
      ${DOW.map((d,i)=>`<div style="text-align:center;font-size:11px;font-weight:700;padding:3px;color:${i===0?'var(--danger)':i===6?'var(--info)':'var(--mid)'}">${d}</div>`).join('')}
      ${Array(firstDay).fill('<div></div>').join('')}
      ${Array.from({length:last},(_,i)=>{
        const d=i+1;
        const dk=`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const ds=sched[dk]||[];
        const isT=dk===today();
        const dow=new Date(yr,mo-1,d).getDay();
        // 希望休申請者
        const reqOff=reqs.filter(r=>r.offDays&&(r.offDays||[]).includes(dk)).map(r=>{
          const sf=STAFF_LIST.find(x=>x.id===r.staffId);
          return (sf&&sf.name)?sf.name:null;

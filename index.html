function bindEvents(){
  const sel=document.getElementById('storeViewSel');
  if(sel) sel.addEventListener('change',e=>{S.viewStore=e.target.value;render();});

  // гғӯгӮҙгӮ’йҒ©з”Ё
  applyLogo();

  // е…Ёз”»еғҸгҒ«гӮҝгғғгғ—жӢЎеӨ§гӮ’йҒ©з”ЁпјҲгғҠгғ“гғ»гғӯгӮҙд»ҘеӨ–пјү
  document.querySelectorAll('img:not(#brand-logo):not(#loading-logo):not([data-no-expand])').forEach(function(img){
    if(img.dataset.expandBound) return; // йҮҚиӨҮйҳІжӯў
    img.dataset.expandBound = '1';
    img.style.cursor = 'zoom-in';
    img.addEventListener('click', function(e){
      e.stopPropagation();
      if(!img.src || img.src === window.location.href) return;
      showImgModal(img);
    });
  });

  // жүҝиӘҚгғӘгӮ№гғҲгӮ’еӢ•зҡ„з”ҹжҲҗ
  const approvalList = document.getElementById('approvalList');
  if(approvalList && S.page==='shiftInput'){
    const store2 = S.shiftInStore||'A';
    const year2 = S.shiftInYear||new Date().getFullYear();
    const month2 = S.shiftInMonth!==undefined?S.shiftInMonth:new Date().getMonth()+1;
    renderApprovalList(store2, year2, month2, approvalList);
  }
}

function renderApprovalList(store, year, month, container){
  const approvedOff = DB.getApprovedOff(store, year, month);
  const requests = DB.getShiftRequests().filter(r=>r.year===year&&r.month===month&&(r.offDays||[]).length>0);
  if(requests.length===0){
    container.innerHTML = '<div style="font-size:13px;color:var(--mid)">еёҢжңӣдј‘гҒ®жҸҗеҮәгҒҜгҒӮгӮҠгҒҫгҒӣгӮ“</div>';
    return;
  }
  let html = '';
  requests.forEach(function(req){
    const s = STAFF_LIST.find(function(x){return x.id===req.staffId;});
    if(!s) return;
    const approved = approvedOff[req.staffId]||[];
    html += '<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)">';
    html += '<div class="fw-bold" style="margin-bottom:6px">'+s.name+'гҒ®еёҢжңӣдј‘</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:4px">';
    (req.offDays||[]).forEach(function(dk){
      const d = parseInt(dk.slice(8));
      const dow = ['ж—Ҙ','жңҲ','зҒ«','ж°ҙ','жңЁ','йҮ‘','еңҹ'][new Date(dk).getDay()];
      const isApproved = approved.includes(dk);
      html += '<button onclick="toggleApproveOff(\''+store+'\','+year+','+month+',\''+req.staffId+'\',\''+dk+'\')" ';
      html += 'style="padding:5px 10px;border-radius:20px;border:1.5px solid '+(isApproved?'var(--success)':'var(--border)')+';';
      html += 'background:'+(isApproved?'#E8F5E9':'#fff')+';color:'+(isApproved?'var(--success)':'var(--mid)')+';';
      html += 'font-size:12px;font-weight:600;cursor:pointer">';
      html += (isApproved?'вң… ':'')+d+'ж—ҘпјҲ'+dow+'пјү';
      html += '</button>';
    });
    html += '</div>';
    if(approved.length>0){
      html += '<div style="font-size:10px;color:var(--mid);margin-top:4px">вң… жүҝиӘҚжёҲ: '+approved.map(function(d){return parseInt(d.slice(8))+'ж—Ҙ';}).join('гғ»')+'</div>';
    }
    html += '</div>';
  });
  container.innerHTML = html;
}

function sendShiftReminder(year, month, targetId){
  const requests = DB.getShiftRequests();
  const monthReqs = requests.filter(r=>r.year===year&&r.month===month);
  const adminStore = !isOwner() && S.user?.shiftAdmin ? S.user.shiftAdmin : null;
  const allStaff = STAFF_LIST.filter(s=>s.treat&&(adminStore?s.store===adminStore||s.store==='both':true));
  const notSubmitted = allStaff.filter(s=>!monthReqs.some(r=>r.staffId===s.id));
  const targets = targetId==='all' ? notSubmitted : notSubmitted.filter(s=>s.id===targetId);

  if(targets.length===0){ alert('еӮ¬дҝғеҜҫиұЎгҒҢгҒ„гҒҫгҒӣгӮ“'); return; }
  if(!confirm(targets.map(s=>s.name).join('гғ»')+'гҒ«гӮ·гғ•гғҲеёҢжңӣгҒ®еӮ¬дҝғгӮ’йҖҒгӮҠгҒҫгҒҷгҒӢпјҹ')) return;

  const msgs = DB.getMessages();
  targets.forEach(s=>{
    msgs.unshift({
      id: genId(),
      title: `гҖҗеӮ¬дҝғгҖ‘${year}е№ҙ${month}жңҲ гӮ·гғ•гғҲеёҢжңӣгӮ’жҸҗеҮәгҒ—гҒҰгҒҸгҒ гҒ•гҒ„`,
      body: `${s.name}гҒ•гӮ“\n\n${year}е№ҙ${month}жңҲгҒ®гӮ·гғ•гғҲеёҢжңӣгҒҢгҒҫгҒ жҸҗеҮәгҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“гҖӮ\nж—©гӮҒгҒ«жҸҗеҮәгӮ’гҒҠйЎҳгҒ„гҒ—гҒҫгҒҷрҹҷҸ\n\nгӮ·гғ•гғҲеёҢжңӣ вҶ’ гғЎгғӢгғҘгғј вҶ’ рҹ“… гӮ·гғ•гғҲеёҢжңӣ`,
      from: S.user.id, fromName: S.user.name,
      to: 'individual', toId: s.id, toName: s.name,
      date: today(), readBy: [], progress: {[s.id]: 'жңӘеҜҫеҝң'}
    });
  });
  DB.set('messages', msgs);
  alert(`вң… ${targets.map(s=>s.name).join('гғ»')}гҒ«еӮ¬дҝғгӮ’йҖҒгӮҠгҒҫгҒ—гҒҹпјҒ`);
  render();
}

function showReminderModal(year, month){
  const requests = DB.getShiftRequests();
  const monthReqs = requests.filter(r=>r.year===year&&r.month===month);
  const adminStore = !isOwner() && S.user?.shiftAdmin ? S.user.shiftAdmin : null;
  const allStaff = STAFF_LIST.filter(s=>s.treat&&(adminStore?s.store===adminStore||s.store==='both':true));
  const notSubmitted = allStaff.filter(s=>!monthReqs.some(r=>r.staffId===s.id));

  if(notSubmitted.length===0){ alert('жңӘжҸҗеҮәгҒ®гӮ№гӮҝгғғгғ•гҒҜгҒ„гҒҫгҒӣгӮ“'); return; }

  let html = `<div class="modal-title">рҹ‘Ө еҖӢеҲҘеӮ¬дҝғ</div>`;
  html += `<div style="font-size:13px;color:var(--mid);margin-bottom:12px">еӮ¬дҝғгӮ’йҖҒгӮӢгӮ№гӮҝгғғгғ•гӮ’йҒёжҠһ</div>`;
  notSubmitted.forEach(s=>{
    html += `<button class="btn btn-outline btn-block" style="margin-bottom:8px;text-align:left" onclick="sendShiftReminder(${year},${month},'${s.id}');closeModal()">
      рҹ“ў ${s.name}пјҲ${s.store==='A'?'жөҰе’Ңеә—':'еәғе°ҫеә—'}пјүгҒ«еӮ¬дҝғ
    </button>`;
  });
  html += `<button class="btn btn-ghost btn-sm btn-block" onclick="closeModal()">гӮӯгғЈгғігӮ»гғ«</button>`;
  showModal(html);
}

function renderRepairs(){
  const repairs = DB.get('repairs2') || [];
  const myStore = S.user?.store;
  // гӮӘгғјгғҠгғјгҒҜе…Ёеә—иҲ—гҖҒгӮ№гӮҝгғғгғ•гҒҜиҮӘеә—иҲ—гҒ®гҒҝ
  const visibleRepairs = canSeeAll() ? repairs : repairs.filter(r=>r.store===myStore);
  const storeFilter = canSeeAll() ? (S.repairStore || 'all') : myStore;
  const filtered = (!canSeeAll()) ? visibleRepairs : (storeFilter==='all' ? repairs : repairs.filter(r=>r.store===storeFilter));
  return`<div class="page">
    ${canSeeAll()?`<div class="tab-row">
      <button class="tab ${storeFilter==='all'?'active':''}" onclick="S.repairStore='all';render()">рҹҢҗ е…Ёеә—</button>

      <button class="tab ${storeFilter==='B'?'active':''}" onclick="S.repairStore='B';render()">еәғе°ҫеә—</button>

  }

  const allMsgs = DB.getChats(room);
  const msgs = allMsgs.slice(-100);

  const userIcons = DB.getUserIcons();

  let h = '<div style="padding:0;display:flex;flex-direction:column;height:100vh">';
  h += '<div id="dmChatBox" style="flex:1;overflow-y:auto;padding:12px;background:#f5f5f5">';

  msgs.forEach(function(m){
    const isMe = m.senderId===S.user?.id;
    const icon = userIcons[m.senderId]||getRank(DB.getPoints()[m.senderId]||0).char;
    const fbKey = m._fbKey||'';

      h += '<div style="font-size:22px;flex-shrink:0;cursor:pointer" data-uid="'+m.senderId+'" data-uname="'+encodeURIComponent(m.senderName||'')+'" data-fbkey="'+fbKey+'" data-room="'+(S.dmRoom||'')+'" data-text="'+encodeURIComponent((m.text||'').slice(0,50))+'" data-nodm="1" onclick="showUserActionFromEl(this)">'+icon+'</div>';
    } else {
      h += '<div style="font-size:22px;flex-shrink:0">'+icon+'</div>';
    }

  h += '</div>';

function sendDMChatBtn(btn){
  sendDMChat(btn.dataset.sroom);
}
function handleDMEnter(e, input){
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    sendDMChat(input.dataset.room);
  }
}
function sendDMChat(room){
  const input = document.getElementById('dmChatInput');
  if(!input) return;
  const text = input.value.trim();
  if(!text) return;
  const d = new Date();
  const time = (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  const msg = {id:genId(),text,room,type:'text',senderId:S.user?.id||'',senderName:S.user?.name||'',time};
  if(window._replyTo&&window._replyTo.room===room){
    msg.replyTo={fbKey:window._replyTo.fbKey,senderName:window._replyTo.senderName,text:decodeURIComponent(window._replyTo.text)};
    window._replyTo=null;
  }
  DB.addChat(room, msg);
  input.value='';
  setTimeout(function(){ var b=document.getElementById('dmChatBox'); if(b) b.scrollTop=b.scrollHeight; },80);
}

function sendMediaBtn(input){
  const room = input.dataset.room;
  const file = input.files[0];
  if(!file||!room) return;
  if(file.size>50*1024*1024){ alert('гғ•гӮЎгӮӨгғ«гӮөгӮӨгӮәгҒҜ50MBд»ҘдёӢгҒ«гҒ—гҒҰгҒҸгҒ гҒ•гҒ„'); return; }
  const isVideo = file.type.startsWith('video/');
  const reader = new FileReader();
  reader.onload = function(e){
    const d = new Date();
    const time = (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    DB.addChat(room, {
      id:genId(), room,
      type: isVideo?'video':'image',
      imageUrl: isVideo?null:e.target.result,
      videoUrl: isVideo?e.target.result:null,
      text: isVideo?'[еӢ•з”»]':'[з”»еғҸ]',
      senderId:S.user?.id||'',senderName:S.user?.name||'',time
    });
  };
  reader.readAsDataURL(file);
  input.value='';
}

function isSpaceMember(space){
  if(!space) return false;
  if(isOwner()) return true;
  if(space.createdById === S.user?.id) return true;
  return (space.members||[]).includes(S.user?.id);
}

  const allSpaces = DB.get('chatSpaces')||[];
  const spaces = allSpaces.filter(sp=>isSpaceMember(sp));
  return`<div class="page">

function sendSpaceChat(room){
  const input = document.getElementById('spaceChatInput');
  if(!input) return;
  const text = input.value.trim();
  if(!text) return;
  const d = new Date();
  const time = (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  DB.addChat(room, {id:genId(),text,room,senderId:S.user?.id||'',senderName:S.user?.name||'',time});

}

function insertEmojiToSpace(btn){
  const EMOJI_LIST=['рҹҳҠ','рҹҳӮ','рҹҘ°','рҹҳҚ','рҹӨ”','рҹҳ…','рҹҷҸ','рҹ‘Ҹ','рҹ’Ә','рҹҺү','вңЁ','рҹ’…','рҹҢё','рҹ’•','рҹҳӯ','рҹ”Ҙ','рҹ’Ҝ','рҹ‘Қ','вқӨпёҸ','рҹҳҳ','рҹӨ—','рҹҳҺ','рҹҘі','рҹ’–','рҹҢҲ'];

  const input = document.getElementById('spaceChatInput');
  if(input&&idx>=0) input.value+=EMOJI_LIST[idx];
}

function showEditMeeting(id){ showAddMeetingModal(id); }

function saveMeeting(editId){
  const allMgmt = STAFF_LIST.filter(s=>s.role==='admin'||s.role==='owner'||s.id==='misa'||s.id==='wakana');
  const title = document.getElementById('mt_title').value.trim();
  const date = document.getElementById('mt_date').value;
  const time = document.getElementById('mt_time').value;
  const location = document.getElementById('mt_location').value.trim();
  const note = document.getElementById('mt_note').value.trim();
  const participants = allMgmt.filter(s=>document.getElementById('mt_p_'+s.id)?.checked).map(s=>s.name);
  if(!title||!date) return alert('гӮҝгӮӨгғҲгғ«гҒЁж—Ҙд»ҳгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„');
  const list = DB.get('meetings')||[];
  if(editId){
    const idx = list.findIndex(m=>m.id===editId);
    if(idx>=0) list[idx]={...list[idx],title,date,time,location,note,participants};
  } else {
    list.unshift({id:genId(),title,date,time,location,note,participants,status:'жҸҗжЎҲдёӯ',createdBy:S.user?.name,createdAt:today()});
  }
  DB.set('meetings',list);
  closeModal(); render();
}

function updateMeeting(id, status){
  if(status==='гӮӯгғЈгғігӮ»гғ«'&&!confirm('гӮӯгғЈгғігӮ»гғ«гҒ—гҒҫгҒҷгҒӢпјҹ')) return;
  const list = DB.get('meetings')||[];
  const idx = list.findIndex(m=>m.id===id);
  if(idx>=0) list[idx].status=status;
  DB.set('meetings',list);
  render();
}

  const hrStore = isOwner() ? (S.hrStore||'A') : (S.user?.id==='wakana'?'A':'B');

  const allNotes = DB.get('hrNotes2')||{};
  const monthNotes = allNotes[monthKey]||{};
  const selectedStaff = S.hrStaff||null;
  const [evalYear, evalMonth] = monthKey.split('-').map(Number);

  // и©•дҫЎеҜҫиұЎгӮ№гӮҝгғғгғ•пјҲиҮӘеҲҶгғ»гӮӘгғјгғҠгғјйҷӨеӨ–пјү
  const evalTargets = STAFF_LIST.filter(s=>{
    if(s.id===S.user?.id) return false;

function renderHRDetail(staffId, monthNotes, monthKey){

function setHRRating(staffId, catId, val, monthKey){
  const allNotes = DB.get('hrNotes2')||{};
  if(!allNotes[monthKey]) allNotes[monthKey]={};
  if(!allNotes[monthKey][staffId]) allNotes[monthKey][staffId]={};
  allNotes[monthKey][staffId]['r_'+catId] = allNotes[monthKey][staffId]['r_'+catId]===val ? 0 : val;
  allNotes[monthKey][staffId].updatedAt = today();
  allNotes[monthKey][staffId].updatedBy = S.user?.name;
  DB.set('hrNotes2', allNotes);
  render();
}

function saveHRNote2(staffId, monthKey){
  const comment = document.getElementById('hr_comment_'+staffId)?.value.trim()||'';
  const allNotes = DB.get('hrNotes2')||{};
  if(!allNotes[monthKey]) allNotes[monthKey]={};
  if(!allNotes[monthKey][staffId]) allNotes[monthKey][staffId]={};
  allNotes[monthKey][staffId].comment = comment;
  allNotes[monthKey][staffId].updatedAt = today();
  allNotes[monthKey][staffId].updatedBy = S.user?.name;
  DB.set('hrNotes2', allNotes);
  alert('вң… дҝқеӯҳгҒ—гҒҫгҒ—гҒҹ');
  render();
}

function saveHRNote(staffId){ saveHRNote2(staffId, getHRMonthKey()); }

function submitHREval(monthKey){
  const [y,m_] = monthKey.split('-').map(Number);
  if(!confirm(y+'е№ҙ'+m_+'жңҲгҒ®и©•дҫЎгӮ’гӮӘгғјгғҠгғјгҒ«жҸҗеҮәгҒ—гҒҫгҒҷгҒӢпјҹ')) return;
  const allNotes = DB.get('hrNotes2')||{};
  if(!allNotes[monthKey]) allNotes[monthKey]={};
  allNotes[monthKey].__submittedBy = S.user?.name;
  allNotes[monthKey].__submittedAt = today();
  DB.set('hrNotes2', allNotes);
  const msgs = DB.getMessages()||[];
  STAFF_LIST.filter(s=>s.role==='admin'||s.role==='owner').forEach(owner=>{
    msgs.unshift({id:genId(),title:'гҖҗдәәдәӢи©•дҫЎжҸҗеҮәгҖ‘'+y+'е№ҙ'+m_+'жңҲ '+S.user?.name+'гӮҲгӮҠ',
      body:S.user?.name+'гҒҢ'+y+'е№ҙ'+m_+'жңҲгҒ®дәәдәӢи©•дҫЎгӮ’жҸҗеҮәгҒ—гҒҫгҒ—гҒҹгҖӮ\nгғһгғҚгӮёгғЎгғігғҲ вҶ’ дәәдәӢгғ»и©•дҫЎгҒӢгӮүгҒ”зўәиӘҚгҒҸгҒ гҒ•гҒ„гҖӮ',
      from:S.user?.id,fromName:S.user?.name,to:'individual',toId:owner.id,toName:owner.name,
      date:today(),readBy:[],progress:{[owner.id]:'жңӘеҜҫеҝң'}});
  });
  DB.set('messages', msgs);
  alert('вң… гӮӘгғјгғҠгғјгҒ«жҸҗеҮәгҒ—гҒҫгҒ—гҒҹпјҒ');
  render();
}

        <div style="margin-bottom:16px">
          <div class="fw-bold mb-8">зўәиӘҚ</div>
          <div style="font-size:14px;color:var(--mid)">гӮөгғӯгғіеҗҚ: <strong>${data.appName}</strong></div>
          <div style="font-size:14px;color:var(--mid)">еә—иҲ—ж•°: <strong>${(data.stores||[]).length}еә—иҲ—</strong></div>
          <div style="font-size:14px;color:var(--mid)">гӮ№гӮҝгғғгғ•: <strong>${staff.length}еҗҚ</strong></div>
        </div>
        <button class="btn btn-primary btn-block" style="font-size:16px;padding:14px" onclick="completeSetup()">рҹҡҖ дҪҝгҒ„е§ӢгӮҒгӮӢ</button>
      </div>
      <div style="text-align:center;margin-top:12px">
        <button onclick="S.page='setup2';render()" style="background:none;border:none;color:var(--mid);font-size:13px;cursor:pointer">вҶҗ жҲ»гӮӢ</button>
      </div>
    </div>
  </div>`;
}

function completeSetup(){
  const data = window._setupData||{};
  const staff = window._setupStaff||[];
  // гӮўгғ—гғӘиЁӯе®ҡгӮ’дҝқеӯҳ
  const cfg = {
    appName: data.appName,
    stores: data.stores,
    storeCount: data.storeCount,
    setupAt: new Date().toISOString()
  };
  // еҗҚеүҚз©әй–“гӮ’з”ҹжҲҗпјҲж–°гӮөгғӯгғіз”ЁгҒ®гғҮгғјгӮҝеҲҶйӣўпјү
  if(!localStorage.getItem('salon_ns')){
    const ns = Math.random().toString(36).slice(2,10);
    localStorage.setItem('salon_ns', ns);
    window._salonNs = ns;
    window._dataPath = '/salons/'+ns;
    window._chatsBasePath = '/salons/'+ns+'/chats';
    window._reactionsBasePath = '/salons/'+ns+'/reactions';
    window._pinnedBasePath = '/salons/'+ns+'/pinned';
    window._chatReadBasePath = '/salons/'+ns+'/chatRead';
  }
  saveAppConfig(cfg);
  // гӮ№гӮҝгғғгғ•иЁӯе®ҡгӮ’дҝқеӯҳ
  if(staff.length>0) saveStaffConfig(staff);
  STAFF_LIST = staff.length>0 ? staff : DEFAULT_STAFF_LIST;
  alert('вң… иЁӯе®ҡе®ҢдәҶпјҒгӮўгғ—гғӘгӮ’й–Ӣе§ӢгҒ—гҒҫгҒҷгҖӮ');
  S.page='login'; render();
}

function skipSetup(){
  if(!confirm('ж—ўеӯҳгғҮгғјгӮҝгӮ’еј•гҒҚз¶ҷгҒҺгҒҫгҒҷгҒӢпјҹ\nпјҲзҸҫеңЁгҒ®FirebaseгғҮгғјгӮҝгӮ’гҒқгҒ®гҒҫгҒҫдҪҝз”ЁгҒ—гҒҫгҒҷпјү')) return;
  // ж—ўеӯҳгғҮгғјгӮҝз”ЁпјҡеҗҚеүҚз©әй–“гӮ’гӮҜгғӘгӮўгҒ—гҒҰе…ғгҒ®гғ‘гӮ№гӮ’дҪҝз”Ё
  localStorage.removeItem('salon_ns');
  window._salonNs = '';
  window._dataPath = '/data';
  window._chatsBasePath = '/chats';
  window._reactionsBasePath = '/reactions';
  window._pinnedBasePath = '/pinned';
  window._chatReadBasePath = '/chatRead';
  const cfg = {appName:'My Salon',stores:[{id:'A',name:'еә—иҲ—A'},{id:'B',name:'еә—иҲ—B'}],storeCount:1,setupAt:new Date().toISOString()};
  saveAppConfig(cfg);
  S.page='login'; render();
}

function resetToExistingData(){
  if(!confirm('ж—ўеӯҳгҒ®FirebaseгғҮгғјгӮҝгҒ«жҲ»гҒ—гҒҫгҒҷгҒӢпјҹ\nиЁӯе®ҡгҒ—гҒҹеҗҚеүҚз©әй–“гҒҢгғӘгӮ»гғғгғҲгҒ•гӮҢгҒҫгҒҷгҖӮ')) return;
  localStorage.removeItem('salon_ns');
  localStorage.removeItem('salon_appConfig');
  window._salonNs = '';
  window._dataPath = '/data';
  window._chatsBasePath = '/chats';
  window._reactionsBasePath = '/reactions';
  window._pinnedBasePath = '/pinned';
  window._chatReadBasePath = '/chatRead';
  alert('вң… гғӘгӮ»гғғгғҲгҒ—гҒҫгҒ—гҒҹпјҒгғҡгғјгӮёгӮ’еҶҚиӘӯгҒҝиҫјгҒҝгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ');
  location.reload();
}

// ============================================================
// STAFF MANAGEMENTпјҲиЁӯе®ҡз”»йқўгҒ§гӮ№гӮҝгғғгғ•з®ЎзҗҶпјү
// ============================================================
function renderStaffManagement(){
  const staff = STAFF_LIST;
  const cfg = getAppConfig()||{};
  const stores = cfg.stores||[{id:'A',name:'еә—иҲ—A'},{id:'B',name:'еә—иҲ—B'}];
  let html = '';
  staff.forEach(function(s){
    const storeName = (stores.find(function(st){return st.id===s.store;})||{}).name||s.store||'дёЎеә—';
    html += '<div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #f0f0f0">';
    html += '<div style="flex:1">';
    html += '<div class="fw-bold">'+s.name+(s.inactive?'<span style="font-size:10px;color:var(--danger);margin-left:6px">йҖҖзӨҫжёҲ</span>':'')+'</div>';
    html += '<div style="font-size:12px;color:var(--mid)">'+s.title+' В· '+storeName+(s.contractor?' В· жҘӯеӢҷе§”иЁ—':'')+'</div>';
    html += '</div>';
    html += '<div style="display:flex;gap:4px">';
    html += '<button class="btn btn-outline btn-sm" onclick="showEditStaffModal(\''+s.id+'\')">вңҸпёҸ</button>';
    if(s.role!=='admin'){
      if(s.inactive){
        html += '<button class="btn btn-sm" style="background:var(--success);color:#fff;border:none" onclick="reinstateStaff(\''+s.id+'\')">еҫ©её°</button>';
      } else {
        html += '<button class="btn btn-sm" style="background:var(--danger);color:#fff;border:none" onclick="retireStaff(\''+s.id+'\',\''+encodeURIComponent(s.name)+'\')">йҖҖзӨҫ</button>';
      }
    }
    html += '</div></div>';
  });
  html += '<button class="btn btn-primary btn-block" style="margin-top:12px" onclick="showAddStaffModal()">пјӢ е…ҘзӨҫзҷ»йҢІ</button>';
  return html;
}

function showAddStaffModal(editId){
  const cfg = getAppConfig()||{};
  const stores = cfg.stores||[{id:'A',name:'еә—иҲ—A'},{id:'B',name:'еә—иҲ—B'}];
  const editing = editId ? STAFF_LIST.find(s=>s.id===editId) : null;
  const ROLES = [{value:'admin',label:'з®ЎзҗҶиҖ…'},{value:'owner',label:'гӮӘгғјгғҠгғј'},{value:'manager',label:'гғһгғҚгғјгӮёгғЈгғј'},{value:'sub',label:'гӮөгғ–гғӘгғјгғҖгғј'},{value:'staff',label:'гӮ№гӮҝгғғгғ•'}];
  showModal(`<div class="modal-title">${editing?'вңҸпёҸ гӮ№гӮҝгғғгғ•гӮ’з·ЁйӣҶ':'рҹ‘Ө гӮ№гӮҝгғғгғ•гӮ’иҝҪеҠ '}</div>
    <div class="form-group"><label class="form-label">гғӯгӮ°гӮӨгғіID</label>
      <input class="form-input" id="ns_id" value="${editing?.id||''}" placeholder="дҫӢ: tanaka" ${editing?'readonly':''}></div>
    <div class="form-group"><label class="form-label">иЎЁзӨәеҗҚ</label>
      <input class="form-input" id="ns_name" value="${editing?.name||''}" placeholder="дҫӢ: еұұз”°"></div>
    <div class="form-group"><label class="form-label">еҪ№иҒ·</label>
      <select class="form-input" id="ns_role">
        ${ROLES.map(r=>`<option value="${r.value}" ${editing?.role===r.value?'selected':''}>${r.label}</option>`).join('')}
      </select></div>
    <div class="form-group"><label class="form-label">еҪ№иҒ·еҗҚпјҲиЎЁзӨәпјү</label>
      <input class="form-input" id="ns_title" value="${editing?.title||''}" placeholder="дҫӢ: гғҒгғјгғ•гғҚгӮӨгғӘгӮ№гғҲ"></div>
    <div class="form-group"><label class="form-label">жӢ…еҪ“еә—иҲ—</label>
      <select class="form-input" id="ns_store">
        ${stores.map(s=>`<option value="${s.id}" ${editing?.store===s.id?'selected':''}>${s.name}</option>`).join('')}
        ${stores.length>1?`<option value="both" ${editing?.store==='both'?'selected':''}>дёЎеә—иҲ—</option>`:''}
      </select></div>
    <div class="form-group"><label class="form-label">жҘӯеӢҷе§”иЁ—</label>
      <select class="form-input" id="ns_contractor">
        <option value="0" ${!editing?.contractor?'selected':''}>жӯЈзӨҫе“Ў</option>
        <option value="1" ${editing?.contractor?'selected':''}>жҘӯеӢҷе§”иЁ—</option>
      </select></div>
    <div class="form-group"><label class="form-label">PINгӮігғјгғүпјҲ4жЎҒпјү</label>
      <input type="number" class="form-input" id="ns_pin" value="${editing?.pin||''}" placeholder="4жЎҒгҒ®ж•°еӯ—" maxlength="4"></div>
    <button class="btn btn-primary btn-block" onclick="saveStaffMember('${editId||''}')">рҹ’ҫ ${editing?'жӣҙж–°':'иҝҪеҠ '}гҒҷгӮӢ</button>`);
}

function showEditStaffModal(id){ showAddStaffModal(id); }

function saveStaffMember(editId){
  const id = (document.getElementById('ns_id')?.value||'').trim();
  const name = (document.getElementById('ns_name')?.value||'').trim();
  const role = document.getElementById('ns_role')?.value||'staff';
  const title = (document.getElementById('ns_title')?.value||'').trim()||'гӮ№гӮҝгғғгғ•';
  const store = document.getElementById('ns_store')?.value||'A';
  const contractor = document.getElementById('ns_contractor')?.value==='1';
  const pin = (document.getElementById('ns_pin')?.value||'').trim();
  if(!name){ alert('еҗҚеүҚгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„'); return; }
  const newStaff = {
    id: editId||id||name.toLowerCase()+'_'+Date.now(),
    name, role, title, store, contractor,
    treat: role!=='admin'&&role!=='owner',
    noSales: role==='admin'||role==='owner',
    noRank: role==='admin'||role==='owner',
    pin: pin||''
  };
  let list = [...STAFF_LIST];
  if(editId){
    const idx = list.findIndex(s=>s.id===editId);
    if(idx>=0) list[idx]={...list[idx],...newStaff};
  } else {
    list.push(newStaff);
  }
  saveStaffConfig(list);
  // PINдҝқеӯҳ
  if(pin){
    const pins = DB.getPins()||{};
    pins[newStaff.id] = pin;
    DB.setPins(pins);
  }
  closeModal(); render();
  alert('вң… '+(editId?'жӣҙж–°':'иҝҪеҠ ')+'гҒ—гҒҫгҒ—гҒҹпјҒ');
}

function deleteStaffMember(id){
  if(FIXED_ROLES[id]){ alert('гҒ“гҒ®гӮўгӮ«гӮҰгғігғҲгҒҜеүҠйҷӨгҒ§гҒҚгҒҫгҒӣгӮ“'); return; }
  if(!confirm('гҒ“гҒ®гӮ№гӮҝгғғгғ•гӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ')) return;
  const list = STAFF_LIST.filter(s=>s.id!==id);
  saveStaffConfig(list);
  render();
}

// йҖҖзӨҫпјҲinactiveгғ•гғ©гӮ° вҶ’ гғҮгғјгӮҝдҝқжҢҒгғ»дёҖиҰ§гҒӢгӮүйқһиЎЁзӨәпјү
function retireStaff(id, encodedName){
  if(FIXED_ROLES[id]){ alert('гҒ“гҒ®гӮўгӮ«гӮҰгғігғҲгҒҜйҖҖзӨҫеҮҰзҗҶгҒ§гҒҚгҒҫгҒӣгӮ“'); return; }
  const name = decodeURIComponent(encodedName);
  if(!confirm(name+'гҒ•гӮ“гӮ’йҖҖзӨҫеҮҰзҗҶгҒ—гҒҫгҒҷгҒӢпјҹ\nпјҲгғҮгғјгӮҝгҒҜдҝқжҢҒгҒ•гӮҢгҒҫгҒҷгҖӮе…ғгҒ«жҲ»гҒҷгҒ“гҒЁгӮӮеҸҜиғҪгҒ§гҒҷпјү')) return;
  const list = STAFF_LIST.map(s=> s.id===id ? Object.assign({},s,{inactive:true, retiredAt: today()}) : s);
  saveStaffConfig(list);
  render();
  alert('вң… '+name+'гҒ•гӮ“гӮ’йҖҖзӨҫеҮҰзҗҶгҒ—гҒҫгҒ—гҒҹ');
}

// еҫ©её°пјҲinactiveгғ•гғ©гӮ°и§ЈйҷӨпјү
function reinstateStaff(id){
  const s = STAFF_LIST.find(x=>x.id===id);
  if(!s) return;
  if(!confirm(s.name+'гҒ•гӮ“гӮ’еҫ©её°гҒ•гҒӣгҒҫгҒҷгҒӢпјҹ')) return;
  const list = STAFF_LIST.map(x=> x.id===id ? Object.assign({},x,{inactive:false, retiredAt:null}) : x);
  saveStaffConfig(list);
  render();
  alert('вң… '+s.name+'гҒ•гӮ“гӮ’еҫ©её°гҒ•гҒӣгҒҫгҒ—гҒҹ');
}


// ============================================================

window._appMounted = true;
// еҲқеӣһгӮ»гғғгғҲгӮўгғғгғ—гғҒгӮ§гғғгӮҜ
if(isFirstRun()) { S.page = 'setup'; }
render();</script>

function openMessage(id){
  const msgs=DB.getMessages();
  const idx=msgs.findIndex(x=>x.id===id);
  const m=msgs[idx];
  if(!m) return;
  // ж—ўиӘӯгҒ«гҒҷгӮӢ
  if(!isOwner()||(m.from!==S.user?.id)){
    msgs[idx].readBy=[...new Set([...(msgs[idx].readBy||[]),S.user?.id])];
    DB.set('messages',msgs);
  }
  const myProg=m.progress?m.progress[S.user?.id]:'';
  const progOptions=['жңӘеҜҫеҝң','еҜҫеҝңдёӯ','е®ҢдәҶ'];
  const isExp=m.deadline&&new Date(m.deadline)<new Date()&&myProg!=='е®ҢдәҶ';
  const toLabel=m.to==='all'?'е…Ёе“Ў':m.to==='store'?getStoreLabel(m.toStore):(m.toName||'');
  const isSender=m.from===S.user?.id;

  const deadlineHtml=m.deadline?`<div style="padding:8px 12px;background:${isExp?'#FFEBEE':'#f5f5f5'};border-radius:var(--rs);margin:8px 0;font-size:13px">
    рҹ“… жңҹйҷҗ: <strong>${fmtDateFull(m.deadline)}</strong>${isExp?' вҡ пёҸ и¶…йҒҺ':''}
  </div>`:'';

  const progressHtml=!isSender&&m.progress&&S.user?.id in m.progress?`<div style="margin:14px 0">
    <div style="font-size:13px;font-weight:600;color:var(--mid);margin-bottom:8px">рҹ“Ҡ йҖІжҚ—гӮ’жӣҙж–°</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      ${progOptions.map(p=>`<button class="btn ${myProg===p?'btn-primary':'btn-ghost'} btn-sm" onclick="updateMsgProgress('${m.id}','${p}')">${p==='е®ҢдәҶ'?'вң…':p==='еҜҫеҝңдёӯ'?'рҹ”„':'в¬ң'} ${p}</button>`).join('')}
    </div>
  </div>`:'';

  const ownerProgressHtml=isSender&&m.progress?`<div style="margin:14px 0">
    <div style="font-size:13px;font-weight:600;color:var(--mid);margin-bottom:8px">рҹ‘Ҙ йҖІжҚ—дёҖиҰ§</div>
    ${Object.entries(m.progress).map(([sid,st])=>{
      const s=STAFF_LIST.find(x=>x.id===sid);
      if(!s) return '';
      const c=st==='е®ҢдәҶ'?'badge-green':st==='еҜҫеҝңдёӯ'?'badge-warn':'badge-gray';
      return`<div class="att-item"><span class="fw-bold">${s.name}</span><span class="badge ${c}">${st==='е®ҢдәҶ'?'вң…':st==='еҜҫеҝңдёӯ'?'рҹ”„':'в¬ң'} ${st}</span></div>`;
    }).join('')}
  </div>`:'';

  showModal(`
    <div class="flex gap-8 mb-8" style="flex-wrap:wrap">
      <span class="badge badge-gray">From: ${m.fromName||"дёҚжҳҺ"}${STAFF_LIST.find(s=>s.id===m.from)?("пјҲ"+getStoreLabel(STAFF_LIST.find(s=>s.id===m.from).store)+"пјү"):""}</span>
      <span class="badge badge-pink">To: ${toLabel}</span>
    </div>
    <div class="modal-title">${m.title}</div>
    <div style="font-size:12px;color:var(--mid);margin-bottom:8px">${fmtDateFull(m.date)}</div>
    ${deadlineHtml}
    <div style="font-size:15px;line-height:1.9;white-space:pre-wrap;background:#f9f9f9;padding:14px;border-radius:var(--rs)">${m.body}</div>
    ${progressHtml}${ownerProgressHtml}
    <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${isSender?`<button class="btn btn-danger btn-sm" onclick="deleteMessage('${m.id}')">рҹ—‘ еүҠйҷӨ</button>`:'<div></div>'}
      <button class="btn btn-outline btn-sm" onclick="closeModal()">й–үгҒҳгӮӢ</button>
    </div>`);
}

function showAddMessageModal(){
  // misaгғ»wakanaгғ»гӮӘгғјгғҠгғјгҒ®гҒҝгӮӘгғјгғҠгғјгҒ«йҖЈзөЎгҒ§гҒҚгӮӢ
  const canMsgOwner = isOwner()||isTaskAdmin();
  const staffList=STAFF_LIST.filter(s=>{
    if(s.id===S.user?.id) return false;
    if(s.role==='admin'||s.role==='owner') return canMsgOwner;
    return true;
  });
  const userStore = S.user?.store;
  const groupOptions = isOwner() ? `
    <option value="all">рҹ‘Ҙ е…Ёе“Ў</option>
    <option value="store_A">рҹҸӘ жөҰе’Ңеә—е…Ёе“Ў</option>
    <option value="store_B">рҹҸӘ еәғе°ҫеә—е…Ёе“Ў</option>
    <option disabled>в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ</option>` 
  : isTaskAdmin() ? `
    <option value="store_A">рҹҸӘ жөҰе’Ңеә—е…Ёе“Ў</option>
    <option disabled>в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ</option>`
  : '';
  showModal(`<div class="modal-title">вңҸпёҸ гғЎгғғгӮ»гғјгӮёгӮ’йҖҒгӮӢ</div>
    <div class="form-group"><label class="form-label">е®ӣе…Ҳ</label>
      <select class="form-input" id="m_mto">
        ${groupOptions}
        ${staffList.map(s=>`<option value="id_${s.id}">рҹ‘Ө ${s.name}пјҲ${s.title}пјү</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label class="form-label">гӮҝгӮӨгғҲгғ«</label><input class="form-input" id="m_mtit" placeholder="д»¶еҗҚгӮ’е…ҘеҠӣ"></div>
    <div class="form-group"><label class="form-label">еҶ…е®№</label><textarea class="form-input" id="m_mbod" rows="5" placeholder="гғЎгғғгӮ»гғјгӮёеҶ…е®№"></textarea></div>
    <div class="form-group"><label class="form-label">рҹ“… жңҹйҷҗпјҲд»»ж„Ҹпјү</label><input type="date" class="form-input" id="m_mdl"></div>
    <button class="btn btn-primary btn-block" onclick="saveMessage()">рҹ“Ё йҖҒдҝЎгҒҷгӮӢ</button>`);
}

function saveMessage(){
  const title=document.getElementById('m_mtit').value.trim();
  const body=document.getElementById('m_mbod').value.trim();
  const deadline=document.getElementById('m_mdl').value;
  const toVal=document.getElementById('m_mto').value;
  if(!title||!body) return alert('гӮҝгӮӨгғҲгғ«гҒЁеҶ…е®№гӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„');
  let to='individual', toStore=null, toId=null, toName=null;
  let recipients=[];
  if(toVal==='all'){to='all';recipients=STAFF_LIST.filter(s=>s.treat&&s.id!==S.user?.id);}
  else if(toVal.startsWith('store_')){toStore=toVal.replace('store_','');to='store';recipients=STAFF_LIST.filter(s=>s.treat&&s.store===toStore&&s.id!==S.user?.id);}
  else{toId=toVal.replace('id_','');const ts=STAFF_LIST.find(s=>s.id===toId);toName=ts?.name||'';recipients=ts?[ts]:[];}
  const progress={};
  if(recipients && recipients.length>0) recipients.forEach(s=>{if(s&&s.id) progress[s.id]='жңӘеҜҫеҝң';});
  const list=DB.getMessages();
  list.unshift({id:genId(),title,body,deadline,to,toStore,toId,toName,date:today(),from:S.user?.id||'',fromName:S.user?.name||'',readBy:[S.user?.id||''],progress});
  DB.set('messages',list);
  closeModal();
  alert('рҹ“Ё йҖҒдҝЎгҒ—гҒҫгҒ—гҒҹпјҒ');
  render();
}

function updateMsgProgress(msgId, status){
  const msgs=DB.getMessages();
  const idx=msgs.findIndex(m=>m.id===msgId);
  if(idx>=0){
    const prev=(msgs[idx].progress||{})[S.user?.id];
    if(!msgs[idx].progress)msgs[idx].progress={};
    msgs[idx].progress[S.user?.id]=status;
    DB.set('messages',msgs);
    if(status==='е®ҢдәҶ'&&prev!=='е®ҢдәҶ'&&S.user){
      addPoints(S.user.id,'рҹ“Ӣ гӮҝгӮ№гӮҜе®ҢдәҶ',POINT_RULES.task_done);
    }
  }
  closeModal();
  setTimeout(()=>openMessage(msgId),100);
}

function deleteMessage(id){
  if(!confirm('еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ'))return;
  DB.set('messages',DB.getMessages().filter(m=>m.id!==id));
  closeModal();render();
}

function renderDesigns(){

function openDesign(id){
  const d=DB.getDesigns().find(x=>x.id===id);
  if(!d) return;
  const myId = S.user?.id||'';
  const myStatus=d.progress&&S.user?d.progress[myId]:'жңӘзўәиӘҚ';
  const confirmed = d.confirmed||{};
  const myConfirmed = confirmed[myId]||false;

  // жүӢй ҶзўәиӘҚгғңгӮҝгғіпјҲгӮ№гӮҝгғғгғ•з”Ёпјү
  const confirmHtml = !isOwner() ? `<div style="margin:14px 0;padding:12px;background:${myConfirmed?'#E8F5E9':'#FFF8E1'};border-radius:10px;border:2px solid ${myConfirmed?'var(--success)':'var(--warn)'}">
    <div style="font-size:13px;font-weight:700;color:${myConfirmed?'var(--success)':'var(--warn)'};margin-bottom:8px">
      ${myConfirmed?'вң… жүӢй ҶгӮ’зўәиӘҚгҒ—гҒҫгҒ—гҒҹпјҒ':'рҹ“– жүӢй ҶгӮ’иӘӯгӮ“гҒ§зўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„'}
    </div>
    ${!myConfirmed?`<button class="btn btn-block" style="background:var(--success);color:#fff;border:none;font-weight:700" onclick="confirmDesign('${d.id}')">вң… жүӢй ҶгӮ’зўәиӘҚгҒ—гҒҫгҒ—гҒҹ</button>`:''}
    ${myConfirmed?`<div style="font-size:11px;color:var(--mid)">${confirmed[myId+'_at']||''} зўәиӘҚжёҲгҒҝ</div>`:''}
  </div>` : '';

  // зҝ’еҫ—зҠ¶жіҒпјҲгӮ№гӮҝгғғгғ•пјү
  const progressHtml=!isOwner()?`<div style="margin:14px 0">
    <div style="font-size:13px;font-weight:600;color:var(--mid);margin-bottom:8px">рҹ’Ә зҝ’еҫ—зҠ¶жіҒ</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      ${LEARN_STATUS.map(p=>`<button class="btn ${myStatus===p?'btn-primary':'btn-ghost'} btn-sm" onclick="updateDesignProgress('${d.id}','${p}')">${p==='зҝ’еҫ—жёҲгҒҝ'?'вң…':p==='з·ҙзҝ’дёӯ'?'рҹ”„':'рҹ“–'} ${p}</button>`).join('')}
    </div>
  </div>`:'';

  // гӮӘгғјгғҠгғјеҗ‘гҒ‘зўәиӘҚзҠ¶жіҒдёҖиҰ§
  const ownerProgressHtml=isOwner()?`<div style="margin:14px 0">
    <div style="font-size:13px;font-weight:600;color:var(--mid);margin-bottom:8px">рҹ‘Ҙ жүӢй ҶзўәиӘҚзҠ¶жіҒ</div>
    ${(()=>{
      const targets = d.targetStaffIds
        ? STAFF_LIST.filter(s=>d.targetStaffIds.includes(s.id))
        : STAFF_LIST.filter(s=>s.treat);
      const confirmedCount = targets.filter(s=>confirmed[s.id]).length;
      return`<div style="font-size:12px;color:var(--mid);margin-bottom:8px">вң… ${confirmedCount}/${targets.length}еҗҚ зўәиӘҚжёҲгҒҝ</div>`+
      targets.map(s=>{
        const isConf = confirmed[s.id];
        const st=d.progress?d.progress[s.id]||'жңӘзўәиӘҚ':'жңӘзўәиӘҚ';
        const skillColor=st==='зҝ’еҫ—жёҲгҒҝ'?'badge-green':st==='з·ҙзҝ’дёӯ'?'badge-warn':'badge-gray';
        return`<div class="att-item">
          <span class="fw-bold">${s.name}</span>
          <div style="display:flex;gap:4px">
            <span class="badge ${isConf?'badge-green':'badge-gray'}" style="font-size:10px">${isConf?'вң… зўәиӘҚжёҲ':'в¬ң жңӘзўәиӘҚ'}</span>
            <span class="badge ${skillColor}" style="font-size:10px">${st==='зҝ’еҫ—жёҲгҒҝ'?'вң…':st==='з·ҙзҝ’дёӯ'?'рҹ”„':'рҹ“–'} ${st}</span>
          </div>
        </div>`;
      }).join('');
    })()}
  </div>`:'';

  showModal(`
    <div class="flex gap-8 mb-8" style="flex-wrap:wrap">
      <span class="badge badge-pink">${d.cat}</span>
      ${d.menuCat?`<span class="badge badge-blue">${d.menuCat}</span>`:''}
      ${d.store&&d.store!=='both'?`<span class="badge ${d.store==='A'?'store-a':'store-b'}" style="font-size:9px">${d.store==='A'?'жөҰе’Ң':'еәғе°ҫ'}</span>`:''}
      ${d.updatedAt?`<span class="badge badge-warn" style="font-size:9px">рҹ”„ жӣҙж–°гҒӮгӮҠ</span>`:''}
    </div>
    <div class="modal-title">${d.title}</div>
    <div style="font-size:12px;color:var(--mid);margin-bottom:4px">${fmtDateFull(d.date)} В· ${d.author}</div>
    ${d.updatedAt?`<div style="font-size:11px;color:var(--warn);margin-bottom:8px">рҹ”„ ${d.updatedAt} гҒ« ${d.updatedBy} гҒҢжӣҙж–°гҒ—гҒҫгҒ—гҒҹ</div>`:''}
    ${d.imageUrl?`<img src="${d.imageUrl}" style="width:100%;border-radius:var(--rs);margin-bottom:8px;object-fit:cover;max-height:200px" onerror="this.style.display='none'">`:''}
    ${d.videoUrl?`<video src="${d.videoUrl}" style="width:100%;border-radius:var(--rs);margin-bottom:8px" controls></video>`:''}
    ${d.youtubeUrl?`<div style="margin-bottom:8px"><a href="${d.youtubeUrl}" target="_blank" style="display:flex;align-items:center;gap:8px;padding:10px;background:#ff000015;border-radius:10px;text-decoration:none;color:#cc0000"><span style="font-size:20px">в–¶пёҸ</span><span style="font-weight:600;font-size:13px">How-toеӢ•з”»гӮ’иҰӢгӮӢ</span></a></div>`:''}
    <div style="font-size:14px;line-height:1.9;white-space:pre-wrap;background:var(--bg);padding:14px;border-radius:var(--rs);max-height:200px;overflow-y:auto">${d.body}</div>
    ${confirmHtml}
    ${progressHtml}
    ${ownerProgressHtml}
    <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      ${(isDesignAdmin()||d.authorId===S.user?.id||d.author===S.user?.name)?`<button class="btn btn-outline btn-sm" onclick="closeModal();editDesign('${d.id}')">вңҸпёҸ з·ЁйӣҶ</button>`:'<div></div>'}
      ${(isDesignAdmin()||d.authorId===S.user?.id||d.author===S.user?.name)?`<button class="btn btn-danger btn-sm" onclick="deleteDesign('${d.id}')">рҹ—‘ еүҠйҷӨ</button>`:'<div></div>'}
      <button class="btn btn-primary btn-sm" onclick="closeModal()">й–үгҒҳгӮӢ</button>
    </div>`);

}

function previewDesignImg(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    window._designImgData = e.target.result;
    const prev = document.getElementById('d_img_preview');
    const prevImg = document.getElementById('d_img_previewImg');
    const label = document.getElementById('d_img_label');
    if(prev && prevImg){
      prevImg.src = e.target.result;
      prev.style.display = 'block';
      if(label) label.textContent = 'вң… з”»еғҸйҒёжҠһжёҲгҒҝ';
    }
  };
  reader.readAsDataURL(file);
}

function clearDesignImg(){
  window._designImgData = null;
  const prev = document.getElementById('d_img_preview');
  const label = document.getElementById('d_img_label');
  if(prev) prev.style.display = 'none';
  if(label) label.textContent = 'рҹ“ё еҶҷзңҹгӮ’йҒёжҠһпјҲгӮӨгғігӮ№гӮҝгӮ№гӮҜгӮ·гғ§гҒӘгҒ©пјү';
}

function saveDesign(){
  const title=document.getElementById('d_title').value.trim();
  const cat=document.getElementById('d_cat').value;
  const menuCat=document.getElementById('d_menucat').value;
  const tags=document.getElementById('d_tags').value.trim();
  const store=document.getElementById('d_store')?.value||'both';
  const imageUrl = window._designImgData || document.getElementById('d_img').value.trim();
  const youtubeUrl = document.getElementById('d_youtube')?.value.trim()||'';
  const bodyEl=document.getElementById('d_body');
  const body=(bodyEl?bodyEl.value.trim():'')||'пјҲгӮігғЎгғігғҲгҒӘгҒ—пјү';
  if(!title) return alert('гӮҝгӮӨгғҲгғ«гӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„');

  // зўәиӘҚгӮ№гӮҝгғғгғ•гҒ®жҢҮе®ҡпјҲгғҒгӮ§гғғгӮҜгҒ•гӮҢгҒҹгӮ№гӮҝгғғгғ•гҒ®гҒҝгҖҒжңӘйҒёжҠһгҒӘгӮүе…Ёе“Ўпјү
  const treatStaff = STAFF_LIST.filter(s=>s.treat);
  const checkedStaff = treatStaff.filter(s=>document.getElementById('d_staff_'+s.id)?.checked);
  const targetStaff = checkedStaff.length>0 ? checkedStaff : treatStaff;

  const progress={};
  targetStaff.forEach(s=>progress[s.id]='жңӘзўәиӘҚ');

  const list=DB.getDesigns();
  list.unshift({
    id:genId(),title,cat,menuCat,tags,imageUrl,youtubeUrl,body,store,
    date:today(),author:S.user.name,authorId:S.user.id,
    progress,
    targetStaffIds: targetStaff.map(s=>s.id)
  });
  DB.set('designs',list);
  window._designImgData = null;
  closeModal();render();
}

function confirmDesign(id){
  const list = DB.getDesigns();
  const idx = list.findIndex(d=>d.id===id);
  if(idx<0) return;
  if(!list[idx].confirmed) list[idx].confirmed = {};
  list[idx].confirmed[S.user.id] = true;
  list[idx].confirmed[S.user.id+'_at'] = today();
  DB.set('designs', list);
  closeModal();
  openDesign(id); // еҶҚиЎЁзӨә
}

function updateDesignProgress(designId, status){
  const designs=DB.getDesigns();
  const idx=designs.findIndex(d=>d.id===designId);
  if(idx>=0){
    const prev=(designs[idx].progress||{})[S.user.id];
    if(!designs[idx].progress)designs[idx].progress={};
    designs[idx].progress[S.user.id]=status;
    DB.set('designs',designs);
    if(status==='зҝ’еҫ—жёҲгҒҝ'&&prev!=='зҝ’еҫ—жёҲгҒҝ'&&S.user){
      addPoints(S.user.id,'рҹ’… гғҮгӮ¶гӮӨгғізҝ’еҫ—жёҲгҒҝ',POINT_RULES.design_learn);
    }
  }
  closeModal();
  setTimeout(()=>openDesign(designId),100);
}

      const stageIdx=DESIGN_STAGES.indexOf(s.stage);

function saveSchedule(){
  const title=document.getElementById('sch_title').value.trim();

  const requests = DB.getShiftRequests();

  if(isOwner()){
    return renderShiftRequestOwner(requests, targetYear, targetMonth);
  } else if(isShiftAdmin()){
    // misa/wakanaгҒҜдёЎж–№гҒ®гғ“гғҘгғјгӮ’жҢҒгҒӨ
    return `<div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
        <button class="btn ${shiftView==='submit'?'btn-primary':'btn-ghost'}" onclick="S.shiftView='submit';render()">рҹ“қ иҮӘеҲҶгҒ®гӮ·гғ•гғҲеёҢжңӣ</button>

      жҸҗеҮәеҫҢгӮӮеҶҚжҸҗеҮәгҒ§еӨүжӣҙгҒ§гҒҚгҒҫгҒҷ

function toggleOffDay(date, year, month){
  const requests = DB.getShiftRequests();
  let req = requests.find(r=>r.staffId===S.user.id&&r.year===parseInt(year)&&r.month===parseInt(month));
  if(!req){
    req = {staffId:S.user.id, year:parseInt(year), month:parseInt(month), offDays:[], startTime:'10:00', endTime:'19:00', note:''};
    requests.push(req);
  }
  const idx2 = req.offDays.indexOf(date);
  if(idx2>=0){
    req.offDays.splice(idx2,1);
  } else {
    // жҘӯеӢҷе§”иЁ—гҒҜеҲ¶йҷҗгҒӘгҒ—гҖҒгҒқгӮҢд»ҘеӨ–гҒҜиЁӯе®ҡеҖӨпјҲгғҮгғ•гӮ©гғ«гғҲ8ж—Ҙпјү
    const isContractor = S.user?.contractor;
    if(!isContractor){
      const maxOffDaysMap = DB.getStaffMaxOffDays();
      const MAX_OFF_DAYS = maxOffDaysMap[S.user?.id] || 8;
      if((req.offDays||[]).length >= MAX_OFF_DAYS){
        alert(`дј‘гҒҝеёҢжңӣгҒҜжңҖеӨ§${MAX_OFF_DAYS}ж—ҘгҒҫгҒ§гҒ§гҒҷ`);
        return;
      }
    }
    req.offDays.push(date);
  }
  req.offDays.sort();
  DB.setShiftRequests(requests);
  render();
}

function submitShiftRequest(year, month){
  const startTime = document.getElementById('shift_start')?.value || '10:00';
  const endTime = document.getElementById('shift_end')?.value || '19:00';
  const note = document.getElementById('shift_note')?.value || '';
  const requests = DB.getShiftRequests();
  const idx2 = requests.findIndex(r=>r.staffId===S.user.id&&r.year===parseInt(year)&&r.month===parseInt(month));
  const existing = idx2>=0 ? requests[idx2] : null;
  const newReq = {
    staffId: S.user.id,
    staffName: S.user.name,
    year: parseInt(year),
    month: parseInt(month),
    offDays: existing ? existing.offDays : [],
    startTime, endTime, note,
    submittedAt: nowTime()
  };
  if(idx2>=0) requests[idx2] = newReq;
  else requests.push(newReq);
  DB.setShiftRequests(requests);
  addPoints(S.user.id,'рҹ“… гӮ·гғ•гғҲеёҢжңӣгӮ’жҸҗеҮә',POINT_RULES.shift_submit);
  alert('вң… гӮ·гғ•гғҲеёҢжңӣгӮ’жҸҗеҮәгҒ—гҒҫгҒ—гҒҹпјҒ+'+POINT_RULES.shift_submit+'ptзҚІеҫ—пјҒ');
  render();
}

function getCurrentPeriod(){
  const now = new Date();
  const year = now.getFullYear();
  const half = now.getMonth() < 6 ? 1 : 2;
  return {year, half, label: `${year}е№ҙ ${half===1?'дёҠеҚҠжңҹпјҲ1гҖң6жңҲпјү':'дёӢеҚҠжңҹпјҲ7гҖң12жңҲпјү'}`};
}

function getPeriodKey(year, half){ return `${year}-H${half}`; }

function getPeriodRange(year, half){
  if(half===1) return {start:`${year}-01-01`, end:`${year}-06-30`};
  return {start:`${year}-07-01`, end:`${year}-12-31`};
}

function showInputModal(type, periodKey){
  const awards = DB.getAwards();
  const staff = STAFF_LIST.filter(s=>s.treat&&!s.noRank&&s.store==='A');
  const currentData = type==='new'?(awards.newClients[periodKey]||{}):type==='review'?(awards.reviews[periodKey]||{}):(awards.contributions[periodKey]||{});
  const title = type==='new'?'ж–°иҰҸжҢҮеҗҚж•°':type==='review'?'еҸЈгӮігғҹж•°':'иІўзҢ®жҠ•зҘЁж•°';
  const unit = type==='new'?'еҗҚ':type==='review'?'д»¶':'зҘЁ';

  showModal(`<div class="modal-title">вңҸпёҸ ${title}гӮ’е…ҘеҠӣ</div>
    ${staff.map(s=>`

}

function saveAwardData(type, periodKey){
  const awards = DB.getAwards();
  const staff = STAFF_LIST.filter(s=>s.treat&&!s.noRank&&s.store==='A');
  const data = {};
  staff.forEach(s=>{
    const val = parseInt(document.getElementById('award_'+s.id)?.value||0);
    if(val>0) data[s.id] = val;
  });
  if(type==='new') awards.newClients[periodKey] = data;
  else awards.contributions[periodKey] = data;
  DB.setAwards(awards);
  closeModal();
  render();
  // гғқгӮӨгғігғҲд»ҳдёҺ
  addPoints(staff, 'рҹ’° еЈІдёҠе…ҘеҠӣ', POINT_RULES.sale_entry);
  // жңҲй–“зӣ®жЁҷйҒ”жҲҗгғҒгӮ§гғғгӮҜ
  const targets3 = DB.getStaffTargets();
  const cfg3 = DB.getSettings();
  const myTarget3 = targets3[staff]||cfg3.monthlyTarget||0;
  if(myTarget3){
    const mk3 = getMonthKey();
    const monthSales3 = DB.getSales().filter(x=>x.staff===staff&&x.date.startsWith(mk3));
    const monthTotal3 = monthSales3.reduce((a,x)=>a+x.amount,0);
    if(monthTotal3>=myTarget3 && monthTotal3-Number(amount)<myTarget3){
      addPoints(staff, 'рҹҸҶ жңҲй–“зӣ®жЁҷйҒ”жҲҗпјҒ', POINT_RULES.sale_target);
    }
  }
  alert('вң… дҝқеӯҳгҒ—гҒҫгҒ—гҒҹпјҒ');
}

function getTaskCreatorType(fromName){
  const staff = STAFF_LIST.find(s=>s.name===fromName);
  if(!staff) return 'owner';
  if(staff.role==='admin'||staff.role==='owner') return 'owner';
  if(staff.taskAdmin) return 'leader';
  return 'staff';
}


// зЁјеғҚзҺҮиЁҲз®—пјҲеёӯж•°гҒЁгӮ№гӮҝгғғгғ•ж•°гҒ®е°ҸгҒ•гҒ„ж–№гӮ’дҪҝз”Ёпјү
function getEffectiveSeats(store, cfg){
  const seats = store==='A'?(cfg.seatsA||6):(cfg.seatsB||3);
  // еҗ„еә—иҲ—гҒ®ж–ҪиЎ“гӮ№гӮҝгғғгғ•ж•°
  const staffCount = STAFF_LIST.filter(s=>s.treat&&!s.noSales&&(s.store===store||s.store==='both')).length;
  // еёӯж•°гҒЁгӮ№гӮҝгғғгғ•ж•°гҒ®е°‘гҒӘгҒ„ж–№гҒҢе®ҹеҠ№зЁјеғҚж•°
  return Math.min(seats, staffCount);
}

function calcHourDiff(open, close){
  if(!open||!close) return 0;
  const [oh,om]=open.split(':').map(Number);
  const [ch,cm]=close.split(':').map(Number);
  return Math.round(((ch*60+cm)-(oh*60+om))/60*10)/10;
}

function getActualOpenHours(store, date, cfg){
  const logged = DB.getStoreHoursForDate(store, date||today());
  if(logged && logged.hours>0) return logged.hours;
  return store==='A'?(cfg.openHoursA||9):(cfg.openHoursB||10);
}

function calcOccupancyWithHours(salesCount, store, cfg, hours){
  const effectiveSeats = getEffectiveSeats(store, cfg);
  const avgTime = cfg.avgTreatTime||90;
  const capacity = effectiveSeats * hours * 60;
  const used = salesCount * avgTime;
  return capacity>0?Math.min(100,Math.round(used/capacity*100)):0;
}

function getStoreOpenHours(store, cfg){
  return store==='A'?(cfg.openHoursA||9):(cfg.openHoursB||10);
}

function calcOccupancy(salesCount, store, cfg, days=1){
  const effectiveSeats = getEffectiveSeats(store, cfg);
  const openHours = getStoreOpenHours(store, cfg);
  const avgTime = cfg.avgTreatTime||90;
  // зЁјеғҚзҺҮ = (д»¶ж•° Г— е№іеқҮж–ҪиЎ“жҷӮй–“) / (е®ҹеҠ№еёӯж•° Г— е–¶жҘӯжҷӮй–“ Г— ж—Ҙж•° Г— 60еҲҶ) Г— 100
  const capacity = effectiveSeats * openHours * 60 * days;
  const used = salesCount * avgTime;
  return capacity>0?Math.min(100,Math.round(used/capacity*100)):0;
}

function getOccupancyLabel(store, cfg){
  const seats = store==='A'?(cfg.seatsA||6):(cfg.seatsB||3);
  const staff = STAFF_LIST.filter(s=>s.treat&&!s.noSales&&(s.store===store||s.store==='both')).length;
  const effective = Math.min(seats, staff);
  const hours = getStoreOpenHours(store, cfg);
  const storeName = store==='A'?'жөҰе’Ңеә—пјҲ10-19жҷӮпјү':'еәғе°ҫеә—пјҲ11-21жҷӮпјү';
  return `${storeName} ${seats}еёӯгғ»${staff}еҗҚвҶ’е®ҹеҠ№${effective}жһ `;
}

        ${done.length>0?`<span class="badge badge-green">вң… е®ҢдәҶ ${done.length}</span>`:''}
        ${overdue.length>0?`<span class="badge badge-danger">вҡ пёҸ жңҹйҷҗи¶…йҒҺ ${overdue.length}</span>`:''}
        ${tasks.length===0?`<span class="badge badge-gray">гӮҝгӮ№гӮҜгҒӘгҒ—</span>`:''}
      </div>

          const isExp=t.deadline&&new Date(t.deadline)<new Date();

            </div>

function renderProgressByTaskGrouped(allTasks, storeFilter){
  const ownerTasks = allTasks.filter(t=>getTaskCreatorType(t.from)==='owner');
  const leaderTasks = allTasks.filter(t=>getTaskCreatorType(t.from)==='leader');

  const renderSection = (tasks, label, color, icon) => {
    if(tasks.length===0) return '';
    const taskMap = {};
    tasks.forEach(t=>{
      if(!taskMap[t.id]) taskMap[t.id]={icon:t.icon,title:t.title,type:t.type,from:t.from,date:t.date,deadline:t.deadline,staff:[]};
      taskMap[t.id].staff.push({name:t.staffName,store:t.staffStore,status:t.status});
    });
    const taskList = Object.values(taskMap).sort((a,b)=>{
      const ad=a.staff.every(s=>s.status==='е®ҢдәҶ');
      const bd=b.staff.every(s=>s.status==='е®ҢдәҶ');
      return ad===bd?0:ad?1:-1;
    });
    return`<div style="margin-bottom:20px">
      <div style="font-size:14px;font-weight:700;color:${color};margin-bottom:10px;display:flex;align-items:center;gap:6px">
        <span>${icon}</span>${label}
        <span style="background:${color};color:#fff;border-radius:20px;padding:2px 8px;font-size:11px">${taskList.length}д»¶</span>
      </div>
      ${taskList.map(task=>{
        const allDone=task.staff.every(s=>s.status==='е®ҢдәҶ');
        const pendingStaff=task.staff.filter(s=>s.status==='жңӘеҜҫеҝң');
        const doingStaff=task.staff.filter(s=>s.status==='еҜҫеҝңдёӯ');
        const doneStaff=task.staff.filter(s=>s.status==='е®ҢдәҶ');
        const isExp=task.deadline&&new Date(task.deadline)<new Date()&&!allDone;
        const pct=task.staff.length?Math.round(doneStaff.length/task.staff.length*100):0;
        return`<div class="card" style="margin-bottom:8px;border-left:4px solid ${allDone?'var(--success)':isExp?'var(--danger)':color}">
          <div class="card-row mb-8">
            <div><span>${task.icon}</span><span class="fw-bold" style="margin-left:4px">${task.title}</span></div>
            <span class="badge ${allDone?'badge-green':isExp?'badge-danger':'badge-warn'}">${allDone?'вң…е®ҢдәҶ':isExp?'вҡ пёҸи¶…йҒҺ':'йҖІиЎҢдёӯ'}</span>
          </div>
          <div style="font-size:12px;color:var(--mid);margin-bottom:8px">
            From: ${task.from} В· ${fmtDateFull(task.date)}${task.deadline?` В· рҹ“… ${fmtDateFull(task.deadline)}`:''}
          </div>
          <div class="progress-bar" style="margin-bottom:8px"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
          <div style="display:flex;gap:4px;flex-wrap:wrap">
            ${pendingStaff.map(s=>`<span class="badge badge-danger" style="font-size:11px">в¬ң ${s.name}</span>`).join('')}
            ${doingStaff.map(s=>`<span class="badge badge-warn" style="font-size:11px">рҹ”„ ${s.name}</span>`).join('')}
            ${doneStaff.map(s=>`<span class="badge badge-green" style="font-size:11px">вң… ${s.name}</span>`).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  };

  if(ownerTasks.length===0&&leaderTasks.length===0){
    return`<div class="empty-state"><div class="empty-icon">рҹ“Ӣ</div><div class="empty-text">гӮҝгӮ№гӮҜгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“</div></div>`;
  }

function renderProgressByTask(allTasks, storeFilter){
  // гӮҝгӮ№гӮҜIDгҒ§гӮ°гғ«гғјгғ—еҢ–
  const taskMap = {};
  allTasks.forEach(t=>{
    if(!taskMap[t.id]) taskMap[t.id] = {
      icon:t.icon, title:t.title, type:t.type,
      from:t.from, date:t.date, deadline:t.deadline,
      staff:[]
    };
    taskMap[t.id].staff.push({
      name:t.staffName, store:t.staffStore,
      status:t.status, staffId:t.staffId
    });
  });

  const tasks = Object.values(taskMap);
  if(tasks.length===0) return`<div class="empty-state"><div class="empty-icon">рҹ“Ӣ</div><div class="empty-text">гӮҝгӮ№гӮҜгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“</div></div>`;

  // жңӘе®ҢдәҶгӮҝгӮ№гӮҜгӮ’е…ҲгҒ«
  tasks.sort((a,b)=>{
    const aDone = a.staff.every(s=>s.status==='е®ҢдәҶ');
    const bDone = b.staff.every(s=>s.status==='е®ҢдәҶ');
    return aDone===bDone?0:aDone?1:-1;
  });

  return tasks.map(task=>{
    const allDone = task.staff.every(s=>s.status==='е®ҢдәҶ');
    const pendingStaff = task.staff.filter(s=>s.status==='жңӘеҜҫеҝң');
    const doingStaff = task.staff.filter(s=>s.status==='еҜҫеҝңдёӯ');
    const doneStaff = task.staff.filter(s=>s.status==='е®ҢдәҶ');
    const isExp = task.deadline&&new Date(task.deadline)<new Date()&&!allDone;
    const pct = task.staff.length ? Math.round(doneStaff.length/task.staff.length*100) : 0;

    return`<div class="card" style="margin-bottom:12px;border-left:4px solid ${allDone?'var(--success)':isExp?'var(--danger)':'var(--pink)'}">
      <div class="card-row mb-8">
        <div>
          <span>${task.icon}</span>
          <span class="fw-bold" style="margin-left:4px">${task.title}</span>
        </div>
        <span class="badge ${allDone?'badge-green':isExp?'badge-danger':'badge-warn'}">${allDone?'вң…е®ҢдәҶ':isExp?'вҡ пёҸи¶…йҒҺ':'йҖІиЎҢдёӯ'}</span>
      </div>
      <div style="font-size:12px;color:var(--mid);margin-bottom:8px">
        From: ${task.from} В· ${fmtDateFull(task.date)}
        ${task.deadline?` В· рҹ“… ${fmtDateFull(task.deadline)}`:'' }
      </div>
      <div class="progress-bar" style="margin-bottom:8px"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        ${pendingStaff.map(s=>`<span class="badge badge-danger" style="font-size:11px">в¬ң ${s.name}</span>`).join('')}
        ${doingStaff.map(s=>`<span class="badge badge-warn" style="font-size:11px">рҹ”„ ${s.name}</span>`).join('')}
        ${doneStaff.map(s=>`<span class="badge badge-green" style="font-size:11px">вң… ${s.name}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function saveInventoryItem(){
  const name = document.getElementById('inv_name').value.trim();
  const cat = document.getElementById('inv_cat').value;
  const store = document.getElementById('inv_store').value;
  const stock = parseInt(document.getElementById('inv_stock').value)||0;
  const unit = document.getElementById('inv_unit').value.trim()||'еҖӢ';
  const minStock = parseInt(document.getElementById('inv_min').value)||0;
  const wholesalePrice = parseInt(document.getElementById('inv_price').value)||0;
  const location = document.getElementById('inv_loc').value.trim();
  const note = document.getElementById('inv_note').value.trim();
  if(!name) return alert('е•Ҷе“ҒеҗҚгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„');
  const list = DB.getInventory();
  list.push({
    id:genId(),name,cat,store,currentStock:stock,unit,minStock,
    wholesalePrice,location,note,
    updatedAt:nowDateTime(),updatedBy:S.user?.name||'',
    createdAt:nowDateTime(),createdBy:S.user?.name||'',
    history:[{date:nowDateTime(),by:S.user?.name||'',before:0,after:stock,type:'еҲқжңҹзҷ»йҢІ'}]
  });
  DB.setInventory(list);
  closeModal();render();
}

function updateInventoryItem(id){
  const list = DB.getInventory();
  const idx = list.findIndex(i=>i.id===id);
  if(idx<0) return;
  list[idx].name = document.getElementById('inv_name').value.trim();
  list[idx].cat = document.getElementById('inv_cat').value;
  list[idx].wholesalePrice = parseInt(document.getElementById('inv_price').value)||0;
  list[idx].unit = document.getElementById('inv_unit').value.trim()||'еҖӢ';
  list[idx].minStock = parseInt(document.getElementById('inv_min').value)||0;
  list[idx].location = document.getElementById('inv_loc').value.trim();
  list[idx].note = document.getElementById('inv_note').value.trim();
  const prevStock = list[idx].currentStock;
  const newStock = parseInt(document.getElementById('inv_stock').value)||0;
  list[idx].currentStock = newStock;
  list[idx].updatedAt = nowDateTime();
  list[idx].updatedBy = S.user?.name||'';
  if(!list[idx].history) list[idx].history=[];
  if(prevStock !== newStock){
    list[idx].history.unshift({
      date:nowDateTime(), by:S.user?.name||'',
      before:prevStock, after:newStock, type:'з·ЁйӣҶ'
    });
    if(list[idx].history.length>20) list[idx].history=list[idx].history.slice(0,20);
  }
  DB.setInventory(list);
  closeModal();render();
}

function deleteInventoryItem(id){
  if(!confirm('еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ'))return;
  DB.setInventory(DB.getInventory().filter(i=>i.id!==id));
  closeModal();render();
}

function updateStock(id, delta){
  const list = DB.getInventory();
  const idx = list.findIndex(i=>i.id===id);
  if(idx<0) return;
  const before = list[idx].currentStock||0;
  list[idx].currentStock = Math.max(0, before+delta);
  list[idx].updatedAt = nowDateTime();
  list[idx].updatedBy = S.user?.name||'';
  // еӨүжӣҙеұҘжӯҙгӮ’иҝҪеҠ 
  if(!list[idx].history) list[idx].history=[];
  list[idx].history.unshift({
    date:nowDateTime(), by:S.user?.name||'',
    before, after:list[idx].currentStock,
    type: delta>0?'е…Ҙеә«':'дҪҝз”Ё'
  });
  if(list[idx].history.length>20) list[idx].history=list[idx].history.slice(0,20);
  DB.setInventory(list);
  render();
}

function saveStocktaking(store){
  const list = DB.getInventory();
  const items = list.filter(i=>i.store===store);
  let updatedCount = 0;
  items.forEach(item=>{
    const input = document.getElementById('st_'+item.id);
    if(!input||input.value==='') return;
    const newStock = parseInt(input.value);
    if(isNaN(newStock)||newStock<0) return;
    const idx = list.findIndex(i=>i.id===item.id);
    if(idx>=0){
      const prevSt = list[idx].currentStock;
      list[idx].currentStock = newStock;
      list[idx].updatedAt = nowDateTime();
      list[idx].updatedBy = S.user?.name||'';
      if(!list[idx].history) list[idx].history=[];
      list[idx].history.unshift({date:nowDateTime(),by:S.user?.name||'',before:prevSt,after:newStock,type:'жЈҡеҚёгҒ—'});
      if(list[idx].history.length>20) list[idx].history=list[idx].history.slice(0,20);
      updatedCount++;
    }
  });
  // жЈҡеҚёгҒ—еұҘжӯҙдҝқеӯҳ
  const history = DB.getStocktaking();
  history.unshift({id:genId(),store,date:today(),staff:S.user.name,count:updatedCount});
  DB.set('stocktaking', history);
  DB.setInventory(list);
  S.invMode = 'list';
  alert(`вң… жЈҡеҚёгҒ—е®ҢдәҶпјҒ${updatedCount}д»¶гҒ®еңЁеә«гӮ’жӣҙж–°гҒ—гҒҫгҒ—гҒҹ`);
  render();
}

];

function getRank(pts){
  let rank = RANKS[0];
  for(const r of RANKS){ if(pts >= r.min) rank = r; }
  return rank;
}

function getNextRank(pts){
  for(const r of RANKS){ if(pts < r.min) return r; }
  return null;
}

function addPoints(staffId, reason, pts){
  if(!staffId) return;
  const points = DB.getPoints();
  if(!points[staffId]) points[staffId] = 0;
  points[staffId] += pts;
  DB.setPoints(points);
  // еұҘжӯҙиҝҪеҠ 
  const history = DB.getPointHistory();
  history.unshift({staffId, reason, pts, date:today(), time:nowTime()});
  if(history.length > 200) history.splice(200);
  DB.set('pointHistory', history);
}

function sendThanks(toId, toName){
  const msg = document.getElementById('thanks_msg')?.value.trim()||'';
  const remaining = THANKS_LIMIT - getTodayThanksGiven().length;
  if(remaining<=0) return alert('жң¬ж—ҘгҒ®жҠ•зҘЁгҒҜзөӮдәҶгҒ—гҒҫгҒ—гҒҹ');
  if(toId===S.user?.id) return alert('иҮӘеҲҶгҒ«гҒҜйҖҒгӮҢгҒҫгҒӣгӮ“');
  const list = DB.getThanks();
  list.unshift({
    id:genId(), fromId:S.user.id, fromName:S.user.name,
    toId, toName, message:msg, date:today()
  });
  DB.setThanks(list);
  // гғқгӮӨгғігғҲд»ҳдёҺ
  addPoints(S.user.id, `рҹҷҸ ${toName}гҒ•гӮ“гҒёгҒӮгӮҠгҒҢгҒЁгҒҶ`, POINT_RULES.thanks_give);
  addPoints(toId, `рҹҷҸ ${S.user.name}гҒ•гӮ“гҒӢгӮүгҒӮгӮҠгҒҢгҒЁгҒҶ`, POINT_RULES.thanks_receive);
  closeModal();
  render();
  alert(`вң… ${toName}гҒ•гӮ“гҒ«ж„ҹи¬қгӮ’йҖҒгӮҠгҒҫгҒ—гҒҹпјҒ\n+${POINT_RULES.thanks_give}ptзҚІеҫ—пјҒ`);
}

const MONTHLY_CATS = ['еә—иҲ—з®ЎзҗҶ','гӮ№гӮҝгғғгғ•','йЎ§е®ўз®ЎзҗҶ','еЈІдёҠгғ»иІЎеӢҷ','ж•ҷиӮІгғ»жҠҖиЎ“','гҒқгҒ®д»–'];

function renderMonthlyTasks(){
  const tasks = DB.getMonthlyTasks();
  const done = DB.getMonthlyDone();
  const now = new Date();
  const monthLabel = `${now.getFullYear()}е№ҙ${now.getMonth()+1}жңҲ`;
  const store = getEffectiveStore();

  const filtered = tasks.filter(t=>t.store==='both'||t.store===store||store==='both');
  const doneCount = filtered.filter(t=>done[t.id]).length;
  const pct = filtered.length?Math.round(doneCount/filtered.length*100):0;

  const cats = [...new Set(filtered.map(t=>t.cat))];
  const catFilter = S.monthCat||'е…ЁгҒҰ';
  const shown = catFilter==='е…ЁгҒҰ'?filtered:filtered.filter(t=>t.cat===catFilter);

  return`<div class="page">
    <!-- гғҳгғғгғҖгғј -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-row mb-8">
        <div class="fw-bold">рҹ“Ҷ ${monthLabel}гҒ®гӮҝгӮ№гӮҜ</div>
        <span class="badge ${pct===100?'badge-green':'badge-warn'}">${doneCount}/${filtered.length}е®ҢдәҶ</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${pct===100?'<div style="text-align:center;color:var(--success);font-weight:700;margin-top:8px">рҹҺү д»ҠжңҲгҒ®гӮҝгӮ№гӮҜгӮ’е…ЁгҒҰе®ҢдәҶпјҒ</div>':''}
    </div>

    <!-- гӮ«гғҶгӮҙгғӘгғ•гӮЈгғ«гӮҝгғј -->
    <div class="tab-row">
      ${['е…ЁгҒҰ',...cats].map(c=>`<button class="tab ${catFilter===c?'active':''}" onclick="S.monthCat='${c}';render()">${c}</button>`).join('')}
    </div>

    <!-- гӮҝгӮ№гӮҜгғӘгӮ№гғҲ -->
    ${shown.length===0?`<div class="empty-state"><div class="empty-icon">рҹ“Ҷ</div><div class="empty-text">гӮҝгӮ№гӮҜгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“<br>${isOwner()||isTaskAdmin()?'еҸідёӢгҒ®пјӢгҒӢгӮүиҝҪеҠ гҒ§гҒҚгҒҫгҒҷ':''}</div></div>`:''}
    ${shown.map(task=>{
      const isDone = !!done[task.id];
      const doneInfo = done[task.id];
      const assignee = task.assignee==='all'?'е…Ёе“Ў':task.assignee==='A'?'жөҰе’Ңеә—':task.assignee==='B'?'еәғе°ҫеә—':(STAFF_LIST.find(s=>s.id===task.assignee)?.name||'е…Ёе“Ў');
      const isMyTask = task.assignee==='all'||task.assignee===S.user?.store||task.assignee===S.user?.id;
      return`<div class="card" style="border-left:4px solid ${isDone?'var(--success)':'var(--pink)'};opacity:${isDone?0.8:1}">
        <div class="card-row mb-8">
          <div style="flex:1">
            <div class="fw-bold ${isDone?'':''}">
              ${isDone?'<span style="text-decoration:line-through;color:var(--mid)">':''}${task.title}${isDone?'</span>':''}
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
              <span class="badge badge-pink" style="font-size:10px">${task.cat}</span>
              <span class="badge badge-blue" style="font-size:10px">рҹ‘Ө ${assignee}</span>
              ${task.deadline?`<span class="badge badge-warn" style="font-size:10px">рҹ“… ${task.deadline}ж—ҘгҒҫгҒ§</span>`:''}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            ${isOwner()||isTaskAdmin()?`<button onclick="deleteMonthlyTask('${task.id}')" style="background:none;border:none;color:var(--lite);cursor:pointer;font-size:14px">вң•</button>`:''}
            ${isMyTask?`<button class="btn btn-sm ${isDone?'btn-ghost':'btn-primary'}" onclick="toggleMonthlyDone('${task.id}')" style="${isDone?'border-color:var(--success);color:var(--success)':''}">
              ${isDone?'вң… е®ҢдәҶжёҲ':'е®ҢдәҶгҒ«гҒҷгӮӢ'}
            </button>`:''}
          </div>
        </div>
        ${isDone&&doneInfo.by?`<div style="font-size:11px;color:var(--mid)">вң… ${doneInfo.by} В· ${doneInfo.at}</div>`:''}
        ${task.note?`<div style="font-size:12px;color:var(--mid);margin-top:4px;background:#f9f9f9;padding:6px 10px;border-radius:var(--rs)">рҹ“қ ${task.note}</div>`:''}
      </div>`;
    }).join('')}

    ${isOwner()||isTaskAdmin()?`<button class="fab" onclick="showAddMonthlyModal()">пјӢ</button>`:''}
  </div>`;
}

function toggleMonthlyDone(taskId){
  const done = DB.getMonthlyDone();
  if(done[taskId]){
    delete done[taskId];
  } else {
    done[taskId] = {by:S.user?.name, at:nowDateTime()};
    // гғқгӮӨгғігғҲд»ҳдёҺ
    if(S.user) addPoints(S.user.id, 'рҹ“Ҷ жңҲж¬ЎгӮҝгӮ№гӮҜе®ҢдәҶ', 20);
  }
  DB.setMonthlyDone(done);
  render();
}

function saveMonthlyTask(){
  const title = document.getElementById('mt_title').value.trim();
  const cat = document.getElementById('mt_cat').value;
  const assignee = document.getElementById('mt_assign').value;
  const deadline = document.getElementById('mt_deadline').value;
  const store = document.getElementById('mt_store').value;
  const note = document.getElementById('mt_note').value.trim();
  if(!title) return alert('гӮҝгӮ№гӮҜеҗҚгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„');
  const list = DB.getMonthlyTasks();
  list.push({id:genId(), title, cat, assignee, deadline, store, note, createdBy:S.user?.name, createdAt:today()});
  DB.setMonthlyTasks(list);
  closeModal();
  render();
}

function deleteMonthlyTask(id){
  if(!confirm('гҒ“гҒ®гӮҝгӮ№гӮҜгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ')) return;
  DB.setMonthlyTasks(DB.getMonthlyTasks().filter(t=>t.id!==id));
  render();
}

   date:'2026-01-01', author:'shoko'},
];

const TROUBLE_CATS = ['ж–ҪиЎ“','ж©ҹеҷЁ','жҺҘе®ў','иЎӣз”ҹ','гҒқгҒ®д»–'];

// ============================================================
// TROUBLE SHOOTING (гғҲгғ©гғ–гғ«гӮ·гғҘгғјгғҶгӮЈгғігӮ°)
// ============================================================
function renderTrouble(){
  const list = DB.getTroubles();
  const cats = ['е…ЁгҒҰ',...TROUBLE_CATS];
  const catFilter = S.troubleCat||'е…ЁгҒҰ';
  const keyword = S.troubleKeyword||'';
  const filtered = list.filter(t=>{
    const matchCat = catFilter==='е…ЁгҒҰ'||t.cat===catFilter;
    const matchKey = !keyword||(t.title+t.symptom+t.cause+t.solution).includes(keyword);
    return matchCat&&matchKey;
  });

  return`<div class="page">
    <!-- жӨңзҙў -->
    <div style="position:relative;margin-bottom:12px">
      <input class="form-input" placeholder="рҹ”Қ гӮӯгғјгғҜгғјгғүгҒ§жӨңзҙў"
        value="${keyword}" oninput="S.troubleKeyword=this.value;render()">
      ${keyword?`<button onclick="S.troubleKeyword='';render()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;cursor:pointer;color:var(--mid)">вң•</button>`:''}
    </div>

    <!-- гӮ«гғҶгӮҙгғӘ -->
    <div class="tab-row">
      ${cats.map(c=>`<button class="tab ${catFilter===c?'active':''}" onclick="S.troubleCat='${c}';render()">${c}</button>`).join('')}
    </div>

    <!-- д»¶ж•° -->
    <div style="font-size:12px;color:var(--mid);margin-bottom:12px">${filtered.length}д»¶</div>

    <!-- гғӘгӮ№гғҲ -->
    ${filtered.length===0?`<div class="empty-state"><div class="empty-icon">рҹ”§</div><div class="empty-text">и©ІеҪ“гҒҷгӮӢгғҲгғ©гғ–гғ«гҒҢгҒӮгӮҠгҒҫгҒӣгӮ“</div></div>`:''}
    ${filtered.map(t=>`
      <div class="card" style="cursor:pointer;border-left:4px solid var(--warn)" onclick="openTrouble('${t.id}')">
        <div class="flex gap-8 mb-8">
          <span class="badge badge-warn">${t.cat}</span>
          <span style="font-size:12px;color:var(--mid)">${fmtDateFull(t.date)} В· ${t.author}</span>
        </div>
        <div class="fw-bold">${t.title}</div>
        <div style="font-size:12px;color:var(--mid);margin-top:4px">з—ҮзҠ¶: ${t.symptom.slice(0,40)}...</div>
      </div>`).join('')}

    ${isOwner()||isTaskAdmin()?`<button class="fab" onclick="showAddTroubleModal()">пјӢ</button>`:''}
  </div>`;
}

function openTrouble(id){
  const t = DB.getTroubles().find(x=>x.id===id);
  if(!t) return;
  showModal(`
    <div class="flex gap-8 mb-8"><span class="badge badge-warn">${t.cat}</span></div>
    <div class="modal-title">рҹ”§ ${t.title}</div>
    <div style="font-size:12px;color:var(--mid);margin-bottom:14px">${fmtDateFull(t.date)} В· ${t.author}</div>

    <div style="margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:var(--warn);margin-bottom:6px">вҡ пёҸ з—ҮзҠ¶</div>
      <div style="background:#FFF3E0;padding:10px 12px;border-radius:var(--rs);font-size:14px">${t.symptom}</div>
    </div>
    <div style="margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:var(--danger);margin-bottom:6px">рҹ”Қ еҺҹеӣ </div>
      <div style="background:#FFEBEE;padding:10px 12px;border-radius:var(--rs);font-size:13px;line-height:1.9;white-space:pre-wrap">${t.cause}</div>
    </div>
    <div style="margin-bottom:16px">
      <div style="font-size:13px;font-weight:700;color:var(--success);margin-bottom:6px">вң… еҜҫеҮҰжі•</div>
      <div style="background:#E8F5E9;padding:10px 12px;border-radius:var(--rs);font-size:13px;line-height:1.9;white-space:pre-wrap">${t.solution}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${isOwner()||isTaskAdmin()?`<button class="btn btn-danger btn-sm" onclick="deleteTrouble('${t.id}')">рҹ—‘ еүҠйҷӨ</button>`:'<div></div>'}
      <button class="btn btn-outline btn-sm" onclick="closeModal()">й–үгҒҳгӮӢ</button>
    </div>`);
}

function showAddTroubleModal(){
  showModal(`<div class="modal-title">рҹ”§ гғҲгғ©гғ–гғ«гӮ’иҝҪеҠ </div>
    <div class="form-group"><label class="form-label">гӮ«гғҶгӮҙгғӘ</label>
      <select class="form-input" id="tr_cat">${TROUBLE_CATS.map(c=>`<option>${c}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">гӮҝгӮӨгғҲгғ«пјҲе•ҸйЎҢеҗҚпјү</label>
      <input class="form-input" id="tr_title" placeholder="дҫӢпјҡгӮёгӮ§гғ«гҒҢеүҘгҒҢгӮҢгӮ„гҒҷгҒ„"></div>
    <div class="form-group"><label class="form-label">вҡ пёҸ з—ҮзҠ¶</label>
      <textarea class="form-input" id="tr_symptom" rows="2" placeholder="гҒ©гӮ“гҒӘз—ҮзҠ¶гҒҢеҮәгӮӢгҒӢ"></textarea></div>
    <div class="form-group"><label class="form-label">рҹ”Қ еҺҹеӣ </label>
      <textarea class="form-input" id="tr_cause" rows="3" placeholder="иҖғгҒҲгӮүгӮҢгӮӢеҺҹеӣ пјҲж”№иЎҢOKпјү"></textarea></div>
    <div class="form-group"><label class="form-label">вң… еҜҫеҮҰжі•</label>
      <textarea class="form-input" id="tr_solution" rows="4" placeholder="и§Јжұәж–№жі•гғ»жүӢй ҶпјҲж”№иЎҢOKпјү"></textarea></div>
    <button class="btn btn-primary btn-block" onclick="saveTrouble()">дҝқеӯҳгҒҷгӮӢ</button>`);
}

function saveTrouble(){
  const cat = document.getElementById('tr_cat').value;
  const title = document.getElementById('tr_title').value.trim();
  const symptom = document.getElementById('tr_symptom').value.trim();
  const cause = document.getElementById('tr_cause').value.trim();
  const solution = document.getElementById('tr_solution').value.trim();
  if(!title||!solution) return alert('гӮҝгӮӨгғҲгғ«гҒЁеҜҫеҮҰжі•гҒҜеҝ…й ҲгҒ§гҒҷ');
  const list = DB.getTroubles();
  list.unshift({id:genId(),cat,title,symptom,cause,solution,date:today(),author:S.user?.name||''});
  DB.setTroubles(list);
  closeModal();render();
}

function deleteTrouble(id){
  if(!confirm('еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ'))return;
  DB.setTroubles(DB.getTroubles().filter(t=>t.id!==id));
  closeModal();render();
}


function getOccColor(r){return r>=98?'#1565C0':r>=90?'#E91E8C':r>=80?'#FF5722':r>=60?'#FF9800':r>=40?'#FFC107':r>=20?'#4CAF50':'#9E9E9E';}

function renderOccAnalysis(){
  const occStore = S.occStore||'A';
  const allData=getAllOccData(occStore);
  const tab=S.occTab||'calendar';
  const DOW=['ж—Ҙ','жңҲ','зҒ«','ж°ҙ','жңЁ','йҮ‘','еңҹ'];
  const dowStats=Array(7).fill(null).map(()=>({count:0,totalC:0,totalRate:0,totalH:0,totalA:0}));
  Object.entries(allData).forEach(([date,d])=>{
    const dow=new Date(date).getDay();
    dowStats[dow].count++;dowStats[dow].totalC+=d.c||0;
    dowStats[dow].totalRate+=d.r||0;dowStats[dow].totalH+=d.h||0;dowStats[dow].totalA+=d.a||0;
  });
  const monthStats={};
  Object.entries(allData).forEach(([date,d])=>{
    const mk=date.slice(0,7);
    if(!monthStats[mk])monthStats[mk]={count:0,totalC:0,totalRate:0};
    monthStats[mk].count++;monthStats[mk].totalC+=d.c||0;monthStats[mk].totalRate+=d.r||0;
  });
  const viewYear=S.occYear||new Date().getFullYear();
  const viewMonth=S.occMonth!==undefined?S.occMonth:new Date().getMonth()+1;

  return`<div class="page">
    <!-- еә—иҲ—йҒёжҠһ -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <button class="btn ${occStore==='A'?'btn-primary':'btn-ghost'}" onclick="S.occStore='A';render()">рҹҸӘ жөҰе’Ңеә—</button>
      <button class="btn ${occStore==='B'?'':''} ${occStore==='B'?'btn-primary':'btn-ghost'}" style="${occStore==='B'?'':'border-color:#9C27B0;color:#9C27B0'}" onclick="S.occStore='B';render()">рҹҸӘ еәғе°ҫеә—</button>
    </div>
    <div class="tab-row">
      <button class="tab ${tab==='calendar'?'active':''}" onclick="S.occTab='calendar';render()">рҹ“… гӮ«гғ¬гғігғҖгғј</button>
      <button class="tab ${tab==='dow'?'active':''}" onclick="S.occTab='dow';render()">рҹ“Ҡ жӣңж—ҘеҲҘ</button>
      <button class="tab ${tab==='monthly'?'active':''}" onclick="S.occTab='monthly';render()">рҹ“Ҳ жңҲеҲҘ</button>
      <button class="tab ${tab==='shift'?'active':''}" onclick="S.occTab='shift';render()">рҹ‘Ҙ гӮ·гғ•гғҲеҸӮиҖғ</button>
    </div>
    ${tab==='calendar'?renderOccCal(allData,viewYear,viewMonth):''}
    ${tab==='dow'?renderOccDow(dowStats,DOW):''}
    ${tab==='monthly'?renderOccMonth(monthStats):''}
    ${tab==='shift'?renderShiftRef(dowStats,DOW):''}
    ${isOwner()||isTaskAdmin()?`<button class="fab" onclick="go('occInput')">вңҸпёҸ</button>`:''}
  </div>`;
}

function renderOccCal(all,year,month){
  const fd=new Date(year,month-1,1).getDay();
  const ld=new Date(year,month,0).getDate();
  const DOW=['ж—Ҙ','жңҲ','зҒ«','ж°ҙ','жңЁ','йҮ‘','еңҹ'];
  return`<div class="card-row mb-8">
    <button class="btn btn-ghost btn-sm" onclick="S.occMonth=${month===1?12:month-1};if(${month===1})S.occYear=${year-1};render()">в—Җ</button>
    <div class="fw-bold">${year}е№ҙ${month}жңҲ</div>
    <button class="btn btn-ghost btn-sm" onclick="S.occMonth=${month===12?1:month+1};if(${month===12})S.occYear=${year+1};render()">в–¶</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px">
    ${DOW.map((d,i)=>`<div style="text-align:center;font-size:11px;font-weight:700;padding:4px;color:${i===0?'var(--danger)':i===6?'var(--info)':'var(--mid)'}">${d}</div>`).join('')}
    ${Array(fd).fill('<div></div>').join('')}
    ${Array.from({length:ld},(_,i)=>{
      const dt=i+1;
      const dk=year+'-'+String(month).padStart(2,'0')+'-'+String(dt).padStart(2,'0');
      const d=all[dk];
      const isT=dk===today();
      const dow=new Date(year,month-1,dt).getDay();
      return`<div style="text-align:center;padding:4px 2px;border-radius:6px;background:${d?getOccColor(d.r)+'22':'transparent'};border:${isT?'2px solid var(--pink)':'1px solid var(--border)'}">
        <div style="font-size:11px;color:${dow===0?'var(--danger)':dow===6?'var(--info)':'var(--text)'};font-weight:${isT?700:400}">${dt}</div>
        ${d?`<div style="font-size:9px;font-weight:700;color:${getOccColor(d.r)}">${d.r}%</div><div style="font-size:9px;color:var(--mid)">${d.c}дәә</div>`:''}
      </div>`;
    }).join('')}
  </div>
  <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">
    ${[['#1565C0','98%гҖң'],['#E91E8C','90-97%'],['#FF5722','80-89%'],['#FF9800','60-79%'],['#FFC107','40-59%'],['#4CAF50','гҖң39%']].map(([c,l])=>`<div style="display:flex;align-items:center;gap:3px;font-size:10px"><div style="width:10px;height:10px;border-radius:2px;background:${c}"></div>${l}</div>`).join('')}
  </div>
  ${Object.entries(all).filter(([d])=>d.startsWith(year+'-'+String(month).padStart(2,'0'))).sort().map(([date,d])=>`
    <div class="card" style="border-left:4px solid ${getOccColor(d.r)};margin-bottom:6px;padding:10px 12px">
      <div class="card-row">
        <div><span class="fw-bold">${parseInt(date.slice(8))}ж—ҘпјҲ${['ж—Ҙ','жңҲ','зҒ«','ж°ҙ','жңЁ','йҮ‘','еңҹ'][new Date(date).getDay()]}пјү</span>${d.n?`<span class="badge badge-gray" style="font-size:10px;margin-left:6px">${d.n}</span>`:''}</div>
        <span style="font-size:18px;font-weight:800;color:${getOccColor(d.r)}">${d.r}%</span>
      </div>
      <div style="font-size:11px;color:var(--mid);margin-top:4px">рҹ‘Ҙ${d.c}дәә / вҸұ${d.a}hГ·${d.h}h / 6еёӯ${d.r6}%</div>
    </div>`).join('')}`;
}

function renderOccDow(stats,DOW){
  const maxC=Math.max(...stats.map(s=>s.count>0?s.totalC/s.count:0))||1;
  return`<div class="card"><div class="fw-bold mb-12">рҹ“Ҡ жӣңж—ҘеҲҘ е№іеқҮгғҮгғјгӮҝ</div>
  ${stats.map((s,i)=>{
    if(s.count===0)return`<div class="bar-wrap"><div class="bar-label"><span>${DOW[i]}жӣңж—Ҙ</span><span style="color:var(--mid)">гғҮгғјгӮҝгҒӘгҒ—</span></div></div>`;
    const avgC=Math.round(s.totalC/s.count),avgR=Math.round(s.totalRate/s.count);
    const avgH=Math.round(s.totalH/s.count*10)/10,avgA=Math.round(s.totalA/s.count*10)/10;
    return`<div class="bar-wrap">
      <div class="bar-label"><span style="font-weight:700;color:${i===0?'var(--danger)':i===6?'var(--info)':'var(--text)'}">${DOW[i]}жӣңж—Ҙ</span><span><strong>${avgC}дәә</strong> / ${avgR}%</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(avgC/maxC*100)}%;background:${getOccColor(avgR)}"></div></div>
      <div style="font-size:11px;color:var(--mid)">${avgA}hзЁјеғҚ / ${avgH}hеӢӨеӢҷпјҲ${s.count}ж—Ҙпјү</div>
    </div>`;
  }).join('')}</div>`;
}

function renderOccMonth(stats){
  return`<div class="card"><div class="fw-bold mb-12">рҹ“Ҳ жңҲеҲҘ е№іеқҮзЁјеғҚзҺҮ</div>
  ${Object.keys(stats).sort().map(m=>{
    const s=stats[m],avgR=Math.round(s.totalRate/s.count),avgC=Math.round(s.totalC/s.count);
    return`<div class="bar-wrap">
      <div class="bar-label"><span class="fw-bold">${m}</span><span style="color:${getOccColor(avgR)};font-weight:700">${avgR}%</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${avgR}%;background:${getOccColor(avgR)}"></div></div>
      <div style="font-size:11px;color:var(--mid)">е№іеқҮжқҘе®ў${avgC}дәә / ${s.count}ж—Ҙй–“</div>
    </div>`;
  }).join('')}</div>`;
}

function renderShiftRef(stats,DOW){
  return`<div class="card"><div class="fw-bold mb-12">рҹ‘Ҙ гӮ·гғ•гғҲдҪңжҲҗеҸӮиҖғ</div>
  <div style="font-size:12px;color:var(--mid);margin-bottom:10px">йҒҺеҺ»е®ҹзёҫгҒӢгӮүз®—еҮәгҒ—гҒҹжӣңж—ҘеҲҘгҒ®зӣ®е®үгҒ§гҒҷ</div>
  ${stats.map((s,i)=>{
    if(s.count===0)return'';
    const avgC=Math.round(s.totalC/s.count),avgR=Math.round(s.totalRate/s.count);
    const avgH=Math.round(s.totalH/s.count*10)/10,avgA=Math.round(s.totalA/s.count*10)/10;
    const nFull=Math.ceil(avgA/9),nPT=Math.max(0,Math.round((avgH-nFull*9)/5));
    return`<div style="padding:10px;border-radius:var(--rs);background:${getOccColor(avgR)}15;border-left:4px solid ${getOccColor(avgR)};margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-weight:700;font-size:15px;color:${i===0?'var(--danger)':i===6?'var(--info)':'var(--text)'}">${DOW[i]}жӣңж—Ҙ</span>
        <span style="background:${getOccColor(avgR)};color:#fff;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700">${avgR}%</span>
      </div>

function renderOccInput(){
  const date = S.occInputDate||today();

  const allB = getAllOccData('B');

  const exB = allB[date]||{};

  // еҗҢжӣңж—ҘгҒ®йҒҺеҺ»е№іеқҮ

  const avgC = same.length>0?Math.round(same.reduce((a,[,v])=>a+(v.c||0),0)/same.length):0;

          <button class="btn ${store==='B'?'btn-primary':'btn-ghost'}" onclick="S.occInputStore='B';render()">еәғе°ҫеә—</button>

    <div class="card" style="background:${store==='A'?'var(--pink-l)':'#F3E5F5'};border:1.5px solid ${store==='A'?'var(--pink)':'#9C27B0'};margin-bottom:12px">
      <div class="fw-bold mb-6">рҹ“Ҡ ${store==='A'?'жөҰе’Ңеә—':'еәғе°ҫеә—'} ${dow}жӣңж—ҘгҒ®йҒҺеҺ»е№іеқҮпјҲ${same.length}ж—Ҙй–“пјү</div>
      ${same.length>0?`<div style="display:flex;gap:16px;font-size:13px">
        <span>рҹ‘Ҙ е№іеқҮ: <strong>${avgC}дәә</strong></span>
        <span>рҹ“Ҡ зЁјеғҚзҺҮ: <strong style="color:${getOccColor(avgR)}">${avgR}%</strong></span>
      </div>`:`<div style="font-size:12px;color:var(--mid)">гҒҫгҒ гғҮгғјгӮҝгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“</div>`}
    </div>

    <!-- е…ҘеҠӣгғ•гӮ©гғјгғ  -->
    <div class="card">
      <div class="fw-bold mb-12">${store==='A'?'рҹҸӘ жөҰе’Ңеә—':'рҹҸӘ еәғе°ҫеә—'} - ${date}</div>
      <div class="form-group">
        <label class="form-label">рҹ‘Ҙ жқҘеә—иҖ…ж•°</label>

        зЁјеғҚзҺҮ = е®ҹзЁјеғҚжҷӮй–“ Г· еӢӨеӢҷжҷӮй–“ Г— 100 пјҸ ${seats}еёӯзЁјеғҚзҺҮ = е®ҹзЁјеғҚжҷӮй–“ Г· (${seats}еёӯГ—8h) Г— 100
      </div>
    </div>

    <!-- д»Ҡж—ҘгҒ®дёЎеә—гӮөгғһгғӘгғј -->
    ${exA.h||exB.h?`<div class="card" style="margin-top:8px">
      <div class="fw-bold mb-8">рҹ“Ҡ ${date} дёЎеә—гӮөгғһгғӘгғј</div>
      ${exA.h?`<div class="att-item"><span class="store-badge store-a">жөҰе’Ңеә—</span><div style="font-size:13px">рҹ‘Ҙ${exA.c}дәә / <strong style="color:${getOccColor(exA.r)}">${exA.r}%</strong> / ${exA.a}hГ·${exA.h}h</div></div>`:''}
      ${exB.h?`<div class="att-item"><span class="store-badge store-b">еәғе°ҫеә—</span><div style="font-size:13px">рҹ‘Ҙ${exB.c}дәә / <strong style="color:${getOccColor(exB.r)}">${exB.r}%</strong> / ${exB.a}hГ·${exB.h}h</div></div>`:''}
    </div>`:''}

function saveOccRecord(store){
  store = store || S.occInputStore || 'A';
  const date = document.getElementById('occ_date').value;
  const c = parseInt(document.getElementById('occ_c').value)||0;
  const s = document.getElementById('occ_s')?.value.trim()||'';
  const h = parseFloat(document.getElementById('occ_h').value)||0;
  const a = parseFloat(document.getElementById('occ_a').value)||0;
  const n = document.getElementById('occ_n').value.trim();
  if(!h) return alert('еӢӨеӢҷжҷӮй–“гӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„');
  const seats = store==='A'?6:3;
  const r = Math.round(a/h*100);
  const r6 = Math.round(a/(seats*8)*100);
  DB.setOccRecord(store, date, {c,s,h,a,r,r6,n,store});
  alert('вң… дҝқеӯҳгҒ—гҒҫгҒ—гҒҹпјҒ\n'+(store==='A'?'жөҰе’Ңеә—':'еәғе°ҫеә—')+'\nзЁјеғҚзҺҮ: '+r+'% / '+seats+'еёӯзЁјеғҚзҺҮ: '+r6+'%');
  go('occAnalysis');
}

      <div style="font-size:12px;color:var(--danger);margin-top:4px">гҒҷгҒҗгҒ«зўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„</div>

      <button class="tab ${filter==='all'?'active':''}" onclick="S.reportFilter='all';render()">е…ЁгҒҰпјҲ${reports.length}пјү</button>

  const title = document.getElementById('rp_title').value.trim();

  const customerInfo = document.getElementById('rp_cust').value.trim();
  if(!title||!body) return alert('д»¶еҗҚгҒЁи©ізҙ°гӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„');
  const reports = DB.getReports();
  reports.unshift({
    id:genId(), level, cat, store, title, body, customerInfo,
    status:'жңӘеҜҫеҝң',
    reporterName: S.user?.name||'',
    reporterId: S.user?.id||'',
    createdAt: nowDateTime(),
    action:''
  });
  DB.setReports(reports);
  closeModal();

  render();
}

function updateReportStatus(id, status){
  const reports = DB.getReports();
  const idx = reports.findIndex(r=>r.id===id);
  if(idx>=0){ reports[idx].status=status; DB.setReports(reports); }
  closeModal();
  setTimeout(()=>openReport(id),100);
}

function saveReportAction(id){
  const action = document.getElementById('action_'+id)?.value||'';
  const reports = DB.getReports();
  const idx = reports.findIndex(r=>r.id===id);
  if(idx>=0){ reports[idx].action=action; DB.setReports(reports); }
  alert('вң… еҜҫеҝңеҶ…е®№гӮ’дҝқеӯҳгҒ—гҒҫгҒ—гҒҹ');
  closeModal();
}

function deleteReport(id){
  if(!confirm('гҒ“гҒ®е ұе‘ҠгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ'))return;
  DB.setReports(DB.getReports().filter(r=>r.id!==id));
  closeModal();render();
}


function replyToAbsence(id){
  const input = document.getElementById('reply_'+id);
  if(!input||!input.value.trim()) return;
  const text = input.value.trim();
  const list = DB.getAbsences();
  const idx = list.findIndex(a=>a.id===id);
  if(idx>=0){
    if(!list[idx].replies) list[idx].replies=[];
    list[idx].replies.push({
      name:S.user?.name||'',
      text, isOwner:isOwner(),
      time:nowTime()
    });
    DB.set('absences',list);
    input.value='';
    render();
  }
}

function insertEmoji(emoji){
  const input = document.getElementById('chatInput');
  if(!input) return;
  const pos = input.selectionStart||input.value.length;
  input.value = input.value.slice(0,pos)+emoji+input.value.slice(pos);
  input.focus();
}

function checkMention(input, room){
  const val = input.value;
  const atIdx = val.lastIndexOf('@');
  const suggest = document.getElementById('mentionSuggest');
  if(!suggest) return;
  if(atIdx>=0 && atIdx===val.length-1||atIdx>=0&&!val.slice(atIdx+1).includes(' ')){
    const query = val.slice(atIdx+1).toLowerCase();
    const matches = STAFF_LIST.filter(s=>s.name.toLowerCase().includes(query)).slice(0,5);
    if(matches.length){
      suggest.style.display='block';
      suggest.innerHTML = matches.map(s=>`<div onclick="applyMention('${s.name}')" style="padding:8px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid #f0f0f0">${DB.getUserIcons()[s.id]||getRank(DB.getPoints()[s.id]||0).char} ${s.name}</div>`).join('');
      return;
    }
  }
  suggest.style.display='none';
}

function applyMention(name){
  const input = document.getElementById('chatInput');
  if(!input) return;
  const val = input.value;
  const atIdx = val.lastIndexOf('@');
  if(atIdx>=0) input.value = val.slice(0,atIdx)+'@'+name+' ';
  const suggest = document.getElementById('mentionSuggest');
  if(suggest) suggest.style.display='none';
  input.focus();
}

function toggleDayStaff(store, year, month, date, staffName){
  const sched = DB.getShiftSchedule(store, parseInt(year), parseInt(month));
  if(!sched[date]) sched[date]=[];
  const idx = sched[date].indexOf(staffName);
  if(idx>=0) sched[date].splice(idx,1);
  else sched[date].push(staffName);
  DB.setShiftSchedule(store, parseInt(year), parseInt(month), sched);
  render();
}

function showApprovalModal(store, year, month){
  const reqs = DB.getShiftRequests().filter(function(r){return r.year===parseInt(year)&&r.month===parseInt(month)&&(r.offDays||[]).length>0;});
  const approvedOff = DB.getApprovedOff(store, parseInt(year), parseInt(month));
  const DOW = ['ж—Ҙ','жңҲ','зҒ«','ж°ҙ','жңЁ','йҮ‘','еңҹ'];
  let html = '<div class="modal-title">рҹ“Ӣ еёҢжңӣдј‘гҒ®жүҝиӘҚ</div>';
  if(!reqs.length){ html += '<div style="color:var(--mid)">еёҢжңӣдј‘гҒ®жҸҗеҮәгҒҜгҒӮгӮҠгҒҫгҒӣгӮ“</div>'; }
  reqs.forEach(function(req){
    const s=STAFF_LIST.find(function(x){return x.id===req.staffId;});
    if(!s) return;
    const appr = approvedOff[req.staffId]||[];
    html += '<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)">';
    html += '<div class="fw-bold mb-6">'+s.name+'</div><div style="display:flex;flex-wrap:wrap;gap:4px">';
    (req.offDays||[]).forEach(function(dk){
      const d=parseInt(dk.slice(8)); const dow=DOW[new Date(dk).getDay()]; const isA=appr.includes(dk);
      html += '<button onclick="toggleApproveOff(\''+store+'\','+year+','+month+',\''+req.staffId+'\',\''+dk+'\')" ';
      html += 'style="padding:5px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid '+(isA?'var(--success)':'var(--border)')+';background:'+(isA?'#E8F5E9':'#fff')+';color:'+(isA?'var(--success)':'var(--mid)')+';">';
      html += (isA?'вң… ':'')+d+'ж—ҘпјҲ'+dow+'пјү</button>';
    });
    html += '</div></div>';
  });
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">';
  html += '<button class="btn btn-primary btn-sm" onclick="applyApprovedToCalendar(\''+store+'\','+year+','+month+');closeModal()">вң… гӮ«гғ¬гғігғҖгғјгҒ«еҸҚжҳ </button>';
  html += '<button class="btn btn-outline btn-sm" onclick="closeModal()">й–үгҒҳгӮӢ</button></div>';
  showModal(html);
}

  if(!file) return;
  // 5MBеҲ¶йҷҗ
  if(file.size > 5 * 1024 * 1024){ alert('з”»еғҸгҒҢеӨ§гҒҚгҒҷгҒҺгҒҫгҒҷпјҲ5MBд»ҘдёӢгҒ«гҒ—гҒҰгҒҸгҒ гҒ•гҒ„пјү'); return; }
  const reader = new FileReader();
  reader.onload = function(e){
    const dataUrl = e.target.result;
    // FirebaseгҒ«дҝқеӯҳпјҲе…Ёе“ЎгҒ«еҸҚжҳ пјү
    DB.set('appLogo', dataUrl);
    // localStorageгҒ«гӮӮгӮӯгғЈгғғгӮ·гғҘ
    try{ localStorage.setItem('blancher_logo', dataUrl); }catch(err){}
    alert('вң… гғӯгӮҙгӮ’иЁӯе®ҡгҒ—гҒҫгҒ—гҒҹпјҒе…ЁгӮ№гӮҝгғғгғ•гҒ«еҸҚжҳ гҒ•гӮҢгҒҫгҒҷгҖӮ');
    render();
  };
  reader.readAsDataURL(file);
}

function removeLogo(){
  if(!confirm('гғӯгӮҙгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹе…ЁгӮ№гӮҝгғғгғ•гҒӢгӮүеүҠйҷӨгҒ•гӮҢгҒҫгҒҷгҖӮ')) return;
  DB.set('appLogo', null);
  try{ localStorage.removeItem('blancher_logo'); }catch(err){}
  render();
}

function applyLogo(){
  const firebaseLogo = DB.get('appLogo');
  const cachedLogo = localStorage.getItem('blancher_logo');
  const logo = firebaseLogo || cachedLogo || '';

  // FirebaseгҒӢгӮүгғӯгӮҙгӮ’еҸ–еҫ—гҒ§гҒҚгҒҹгӮүlocalStorageгҒ«гӮӮгӮӯгғЈгғғгӮ·гғҘпјҲж¬ЎеӣһеҚіиЎЁзӨәгҒ®гҒҹгӮҒпјү
  if(firebaseLogo && firebaseLogo !== cachedLogo){
    try{ localStorage.setItem('blancher_logo', firebaseLogo); }catch(e){}
  }
  // FirebaseгҒ§гғӯгӮҙгҒҢеүҠйҷӨгҒ•гӮҢгҒҹе ҙеҗҲгҒҜlocalStorageгӮӮеүҠйҷӨ
  if(firebaseLogo === null && cachedLogo){
    try{ localStorage.removeItem('blancher_logo'); }catch(e){}
  }

  const img = document.getElementById('brand-logo');
  const loadingImg = document.getElementById('loading-logo');
  const loadingEmoji = document.getElementById('loading-emoji');
  if(logo){
    if(img){ img.src = logo; img.style.display = 'block'; }
    if(loadingImg){ loadingImg.src = logo; loadingImg.style.display = 'block'; }
    if(loadingEmoji) loadingEmoji.style.display = 'none';
    const favicon = document.getElementById('favicon');
    const touchIcon = document.getElementById('apple-touch-icon');
    if(favicon) favicon.href = logo;
    if(touchIcon) touchIcon.href = logo;
  } else {
    if(img){ img.src = ''; img.style.display = 'none'; }
    if(loadingImg){ loadingImg.src = ''; loadingImg.style.display = 'none'; }
    if(loadingEmoji) loadingEmoji.style.display = 'block';
    const favicon = document.getElementById('favicon');
    const touchIcon = document.getElementById('apple-touch-icon');
    if(favicon) favicon.href = '';
    if(touchIcon) touchIcon.href = '';
  }
}

function sendChat(room){
  const input = document.getElementById('chatInput');
  if(!input) return;
  const text = input.value.trim();
  if(!text) return;
  const d = new Date();
  const time = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const msg = {
    id:genId(), text, room,
    senderId: S.user?.id||'',
    senderName: S.user?.name||'',
    time
  };
  // еј•з”Ёиҝ”дҝЎ
  if(window._replyTo && window._replyTo.room===room){
    msg.replyTo = {
      fbKey: window._replyTo.fbKey,
      senderName: window._replyTo.senderName,
      text: decodeURIComponent(window._replyTo.text)
    };
    window._replyTo = null;
  }
  // @гғЎгғігӮ·гғ§гғійҖҡзҹҘ
  const mentions = (text.match(/@(\S+)/g)||[]).map(m=>m.slice(1));
  if(mentions.length && window._fbDB){
    const mentioned = STAFF_LIST.filter(s=>mentions.includes(s.name));
    mentioned.forEach(s=>{
      if(s.id===S.user?.id) return;
      const msgs2 = DB.getMessages()||[];
      msgs2.unshift({id:genId(),title:'рҹ’¬ @гғЎгғігӮ·гғ§гғі: '+S.user?.name+'гҒ•гӮ“гҒӢгӮүгғЎгғғгӮ»гғјгӮё',
        body:text,from:S.user?.id,fromName:S.user?.name,
        to:'individual',toId:s.id,toName:s.name,
        date:today(),readBy:[],progress:{[s.id]:'жңӘеҜҫеҝң'}});
      DB.set('messages', msgs2);
    });
  }
  DB.addChat(room, msg);
  input.value='';
  window._showEmojiPanel = null;
  render();
  setTimeout(()=>{ const b=document.getElementById('chatBox'); if(b) b.scrollTop=b.scrollHeight; },80);
}

function toggleReaction(room, fbKey, emoji){
  if(!fbKey || !window._fbDB) return;
  const userId = S.user?.id;
  if(!userId) return;
  const ref = window._fbDB.ref(window._reactionsBasePath+'/'+room+'/'+fbKey+'/'+userId);
  const current = ((window._fbReactions[room]||{})[fbKey]||{})[userId];
  if(current === emoji){
    ref.remove(); // еҗҢгҒҳгғӘгӮўгӮҜгӮ·гғ§гғігҒҜеҸ–гӮҠж¶ҲгҒ—
  } else {
    ref.set(emoji);
  }
}

function showReactionPicker(room, fbKey){
  const REACT_EMOJIS = ['вң…','рҹ‘Қ','вқӨпёҸ','рҹҳҠ','рҹ‘Җ'];
  const labels = {'вң…':'зўәиӘҚ','рҹ‘Қ':'гҒ„гҒ„гҒӯ','вқӨпёҸ':'гғҸгғјгғҲ','рҹҳҠ':'з¬‘йЎ”','рҹ‘Җ':'иҰӢгҒҹгӮҲ'};
  // гӮ°гғӯгғјгғҗгғ«гҒ«room/fbKeyгӮ’дҝқеӯҳгҒ—гҒҰгӮӨгғігғҮгғғгӮҜгӮ№зөҢз”ұгҒ§е‘јгҒ¶
  window._reactRoom = room;
  window._reactFbKey = fbKey;
  window._reactEmojis = REACT_EMOJIS;
  const current = ((window._fbReactions[room]||{})[fbKey]||{})[S.user?.id] || '';
  let html = '<div class="modal-title">гғӘгӮўгӮҜгӮ·гғ§гғі</div>';
  html += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px">';
  REACT_EMOJIS.forEach(function(e, idx){
    const active = current === e;
    html += '<button onclick="doReact('+idx+')" style="padding:10px 4px;border-radius:12px;border:2px solid '+(active?'var(--pink)':'#eee')+';background:'+(active?'var(--pink-l)':'#fff')+';cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px">';
    html += '<span style="font-size:24px">'+e+'</span>';
    html += '<span style="font-size:10px;color:#888">'+labels[e]+'</span>';
    html += '</button>';
  });
  html += '</div>';
  html += '<button class="btn btn-ghost btn-sm btn-block" style="margin-top:12px" onclick="closeModal()">гӮӯгғЈгғігӮ»гғ«</button>';
  showModal(html);
}

function doReact(idx){
  const room = window._reactRoom;
  const fbKey = window._reactFbKey;
  const emoji = (window._reactEmojis||[])[idx];
  if(!emoji) return;
  toggleReaction(room, fbKey, emoji);
  closeModal();
}

function doReactDirect(btn, idx){
  if(!btn) return;
  const room = btn.closest('[data-rroom]')?.dataset?.rroom || btn.dataset?.rroom;
  const fbKey = btn.closest('[data-rfbkey]')?.dataset?.rfbkey || btn.dataset?.rfbkey;
  if(!room||!fbKey) return;
  const REACT_EMOJIS = ['вң…','рҹ‘Қ','вқӨпёҸ','рҹҳҠ','рҹ‘Җ'];
  toggleReaction(room, fbKey, REACT_EMOJIS[idx]);
}
function doReactDirectOld(room, fbKey, idx){
  const REACT_EMOJIS = ['вң…','рҹ‘Қ','вқӨпёҸ','рҹҳҠ','рҹ‘Җ'];
  const emoji = REACT_EMOJIS[idx];
  if(!emoji) return;
  toggleReaction(room, fbKey, emoji);
}

function deleteChatMsg(room, fbKey){
  if(!fbKey){ alert('еүҠйҷӨгҒ§гҒҚгҒҫгҒӣгӮ“'); return; }
  if(!confirm('гҒ“гҒ®гғЎгғғгӮ»гғјгӮёгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ')) return;
  if(window._fbDB){
    window._fbDB.ref(window._chatsBasePath+'/'+room+'/'+fbKey).remove();
  } else {
    // localStorageгғ•гӮ©гғјгғ«гғҗгғғгӮҜ
    try{
      var list = JSON.parse(localStorage.getItem('chat_'+room))||[];
      list = list.filter(function(m){ return m._fbKey !== fbKey; });
      localStorage.setItem('chat_'+room, JSON.stringify(list));

function sendChatPhoto(room, input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 5*1024*1024){ alert('5MBд»ҘдёӢгҒ®з”»еғҸгӮ’йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„'); return; }
  const reader = new FileReader();
  reader.onload = function(e){
    const d = new Date();
    const time = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

    });

  input.value = '';

function cancelMessage(id){
  if(!confirm('гҒ“гҒ®гғЎгғғгӮ»гғјгӮёгӮ’еҸ–гӮҠж¶ҲгҒ—гҒҫгҒҷгҒӢпјҹ\nеҸ—дҝЎиҖ…гҒ«гҒҜгҖҢеҸ–гӮҠж¶ҲгҒ—жёҲгҒҝгҖҚгҒЁиЎЁзӨәгҒ•гӮҢгҒҫгҒҷгҖӮ')) return;
  const msgs = DB.getMessages();
  const idx = msgs.findIndex(m => m.id === id);
  if(idx === -1) return;
  msgs[idx].cancelled = true;
  DB.set('messages', msgs);
  closeModal();
  render();
}

function sendDoubleCheckRequest(store, year, month){
  // еҜҫиұЎеә—иҲ—гҒ®жҘӯеӢҷе§”иЁ—гӮ№гӮҝгғғгғ•гӮ’еҸ–еҫ—
  const contractors = STAFF_LIST.filter(s => s.contractor && (s.store === store || s.store === 'both'));
  if(contractors.length === 0){
    alert('гҒ“гҒ®еә—иҲ—гҒ«жҘӯеӢҷе§”иЁ—гӮ№гӮҝгғғгғ•гҒҢгҒ„гҒҫгҒӣгӮ“');
    return;
  }

    to:'individual',
    toId: owners.length===1?owners[0].id:'',

  // гӮӘгғјгғҠгғјгҒҢиӨҮж•°гҒ®е ҙеҗҲгҒҜеҖӢеҲҘйҖҒдҝЎ

function autoGenShift(store, year, month){
  if(!confirm('зЁјеғҚзҺҮгҒЁеёҢжңӣдј‘гӮ’е…ғгҒ«иҮӘеӢ•гҒ§гӮ·гғ•гғҲгӮ’з”ҹжҲҗгҒ—гҒҫгҒҷгҖӮ\nзҸҫеңЁгҒ®гӮ·гғ•гғҲгҒҜдёҠжӣёгҒҚгҒ•гӮҢгҒҫгҒҷгҖӮгӮҲгӮҚгҒ—гҒ„гҒ§гҒҷгҒӢпјҹ')) return;

  const staff = STAFF_LIST.filter(s=>s.treat&&(s.store===store||s.store==='both')&&!s.noSales);
  const reqs = DB.getShiftRequests().filter(r=>r.year===year&&r.month===month);
  const apprv = DB.getApprovedOff(store,year,month);
  const allOcc = getAllOccData(store);
  const last = new Date(year,month,0).getDate();
  const DOW = ['ж—Ҙ','жңҲ','зҒ«','ж°ҙ','жңЁ','йҮ‘','еңҹ'];
  const newSched = {};

  // жӣңж—ҘеҲҘгҒ®е№іеқҮзЁјеғҚзҺҮгғ»жҺЁеҘЁдәәж•°гӮ’иЁҲз®—
  const dowStats = Array(7).fill(null).map(()=>({count:0,totalR:0}));
  Object.entries(allOcc).forEach(([date,d])=>{
    const dow = new Date(date).getDay();
    dowStats[dow].count++;
    dowStats[dow].totalR += d.r||0;
  });

  const seats = store==='A'?6:3;

  for(let d=1;d<=last;d++){
    const dk = year+'-'+String(month).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dow = new Date(year,month-1,d).getDay();
    const stat = dowStats[dow];
    const avgR = stat.count>0 ? Math.round(stat.totalR/stat.count) : 70;

    // еҝ…иҰҒгӮ№гӮҝгғғгғ•ж•°гӮ’зЁјеғҚзҺҮгҒӢгӮүз®—еҮә
    const neededStaff = Math.max(1, Math.min(seats, Math.ceil(avgR/100*seats)));

    // дј‘гҒҝеёҢжңӣгғ»жүҝиӘҚжёҲгӮ’йҷӨгҒ„гҒҹеҲ©з”ЁеҸҜиғҪгҒӘгӮ№гӮҝгғғгғ•
    const available = staff.filter(s=>{
      const req = reqs.find(r=>r.staffId===s.id);
      const reqOff = req&&(req.offDays||[]).includes(dk);
      const apprvOff = (apprv[s.id]||[]).includes(dk);
      return !reqOff && !apprvOff;
    });

    // жҘӯеӢҷе§”иЁ—пјҲcontractorпјүгҒҜжңҖеҫҢгҒ«
    const regular = available.filter(s=>!s.contractor);
    const contractors = available.filter(s=>s.contractor);
    const sorted = [...regular, ...contractors];

    // еҝ…иҰҒдәәж•°еҲҶгҒ®гӮ№гӮҝгғғгғ•гӮ’еүІгӮҠеҪ“гҒҰ
    newSched[dk] = sorted.slice(0,neededStaff).map(s=>s.name);
  }

  DB.setShiftSchedule(store, year, month, newSched);

  // зөҗжһңгӮөгғһгғӘгғјгӮ’иЎЁзӨә
  const totalDays = Object.keys(newSched).length;
  const avgStaff = Math.round(Object.values(newSched).reduce((a,v)=>a+v.length,0)/totalDays*10)/10;
  alert('вң… гӮ·гғ•гғҲгӮ’иҮӘеӢ•з”ҹжҲҗгҒ—гҒҫгҒ—гҒҹпјҒ\n\n'
    +'жңҹй–“: '+year+'е№ҙ'+month+'жңҲпјҲе…Ё'+totalDays+'ж—Ҙпјү\n'
    +'е№іеқҮеҮәеӢӨдәәж•°: '+avgStaff+'еҗҚ/ж—Ҙ\n\n'
    +'еҶ…е®№гӮ’зўәиӘҚгҒ—гҒҰиӘҝж•ҙгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ');
  render();
}

function shiftToggle(store,year,month,date,name){

  if(!sched[date]) sched[date]=[];

  DB.setShiftSchedule(store,year,month,sched);
  shiftDayTap(store,year,month,date);

function saveEditDesign(id){
  const title = document.getElementById('ed_title')?.value.trim();
  const cat = document.getElementById('ed_cat')?.value;
  const menuCat = document.getElementById('ed_menucat')?.value;
  const store = document.getElementById('ed_store')?.value||'both';
  const tags = document.getElementById('ed_tags')?.value.trim();
  const body = document.getElementById('ed_body')?.value.trim();
  const notify = document.getElementById('ed_notify')?.checked;
  if(!title) return alert('гӮҝгӮӨгғҲгғ«гӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„');

  const list = DB.getDesigns();
  const idx = list.findIndex(d=>d.id===id);
  if(idx<0) return;

  list[idx] = {
    ...list[idx], title, cat, menuCat, store, tags, body,
    updatedAt: today(),
    updatedBy: S.user?.name,
    // жӣҙж–°гҒҢгҒӮгҒЈгҒҹе ҙеҗҲгҖҒзҝ’еҫ—зҠ¶ж…ӢгӮ’гғӘгӮ»гғғгғҲпјҲжңӘзўәиӘҚгҒ«пјү
    progress: notify ? Object.fromEntries(
      Object.keys(list[idx].progress||{}).map(uid=>[uid, 'жңӘзўәиӘҚ'])
    ) : list[idx].progress
  };
  DB.set('designs', list);

  // йҖҡзҹҘгғЎгғғгӮ»гғјгӮёйҖҒдҝЎ
  if(notify){
    const msgs = DB.getMessages()||[];
    const targets = (list[idx].targetStaffIds
      ? STAFF_LIST.filter(s=>list[idx].targetStaffIds.includes(s.id))
      : STAFF_LIST.filter(s=>s.treat)
    ).filter(s=>s.id!==S.user?.id);

    targets.forEach(s=>{
      msgs.unshift({
        id:genId(),
        title:`рҹ”„гҖҗгғҮгӮ¶гӮӨгғіжӣҙж–°гҖ‘${title}`,
        body:`${S.user?.name}гҒҢгғҮгӮ¶гӮӨгғігӮ’жӣҙж–°гҒ—гҒҫгҒ—гҒҹгҖӮ\nеҶ…е®№гӮ’зўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ`,
        from:S.user?.id, fromName:S.user?.name,
        to:'individual', toId:s.id, toName:s.name,
        date:today(), readBy:[], progress:{[s.id]:'жңӘеҜҫеҝң'}
      });
    });
    if(targets.length>0) DB.set('messages', msgs);
  }
  closeModal();
  alert('вң… жӣҙж–°гҒ—гҒҫгҒ—гҒҹпјҒ'+(notify?`\n${(list[idx].targetStaffIds?.length||STAFF_LIST.filter(s=>s.treat).length)}еҗҚгҒ«йҖҡзҹҘгӮ’йҖҒгӮҠгҒҫгҒ—гҒҹгҖӮ`:''));
  render();
}

function getDesignCats(){
  const saved = DB.get('designCatsCustom');
  if(saved&&Array.isArray(saved)&&saved.length>0) return saved;
  return DESIGN_CATS;
}
function getDesignMenuCats(){
  const saved = DB.get('designMenuCatsCustom');
  if(saved&&Array.isArray(saved)&&saved.length>0) return saved;
  return DESIGN_MENU_CATS;
}

function addDesignCat(){

  const cats = getDesignCats();
  if(cats.includes(val)){ alert('гҒҷгҒ§гҒ«еӯҳеңЁгҒ—гҒҫгҒҷ'); return; }
  cats.push(val);
  DB.set('designCatsCustom', cats);
  closeModal(); showDesignCatManager();
}

function showModal(content){
  const existing=document.getElementById('modalOverlay');
  if(existing) existing.remove();
  const el=document.createElement('div');
  el.className='modal-overlay';
  el.id='modalOverlay';
  el.innerHTML=`<div class="modal-sheet">
    <div class="modal-handle"></div>
    ${content}
  </div>`;
  el.addEventListener('click',e=>{if(e.target===el)closeModal();});
  document.body.appendChild(el);
  // гғўгғјгғҖгғ«еҶ…гҒ®з”»еғҸгҒ«гӮӮгӮҝгғғгғ—жӢЎеӨ§гӮ’йҒ©з”Ё
  setTimeout(function(){
    el.querySelectorAll('img:not([data-no-expand])').forEach(function(img){
      if(img.dataset.expandBound) return;
      img.dataset.expandBound='1';
      img.style.cursor='zoom-in';
      img.addEventListener('click',function(e){
        e.stopPropagation();
        if(!img.src||img.src===window.location.href) return;
        // гғўгғјгғҖгғ«гӮ’й–үгҒҳгҒҡгҒ«е…Ёз”»йқўиЎЁзӨә
        const overlay=document.createElement('div');
        overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:99999;display:flex;align-items:center;justify-content:center;cursor:pointer';
        overlay.onclick=function(){document.body.removeChild(overlay);};
        const pic=document.createElement('img');
        pic.src=img.src;
        pic.style.cssText='max-width:100%;max-height:90vh;border-radius:8px;object-fit:contain';
        const closeBtn=document.createElement('button');
        closeBtn.innerHTML='Г—';
        closeBtn.style.cssText='position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:28px;width:44px;height:44px;border-radius:50%;cursor:pointer';
        closeBtn.onclick=function(e){e.stopPropagation();document.body.removeChild(overlay);};
        overlay.appendChild(pic);
        overlay.appendChild(closeBtn);
        document.body.appendChild(overlay);
      });
    });
  },100);
}

function closeModal(){
  const el=document.getElementById('modalOverlay');
  if(el) el.remove();
}

      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">📅 日付</label>
        <input type="date" class="form-input" id="occ_date" value="${date}" onchange="S.occInputDate=this.value;render()">
      </div>
    </div>

    <!-- 過去平均（参考） -->
    <div class="card" style="background:${store==='A'?'var(--pink-l)':'#F3E5F5'};border:1.5px solid ${store==='A'?'var(--pink)':'#9C27B0'};margin-bottom:12px">
      <div class="fw-bold mb-6">📊 ${store==='A'?'浦和店':'広尾店'} ${dow}曜日の過去平均（${same.length}日間）</div>
      ${same.length>0?`<div style="display:flex;gap:16px;font-size:13px">
        <span>👥 平均: <strong>${avgC}人</strong></span>
        <span>📊 稼働率: <strong style="color:${getOccColor(avgR)}">${avgR}%</strong></span>
      </div>`:`<div style="font-size:12px;color:var(--mid)">まだデータがありません</div>`}
    </div>

    <!-- 入力フォーム -->
    <div class="card">
      <div class="fw-bold mb-12">${store==='A'?'🏪 浦和店':'🏪 広尾店'} - ${date}</div>
      <div class="form-group">
        <label class="form-label">👥 来店者数</label>
        <input type="number" class="form-input" id="occ_c" value="${ex.c||''}" placeholder="例：15">
      </div>
      <div class="form-group">
        <label class="form-label">👤 スタッフ編成</label>
        <input class="form-input" id="occ_s" value="${ex.s||''}" placeholder="例：フル3時短2">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group">
          <label class="form-label">⏱ 勤務時間（h）</label>
          <input type="number" class="form-input" id="occ_h" value="${ex.h||''}" placeholder="例：32" step="0.5">
        </div>
        <div class="form-group">
          <label class="form-label">⏱ 実稼働時間（h）</label>
          <input type="number" class="form-input" id="occ_a" value="${ex.a||''}" placeholder="例：25.5" step="0.5">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">📝 備考</label>
        <input class="form-input" id="occ_n" value="${ex.n||''}" placeholder="例：雨・快晴・イベント・積雪">
      </div>
      <button class="btn btn-primary btn-block" onclick="saveOccRecord('${store}')">💾 ${store==='A'?'浦和店':'広尾店'}のデータを保存</button>
      <div style="font-size:11px;color:var(--mid);text-align:center;margin-top:8px">
        稼働率 = 実稼働時間 ÷ 勤務時間 × 100 ／ ${seats}席稼働率 = 実稼働時間 ÷ (${seats}席×8h) × 100
      </div>
    </div>

    <!-- 今日の両店サマリー -->
    ${exA.h||exB.h?`<div class="card" style="margin-top:8px">
      <div class="fw-bold mb-8">📊 ${date} 両店サマリー</div>
      ${exA.h?`<div class="att-item"><span class="store-badge store-a">浦和店</span><div style="font-size:13px">👥${exA.c}人 / <strong style="color:${getOccColor(exA.r)}">${exA.r}%</strong> / ${exA.a}h÷${exA.h}h</div></div>`:''}
      ${exB.h?`<div class="att-item"><span class="store-badge store-b">広尾店</span><div style="font-size:13px">👥${exB.c}人 / <strong style="color:${getOccColor(exB.r)}">${exB.r}%</strong> / ${exB.a}h÷${exB.h}h</div></div>`:''}
    </div>`:''}
  </div>`;
}

function saveOccRecord(store){
  store = store || S.occInputStore || 'A';
  const date = document.getElementById('occ_date').value;
  const c = parseInt(document.getElementById('occ_c').value)||0;
  const s = document.getElementById('occ_s')?.value.trim()||'';
  const h = parseFloat(document.getElementById('occ_h').value)||0;
  const a = parseFloat(document.getElementById('occ_a').value)||0;
  const n = document.getElementById('occ_n').value.trim();
  if(!h) return alert('勤務時間を入力してください');
  const seats = store==='A'?6:3;
  const r = Math.round(a/h*100);
  const r6 = Math.round(a/(seats*8)*100);
  DB.setOccRecord(store, date, {c,s,h,a,r,r6,n,store});
  alert('✅ 保存しました！\n'+(store==='A'?'浦和店':'広尾店')+'\n稼働率: '+r+'% / '+seats+'席稼働率: '+r6+'%');
  go('occAnalysis');
}

const REPORT_CATS = ['お客様トラブル','スタッフ','設備・機器','衛生・安全','予約・システム','その他'];
const REPORT_LEVELS = [
  {key:'urgent', label:'🔴 緊急', color:'var(--danger)', bg:'#FFEBEE'},
  {key:'high',   label:'🟠 要対応', color:'#FF5722', bg:'#FBE9E7'},
  {key:'normal', label:'🟡 確認事項', color:'var(--warn)', bg:'#FFF8E1'},
];

function renderReports(){
  const allReports = DB.getReports().sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
  // 自店舗のみ表示（オーナーは全店）
  const myStore = S.user?.store;
  const storeFiltered = canSeeAll() ? allReports : allReports.filter(r=>r.store===myStore||r.store==='both'||!r.store);
  const canReport = isOwner()||isTaskAdmin();
  const filter = S.reportFilter||'all';
  const filtered = filter==='all'?storeFiltered:
    filter==='open'?storeFiltered.filter(r=>r.status!=='解決済み'):
    storeFiltered.filter(r=>r.status==='解決済み');
  const reports = storeFiltered;

  // 未対応の緊急案件数
  const urgentOpen = storeFiltered.filter(r=>r.level==='urgent'&&r.status!=='解決済み').length;

  return`<div class="page">
    ${urgentOpen>0&&isOwner()?`<div style="background:#FFEBEE;border:2px solid var(--danger);border-radius:var(--rs);padding:12px 14px;margin-bottom:12px">
      <div style="font-weight:700;color:var(--danger);font-size:15px">🔴 緊急報告 ${urgentOpen}件 未対応</div>
      <div style="font-size:12px;color:var(--danger);margin-top:4px">すぐに確認してください</div>
    </div>`:''}

    <!-- フィルター -->
    <div class="tab-row">
      <button class="tab ${filter==='all'?'active':''}" onclick="S.reportFilter='all';render()">全て（${reports.length}）</button>
      <button class="tab ${filter==='open'?'active':''}" onclick="S.reportFilter='open';render()">未解決（${reports.filter(r=>r.status!=='解決済み').length}）</button>
      <button class="tab ${filter==='closed'?'active':''}" onclick="S.reportFilter='closed';render()">解決済み</button>
    </div>

    ${filtered.length===0?`<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">報告はありません</div></div>`:''}

    ${filtered.map(r=>{
      const lv = REPORT_LEVELS.find(l=>l.key===r.level)||REPORT_LEVELS[2];
      const statusColor = r.status==='解決済み'?'var(--success)':r.status==='対応中'?'var(--warn)':'var(--danger)';
      return`<div class="card" style="border-left:5px solid ${lv.color};cursor:pointer" onclick="openReport('${r.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div style="flex:1">
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">
              <span style="background:${lv.bg};color:${lv.color};padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700">${lv.label}</span>
              <span class="badge badge-gray" style="font-size:11px">${r.cat}</span>
              <span class="store-badge ${storeClass(r.store)}" style="font-size:11px">${getStoreLabel(r.store)}</span>
            </div>
            <div class="fw-bold">${r.title}</div>
          </div>
          <span style="color:${statusColor};font-size:12px;font-weight:700;white-space:nowrap;margin-left:8px">${r.status==='解決済み'?'✅':r.status==='対応中'?'🔄':'⬜'} ${r.status}</span>
        </div>
        <div style="font-size:12px;color:var(--mid)">${r.body.slice(0,60)}...</div>
        <div style="font-size:11px;color:var(--lite);margin-top:6px">報告: ${r.reporterName} · ${r.createdAt}</div>
      </div>`;
    }).join('')}

    ${canReport?`<button class="fab" onclick="showAddReportModal()" style="background:var(--danger)">🚨</button>`:''}
  </div>`;
}

  showModal(`
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">

      <span class="store-badge ${storeClass(r.store)}">${getStoreLabel(r.store)}</span>

      <textarea class="form-input" id="rp_body" rows="5" placeholder="いつ・誰が・何が起きたか・現状を詳しく記載してください"></textarea></div>
    <div class="form-group"><label class="form-label">関係するお客様情報（任意）</label>
      <input class="form-input" id="rp_cust" placeholder="例：山田様 14:00予約 オーダーデザイン"></div>
    <button class="btn btn-primary btn-block" style="background:var(--danger)" onclick="saveReport()">🚨 報告する</button>`);

function saveReport(){
  const level = document.getElementById('rp_level').value;
  const cat = document.getElementById('rp_cat').value;
  const store = document.getElementById('rp_store').value;
  const title = document.getElementById('rp_title').value.trim();
  const body = document.getElementById('rp_body').value.trim();
  const customerInfo = document.getElementById('rp_cust').value.trim();
  if(!title||!body) return alert('件名と詳細を入力してください');
  const reports = DB.getReports();
  reports.unshift({
    id:genId(), level, cat, store, title, body, customerInfo,
    status:'未対応',
    reporterName: S.user?.name||'',
    reporterId: S.user?.id||'',
    createdAt: nowDateTime(),
    action:''
  });
  DB.setReports(reports);
  closeModal();
  alert('🚨 報告しました！オーナーに通知されます。');
  render();
}

function updateReportStatus(id, status){
  const reports = DB.getReports();
  const idx = reports.findIndex(r=>r.id===id);
  if(idx>=0){ reports[idx].status=status; DB.setReports(reports); }
  closeModal();
  setTimeout(()=>openReport(id),100);
}

function saveReportAction(id){
  const action = document.getElementById('action_'+id)?.value||'';
  const reports = DB.getReports();
  const idx = reports.findIndex(r=>r.id===id);
  if(idx>=0){ reports[idx].action=action; DB.setReports(reports); }
  alert('✅ 対応内容を保存しました');
  closeModal();
}

function deleteReport(id){
  if(!confirm('この報告を削除しますか？'))return;
  DB.setReports(DB.getReports().filter(r=>r.id!==id));
  closeModal();render();
}


function replyToAbsence(id){
  const input = document.getElementById('reply_'+id);
  if(!input||!input.value.trim()) return;
  const text = input.value.trim();
  const list = DB.getAbsences();
  const idx = list.findIndex(a=>a.id===id);
  if(idx>=0){
    if(!list[idx].replies) list[idx].replies=[];
    list[idx].replies.push({
      name:S.user?.name||'',
      text, isOwner:isOwner(),
      time:nowTime()
    });
    DB.set('absences',list);
    input.value='';
    render();
  }
}

function renderShiftCreate(){
  if(!isOwner()&&!isShiftAdmin()) return `<div class="page"><div class="empty-state"><div class="empty-icon">🔒</div><div class="empty-text">権限がありません</div></div></div>`;

  const now = new Date();
  const year = S.shiftCreateYear || now.getFullYear();
  const month = S.shiftCreateMonth !== undefined ? S.shiftCreateMonth : now.getMonth() + 1;
  const store = S.user?.shiftAdmin || 'A'; // wakana=A, misa=B
  const storeName = store==='A'?'浦和店':'広尾店';

  const firstDay = new Date(year, month-1, 1).getDay();
  const lastDate = new Date(year, month, 0).getDate();
  const DOW = ['日','月','火','水','木','金','土'];

  // シフト希望データ
  const requests = DB.getShiftRequests().filter(r=>r.year===year&&r.month===month);
  const staffInStore = STAFF_LIST.filter(s=>s.treat&&(s.store===store||s.store==='both')&&!s.noSales);

  // 稼働データ
  const allOcc = getAllOccData(store);

  // 各日のデータを集計
  const dayData = {};
  for(let d=1; d<=lastDate; d++){
    const dk = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(year,month-1,d).getDay();
    const occ = allOcc[dk];
    // 同曜日の過去平均
    const sameDow = Object.entries(allOcc).filter(([date])=>new Date(date).getDay()===dow);
    const avgR = sameDow.length>0?Math.round(sameDow.reduce((a,[,v])=>a+(v.r||0),0)/sameDow.length):0;
    // 休み希望のスタッフ
    const offStaff = requests.filter(r=>(r.offDays||[]).includes(dk)).map(r=>r.staffName);
    dayData[dk] = {occ, avgR, offStaff, dow};
  }

  return`<div class="page">
    <!-- ヘッダー -->
    <div class="card" style="background:linear-gradient(135deg,var(--pink-l),var(--pink-p));margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div class="fw-bold">${storeName} シフト作成</div>
          <div style="font-size:12px;color:var(--mid)">${year}年${month}月 · 稼働率参照モード</div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="S.shiftCreateMonth=${month===1?12:month-1};if(${month===1})S.shiftCreateYear=${year-1};render()">◀</button>
          <button class="btn btn-ghost btn-sm" onclick="S.shiftCreateMonth=${month===12?1:month+1};if(${month===12})S.shiftCreateYear=${year+1};render()">▶</button>
        </div>
      </div>
    </div>

    <!-- 凡例 -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;font-size:11px">
      ${[['#1565C0','98%〜'],['#E91E8C','90-97%'],['#FF5722','80-89%'],['#FF9800','60-79%'],['#4CAF50','〜59%']].map(([c,l])=>`<span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:2px;background:${c}"></span>${l}</span>`).join('')}
      <span style="display:flex;align-items:center;gap:3px"><span style="font-size:10px">🚫</span>休み希望あり</span>
    </div>

    <!-- カレンダー -->
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px">
      ${DOW.map((d,i)=>`<div style="text-align:center;font-size:11px;font-weight:700;padding:4px;color:${i===0?'var(--danger)':i===6?'var(--info)':'var(--mid)'}">${d}</div>`).join('')}
      ${Array(firstDay).fill('<div></div>').join('')}
      ${Array.from({length:lastDate},(_,i)=>{
        const d=i+1;
        const dk=`${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dd=dayData[dk]||{avgR:0,offStaff:[],dow:0};
        const color=dd.avgR>=98?'#1565C0':dd.avgR>=90?'#E91E8C':dd.avgR>=80?'#FF5722':dd.avgR>=60?'#FF9800':'#4CAF50';
        const isT=dk===today();
        const dow=new Date(year,month-1,d).getDay();
        return`<div onclick="S.shiftCreateDate='${dk}';render()" style="min-height:52px;padding:3px;border-radius:6px;background:${dd.avgR>0?color+'22':'transparent'};border:${S.shiftCreateDate===dk?'2px solid var(--pink)':isT?'2px solid var(--pink)':'1px solid var(--border)'};cursor:pointer">
          <div style="font-size:11px;text-align:center;font-weight:${isT?700:400};color:${dow===0?'var(--danger)':dow===6?'var(--info)':'var(--text)'}">${d}</div>
          ${dd.avgR>0?`<div style="font-size:9px;font-weight:700;color:${color};text-align:center">${dd.avgR}%</div>`:''}
          ${dd.offStaff.length>0?`<div style="font-size:9px;color:var(--danger);text-align:center">🚫${dd.offStaff.length}</div>`:''}
        </div>`;
      }).join('')}
    </div>

    <!-- 選択日の詳細 -->
    ${S.shiftCreateDate?`
      ${(()=>{
        const dk=S.shiftCreateDate;
        const dd=dayData[dk]||{avgR:0,offStaff:[],dow:0};
        const dow=new Date(dk).getDay();
        const color=dd.avgR>=90?'var(--danger)':dd.avgR>=70?'var(--warn)':'var(--success)';
        const neededStaff=Math.ceil(dd.avgR/100*(store==='A'?6:3));
        const availStaff=staffInStore.filter(s=>!dd.offStaff.includes(s.name));
        const reqStaff=requests.filter(r=>!(r.offDays||[]).includes(dk));
        return`<div class="card" style="border-left:4px solid ${color}">
          <div class="fw-bold mb-8">📅 ${dk.slice(5).replace('-','/')}（${DOW[dow]}）</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
            <div style="text-align:center;background:var(--bg);padding:8px;border-radius:8px">
              <div style="font-size:20px;font-weight:800;color:${color}">${dd.avgR}%</div>
              <div style="font-size:10px;color:var(--mid)">過去平均稼働率</div>
            </div>
            <div style="text-align:center;background:var(--bg);padding:8px;border-radius:8px">
              <div style="font-size:20px;font-weight:800;color:var(--pink)">${neededStaff}名</div>
              <div style="font-size:10px;color:var(--mid)">推奨スタッフ数</div>
            </div>
            <div style="text-align:center;background:var(--bg);padding:8px;border-radius:8px">
              <div style="font-size:20px;font-weight:800;color:${dd.offStaff.length>0?'var(--danger)':'var(--success)'}">${dd.offStaff.length}名</div>
              <div style="font-size:10px;color:var(--mid)">休み希望</div>
            </div>
          </div>
          ${dd.offStaff.length>0?`<div style="margin-bottom:8px"><div style="font-size:12px;font-weight:600;color:var(--danger);margin-bottom:4px">🚫 休み希望</div><div style="display:flex;gap:4px;flex-wrap:wrap">${dd.offStaff.map(n=>`<span class="badge badge-danger" style="font-size:11px">${n}</span>`).join('')}</div></div>`:''}
          <div><div style="font-size:12px;font-weight:600;color:var(--success);margin-bottom:4px">✅ 出勤可能（${availStaff.length}名）</div><div style="display:flex;gap:4px;flex-wrap:wrap">${availStaff.map(s=>`<span class="badge badge-green" style="font-size:11px">${s.name}</span>`).join('')}</div></div>
          ${reqStaff.length>0?`<div style="margin-top:8px;background:var(--bg);padding:8px 10px;border-radius:8px">
            <div style="font-size:12px;font-weight:600;color:var(--mid);margin-bottom:4px">⏰ 希望時間</div>
            ${reqStaff.map(r=>`<div style="font-size:11px;color:var(--mid)">${r.staffName}: ${r.startTime}〜${r.endTime}</div>`).join('')}
          </div>`:''}
        </div>`;
      })()}
    `:'<div style="text-align:center;color:var(--mid);font-size:13px;padding:12px">カレンダーの日付をタップして詳細を確認</div>'}

    <!-- シフト提出状況 -->
    <div class="card" style="margin-top:8px">
      <div class="fw-bold mb-8">📋 シフト希望 提出状況</div>
      ${staffInStore.map(s=>{
        const req=requests.find(r=>r.staffId===s.id);
        return`<div class="att-item">
          <span class="fw-bold">${s.name}</span>
          <span class="badge ${req?'badge-green':'badge-warn'}">${req?'✅ 提出済':'⬜ 未提出'}</span>
        </div>`;
      }).join('')}
    </div>


  </div>`;
}

function renderChat(){
  const myStore = S.user?.store;
  const allowedRooms = canSeeAll() ? ['all','A','B'] : ['all', myStore].filter(Boolean);
  let room = S.chatRoom || 'all';
  if(!allowedRooms.includes(room)) room = 'all';

  // チャット開いたら既読更新
  if(window._fbDB && S.user?.id){
    window._fbDB.ref('/chatRead/'+room+'/'+S.user.id).set(Date.now());
  }

  const allMsgs = DB.getChats(room);
  const searchQ = S.chatSearch||'';
  const msgs = (searchQ ? allMsgs.filter(m=>(m.text||'').includes(searchQ)||m.senderName?.includes(searchQ)) : allMsgs).slice(-80);
  const roomLabels = {all:'🌐 全体', A:'🏪 浦和店', B:'🏪 広尾店'};
  const pinned = window._fbPinned ? window._fbPinned[room] : null;
  const chatRead = window._fbChatRead ? (window._fbChatRead[room]||{}) : {};
  const replyTo = window._replyTo && window._replyTo.room===room ? window._replyTo : null;
  const showEmoji = window._showEmojiPanel===room;
  const EMOJI_LIST = ['😊','😂','🥰','😍','🤔','😅','🙏','👏','💪','🎉','✨','💅','🌸','💕','😭','🔥','💯','👍','❤️','😘','🤗','😎','🥳','💖','🌈'];

  let h = '<div style="padding:0;display:flex;flex-direction:column;height:100vh">';

  // DM・スペースへのショートカット
  h += '<div style="padding:6px 12px;background:#fff;border-bottom:1px solid #eee;display:flex;gap:6px">';
  h += '<button onclick="go(\'dm\')" style="flex:1;padding:6px;border-radius:8px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-size:12px;font-weight:600">💬 DM</button>';
  h += '<button onclick="go(\'spaces\')" style="flex:1;padding:6px;border-radius:8px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-size:12px;font-weight:600">🗂️ スペース</button>';
  h += '</div>';

  // ルームタブ
  h += '<div style="padding:8px 12px;background:#fff;border-bottom:1px solid #eee;display:flex;gap:6px;flex-shrink:0">';
  allowedRooms.forEach(function(k){
    const active = room===k;
    h += '<button onclick="switchChatRoom(\''+k+'\')" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid '+(active?'var(--pink)':'#ddd')+';background:'+(active?'var(--pink-l)':'#fff')+';color:'+(active?'var(--pink)':'#666')+'">'  +roomLabels[k]+'</button>';
  });
  // 検索ボタン
  h += '<button onclick="window._showSearch_'+room+'=!window._showSearch_'+room+';render()" style="margin-left:auto;padding:6px 10px;border-radius:20px;font-size:14px;border:1.5px solid #ddd;background:#fff;cursor:pointer">🔍</button>';
  h += '</div>';

  // 検索バー
  if(window['_showSearch_'+room]){
    h += '<div style="padding:8px 12px;background:#fff;border-bottom:1px solid #eee;flex-shrink:0">';
    h += '<input id="chatSearchInput" value="'+(searchQ||'')+'" placeholder="メッセージを検索..." style="width:100%;padding:8px 14px;border:1.5px solid var(--pink);border-radius:20px;font-size:14px;outline:none;font-family:inherit" oninput="S.chatSearch=this.value;render()">';
    h += '</div>';
  }

  // ピン留めバナー
  if(pinned){
    h += '<div onclick="scrollToPinned(\''+pinned.fbKey+'\')" style="padding:8px 14px;background:linear-gradient(135deg,#FFF8E1,#FFF3CD);border-bottom:2px solid #FFC107;cursor:pointer;display:flex;gap:8px;align-items:center;flex-shrink:0">';
    h += '<span style="font-size:16px">📌</span>';
    h += '<div style="flex:1;min-width:0"><div style="font-size:11px;color:#888">ピン留め</div><div style="font-size:13px;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(pinned.text||'[画像]')+'</div></div>';
    if(isOwner()||isTaskAdmin()){ window._pinRoom=room; h += '<button onclick="window._pinRoom&&unpinMessage(window._pinRoom)" style="background:none;border:none;cursor:pointer;font-size:14px;color:#999">×</button>'; }
    h += '</div>';
  }

  // メッセージ一覧
  h += '<div id="chatBox" style="flex:1;overflow-y:auto;padding:12px;background:#f5f5f5">';
  if(!msgs.length){
    h += '<div style="text-align:center;color:#aaa;font-size:13px;padding-top:40px">'+(searchQ?'メッセージが見つかりません':'まだメッセージがありません')+'</div>';
  }

  // 既読者数を計算（メッセージのtsより後に読んだ人数）
  const readUsers = Object.entries(chatRead);

  msgs.forEach(function(m){
    const isMe = m.senderId===S.user?.id;
    const userIcons = DB.getUserIcons();
    const rank = getRank(DB.getPoints()[m.senderId]||0);
    const userIcon = userIcons[m.senderId] || rank.char;
    const canDelete = isMe && (Date.now()-(m.ts||0)) < 5*60*1000;
    const fbKey = m._fbKey || '';
    const msgReactions = (window._fbReactions[room]||{})[fbKey] || {};
    const reactCounts = {};
    Object.values(msgReactions).forEach(function(e){ reactCounts[e]=(reactCounts[e]||0)+1; });
    const myReaction = msgReactions[S.user?.id] || '';
    const isPinned = pinned && pinned.fbKey===fbKey;
    // 既読数（自分以外で読んだ人数）
    const readCount = readUsers.filter(([uid, ts])=>uid!==m.senderId&&Number(ts)>=(m.ts||0)).length;

    // メンションハイライト
    const displayText = formatChatText(m.text);

    h += '<div id="msg_'+fbKey+'" style="display:flex;flex-direction:'+(isMe?'row-reverse':'row')+';align-items:flex-end;gap:6px;margin-bottom:8px">';
    if(!isMe){
      h += '<div style="font-size:22px;flex-shrink:0;cursor:pointer" data-uid="'+m.senderId+'" data-uname="'+encodeURIComponent(m.senderName)+'" data-fbkey="'+fbKey+'" data-room="'+room+'" data-text="'+encodeURIComponent((m.text||'').slice(0,50))+'" onclick="showUserActionFromEl(this)">'+userIcon+'</div>';
    } else {
      h += '<div style="font-size:22px;flex-shrink:0">'+userIcon+'</div>';
    }
    h += '<div style="max-width:75%">';
    if(!isMe) h += '<div style="font-size:11px;color:#888;margin-bottom:2px;cursor:pointer;font-weight:600" data-uid="'+m.senderId+'" data-uname="'+encodeURIComponent(m.senderName)+'" data-fbkey="'+fbKey+'" data-room="'+room+'" data-text="'+encodeURIComponent((m.text||'').slice(0,50))+'" onclick="showUserActionFromEl(this)">'+m.senderName+'</div>';

    // 引用返信
    if(m.replyTo){
      h += '<div style="padding:4px 10px;border-left:3px solid '+(isMe?'rgba(255,255,255,.6)':'var(--pink)')+';margin-bottom:4px;font-size:11px;color:'+(isMe?'rgba(255,255,255,.8)':'#999')+';background:'+(isMe?'rgba(255,255,255,.15)':'rgba(0,0,0,.05)')+';border-radius:4px">';
      h += '<span style="font-weight:600">'+m.replyTo.senderName+'</span>: '+(m.replyTo.text||'[画像]').slice(0,40)+'...';
      h += '</div>';
    }

    if(m.type==='image'){
      h += '<div style="padding:4px;border-radius:'+(isMe?'18px 4px 18px 18px':'4px 18px 18px 18px')+';background:'+(isMe?'var(--pink-l)':'#fff')+';box-shadow:0 1px 3px rgba(0,0,0,.1)">';
      h += '<img src="'+m.imageUrl+'" style="max-width:220px;max-height:220px;border-radius:12px;display:block;cursor:pointer" data-src="'+m.imageUrl+'" onclick="showImgModal(this)"></div>';
    } else {
      h += '<div style="padding:10px 14px;border-radius:'+(isMe?'18px 4px 18px 18px':'4px 18px 18px 18px')+';background:'+(isMe?'var(--pink)':'#fff')+';color:'+(isMe?'#fff':'#333')+';font-size:14px;line-height:1.5;word-break:break-word;box-shadow:0 1px 3px rgba(0,0,0,.1)">'+displayText+'</div>';
    }

    // リアクション表示
    if(Object.keys(reactCounts).length>0){
      h += '<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;'+(isMe?'justify-content:flex-end':'')+'">';
      Object.entries(reactCounts).forEach(function(entry){
        const emoji=entry[0];const count=entry[1];
        const isMine=myReaction===emoji;
        h += '<button data-rroom="'+room+'" data-rfbkey="'+fbKey+'" onclick="showReactionPickerBtn(this)" style="padding:2px 6px;border-radius:10px;border:1.5px solid '+(isMine?'var(--pink)':'#ddd')+';background:'+(isMine?'var(--pink-l)':'#fff')+';cursor:pointer;font-size:12px">'+emoji+' '+count+'</button>';
      });
      h += '</div>';
    }

    // 時刻・既読・ボタン
    h += '<div style="font-size:10px;color:#bbb;margin-top:2px;display:flex;align-items:center;gap:5px;'+(isMe?'justify-content:flex-end':'')+'">';
    if(isMe&&readCount>0) h += '<span style="color:var(--pink);font-weight:600">既読'+readCount+'</span>';
    h += '<span>'+m.time+'</span>';
    if(isPinned) h += '<span>📌</span>';
    if(fbKey){
    h += '<button data-fbkey="'+fbKey+'" data-room="'+room+'" data-sname="'+encodeURIComponent(m.senderName)+'" data-text="'+encodeURIComponent((m.text||'').slice(0,50))+'" onclick="setReplyFromBtn(this)" style="background:none;border:none;cursor:pointer;font-size:11px;color:#bbb;padding:0">↩️</button>';
    h += '<button data-rroom="'+room+'" data-rfbkey="'+fbKey+'" onclick="showReactionPickerBtn(this)" style="background:none;border:none;cursor:pointer;font-size:12px;color:#bbb;padding:0">😊</button>';
    }
    if(fbKey&&(isOwner()||isTaskAdmin())) h += '<button data-proom="'+room+'" data-pfbkey="'+fbKey+'" data-ptext="'+encodeURIComponent((m.text||'').slice(0,50))+'" onclick="pinMessageBtn(this)" style="background:none;border:none;cursor:pointer;font-size:11px;color:#bbb;padding:0">📌</button>';
    if(canDelete) h += '<button data-droom="'+room+'" data-dfbkey="'+fbKey+'" onclick="deleteChatMsgBtn(this)" style="background:none;border:none;cursor:pointer;font-size:11px;color:#ffb3b3;padding:0">🗑️</button>';
    h += '</div>';
    h += '</div></div>';
  });
  h += '</div>';

  // 返信プレビュー
  if(replyTo){
    h += '<div style="padding:6px 12px;background:#f0f0ff;border-top:1px solid #ddd;display:flex;gap:8px;align-items:center;flex-shrink:0">';
    h += '<div style="flex:1;font-size:12px"><span style="color:var(--pink);font-weight:600">返信先: '+replyTo.senderName+'</span><br><span style="color:#666">'+decodeURIComponent(replyTo.text).slice(0,40)+'</span></div>';
    h += '<button onclick="window._replyTo=null;render()" style="background:none;border:none;cursor:pointer;font-size:18px;color:#999">×</button>';
    h += '</div>';
  }

  // 絵文字パネル
  if(showEmoji){
    h += '<div style="padding:8px;background:#fff;border-top:1px solid #eee;display:flex;flex-wrap:wrap;gap:4px;max-height:120px;overflow-y:auto;flex-shrink:0">';
    EMOJI_LIST.forEach(function(e){
      h += '<button data-eidx="'+EMOJI_LIST.indexOf(e)+'" onclick="insertEmojiByIdx(this)" style="background:none;border:none;cursor:pointer;font-size:22px;padding:4px">'+e+'</button>';
    });
    h += '</div>';
  }

  // 入力欄
  h += '<div style="padding:8px 10px;background:#fff;border-top:1px solid #eee;flex-shrink:0">';
  h += '<div style="display:flex;gap:6px;align-items:center">';
  h += '<button data-eroom="'+room+'" onclick="toggleEmojiPanel(this)" style="width:38px;height:38px;border-radius:50%;background:'+(showEmoji?'var(--pink-l)':'#f5f5f5')+';border:none;cursor:pointer;font-size:20px;flex-shrink:0">😊</button>';
  h += '<label style="width:38px;height:38px;border-radius:50%;background:#f5f5f5;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">📷<input type="file" accept="image/*" style="display:none" data-room="'+room+'" onchange="sendChatPhotoBtn(this)"></label>';
  h += '<button data-mroom="'+room+'" onclick="showMentionPicker(this.dataset.mroom)" style="width:38px;height:38px;border-radius:50%;background:#f5f5f5;border:none;cursor:pointer;font-size:17px;flex-shrink:0">👤</button>';
  h += '<input id="chatInput" placeholder="'+(replyTo?'返信を入力...':'メッセージを入力')+'" style="flex:1;padding:10px 14px;border:1.5px solid #ddd;border-radius:22px;font-size:14px;outline:none;font-family:inherit" data-room="'+room+'" oninput="checkMentionInput(this)">';
  h += '<button data-sroom="'+room+'" onclick="sendChatBtn(this)" style="width:44px;height:44px;border-radius:50%;background:var(--pink);border:none;color:#fff;font-size:22px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">↑</button>';
  h += '</div>';

  // @メンション候補
  h += '<div id="mentionSuggest" style="display:none;position:absolute;bottom:70px;left:12px;background:#fff;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:100;max-width:200px"></div>';
  h += '</div>';
  h += '</div>';

  setTimeout(function(){
    var b=document.getElementById('chatBox');
    if(b) b.scrollTop=b.scrollHeight;
  },80);
  return h;
}

function showImgModal(img){
  const src = img.dataset.src||img.src;
  // フルスクリーンオーバーレイで表示
  const overlay = document.createElement('div');

}

}

  deleteChatMsg(btn.dataset.droom, btn.dataset.dfbkey);

function switchChatRoom(room){
  S.chatRoom = room;
  S.chatSearch = '';

  render();
}

function setReply(room, fbKey, senderName, encodedText){

function pinMessage(room, fbKey, encodedText){

}

function sendChatPhotoBtn(input){

}
function toggleEmojiPanel(btn){
  const room = btn.dataset.eroom;
  window._showEmojiPanel = (window._showEmojiPanel===room) ? null : room;
  render();
}
function insertEmojiByIdx(btn){
  const EMOJI_LIST = ['😊','😂','🥰','😍','🤔','😅','🙏','👏','💪','🎉','✨','💅','🌸','💕','😭','🔥','💯','👍','❤️','😘','🤗','😎','🥳','💖','🌈'];
  const idx = parseInt(btn.dataset.eidx);
  if(idx>=0&&idx<EMOJI_LIST.length) insertEmoji(EMOJI_LIST[idx]);
}
function insertEmoji(emoji){
  const input = document.getElementById('chatInput');
  if(!input) return;
  const pos = input.selectionStart||input.value.length;
  input.value = input.value.slice(0,pos)+emoji+input.value.slice(pos);
  input.focus();
}

function checkMention(input, room){
  const val = input.value;
  const atIdx = val.lastIndexOf('@');
  const suggest = document.getElementById('mentionSuggest');
  if(!suggest) return;
  if(atIdx>=0 && atIdx===val.length-1||atIdx>=0&&!val.slice(atIdx+1).includes(' ')){
    const query = val.slice(atIdx+1).toLowerCase();
    const matches = STAFF_LIST.filter(s=>s.name.toLowerCase().includes(query)).slice(0,5);
    if(matches.length){
      suggest.style.display='block';
      suggest.innerHTML = matches.map(s=>`<div onclick="applyMention('${s.name}')" style="padding:8px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid #f0f0f0">${DB.getUserIcons()[s.id]||getRank(DB.getPoints()[s.id]||0).char} ${s.name}</div>`).join('');
      return;
    }
  }
  suggest.style.display='none';
}

function applyMention(name){
  const input = document.getElementById('chatInput');
  if(!input) return;
  const val = input.value;
  const atIdx = val.lastIndexOf('@');
  if(atIdx>=0) input.value = val.slice(0,atIdx)+'@'+name+' ';
  const suggest = document.getElementById('mentionSuggest');
  if(suggest) suggest.style.display='none';
  input.focus();
}

function showUserActionFromEl(el){
  const senderId = el.dataset.uid||'';
  const senderName = decodeURIComponent(el.dataset.uname||'');
  const fbKey = el.dataset.fbkey||'';
  const room = el.dataset.room||'';
  const text = el.dataset.text||'';
  const noDM = el.dataset.nodm==='1'; // DMチャット内では「DMを送る」非表示
  showUserAction(senderId, senderName, fbKey, room, text, noDM);
}

function showUserAction(senderId, senderName, fbKey, room, encodedText, noDM){
  window._uaData = {senderId, senderName, fbKey, room, encodedText};
  var existing = document.getElementById('userActionSheet');
  if(existing) existing.remove();

  var myId = S.user?.id;
  var targetStaff = STAFF_LIST.find(function(s){ return s.id===senderId; });
  var canDM = !noDM && targetStaff && senderId!==myId;
  var userIcon = (DB.getUserIcons()[senderId]||getRank(DB.getPoints()[senderId]||0).char);

  var sheet = document.createElement('div');
  sheet.id = 'userActionSheet';
  sheet.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:8000;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center';

  var dmBtn = canDM ? '<button onclick="uaDM()" style="width:100%;padding:15px 16px;border-radius:12px;border:none;background:#f7f7f7;cursor:pointer;font-size:15px;margin-bottom:8px;text-align:left;font-family:inherit">💬　DMを送る</button>' : '';
  var replyBtn = (fbKey&&room) ? '<button onclick="uaReply()" style="width:100%;padding:15px 16px;border-radius:12px;border:none;background:#f7f7f7;cursor:pointer;font-size:15px;margin-bottom:8px;text-align:left;font-family:inherit">↩️　返信する</button>' : '';
  var mentionBtn = (room&&room!==S.dmRoom) ? '<button onclick="uaMention()" style="width:100%;padding:15px 16px;border-radius:12px;border:none;background:#f7f7f7;cursor:pointer;font-size:15px;margin-bottom:8px;text-align:left;font-family:inherit">@　メンションする</button>' : '';

  sheet.innerHTML = '<div style="background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-width:480px;box-shadow:0 -4px 24px rgba(0,0,0,.15)">'
    + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #f0f0f0">'
    + '<div style="font-size:36px">'+userIcon+'</div>'
    + '<div><div style="font-size:17px;font-weight:700">'+senderName+'</div>'
    + (targetStaff?'<div style="font-size:12px;color:#aaa">'+targetStaff.title+'</div>':'')
    + '</div></div>'
    + replyBtn + dmBtn + mentionBtn
    + '<button onclick="closeUserAction()" style="width:100%;padding:13px;border-radius:12px;border:none;background:#fff;cursor:pointer;font-size:14px;color:#aaa;font-family:inherit">キャンセル</button>'
    + '</div>';

  sheet.onclick = function(e){ if(e.target===sheet) closeUserAction(); };
  document.body.appendChild(sheet);
}

function closeUserAction(){
  var s = document.getElementById('userActionSheet');
  if(s) s.remove();
  var p = document.getElementById('mentionPickerSheet');
  if(p) p.remove();
}

function uaReply(){
  var d = window._uaData;
  closeUserAction();
  if(d && d.fbKey && d.room) setReply(d.room, d.fbKey, d.senderName, d.encodedText);
}

function uaDM(){
  var d = window._uaData;
  closeUserAction();
  if(d) openDMFromChat(d.senderId, d.senderName);
}

function uaMention(){
  var d = window._uaData;
  closeUserAction();
  if(d){
    var input = document.getElementById('chatInput');
    if(input){
      input.value = (input.value||'').trimEnd() + ' @' + d.senderName + ' ';
      input.focus();
    }
  }
}

function openDMFromChat(userId, userName){
  var myId = S.user?.id;
  var roomId = getDMRoomId(myId, userId);
  S.dmWithId = userId;
  S.dmWith = userName;
  S.dmRoom = roomId;
  go('dmchat');
}

function pickMention(name){
  closeUserAction();
  var input = document.getElementById('chatInput');

    input.value = (input.value||'').trimEnd() + ' @' + name + ' ';
    input.focus();
  }
}

function toggleDayStaff(store, year, month, date, staffName){
  const sched = DB.getShiftSchedule(store, parseInt(year), parseInt(month));
  if(!sched[date]) sched[date]=[];
  const idx = sched[date].indexOf(staffName);
  if(idx>=0) sched[date].splice(idx,1);
  else sched[date].push(staffName);
  DB.setShiftSchedule(store, parseInt(year), parseInt(month), sched);
  render();
}

function showApprovalModal(store, year, month){
  const reqs = DB.getShiftRequests().filter(function(r){return r.year===parseInt(year)&&r.month===parseInt(month)&&(r.offDays||[]).length>0;});
  const approvedOff = DB.getApprovedOff(store, parseInt(year), parseInt(month));
  const DOW = ['日','月','火','水','木','金','土'];
  let html = '<div class="modal-title">📋 希望休の承認</div>';
  if(!reqs.length){ html += '<div style="color:var(--mid)">希望休の提出はありません</div>'; }
  reqs.forEach(function(req){
    const s=STAFF_LIST.find(function(x){return x.id===req.staffId;});
    if(!s) return;
    const appr = approvedOff[req.staffId]||[];
    html += '<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)">';
    html += '<div class="fw-bold mb-6">'+s.name+'</div><div style="display:flex;flex-wrap:wrap;gap:4px">';
    (req.offDays||[]).forEach(function(dk){
      const d=parseInt(dk.slice(8)); const dow=DOW[new Date(dk).getDay()]; const isA=appr.includes(dk);
      html += '<button onclick="toggleApproveOff(\''+store+'\','+year+','+month+',\''+req.staffId+'\',\''+dk+'\')" ';
      html += 'style="padding:5px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid '+(isA?'var(--success)':'var(--border)')+';background:'+(isA?'#E8F5E9':'#fff')+';color:'+(isA?'var(--success)':'var(--mid)')+';">';
      html += (isA?'✅ ':'')+d+'日（'+dow+'）</button>';
    });
    html += '</div></div>';
  });
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">';
  html += '<button class="btn btn-primary btn-sm" onclick="applyApprovedToCalendar(\''+store+'\','+year+','+month+');closeModal()">✅ カレンダーに反映</button>';
  html += '<button class="btn btn-outline btn-sm" onclick="closeModal()">閉じる</button></div>';
  showModal(html);
}


function uploadLogo(input){
  const file = input.files[0];
  if(!file) return;
  // 5MB制限
  if(file.size > 5 * 1024 * 1024){ alert('画像が大きすぎます（5MB以下にしてください）'); return; }
  const reader = new FileReader();
  reader.onload = function(e){
    const dataUrl = e.target.result;
    // Firebaseに保存（全員に反映）
    DB.set('appLogo', dataUrl);
    // localStorageにもキャッシュ
    try{ localStorage.setItem('blancher_logo', dataUrl); }catch(err){}
    alert('✅ ロゴを設定しました！全スタッフに反映されます。');
    render();
  };
  reader.readAsDataURL(file);
}

function removeLogo(){
  if(!confirm('ロゴを削除しますか？全スタッフから削除されます。')) return;
  DB.set('appLogo', null);
  try{ localStorage.removeItem('blancher_logo'); }catch(err){}
  render();
}

function applyLogo(){
  const firebaseLogo = DB.get('appLogo');
  const cachedLogo = localStorage.getItem('blancher_logo');
  const logo = firebaseLogo || cachedLogo || '';

  // Firebaseからロゴを取得できたらlocalStorageにもキャッシュ（次回即表示のため）
  if(firebaseLogo && firebaseLogo !== cachedLogo){
    try{ localStorage.setItem('blancher_logo', firebaseLogo); }catch(e){}
  }
  // Firebaseでロゴが削除された場合はlocalStorageも削除
  if(firebaseLogo === null && cachedLogo){
    try{ localStorage.removeItem('blancher_logo'); }catch(e){}
  }

  const img = document.getElementById('brand-logo');
  const loadingImg = document.getElementById('loading-logo');
  const loadingEmoji = document.getElementById('loading-emoji');
  if(logo){
    if(img){ img.src = logo; img.style.display = 'block'; }
    if(loadingImg){ loadingImg.src = logo; loadingImg.style.display = 'block'; }
    if(loadingEmoji) loadingEmoji.style.display = 'none';
    const favicon = document.getElementById('favicon');
    const touchIcon = document.getElementById('apple-touch-icon');
    if(favicon) favicon.href = logo;
    if(touchIcon) touchIcon.href = logo;
  } else {
    if(img){ img.src = ''; img.style.display = 'none'; }
    if(loadingImg){ loadingImg.src = ''; loadingImg.style.display = 'none'; }
    if(loadingEmoji) loadingEmoji.style.display = 'block';
    const favicon = document.getElementById('favicon');
    const touchIcon = document.getElementById('apple-touch-icon');
    if(favicon) favicon.href = '';
    if(touchIcon) touchIcon.href = '';
  }
}

function sendChat(room){
  const input = document.getElementById('chatInput');
  if(!input) return;
  const text = input.value.trim();
  if(!text) return;
  const d = new Date();
  const time = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const msg = {
    id:genId(), text, room,
    senderId: S.user?.id||'',
    senderName: S.user?.name||'',
    time
  };
  // 引用返信
  if(window._replyTo && window._replyTo.room===room){
    msg.replyTo = {
      fbKey: window._replyTo.fbKey,
      senderName: window._replyTo.senderName,
      text: decodeURIComponent(window._replyTo.text)
    };
    window._replyTo = null;
  }
  // @メンション通知
  const mentions = (text.match(/@(\S+)/g)||[]).map(m=>m.slice(1));
  if(mentions.length && window._fbDB){
    const mentioned = STAFF_LIST.filter(s=>mentions.includes(s.name));
    mentioned.forEach(s=>{
      if(s.id===S.user?.id) return;
      const msgs2 = DB.getMessages()||[];
      msgs2.unshift({id:genId(),title:'💬 @メンション: '+S.user?.name+'さんからメッセージ',
        body:text,from:S.user?.id,fromName:S.user?.name,
        to:'individual',toId:s.id,toName:s.name,
        date:today(),readBy:[],progress:{[s.id]:'未対応'}});
      DB.set('messages', msgs2);
    });
  }
  DB.addChat(room, msg);
  input.value='';
  window._showEmojiPanel = null;
  render();
  setTimeout(()=>{ const b=document.getElementById('chatBox'); if(b) b.scrollTop=b.scrollHeight; },80);
}

function toggleReaction(room, fbKey, emoji){
  if(!fbKey || !window._fbDB) return;
  const userId = S.user?.id;
  if(!userId) return;
  const ref = window._fbDB.ref(window._reactionsBasePath+'/'+room+'/'+fbKey+'/'+userId);
  const current = ((window._fbReactions[room]||{})[fbKey]||{})[userId];
  if(current === emoji){
    ref.remove(); // 同じリアクションは取り消し
  } else {
    ref.set(emoji);
  }
}

function showReactionPicker(room, fbKey){
  const REACT_EMOJIS = [
    {e:'👍',l:'いいね'},  {e:'❤️',l:'ハート'},  {e:'😊',l:'嬉しい'},
    {e:'🎉',l:'やった'},  {e:'✅',l:'確認'},    {e:'👀',l:'見たよ'},
    {e:'🔥',l:'熱い'},    {e:'💪',l:'頑張れ'},  {e:'😂',l:'笑える'},
    {e:'🥰',l:'かわいい'},{e:'👏',l:'拍手'},    {e:'💯',l:'最高'},
    {e:'🙏',l:'感謝'},    {e:'😭',l:'泣ける'},  {e:'💅',l:'ナイス'},
    {e:'⭐',l:'スター'},  {e:'😮',l:'驚き'},    {e:'🤔',l:'なるほど'},
  ];
  window._reactRoom = room;
  window._reactFbKey = fbKey;
  window._reactEmojis = REACT_EMOJIS.map(function(r){return r.e;});
  const current = ((window._fbReactions[room]||{})[fbKey]||{})[S.user?.id] || '';

    html += '<button onclick="doReact('+idx+')" style="padding:8px 2px;border-radius:10px;border:2px solid '+(active?'var(--pink)':'#f0f0f0')+';background:'+(active?'var(--pink-l)':'#fff')+';cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px">';

  }
  html += '<button class="btn btn-ghost btn-sm btn-block" style="margin-top:6px" onclick="closeModal()">キャンセル</button>';

function doReactRemove(){
  const room = window._reactRoom;
  const fbKey = window._reactFbKey;
  if(!room||!fbKey||!window._fbDB) return;
  window._fbDB.ref(window._reactionsBasePath+'/'+room+'/'+fbKey+'/'+S.user?.id).remove();
  closeModal();
}

function doReact(idx){
  const room = window._reactRoom;
  const fbKey = window._reactFbKey;
  const emoji = (window._reactEmojis||[])[idx];
  if(!emoji) return;
  toggleReaction(room, fbKey, emoji);

}

function doReactDirectOld(room, fbKey, idx){

    window._fbDB.ref(window._chatsBasePath+'/'+room+'/'+fbKey).remove();

function cancelMessage(id){

  const msgs = DB.getMessages();
  const idx = msgs.findIndex(m => m.id === id);

  closeModal();

}

function sendDoubleCheckRequest(store, year, month){
  // 対象店舗の業務委託スタッフを取得
  const contractors = STAFF_LIST.filter(s => s.contractor && (s.store === store || s.store === 'both'));
  if(contractors.length === 0){
    alert('この店舗に業務委託スタッフがいません');
    return;
  }

  const sched = DB.getShiftSchedule(store, year, month);
  const storeName = store === 'A' ? '浦和店' : '広尾店';
  const last = new Date(year, month, 0).getDate();
  const DOW = ['日','月','火','水','木','金','土'];

  // シフト内容テキスト作成
  let shiftText = year+'年'+month+'月 確定シフト（'+storeName+'）\n\n';
  for(let d = 1; d <= last; d++){
    const dk = year+'-'+String(month).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const ds = sched[dk] || [];
    if(ds.length === 0) continue;
    const dow = DOW[new Date(year, month-1, d).getDay()];
    shiftText += month+'/'+d+'（'+dow+'） ' + ds.join('・') + '\n';
  }

  if(!confirm(contractors.map(s=>s.name).join('・') + '\nにダブルチェック依頼を送りますか？')) return;

  // 各業務委託スタッフにメッセージ送信
  const msgs = DB.getMessages();
  contractors.forEach(c => {
    msgs.unshift({
      id: genId(),
      title: '【ダブルチェック依頼】'+year+'年'+month+'月 シフト確認',
      body: 'シフトの内容をご確認ください。\n\n'+shiftText+'\n問題がなければ「✅ 確認済み」に進捗を更新してください。',
      from: S.user.id,
      fromName: S.user.name,
      to: 'individual',
      toId: c.id,
      toName: c.name,
      date: today(),
      readBy: [],
      progress: {[c.id]: '未対応'}
    });
  });
  DB.set('messages', msgs);

  alert('✅ '+contractors.map(s=>s.name).join('・')+'にダブルチェック依頼を送りました！');
  render();
}

function shareShiftToOwner(store, year, month){
  const sched = DB.getShiftSchedule(store, year, month);
  const allOcc = getAllOccData(store);
  const storeName = store==='A'?'浦和店':'広尾店';
  const last = new Date(year,month,0).getDate();
  const DOW = ['日','月','火','水','木','金','土'];

  // シフト内容を組み立て
  let lines = [];
  lines.push('📅 '+year+'年'+month+'月 確定シフト（'+storeName+'）');
  lines.push('（稼働率データを参照して自動生成）');
  lines.push('');

  let hasData = false;
  for(let d=1;d<=last;d++){
    const dk = year+'-'+String(month).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const ds = sched[dk]||[];
    if(ds.length===0) continue;
    hasData = true;
    const dow = DOW[new Date(year,month-1,d).getDay()];
    const occ = allOcc[dk];
    const occStr = occ ? ' (稼働率参考:'+occ.r+'%)' : '';
    lines.push(month+'/'+d+'（'+dow+'）'+occStr);
    lines.push('  出勤: '+ds.join('・'));
  }

  if(!hasData){
    alert('まだシフトが設定されていません。\n先に自動生成か手動でシフトを組んでください。');
    return;
  }

  // オーナー全員にメッセージ送信
  const owners = STAFF_LIST.filter(s=>s.role==='admin'||s.role==='owner');
  const progress = {};
  owners.forEach(s=>progress[s.id]='未対応');

  const msgs = DB.getMessages();
  msgs.unshift({
    id:genId(),
    title:year+'年'+month+'月 '+storeName+' 確定シフト（確認依頼）',
    body: lines.join('\n'),
    to:'individual',
    toId: owners.length===1?owners[0].id:'',
    toName: owners.map(s=>s.name).join('・'),
    date:today(),
    from:S.user?.id||'',
    fromName:S.user?.name||'',
    readBy:[S.user?.id||''],
    progress: progress,
    type:'shiftShare'
  });

  // オーナーが複数の場合は個別送信
  owners.forEach(s=>{
    msgs.unshift({
      id:genId(),
      title:year+'年'+month+'月 '+storeName+' 確定シフト（確認依頼）',
      body: lines.join('\n'),
      to:'individual',
      toId:s.id,
      toName:s.name,
      date:today(),
      from:S.user?.id||'',

function autoGenShift(store, year, month){
  if(!confirm('稼働率と希望休を元に自動でシフトを生成します。\n現在のシフトは上書きされます。よろしいですか？')) return;

  const staff = STAFF_LIST.filter(s=>s.treat&&(s.store===store||s.store==='both')&&!s.noSales);
  const reqs = DB.getShiftRequests().filter(r=>r.year===year&&r.month===month);
  const apprv = DB.getApprovedOff(store,year,month);
  const allOcc = getAllOccData(store);
  const last = new Date(year,month,0).getDate();
  const DOW = ['日','月','火','水','木','金','土'];
  const newSched = {};

  // 曜日別の平均稼働率・推奨人数を計算
  const dowStats = Array(7).fill(null).map(()=>({count:0,totalR:0}));
  Object.entries(allOcc).forEach(([date,d])=>{
    const dow = new Date(date).getDay();
    dowStats[dow].count++;
    dowStats[dow].totalR += d.r||0;
  });

  const seats = store==='A'?6:3;

  for(let d=1;d<=last;d++){
    const dk = year+'-'+String(month).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dow = new Date(year,month-1,d).getDay();
    const stat = dowStats[dow];
    const avgR = stat.count>0 ? Math.round(stat.totalR/stat.count) : 70;

    // 必要スタッフ数を稼働率から算出
    const neededStaff = Math.max(1, Math.min(seats, Math.ceil(avgR/100*seats)));

    // 休み希望・承認済を除いた利用可能なスタッフ
    const available = staff.filter(s=>{
      const req = reqs.find(r=>r.staffId===s.id);
      const reqOff = req&&(req.offDays||[]).includes(dk);
      const apprvOff = (apprv[s.id]||[]).includes(dk);
      return !reqOff && !apprvOff;
    });

    // 業務委託（contractor）は最後に
    const regular = available.filter(s=>!s.contractor);
    const contractors = available.filter(s=>s.contractor);
    const sorted = [...regular, ...contractors];

    // 必要人数分のスタッフを割り当て
    newSched[dk] = sorted.slice(0,neededStaff).map(s=>s.name);
  }

  DB.setShiftSchedule(store, year, month, newSched);

  // 結果サマリーを表示
  const totalDays = Object.keys(newSched).length;
  const avgStaff = Math.round(Object.values(newSched).reduce((a,v)=>a+v.length,0)/totalDays*10)/10;
  alert('✅ シフトを自動生成しました！\n\n'
    +'期間: '+year+'年'+month+'月（全'+totalDays+'日）\n'
    +'平均出勤人数: '+avgStaff+'名/日\n\n'
    +'内容を確認して調整してください。');
  render();
}

  const idx = list.findIndex(d=>d.id===id);
  if(idx<0) return;

  list[idx] = {

    updatedAt: today(),
    updatedBy: S.user?.name,
    // 更新があった場合、習得状態をリセット（未確認に）
    progress: notify ? Object.fromEntries(
      Object.keys(list[idx].progress||{}).map(uid=>[uid, '未確認'])
    ) : list[idx].progress
  };
  DB.set('designs', list);

  // 通知メッセージ送信
  if(notify){
    const msgs = DB.getMessages()||[];
    const targets = (list[idx].targetStaffIds
      ? STAFF_LIST.filter(s=>list[idx].targetStaffIds.includes(s.id))
      : STAFF_LIST.filter(s=>s.treat)
    ).filter(s=>s.id!==S.user?.id);

    targets.forEach(s=>{
      msgs.unshift({
        id:genId(),
        title:`🔄【デザイン更新】${title}`,
        body:`${S.user?.name}がデザインを更新しました。\n内容を確認してください。`,
        from:S.user?.id, fromName:S.user?.name,
        to:'individual', toId:s.id, toName:s.name,
        date:today(), readBy:[], progress:{[s.id]:'未対応'}
      });
    });
    if(targets.length>0) DB.set('messages', msgs);
  }
  closeModal();
  alert('✅ 更新しました！'+(notify?`\n${(list[idx].targetStaffIds?.length||STAFF_LIST.filter(s=>s.treat).length)}名に通知を送りました。`:''));
  render();

function showModal(content){
  const existing=document.getElementById('modalOverlay');
  if(existing) existing.remove();
  const el=document.createElement('div');
  el.className='modal-overlay';
  el.id='modalOverlay';
  el.innerHTML=`<div class="modal-sheet">
    <div class="modal-handle"></div>
    ${content}
  </div>`;
  el.addEventListener('click',e=>{if(e.target===el)closeModal();});
  document.body.appendChild(el);
  // モーダル内の画像にもタップ拡大を適用
  setTimeout(function(){
    el.querySelectorAll('img:not([data-no-expand])').forEach(function(img){
      if(img.dataset.expandBound) return;
      img.dataset.expandBound='1';
      img.style.cursor='zoom-in';
      img.addEventListener('click',function(e){
        e.stopPropagation();
        if(!img.src||img.src===window.location.href) return;
        // モーダルを閉じずに全画面表示
        const overlay=document.createElement('div');
        overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:99999;display:flex;align-items:center;justify-content:center;cursor:pointer';
        overlay.onclick=function(){document.body.removeChild(overlay);};
        const pic=document.createElement('img');
        pic.src=img.src;
        pic.style.cssText='max-width:100%;max-height:90vh;border-radius:8px;object-fit:contain';
        const closeBtn=document.createElement('button');
        closeBtn.innerHTML='×';
        closeBtn.style.cssText='position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:28px;width:44px;height:44px;border-radius:50%;cursor:pointer';
        closeBtn.onclick=function(e){e.stopPropagation();document.body.removeChild(overlay);};
        overlay.appendChild(pic);
        overlay.appendChild(closeBtn);
        document.body.appendChild(overlay);
      });
    });
  },100);
}

function closeModal(){
  const el=document.getElementById('modalOverlay');
  if(el) el.remove();
}

  const approvedOff = DB.getApprovedOff(store, year, month);
  const requests = DB.getShiftRequests().filter(r=>r.year===year&&r.month===month&&(r.offDays||[]).length>0);
  if(requests.length===0){
    container.innerHTML = '<div style="font-size:13px;color:var(--mid)">希望休の提出はありません</div>';
    return;
  }
  let html = '';
  requests.forEach(function(req){
    const s = STAFF_LIST.find(function(x){return x.id===req.staffId;});
    if(!s) return;
    const approved = approvedOff[req.staffId]||[];
    html += '<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)">';
    html += '<div class="fw-bold" style="margin-bottom:6px">'+s.name+'の希望休</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:4px">';
    (req.offDays||[]).forEach(function(dk){
      const d = parseInt(dk.slice(8));
      const dow = ['日','月','火','水','木','金','土'][new Date(dk).getDay()];
      const isApproved = approved.includes(dk);
      html += '<button onclick="toggleApproveOff(\''+store+'\','+year+','+month+',\''+req.staffId+'\',\''+dk+'\')" ';
      html += 'style="padding:5px 10px;border-radius:20px;border:1.5px solid '+(isApproved?'var(--success)':'var(--border)')+';';
      html += 'background:'+(isApproved?'#E8F5E9':'#fff')+';color:'+(isApproved?'var(--success)':'var(--mid)')+';';
      html += 'font-size:12px;font-weight:600;cursor:pointer">';
      html += (isApproved?'✅ ':'')+d+'日（'+dow+'）';
      html += '</button>';
    });
    html += '</div>';
    if(approved.length>0){
      html += '<div style="font-size:10px;color:var(--mid);margin-top:4px">✅ 承認済: '+approved.map(function(d){return parseInt(d.slice(8))+'日';}).join('・')+'</div>';
    }
    html += '</div>';
  });
  container.innerHTML = html;
}

function sendShiftReminder(year, month, targetId){
  const requests = DB.getShiftRequests();
  const monthReqs = requests.filter(r=>r.year===year&&r.month===month);
  const adminStore = !isOwner() && S.user?.shiftAdmin ? S.user.shiftAdmin : null;
  const allStaff = STAFF_LIST.filter(s=>s.treat&&(adminStore?s.store===adminStore||s.store==='both':true));
  const notSubmitted = allStaff.filter(s=>!monthReqs.some(r=>r.staffId===s.id));
  const targets = targetId==='all' ? notSubmitted : notSubmitted.filter(s=>s.id===targetId);

  if(targets.length===0){ alert('催促対象がいません'); return; }
  if(!confirm(targets.map(s=>s.name).join('・')+'にシフト希望の催促を送りますか？')) return;

  const msgs = DB.getMessages();
  targets.forEach(s=>{
    msgs.unshift({
      id: genId(),
      title: `【催促】${year}年${month}月 シフト希望を提出してください`,
      body: `${s.name}さん\n\n${year}年${month}月のシフト希望がまだ提出されていません。\n早めに提出をお願いします🙏\n\nシフト希望 → メニュー → 📅 シフト希望`,
      from: S.user.id, fromName: S.user.name,
      to: 'individual', toId: s.id, toName: s.name,
      date: today(), readBy: [], progress: {[s.id]: '未対応'}
    });
  });
  DB.set('messages', msgs);
  alert(`✅ ${targets.map(s=>s.name).join('・')}に催促を送りました！`);
  render();
}

function sendDMChatBtn(btn){
  sendDMChat(btn.dataset.sroom);
}
function handleDMEnter(e, input){
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    sendDMChat(input.dataset.room);
  }
}
function sendDMChat(room){
  const input = document.getElementById('dmChatInput');
  if(!input) return;
  const text = input.value.trim();
  if(!text) return;
  const d = new Date();
  const time = (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  const msg = {id:genId(),text,room,type:'text',senderId:S.user?.id||'',senderName:S.user?.name||'',time};
  if(window._replyTo&&window._replyTo.room===room){
    msg.replyTo={fbKey:window._replyTo.fbKey,senderName:window._replyTo.senderName,text:decodeURIComponent(window._replyTo.text)};
    window._replyTo=null;
  }
  DB.addChat(room, msg);
  input.value='';
  setTimeout(function(){ var b=document.getElementById('dmChatBox'); if(b) b.scrollTop=b.scrollHeight; },80);
}

function sendMediaBtn(input){
  const room = input.dataset.room;
  const file = input.files[0];
  if(!file||!room) return;
  if(file.size>50*1024*1024){ alert('ファイルサイズは50MB以下にしてください'); return; }
  const isVideo = file.type.startsWith('video/');
  const reader = new FileReader();
  reader.onload = function(e){
    const d = new Date();
    const time = (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    DB.addChat(room, {
      id:genId(), room,
      type: isVideo?'video':'image',
      imageUrl: isVideo?null:e.target.result,
      videoUrl: isVideo?e.target.result:null,
      text: isVideo?'[動画]':'[画像]',
      senderId:S.user?.id||'',senderName:S.user?.name||'',time
    });
  };
  reader.readAsDataURL(file);
  input.value='';
}

function isSpaceMember(space){
  if(!space) return false;
  if(isOwner()) return true;
  if(space.createdById === S.user?.id) return true;
  return (space.members||[]).includes(S.user?.id);
}

function renderSpaces(){
  const allSpaces = DB.get('chatSpaces')||[];
  const spaces = allSpaces.filter(sp=>isSpaceMember(sp));
  return`<div class="page">
    <div style="font-size:13px;color:var(--mid);margin-bottom:12px">参加中のスペース ${spaces.length}件</div>

function selectAllSpaceMembersAdd(){

function selectSpaceIcon(icon, idx){

function saveSpace(){
  const name = document.getElementById('sp_name')?.value.trim();
  if(!name){ alert('スペース名を入力してください'); return; }
  const desc = document.getElementById('sp_desc')?.value.trim();
  const members = STAFF_LIST.filter(s=>s.id!==S.user?.id&&document.getElementById('sp_m_'+s.id)?.checked).map(s=>s.id);
  const spaces = DB.get('chatSpaces')||[];
  const id = 'space_'+genId();
  spaces.push({id, name, desc, icon:window._selectedSpaceIcon||'💬', createdBy:S.user?.name, createdById:S.user?.id, members, createdAt:today()});
  DB.set('chatSpaces', spaces);
  closeModal(); render();
  alert('✅ スペースを作成しました！招待メンバー: '+(members.length)+'名');
}

function showSpaceMemberModal(spaceId){
  const spaces = DB.get('chatSpaces')||[];
  const sp = spaces.find(s=>s.id===spaceId);
  if(!sp) return;
  const currentMembers = sp.members||[];
  const allStaff = STAFF_LIST.filter(s=>s.id!==sp.createdById);
  showModal(`<div class="modal-title">👥 ${sp.name} のメンバー</div>

function saveSpaceMembers(spaceId){
  const spaces = DB.get('chatSpaces')||[];
  const idx = spaces.findIndex(s=>s.id===spaceId);
  if(idx<0) return;
  const members = STAFF_LIST.filter(s=>s.id!==spaces[idx].createdById&&document.getElementById('spm_'+s.id)?.checked).map(s=>s.id);
  spaces[idx].members = members;
  DB.set('chatSpaces', spaces);
  closeModal(); render();
}

function deleteSpace(spaceId){
  if(!confirm('このスペースを削除しますか？')) return;
  const spaces = DB.get('chatSpaces')||[];
  DB.set('chatSpaces', spaces.filter(s=>s.id!==spaceId));
  if(window._fbDB) window._fbDB.ref(window._chatsBasePath+'/'+spaceId).set(null);
  render();
}

// ===== スペース タスク機能 =====
function showCreateSpaceTaskModal(spaceId){
  const spaces = DB.get('chatSpaces')||[];
  const space = spaces.find(function(s){return s.id===spaceId;})||{};
  const members = (space.members||[]).map(function(id){
    return STAFF_LIST.find(function(s){return s.id===id;});
  }).filter(Boolean);

  showModal(`<div class="modal-title">📋 タスクを作成</div>
    <div class="form-group"><label class="form-label">タスク名 <span style="color:var(--danger)">*</span></label>
      <input class="form-input" id="st_title" placeholder="例: 商品棚の整理・マニュアル更新"></div>
    <div class="form-group"><label class="form-label">詳細（任意）</label>
      <textarea class="form-input" id="st_body" rows="3" placeholder="詳しい説明や手順など"></textarea></div>
    <div class="form-group"><label class="form-label">期限（任意）</label>
      <input type="date" class="form-input" id="st_deadline"></div>
    <div class="form-group"><label class="form-label">担当者（複数選択可）</label>
      <div style="display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto">
        <label style="display:flex;align-items:center;gap:8px;padding:8px;background:#f8f8f8;border-radius:8px;cursor:pointer">
          <input type="checkbox" id="st_all" onchange="toggleAllAssignees(this)" style="width:18px;height:18px">
          <span style="font-size:13px;font-weight:600">👥 全員</span>
        </label>
        ${members.map(function(s){
          return '<label style="display:flex;align-items:center;gap:8px;padding:8px;background:#f8f8f8;border-radius:8px;cursor:pointer">'
            +'<input type="checkbox" class="st_assignee" value="'+s.id+'" style="width:18px;height:18px">'
            +'<span style="font-size:13px">'+s.name+'（'+s.title+'）</span>'
            +'</label>';
        }).join('')}
      </div>
    </div>
    <button class="btn btn-primary btn-block" onclick="saveSpaceTask('${spaceId}')">📋 作成する</button>`);
}

function toggleAllAssignees(cb){
  document.querySelectorAll('.st_assignee').forEach(function(el){ el.checked = cb.checked; });
}

function saveSpaceTask(spaceId){
  const title = (document.getElementById('st_title')?.value||'').trim();
  const body = (document.getElementById('st_body')?.value||'').trim();
  const deadline = document.getElementById('st_deadline')?.value||'';
  if(!title){ alert('タスク名を入力してください'); return; }

  const assignees = Array.from(document.querySelectorAll('.st_assignee:checked')).map(function(el){return el.value;});
  const progress = {};
  assignees.forEach(function(id){ progress[id]='未対応'; });

  const tasks = DB.getSpaceTasks(spaceId);
  tasks.unshift({
    id: genId(),
    title, body, deadline,
    assignees,
    progress,
    status: '未対応',
    createdBy: S.user?.id||'',
    createdByName: S.user?.name||'',
    createdAt: Date.now()
  });
  DB.setSpaceTasks(spaceId, tasks);
  closeModal();
  render();
  // チャットに通知
  if(assignees.length>0){
    const d = new Date();
    const time = (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    DB.addChat(spaceId, {id:genId(), text:'📋 新しいタスクが作成されました：「'+title+'」'+(deadline?' (期限: '+fmtDateFull(deadline)+')':''), room:spaceId, senderId:'system', senderName:'タスク', time});
  }
}

function openSpaceTask(spaceId, taskId){
  const tasks = DB.getSpaceTasks(spaceId);
  const task = tasks.find(function(t){return t.id===taskId;});
  if(!task) return;

  const myStatus = (task.progress||{})[S.user?.id]||'未対応';
  const isAssigned = (task.assignees||[]).includes(S.user?.id);
  const progOptions = ['未対応','対応中','完了'];
  const statusColors = {'未対応':'#aaa','対応中':'var(--warn)','完了':'var(--success)'};

  const memberProgress = (task.assignees||[]).map(function(id){
    const s = STAFF_LIST.find(function(x){return x.id===id;});
    const st = (task.progress||{})[id]||'未対応';
    return s ? '<div class="att-item"><span>'+s.name+'</span><span style="font-size:12px;color:'+statusColors[st]+'">'+st+'</span></div>' : '';
  }).join('');

  showModal(`
    <div class="modal-title" style="font-size:16px">📋 ${escapeHtml(task.title)}</div>
    ${task.deadline?`<div style="background:#f8f8f8;border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:10px">📅 期限: <strong>${fmtDateFull(task.deadline)}</strong></div>`:''}
    ${task.body?`<div style="font-size:14px;line-height:1.8;white-space:pre-wrap;background:#f8f8f8;padding:12px;border-radius:10px;margin-bottom:12px">${escapeHtml(task.body)}</div>`:''}
    ${isAssigned?`
    <div style="margin-bottom:14px">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">自分の進捗を更新</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        ${progOptions.map(function(p){
          return '<button onclick="updateSpaceTaskProgress(\''+spaceId+'\',\''+taskId+'\',\''+p+'\')" style="padding:10px 4px;border-radius:10px;border:2px solid '+(myStatus===p?'var(--pink)':'#eee')+';background:'+(myStatus===p?'var(--pink-l)':'#fff')+';cursor:pointer;font-size:13px;font-weight:'+(myStatus===p?'700':'400')+'">'+
            (p==='完了'?'✅':p==='対応中'?'🔄':'⬜')+' '+p+'</button>';
        }).join('')}
      </div>
    </div>`:''}
    ${memberProgress?`<div style="margin-bottom:14px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">メンバーの進捗</div>${memberProgress}</div>`:''}
    <div style="font-size:12px;color:#aaa;margin-bottom:12px">作成: ${escapeHtml(task.createdByName)} · ${fmtDateFull(new Date(task.createdAt).toISOString().slice(0,10))}</div>
    <div style="display:grid;grid-template-columns:${isOwner()||task.createdBy===S.user?.id?'1fr 1fr':'1fr'};gap:8px">
      ${isOwner()||task.createdBy===S.user?.id?`<button class="btn btn-danger btn-sm" onclick="deleteSpaceTask('${spaceId}','${taskId}')">🗑 削除</button>`:''}
      <button class="btn btn-outline btn-sm" onclick="closeModal()">閉じる</button>
    </div>`);
}

function updateSpaceTaskProgress(spaceId, taskId, status){
  const tasks = DB.getSpaceTasks(spaceId);
  const idx = tasks.findIndex(function(t){return t.id===taskId;});
  if(idx>=0){
    if(!tasks[idx].progress) tasks[idx].progress={};
    tasks[idx].progress[S.user?.id] = status;
    // 全員完了なら全体ステータスも完了に
    const assignees = tasks[idx].assignees||[];
    const allDone = assignees.length>0 && assignees.every(function(id){return tasks[idx].progress[id]==='完了';});
    tasks[idx].status = allDone?'完了':status==='完了'?'対応中':tasks[idx].status;
    DB.setSpaceTasks(spaceId, tasks);
    if(status==='完了' && S.user) addPoints(S.user.id,'📋 タスク完了',POINT_RULES.task_done||5);
  }
  closeModal();
  render();
}

function deleteSpaceTask(spaceId, taskId){
  if(!confirm('このタスクを削除しますか？')) return;
  DB.setSpaceTasks(spaceId, DB.getSpaceTasks(spaceId).filter(function(t){return t.id!==taskId;}));
  closeModal();
  render();
}

function createAlbum(spaceId){
  const name = (document.getElementById('album_name')?.value||'').trim();
  if(!name){ alert('アルバム名を入力してください'); return; }
  const albums = DB.getAlbums(spaceId);
  albums.push({
    id: genId(),
    name,
    createdBy: S.user?.id||'',
    createdByName: S.user?.name||'',
    createdAt: Date.now(),
    photos: []
  });
  DB.setAlbums(spaceId, albums);
  closeModal();
  render();
}

function addPhotosToAlbum(input){
  const spaceId = input.dataset.space;
  const albumId = input.dataset.album;
  if(!input.files||!spaceId||!albumId) return;
  const files = Array.from(input.files);
  let loaded = 0;
  files.forEach(function(file){
    const reader = new FileReader();
    reader.onload = function(e){
      const albums = DB.getAlbums(spaceId);
      const idx = albums.findIndex(function(a){ return a.id===albumId; });
      if(idx>=0){
        if(!albums[idx].photos) albums[idx].photos=[];
        albums[idx].photos.push({
          url: e.target.result,
          caption: '',
          uploadedBy: S.user?.id||'',
          uploadedByName: S.user?.name||'',
          uploadedAt: Date.now()
        });
        DB.setAlbums(spaceId, albums);
      }
      loaded++;
      if(loaded===files.length) render();
    };
    reader.readAsDataURL(file);
  });
}

function openAlbumPhoto(spaceId, albumId, idx){
  const albums = DB.getAlbums(spaceId);
  const album = albums.find(function(a){ return a.id===albumId; });
  if(!album) return;
  const photos = (album.photos||[]).slice().reverse();
  const photo = photos[idx];
  if(!photo) return;

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center';

  const img = document.createElement('img');
  img.src = photo.url;
  img.style.cssText = 'max-width:100%;max-height:75vh;object-fit:contain;border-radius:8px';

  const info = document.createElement('div');
  info.style.cssText = 'color:#fff;font-size:12px;margin-top:12px;text-align:center;padding:0 20px';
  info.innerHTML = (photo.caption?'<div style="font-size:14px;margin-bottom:6px">'+escapeHtml(photo.caption)+'</div>':'')
    + '<div style="color:#aaa">'+photo.uploadedByName+' · '+new Date(photo.uploadedAt).toLocaleDateString('ja-JP')+'</div>';

  const closeBtn = document.createElement('button');
  closeBtn.innerHTML = '×';
  closeBtn.style.cssText = 'position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:28px;width:44px;height:44px;border-radius:50%;cursor:pointer';
  closeBtn.onclick = function(){ document.body.removeChild(overlay); };

  // キャプション編集（アップロード者またはオーナー）
  if(isOwner()||photo.uploadedBy===S.user?.id){
    const editBtn = document.createElement('button');
    editBtn.innerHTML = '✏️ キャプション';
    editBtn.style.cssText = 'margin-top:10px;background:rgba(255,255,255,.15);border:none;color:#fff;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px';
    editBtn.onclick = function(){
      const cap = prompt('キャプションを入力:', photo.caption||'');
      if(cap===null) return;
      const als = DB.getAlbums(spaceId);
      const ai = als.findIndex(function(a){return a.id===albumId;});
      if(ai>=0){
        const pi = (als[ai].photos||[]).length - 1 - idx;
        if(als[ai].photos[pi]) als[ai].photos[pi].caption = cap;
        DB.setAlbums(spaceId, als);
      }
      document.body.removeChild(overlay);
      render();
    };
    overlay.appendChild(editBtn);
  }

  overlay.onclick = function(e){ if(e.target===overlay) document.body.removeChild(overlay); };
  overlay.appendChild(closeBtn);
  overlay.appendChild(img);
  overlay.appendChild(info);
  document.body.appendChild(overlay);
}

  DB.setAlbums(spaceId, albums);
  S.albumId = null;
  render();
}

function renderMgmtChat(){
  const room = 'mgmt';
  const msgs = DB.getChats(room).slice(-100);
  const reactions = window._fbReactions[room]||{};
  const MGMT_MEMBERS = STAFF_LIST.filter(s=>isOwner()||(s.id==='misa'||s.id==='wakana'||s.role==='admin'||s.role==='owner'));
  let h = '';
  h += '<div style="background:#f0f0ff;border-radius:10px;padding:8px 12px;margin-bottom:8px;font-size:12px;color:#555">';
  h += '👔 オーナー・misa・wakana 専用チャット</div>';
  h += '<div id="mgmtChatBox" style="height:calc(100vh - 280px);overflow-y:auto;padding:12px;background:#f8f5ff;border-radius:12px;margin-bottom:8px">';
  if(!msgs.length) h += '<div style="text-align:center;color:#aaa;font-size:13px;padding-top:40px">まだメッセージがありません</div>';
  msgs.forEach(function(m){
    const isMe = m.senderId===S.user?.id;
    const fbKey = m._fbKey||'';
    const canDelete = isMe && (Date.now()-(m.ts||0)) < 5*60*1000;
    const msgReactions = (reactions[fbKey])||{};
    const reactCounts = {};
    Object.values(msgReactions).forEach(function(e){ reactCounts[e]=(reactCounts[e]||0)+1; });
    const myReaction = msgReactions[S.user?.id]||'';
    h += '<div style="display:flex;flex-direction:'+(isMe?'row-reverse':'row')+';align-items:flex-end;gap:6px;margin-bottom:8px">';
    h += '<div style="font-size:11px;color:#888;flex-shrink:0;padding-bottom:2px">'+m.senderName+'</div>';
    h += '<div style="max-width:75%">';
    if(m.type==='image'){
      h += '<img src="'+m.imageUrl+'" style="max-width:200px;max-height:200px;border-radius:12px;display:block">';
    } else {
      h += '<div style="padding:10px 14px;border-radius:'+(isMe?'18px 4px 18px 18px':'4px 18px 18px 18px')+';background:'+(isMe?'#7c4dff':'#fff')+';color:'+(isMe?'#fff':'#333')+';font-size:14px;line-height:1.5;word-break:break-word;box-shadow:0 1px 3px rgba(0,0,0,.1)">'+formatChatText(m.text)+'</div>';
    }
    if(Object.keys(reactCounts).length>0){
      h += '<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;'+(isMe?'justify-content:flex-end':'')+'">';
      Object.entries(reactCounts).forEach(function(entry){
        const isMine = myReaction===entry[0];
        h += '<button onclick="toggleReaction(\'mgmt\',\''+fbKey+'\',\''+entry[0]+'\')" style="padding:2px 6px;border-radius:10px;border:1.5px solid '+(isMine?'#7c4dff':'#ddd')+';background:'+(isMine?'#ede7f6':'#fff')+';cursor:pointer;font-size:12px">'+entry[0]+' '+entry[1]+'</button>';
      });
      h += '</div>';
    }
    h += '<div style="font-size:10px;color:#bbb;margin-top:2px;display:flex;gap:6px;'+(isMe?'justify-content:flex-end':'')+'">';
    h += '<span>'+m.time+'</span>';
    if(fbKey) h += '<button onclick="showReactionPicker(\'mgmt\',\''+fbKey+'\')" style="background:none;border:none;cursor:pointer;font-size:12px;color:#ccc;padding:0">＋😊</button>';
    if(canDelete) h += '<button onclick="deleteChatMsg(\'mgmt\',\''+fbKey+'\')" style="background:none;border:none;cursor:pointer;font-size:11px;color:#ffb3b3;padding:0">🗑️</button>';
    h += '</div></div></div>';
  });
  h += '</div>';
  h += '<div style="display:flex;gap:8px;align-items:center">';
  h += '<label style="width:40px;height:40px;border-radius:50%;background:#f0f0ff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">📷<input type="file" accept="image/*" style="display:none" onchange="sendChatPhoto(\'mgmt\',this)"></label>';
  h += '<input id="mgmtChatInput" placeholder="メッセージを入力..." style="flex:1;padding:10px 14px;border:1.5px solid #c5b8f5;border-radius:22px;font-size:14px;outline:none;font-family:inherit">';
  h += '<button onclick="sendMgmtChat()" style="width:44px;height:44px;border-radius:50%;background:#7c4dff;border:none;color:#fff;font-size:22px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">↑</button>';
  h += '</div>';
  setTimeout(function(){ const b=document.getElementById('mgmtChatBox'); if(b) b.scrollTop=b.scrollHeight; },80);
  return h;
}

function sendMgmtChat(){
  const input = document.getElementById('mgmtChatInput');
  if(!input) return;
  const text = input.value.trim();
  if(!text) return;
  const d = new Date();
  const time = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  DB.addChat('mgmt',{id:genId(),text,room:'mgmt',senderId:S.user?.id||'',senderName:S.user?.name||'',time});

  setTimeout(()=>{ const b=document.getElementById('mgmtChatBox'); if(b) b.scrollTop=b.scrollHeight; },100);
}

function saveMeeting(editId){
  const allMgmt = STAFF_LIST.filter(s=>s.role==='admin'||s.role==='owner'||s.id==='misa'||s.id==='wakana');
  const title = document.getElementById('mt_title').value.trim();
  const date = document.getElementById('mt_date').value;
  const time = document.getElementById('mt_time').value;
  const location = document.getElementById('mt_location').value.trim();
  const note = document.getElementById('mt_note').value.trim();
  const participants = allMgmt.filter(s=>document.getElementById('mt_p_'+s.id)?.checked).map(s=>s.name);
  if(!title||!date) return alert('タイトルと日付を入力してください');
  const list = DB.get('meetings')||[];
  if(editId){
    const idx = list.findIndex(m=>m.id===editId);
    if(idx>=0) list[idx]={...list[idx],title,date,time,location,note,participants};
  } else {
    list.unshift({id:genId(),title,date,time,location,note,participants,status:'提案中',createdBy:S.user?.name,createdAt:today()});
  }
  DB.set('meetings',list);
  closeModal(); render();
}

function updateMeeting(id, status){
  if(status==='キャンセル'&&!confirm('キャンセルしますか？')) return;
  const list = DB.get('meetings')||[];
  const idx = list.findIndex(m=>m.id===id);
  if(idx>=0) list[idx].status=status;
  DB.set('meetings',list);
  render();
}

function getHRMonthKey(){ const d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1); }

  const hrStore = isOwner() ? (S.hrStore||'A') : (S.user?.id==='wakana'?'A':'B');
  const monthKey = S.hrMonth || getHRMonthKey();
  const allNotes = DB.get('hrNotes2')||{};

  const selectedStaff = S.hrStaff||null;
  const [evalYear, evalMonth] = monthKey.split('-').map(Number);

  const evalTargets = STAFF_LIST.filter(s=>{
    if(s.id===S.user?.id) return false;
    if(s.role==='admin'||s.role==='owner') return false;
    return s.store===hrStore;
  });

  // 提出期限

  for(let i=0;i<3;i++){

  if(!allNotes[monthKey]) allNotes[monthKey]={};
  if(!allNotes[monthKey][staffId]) allNotes[monthKey][staffId]={};
  allNotes[monthKey][staffId]['r_'+catId] = allNotes[monthKey][staffId]['r_'+catId]===val ? 0 : val;
  allNotes[monthKey][staffId].updatedAt = today();
  allNotes[monthKey][staffId].updatedBy = S.user?.name;
  DB.set('hrNotes2', allNotes);
  render();
}

function saveHRNote2(staffId, monthKey){

  if(!allNotes[monthKey][staffId]) allNotes[monthKey][staffId]={};
  allNotes[monthKey][staffId].comment = comment;
  allNotes[monthKey][staffId].updatedAt = today();
  allNotes[monthKey][staffId].updatedBy = S.user?.name;

function submitHREval(monthKey){

  if(!allNotes[monthKey]) allNotes[monthKey]={};

function connectWithCode(){
  const code = (document.getElementById('salon_code_input')?.value||'').trim().toLowerCase();
  if(!code){ alert('コードを入力してください'); return; }
  // コードで名前空間を設定してFirebaseに接続
  localStorage.setItem('salon_ns', code);
  window._salonNs = code;
  window._dataPath = '/salons/'+code;
  window._chatsBasePath = '/salons/'+code+'/chats';
  window._reactionsBasePath = '/salons/'+code+'/reactions';
  window._pinnedBasePath = '/salons/'+code+'/pinned';
  window._chatReadBasePath = '/salons/'+code+'/chatRead';
  closeModal();
  // Firebaseを再接続してデータ確認
  if(window._fbDB){
    window._fbDB.ref(window._dataPath+'/appConfig').once('value', function(snap){
      if(snap.val()){
        // アプリ設定が存在 → ログイン画面へ
        window._fbCache = {};
        window._fbReady = false;
        // メインリスナーを再設定
        window._fbDB.ref(window._dataPath).on('value', function(s){
          window._fbCache = s.val()||{};
          window._fbReady = true;
          STAFF_LIST = loadStaffList();
          if(window._appMounted) render();
        });
        S.page='login'; render();
      } else {
        alert('❌ このコードのサロンが見つかりません。\nコードを確認してください。');
        localStorage.removeItem('salon_ns');
      }
    });
  } else {
    S.page='login'; render();
  }
}

function saveStaffMember(editId){
  const id = (document.getElementById('ns_id')?.value||'').trim();
  const name = (document.getElementById('ns_name')?.value||'').trim();
  const role = document.getElementById('ns_role')?.value||'staff';
  const title = (document.getElementById('ns_title')?.value||'').trim()||'スタッフ';
  const store = document.getElementById('ns_store')?.value||'A';
  const contractor = document.getElementById('ns_contractor')?.value==='1';
  const pin = (document.getElementById('ns_pin')?.value||'').trim();
  if(!name){ alert('名前を入力してください'); return; }
  const newStaff = {
    id: editId||id||name.toLowerCase()+'_'+Date.now(),
    name, role, title, store, contractor,
    treat: role!=='admin'&&role!=='owner',
    noSales: role==='admin'||role==='owner',
    noRank: role==='admin'||role==='owner',
    pin: pin||''
  };
  let list = [...STAFF_LIST];
  if(editId){
    const idx = list.findIndex(s=>s.id===editId);
    if(idx>=0) list[idx]={...list[idx],...newStaff};
  } else {
    list.push(newStaff);
  }
  saveStaffConfig(list);
  // PIN保存
  if(pin){
    const pins = DB.getPins()||{};
    pins[newStaff.id] = pin;
    DB.setPins(pins);
  }
  closeModal(); render();
  alert('✅ '+(editId?'更新':'追加')+'しました！');
}

function deleteStaffMember(id){
  if(!confirm('このスタッフを削除しますか？')) return;
  const list = STAFF_LIST.filter(s=>s.id!==id);
  saveStaffConfig(list);
  render();
}

// 退社（inactiveフラグ → データ保持・一覧から非表示）
function retireStaff(id, encodedName){
  const name = decodeURIComponent(encodedName);
  if(!confirm(name+'さんを退社処理しますか？\n（データは保持されます。元に戻すことも可能です）')) return;
  const list = STAFF_LIST.map(s=> s.id===id ? Object.assign({},s,{inactive:true, retiredAt: today()}) : s);
  saveStaffConfig(list);
  render();
  alert('✅ '+name+'さんを退社処理しました');
}

// 復帰（inactiveフラグ解除）
function reinstateStaff(id){
  const s = STAFF_LIST.find(x=>x.id===id);
  if(!s) return;
  if(!confirm(s.name+'さんを復帰させますか？')) return;
  const list = STAFF_LIST.map(x=> x.id===id ? Object.assign({},x,{inactive:false, retiredAt:null}) : x);
  saveStaffConfig(list);
  render();
  alert('✅ '+s.name+'さんを復帰させました');
}


// ============================================================
// INIT
// ============================================================
window._appMounted = true;
// 初回セットアップチェック
if(isFirstRun()) { S.page = 'setup'; }
render();</script>

function sendDoubleCheckRequest(store, year, month){
  // 対象店舗の業務委託スタッフを取得
  const contractors = STAFF_LIST.filter(s => s.contractor && (s.store === store || s.store === 'both'));
  if(contractors.length === 0){
    alert('この店舗に業務委託スタッフがいません');
    return;
  }

  const sched = DB.getShiftSchedule(store, year, month);
  const storeName = store === 'A' ? '浦和店' : '広尾店';
  const last = new Date(year, month, 0).getDate();
  const DOW = ['日','月','火','水','木','金','土'];

  // シフト内容テキスト作成
  let shiftText = year+'年'+month+'月 確定シフト（'+storeName+'）\n\n';
  for(let d = 1; d <= last; d++){
    const dk = year+'-'+String(month).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const ds = sched[dk] || [];
    if(ds.length === 0) continue;
    const dow = DOW[new Date(year, month-1, d).getDay()];
    shiftText += month+'/'+d+'（'+dow+'） ' + ds.join('・') + '\n';
  }

  if(!confirm(contractors.map(s=>s.name).join('・') + '\nにダブルチェック依頼を送りますか？')) return;

  // 各業務委託スタッフにメッセージ送信
  const msgs = DB.getMessages();
  contractors.forEach(c => {
    msgs.unshift({
      id: genId(),
      title: '【ダブルチェック依頼】'+year+'年'+month+'月 シフト確認',
      body: 'シフトの内容をご確認ください。\n\n'+shiftText+'\n問題がなければ「✅ 確認済み」に進捗を更新してください。',
      from: S.user.id,
      fromName: S.user.name,
      to: 'individual',
      toId: c.id,
      toName: c.name,
      date: today(),
      readBy: [],
      progress: {[c.id]: '未対応'}
    });
  });
  DB.set('messages', msgs);

  alert('✅ '+contractors.map(s=>s.name).join('・')+'にダブルチェック依頼を送りました！');
  render();
}

function shareShiftToOwner(store, year, month){
  const sched = DB.getShiftSchedule(store, year, month);
  const allOcc = getAllOccData(store);
  const storeName = store==='A'?'浦和店':'広尾店';
  const last = new Date(year,month,0).getDate();
  const DOW = ['日','月','火','水','木','金','土'];

  // シフト内容を組み立て
  let lines = [];
  lines.push('📅 '+year+'年'+month+'月 確定シフト（'+storeName+'）');
  lines.push('（稼働率データを参照して自動生成）');
  lines.push('');

  let hasData = false;
  for(let d=1;d<=last;d++){
    const dk = year+'-'+String(month).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const ds = sched[dk]||[];
    if(ds.length===0) continue;
    hasData = true;
    const dow = DOW[new Date(year,month-1,d).getDay()];
    const occ = allOcc[dk];
    const occStr = occ ? ' (稼働率参考:'+occ.r+'%)' : '';
    lines.push(month+'/'+d+'（'+dow+'）'+occStr);
    lines.push('  出勤: '+ds.join('・'));
  }

  if(!hasData){
    alert('まだシフトが設定されていません。\n先に自動生成か手動でシフトを組んでください。');
    return;
  }

  // オーナー全員にメッセージ送信
  const owners = STAFF_LIST.filter(s=>s.role==='admin'||s.role==='owner');
  const progress = {};
  owners.forEach(s=>progress[s.id]='未対応');

  const msgs = DB.getMessages();
  msgs.unshift({
    id:genId(),
    title:year+'年'+month+'月 '+storeName+' 確定シフト（確認依頼）',
    body: lines.join('\n'),
    to:'individual',
    toId: owners.length===1?owners[0].id:'',
    toName: owners.map(s=>s.name).join('・'),
    date:today(),
    from:S.user?.id||'',
    fromName:S.user?.name||'',
    readBy:[S.user?.id||''],
    progress: progress,
    type:'shiftShare'
  });

  // オーナーが複数の場合は個別送信
  owners.forEach(s=>{
    msgs.unshift({
      id:genId(),
      title:year+'年'+month+'月 '+storeName+' 確定シフト（確認依頼）',
      body: lines.join('\n'),
      to:'individual',
      toId:s.id,
      toName:s.name,
      date:today(),
      from:S.user?.id||'',
      fromName:S.user?.name||'',
      readBy:[S.user?.id||''],
      progress:{[s.id]:'未対応'},
      type:'shiftShare'
    });
  });

  DB.set('messages',msgs);
  alert('✅ '+owners.map(s=>s.name).join('・')+'さんにシフトを共有しました！\nメッセージ画面で確認できます。');
  render();
}

function autoGenShift(store, year, month){
  if(!confirm('稼働率と希望休を元に自動でシフトを生成します。\n現在のシフトは上書きされます。よろしいですか？')) return;

  const staff = STAFF_LIST.filter(s=>s.treat&&(s.store===store||s.store==='both')&&!s.noSales);
  const reqs = DB.getShiftRequests().filter(r=>r.year===year&&r.month===month);
  const apprv = DB.getApprovedOff(store,year,month);
  const allOcc = getAllOccData(store);
  const last = new Date(year,month,0).getDate();
  const DOW = ['日','月','火','水','木','金','土'];
  const newSched = {};

  // 曜日別の平均稼働率・推奨人数を計算
  const dowStats = Array(7).fill(null).map(()=>({count:0,totalR:0}));
  Object.entries(allOcc).forEach(([date,d])=>{
    const dow = new Date(date).getDay();
    dowStats[dow].count++;
    dowStats[dow].totalR += d.r||0;
  });

  const seats = store==='A'?6:3;

  for(let d=1;d<=last;d++){
    const dk = year+'-'+String(month).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dow = new Date(year,month-1,d).getDay();
    const stat = dowStats[dow];
    const avgR = stat.count>0 ? Math.round(stat.totalR/stat.count) : 70;

    // 必要スタッフ数を稼働率から算出
    const neededStaff = Math.max(1, Math.min(seats, Math.ceil(avgR/100*seats)));

    // 休み希望・承認済を除いた利用可能なスタッフ
    const available = staff.filter(s=>{
      const req = reqs.find(r=>r.staffId===s.id);
      const reqOff = req&&(req.offDays||[]).includes(dk);
      const apprvOff = (apprv[s.id]||[]).includes(dk);
      return !reqOff && !apprvOff;
    });

    // 業務委託（contractor）は最後に
    const regular = available.filter(s=>!s.contractor);
    const contractors = available.filter(s=>s.contractor);
    const sorted = [...regular, ...contractors];

    // 必要人数分のスタッフを割り当て
    newSched[dk] = sorted.slice(0,neededStaff).map(s=>s.name);
  }

  DB.setShiftSchedule(store, year, month, newSched);

  // 結果サマリーを表示
  const totalDays = Object.keys(newSched).length;
  const avgStaff = Math.round(Object.values(newSched).reduce((a,v)=>a+v.length,0)/totalDays*10)/10;
  alert('✅ シフトを自動生成しました！\n\n'
    +'期間: '+year+'年'+month+'月（全'+totalDays+'日）\n'
    +'平均出勤人数: '+avgStaff+'名/日\n\n'
    +'内容を確認して調整してください。');
  render();
}

  const el=document.createElement('div');
  el.className='modal-overlay';
  el.id='modalOverlay';
  el.innerHTML=`<div class="modal-sheet">

  el.addEventListener('click',e=>{if(e.target===el)closeModal();});

  const approvalList = document.getElementById('approvalList');
  if(approvalList && S.page==='shiftInput'){
    const store2 = S.shiftInStore||'A';
    const year2 = S.shiftInYear||new Date().getFullYear();
    const month2 = S.shiftInMonth!==undefined?S.shiftInMonth:new Date().getMonth()+1;
    renderApprovalList(store2, year2, month2, approvalList);
  }
}

function renderApprovalList(store, year, month, container){
  const approvedOff = DB.getApprovedOff(store, year, month);
  const requests = DB.getShiftRequests().filter(r=>r.year===year&&r.month===month&&(r.offDays||[]).length>0);
  if(requests.length===0){
    container.innerHTML = '<div style="font-size:13px;color:var(--mid)">希望休の提出はありません</div>';
    return;
  }
  let html = '';
  requests.forEach(function(req){
    const s = STAFF_LIST.find(function(x){return x.id===req.staffId;});
    if(!s) return;
    const approved = approvedOff[req.staffId]||[];
    html += '<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)">';
    html += '<div class="fw-bold" style="margin-bottom:6px">'+s.name+'の希望休</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:4px">';
    (req.offDays||[]).forEach(function(dk){
      const d = parseInt(dk.slice(8));
      const dow = ['日','月','火','水','木','金','土'][new Date(dk).getDay()];
      const isApproved = approved.includes(dk);
      html += '<button onclick="toggleApproveOff(\''+store+'\','+year+','+month+',\''+req.staffId+'\',\''+dk+'\')" ';
      html += 'style="padding:5px 10px;border-radius:20px;border:1.5px solid '+(isApproved?'var(--success)':'var(--border)')+';';
      html += 'background:'+(isApproved?'#E8F5E9':'#fff')+';color:'+(isApproved?'var(--success)':'var(--mid)')+';';
      html += 'font-size:12px;font-weight:600;cursor:pointer">';
      html += (isApproved?'✅ ':'')+d+'日（'+dow+'）';
      html += '</button>';
    });
    html += '</div>';
    if(approved.length>0){
      html += '<div style="font-size:10px;color:var(--mid);margin-top:4px">✅ 承認済: '+approved.map(function(d){return parseInt(d.slice(8))+'日';}).join('・')+'</div>';
    }
    html += '</div>';
  });
  container.innerHTML = html;
}

// ============================================================
// お直し管理
// ============================================================
function sendShiftReminder(year, month, targetId){
  const requests = DB.getShiftRequests();
  const monthReqs = requests.filter(r=>r.year===year&&r.month===month);
  const adminStore = !isOwner() && S.user?.shiftAdmin ? S.user.shiftAdmin : null;
  const allStaff = STAFF_LIST.filter(s=>s.treat&&(adminStore?s.store===adminStore||s.store==='both':true));
  const notSubmitted = allStaff.filter(s=>!monthReqs.some(r=>r.staffId===s.id));
  const targets = targetId==='all' ? notSubmitted : notSubmitted.filter(s=>s.id===targetId);

  if(targets.length===0){ alert('催促対象がいません'); return; }
  if(!confirm(targets.map(s=>s.name).join('・')+'にシフト希望の催促を送りますか？')) return;

  const msgs = DB.getMessages();
  targets.forEach(s=>{
    msgs.unshift({
      id: genId(),
      title: `【催促】${year}年${month}月 シフト希望を提出してください`,
      body: `${s.name}さん\n\n${year}年${month}月のシフト希望がまだ提出されていません。\n早めに提出をお願いします🙏\n\nシフト希望 → メニュー → 📅 シフト希望`,
      from: S.user.id, fromName: S.user.name,
      to: 'individual', toId: s.id, toName: s.name,
      date: today(), readBy: [], progress: {[s.id]: '未対応'}
    });
  });
  DB.set('messages', msgs);
  alert(`✅ ${targets.map(s=>s.name).join('・')}に催促を送りました！`);
  render();
}

function showReminderModal(year, month){
  const requests = DB.getShiftRequests();
  const monthReqs = requests.filter(r=>r.year===year&&r.month===month);
  const adminStore = !isOwner() && S.user?.shiftAdmin ? S.user.shiftAdmin : null;
  const allStaff = STAFF_LIST.filter(s=>s.treat&&(adminStore?s.store===adminStore||s.store==='both':true));
  const notSubmitted = allStaff.filter(s=>!monthReqs.some(r=>r.staffId===s.id));

  if(notSubmitted.length===0){ alert('未提出のスタッフはいません'); return; }

  let html = `<div class="modal-title">👤 個別催促</div>`;
  html += `<div style="font-size:13px;color:var(--mid);margin-bottom:12px">催促を送るスタッフを選択</div>`;
  notSubmitted.forEach(s=>{
    html += `<button class="btn btn-outline btn-block" style="margin-bottom:8px;text-align:left" onclick="sendShiftReminder(${year},${month},'${s.id}');closeModal()">
      📢 ${s.name}（${s.store==='A'?'浦和店':'広尾店'}）に催促
    </button>`;
  });
  html += `<button class="btn btn-ghost btn-sm btn-block" onclick="closeModal()">キャンセル</button>`;
  showModal(html);
}

function renderRepairs(){
  const repairs = DB.get('repairs2') || [];
  const myStore = S.user?.store;
  // オーナーは全店舗、スタッフは自店舗のみ
  const visibleRepairs = canSeeAll() ? repairs : repairs.filter(r=>r.store===myStore);
  const storeFilter = canSeeAll() ? (S.repairStore || 'all') : myStore;
  const filtered = (!canSeeAll()) ? visibleRepairs : (storeFilter==='all' ? repairs : repairs.filter(r=>r.store===storeFilter));
  return`<div class="page">
    ${canSeeAll()?`<div class="tab-row">
      <button class="tab ${storeFilter==='all'?'active':''}" onclick="S.repairStore='all';render()">🌐 全店</button>
      <button class="tab ${storeFilter==='A'?'active':''}" onclick="S.repairStore='A';render()">浦和店</button>
      <button class="tab ${storeFilter==='B'?'active':''}" onclick="S.repairStore='B';render()">広尾店</button>
    </div>`:`<div style="margin-bottom:12px"><span class="store-badge ${myStore==='A'?'store-a':'store-b'}">${myStore==='A'?'🏪 浦和店':'🏪 広尾店'}</span></div>`}
    ${filtered.length===0?`<div class="empty-state"><div class="empty-icon">💅</div><div class="empty-text">お直し記録はまだありません</div></div>`:''}
    ${filtered.map(r=>`<div class="card" onclick="openRepair('${r.id}')" style="cursor:pointer;border-left:4px solid ${r.status==='完了'?'var(--success)':'var(--warn)'}">
      <div class="card-row mb-8">
        <div>
          <span class="store-badge ${r.store==='A'?'store-a':'store-b'}">${r.store==='A'?'浦和店':'広尾店'}</span>
          <span style="font-size:12px;color:var(--mid);margin-left:6px">${r.date} · ${r.staff}</span>
        </div>
        <span class="badge ${r.status==='完了'?'badge-green':'badge-warn'}">${r.status}</span>
      </div>
      <div class="fw-bold">${r.cause}</div>
      <div style="font-size:12px;color:var(--mid);margin-top:4px">${r.action||'対応内容未記入'}</div>
      ${r.imageUrl?`<img src="${r.imageUrl}" style="width:100%;max-height:120px;object-fit:cover;border-radius:8px;margin-top:8px">`:''}
    </div>`).join('')}
    <button class="fab" onclick="showAddRepairModal()">＋</button>
  </div>`;
}

function openRepair(id){
  const r = (DB.get('repairs2')||[]).find(x=>x.id===id);
  if(!r) return;
  showModal(`
    <div class="modal-title">💅 お直し詳細</div>
    <div class="flex gap-8 mb-8">
      <span class="store-badge ${r.store==='A'?'store-a':'store-b'}">${r.store==='A'?'浦和店':'広尾店'}</span>
      <span class="badge ${r.status==='完了'?'badge-green':'badge-warn'}">${r.status}</span>
    </div>
    <div style="font-size:12px;color:var(--mid);margin-bottom:12px">${r.date} · 報告者: ${r.staff}</div>
    <div class="form-group"><div class="fw-bold mb-4">📋 原因</div><div style="background:#f5f5f5;padding:10px;border-radius:8px;font-size:14px">${r.cause}</div></div>
    <div class="form-group"><div class="fw-bold mb-4">🔧 対応内容</div><div style="background:#f5f5f5;padding:10px;border-radius:8px;font-size:14px">${r.action||'未記入'}</div></div>
    ${r.note?`<div class="form-group"><div class="fw-bold mb-4">📝 備考</div><div style="background:#f5f5f5;padding:10px;border-radius:8px;font-size:14px">${r.note}</div></div>`:''}
    ${r.imageUrl?`<img src="${r.imageUrl}" style="width:100%;border-radius:12px;margin-top:8px">`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px">
      ${(isOwner()||r.staffId===S.user?.id)?`<button class="btn btn-outline btn-sm" onclick="toggleRepairStatus('${r.id}')">
        ${r.status==='完了'?'↩️ 対応中に戻す':'✅ 完了にする'}</button>`:'<div></div>'}
      <button class="btn btn-primary btn-sm" onclick="closeModal()">閉じる</button>
    </div>`);
}

function toggleRepairStatus(id){
  const list = DB.get('repairs2')||[];
  const idx = list.findIndex(x=>x.id===id);
  if(idx>=0) list[idx].status = list[idx].status==='完了'?'対応中':'完了';
  DB.set('repairs2', list);
  closeModal(); render();
}

function showAddRepairModal(){
  const store = canSeeAll() ? (S.repairStore==='all'?'A':S.repairStore) : S.user?.store;
  showModal(`<div class="modal-title">💅 お直し記録を追加</div>
    <div class="form-group"><label class="form-label">店舗</label>
      <select class="form-input" id="rep_store">
        <option value="A" ${store==='A'?'selected':''}>浦和店</option>
        <option value="B" ${store==='B'?'selected':''}>広尾店</option>
      </select></div>
    <div class="form-group"><label class="form-label">日付</label>
      <input type="date" class="form-input" id="rep_date" value="${today()}"></div>
    <div class="form-group"><label class="form-label">原因・内容</label>
      <textarea class="form-input" id="rep_cause" rows="3" placeholder="例：チップが剥がれた、爪折れ、デザインの変更希望など"></textarea></div>
    <div class="form-group"><label class="form-label">対応内容</label>
      <textarea class="form-input" id="rep_action" rows="3" placeholder="例：付け替え対応、無料お直し、次回割引など"></textarea></div>
    <div class="form-group"><label class="form-label">備考（任意）</label>
      <input class="form-input" id="rep_note" placeholder="その他気づいたこと"></div>
    <div class="form-group">
      <label class="form-label">📸 写真（任意）</label>
      <label style="display:block;background:var(--pink-l);border:1.5px dashed var(--pink);border-radius:var(--rs);padding:10px;text-align:center;cursor:pointer">
        <span id="rep_img_label" style="color:var(--pink);font-weight:600">📷 写真を選択</span>
        <input type="file" accept="image/*" style="display:none" onchange="previewRepairImg(this)">
      </label>
      <div id="rep_img_preview" style="display:none;margin-top:8px;text-align:center">
        <img id="rep_img_previewImg" style="max-height:120px;border-radius:8px">
      </div>
    </div>
    <button class="btn btn-primary btn-block" onclick="saveRepair()">💾 保存する</button>`);
}

function previewRepairImg(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    window._repairImgData = e.target.result;
    document.getElementById('rep_img_preview').style.display='block';
    document.getElementById('rep_img_previewImg').src=e.target.result;
    document.getElementById('rep_img_label').textContent='✅ 写真選択済み';
  };
  reader.readAsDataURL(file);
}

function saveRepair(){
  const store = document.getElementById('rep_store').value;
  const date = document.getElementById('rep_date').value;
  const cause = document.getElementById('rep_cause').value.trim();
  const action = document.getElementById('rep_action').value.trim();
  const note = document.getElementById('rep_note').value.trim();
  if(!cause) return alert('原因・内容を入力してください');
  const list = DB.get('repairs2')||[];
  list.unshift({id:genId(),store,date,cause,action,note,staff:S.user?.name,staffId:S.user?.id,status:'対応中',imageUrl:window._repairImgData||null,createdAt:today()});
  DB.set('repairs2', list);
  window._repairImgData = null;
  closeModal(); render();
}

// ============================================================
// 店舗利用申請
// ============================================================
function renderStoreUsage(){
  const requests = DB.get('storeUsageReqs') || [];
  const isContractor = S.user?.contractor;
  const myReqs = isContractor ? requests.filter(r=>r.staffId===S.user?.id) : requests;
  const pending = requests.filter(r=>r.status==='申請中');

  return`<div class="page">
    ${isOwner()&&pending.length>0?`<div style="background:#FFF8E1;border:1.5px solid var(--warn);border-radius:var(--rs);padding:10px 14px;margin-bottom:12px">
      <div style="font-weight:700;color:var(--warn)">⏳ 承認待ち ${pending.length}件</div>
    </div>`:''}
    ${myReqs.length===0?`<div class="empty-state"><div class="empty-icon">🏪</div><div class="empty-text">申請はまだありません</div></div>`:''}
    ${myReqs.map(r=>`<div class="card" style="border-left:4px solid ${r.status==='承認'?'var(--success)':r.status==='却下'?'var(--danger)':'var(--warn)'}">
      <div class="card-row mb-8">
        <div>
          <span class="store-badge ${r.store==='A'?'store-a':'store-b'}">${r.store==='A'?'浦和店':'広尾店'}</span>
          <span style="font-size:12px;color:var(--mid);margin-left:6px">${r.date}</span>
        </div>
        <span class="badge ${r.status==='承認'?'badge-green':r.status==='却下'?'badge-danger':'badge-warn'}">${r.status}</span>
      </div>
      <div class="fw-bold">${r.startTime}〜${r.endTime}</div>
      <div style="font-size:13px;color:var(--mid);margin-top:4px">${r.purpose}</div>
      <div style="font-size:11px;color:var(--lite);margin-top:4px">申請者: ${r.staffName} · ${r.createdAt}</div>
      ${isOwner()&&r.status==='申請中'?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
        <button class="btn btn-primary btn-sm" onclick="approveStoreUsage('${r.id}','承認')">✅ 承認</button>
        <button class="btn btn-danger btn-sm" onclick="approveStoreUsage('${r.id}','却下')">❌ 却下</button>
      </div>`:''}
      ${r.ownerComment?`<div style="font-size:12px;margin-top:8px;padding:8px;background:#f5f5f5;border-radius:8px">💬 ${r.ownerComment}</div>`:''}
    </div>`).join('')}
    ${isContractor?`<button class="fab" onclick="showStoreUsageModal()">＋</button>`:''}
  </div>`;
}

function approveStoreUsage(id, status){
  const comment = status==='却下' ? prompt('却下理由（任意）') : null;
  const list = DB.get('storeUsageReqs')||[];
  const idx = list.findIndex(x=>x.id===id);
  if(idx>=0){
    list[idx].status = status;
    list[idx].ownerComment = comment||'';
    list[idx].approvedBy = S.user?.name;
  }
  DB.set('storeUsageReqs', list);
  render();
}

function showStoreUsageModal(){
  const store = S.user?.store==='both'?'A':S.user?.store||'A';
  showModal(`<div class="modal-title">🏪 店舗利用申請</div>
    <div style="font-size:13px;color:var(--mid);margin-bottom:12px">稼働時間外に店舗を利用したい場合に申請してください</div>
    <div class="form-group"><label class="form-label">店舗</label>
      <select class="form-input" id="su_store">
        <option value="A" ${store==='A'?'selected':''}>浦和店</option>
        <option value="B" ${store==='B'?'selected':''}>広尾店</option>
      </select></div>
    <div class="form-group"><label class="form-label">利用日</label>
      <input type="date" class="form-input" id="su_date" value="${today()}"></div>
    <div class="form-group"><label class="form-label">利用時間</label>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center">
        <input type="time" class="form-input" id="su_start" value="20:00">
        <span>〜</span>
        <input type="time" class="form-input" id="su_end" value="22:00">
      </div></div>
    <div class="form-group"><label class="form-label">利用目的</label>
      <textarea class="form-input" id="su_purpose" rows="3" placeholder="例：自習・練習・ネイルケアなど"></textarea></div>
    <button class="btn btn-primary btn-block" onclick="submitStoreUsage()">📤 申請する</button>`);
}

function submitStoreUsage(){
  const store = document.getElementById('su_store').value;
  const date = document.getElementById('su_date').value;
  const startTime = document.getElementById('su_start').value;
  const endTime = document.getElementById('su_end').value;
  const purpose = document.getElementById('su_purpose').value.trim();
  if(!date||!purpose) return alert('日付と利用目的を入力してください');
  const list = DB.get('storeUsageReqs')||[];
  list.unshift({id:genId(),store,date,startTime,endTime,purpose,staffId:S.user?.id,staffName:S.user?.name,status:'申請中',createdAt:today()});
  DB.set('storeUsageReqs', list);
  closeModal(); render();
  alert('✅ 申請を送信しました！オーナーが確認後、承認/却下の通知があります。');
}

// ============================================================
// INIT
// ============================================================
window._appMounted = true;
render();
</script>
